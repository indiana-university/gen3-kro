# ── Operator preferences for spoke1 / spoke1dev.rds-pla.net ──────────────────
# Layer 1 of the 3-layer values architecture.
# ARNs, endpoints, and bucket names are injected via helm.parameters from
# KRO bridge ConfigMaps (Layer 2) and override any values here.
# ---------------------------------------------------------------------------

global:
  aws:
    enabled: true
    scheme: internet-facing  # required by revproxy ingress_aws.yaml template
    # account, hatchery_role, secretStoreServiceAccount.roleArn,
    # and wafv2.wafAclArn are injected by KRO bridge ConfigMaps.
    secretStoreServiceAccount:
      enabled: true
      name: external-secrets
    wafv2:
      enabled: false
  dev: false
  externalSecrets:
    deploy: true
    clusterSecretStoreRef: "gen3-secret-store"  # ClusterSecretStore created by Database1 RGD
  postgres:
    dbCreate: true
    externalSecret: "spoke1-aurora-master-password"
  environment: "spoke1"
  hostname: "spoke1dev.rds-pla.net"
  # revproxyArn injected by KRO acmBridge.dns-bridge (acm-certificate-arn)
  dictionaryUrl: "https://dictionary.ardac.org/2.2.2/schema.json"
  portalApp: gitops
  publicDataSets: false
  tierAccessLevel: "private"
  tierAccessLimit: "100"
  netPolicy:
    enabled: false
  dispatcherJobNum: "10"
  frontendRoot: "portal"
  ddEnabled: false

ambassador:
  enabled: true

arborist:
  enabled: true
  externalSecrets:
    dbcreds: "spoke1-default-arborist-creds"

argo-wrapper:
  enabled: false

audit:
  enabled: true
  externalSecrets:
    dbcreds: "spoke1-default-audit-creds"
    createK8sAuditSecret: true

aws-es-proxy:
  enabled: false  # enable when Search1 (OpenSearch) is deployed and guppy/etl are enabled

dicom-server:
  enabled: false

dicom-viewer:
  enabled: false

etl:
  enabled: false  # requires OpenSearch + data dictionary ETL setup; enable when Search1 is configured

fence:
  enabled: true
  resources:
    requests:
      memory: "105Mi"
      cpu: "15m"
  replicaCount: 2

  externalSecrets:
    dbcreds: "spoke1-default-fence-creds"
    createK8sFenceConfigSecret: true    # keep fence-config K8s Secret even with ESO enabled
    createK8sJwtKeysSecret: true        # keep fence-jwt-keys K8s Secret even with ESO enabled
    createK8sGoogleAppSecrets: false

  USER_YAML: |
    {}

  usersync:
    usersync: true
    schedule: "*/30 * * * *"
    syncFromDbgap: false
    userYamlS3Path: "s3://gen3-users/sepoke1-users/user.yaml"
    slack_webhook: ""
    slack_send_dbgap: false

guppy:
  enabled: false

hatchery:
  enabled: false

indexd:
  enabled: true
  externalSecrets:
    dbcreds: "spoke1-default-indexd-creds"
    createK8sServiceCredsSecret: true  # keep indexd service creds K8s Secret with ESO enabled

manifestservice:
  enabled: false

metadata:
  enabled: true
  externalSecrets:
    dbcreds: "spoke1-default-metadata-creds"

peregrine:
  enabled: true
  externalSecrets:
    dbcreds: "spoke1-default-peregrine-creds"

pidgin:
  enabled: false

portal:
  enabled: false

requestor:
  enabled: false

revproxy:
  enabled: true

sheepdog:
  enabled: true
  externalSecrets:
    dbcreds: "spoke1-default-sheepdog-creds"

ssjdispatcher:
  enabled: false

wts:
  enabled: true
  externalSecrets:
    dbcreds: "spoke1-default-wts-creds"
    wtsG3auto: "spoke1-default-wts-g3auto"
    wtsOidcClient: "spoke1-default-wts-oidc-client"
