# Kind cluster override. Applied on top of ../values.yaml when cluster_type=kind.
# Base values define versions, chart repositories, selectors, namespaces, and
# shared Helm values. This file only enables addons and adds Kind-specific drift
# handling/credential settings.

globalSelectors:
  cluster_type: kind

########################################
# CSOC platform components
########################################

self-managed-kro:
  enabled: true

kro-csoc-rgs:
  enabled: true

external-secrets:
  enabled: true

########################################
# ACK controllers
########################################

ack-cloudtrail:
  enabled: false
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/template/spec/containers/0/env

ack-cloudwatchlogs:
  enabled: false
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/template/spec/containers/0/env

