# AwsGen3SecretDependent1 — Phase 4 companion: AWS SM secrets that depend on
# infrastructure being ready (WTS OIDC from fence, audit SQS URL, manifest bucket).
# Each secret uses one action key in gen3-secret-bootstrap: update, none, or delete.
# update creates/restores/overwrites the AWS Secrets Manager value; none creates no Job;
# delete schedules the AWS secret for deletion with the configured recovery window.
apiVersion: kro.run/v1alpha1
kind: ResourceGraphDefinition
metadata:
  name: awsgen3secretdependent1
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  schema:
    apiVersion: v1alpha1
    kind: AwsGen3SecretDependent1
    spec:
      name: string | required=true
      namespace: string | required=true
      infrastructureConfigMapName: string | default="infrastructure-values"
      secretWriterImage: string | default="quay.io/cdis/awshelper:master"

    status:
      wtsG3AutoCreated: "${wtsG3AutoUpdateJob.status.?succeeded.orValue(0) == 1 ? 'true' : 'false'}"
      wtsG3AutoUpdated: "${wtsG3AutoUpdateJob.status.?succeeded.orValue(0) == 1 ? 'true' : 'false'}"
      wtsG3AutoDeleted: "${wtsG3AutoDeleteJob.status.?succeeded.orValue(0) == 1 ? 'true' : 'false'}"
      auditG3AutoCreated: "${auditG3AutoUpdateJob.status.?succeeded.orValue(0) == 1 ? 'true' : 'false'}"
      auditG3AutoUpdated: "${auditG3AutoUpdateJob.status.?succeeded.orValue(0) == 1 ? 'true' : 'false'}"
      auditG3AutoDeleted: "${auditG3AutoDeleteJob.status.?succeeded.orValue(0) == 1 ? 'true' : 'false'}"
      manifestserviceG3AutoCreated: "${manifestserviceG3AutoUpdateJob.status.?succeeded.orValue(0) == 1 ? 'true' : 'false'}"
      manifestserviceG3AutoUpdated: "${manifestserviceG3AutoUpdateJob.status.?succeeded.orValue(0) == 1 ? 'true' : 'false'}"
      manifestserviceG3AutoDeleted: "${manifestserviceG3AutoDeleteJob.status.?succeeded.orValue(0) == 1 ? 'true' : 'false'}"

  resources:

    - id: infrastructureConfig
      readyWhen:
        - ${infrastructureConfig.metadata.?name.orValue('null') != 'null'}
      externalRef:
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: ${schema.spec.infrastructureConfigMapName}
          namespace: ${schema.spec.namespace}

    - id: secretWriterServiceAccount
      readyWhen:
        - ${secretWriterServiceAccount.metadata.?name.orValue('null') != 'null'}
      externalRef:
        apiVersion: v1
        kind: ServiceAccount
        metadata:
          name: gen3-secret-writer-sa
          namespace: ${schema.spec.namespace}

    - id: bootstrapSecret
      readyWhen:
        - ${bootstrapSecret.metadata.?name.orValue('null') != 'null'}
      externalRef:
        apiVersion: v1
        kind: Secret
        metadata:
          name: gen3-secret-bootstrap
          namespace: ${schema.spec.namespace}

    # -- WTS g3auto ----------------------------------------------------------
    # Sources: gen3-secret-bootstrap/wts-encryption-key, wts-secret-key, wts-oidc-client-id, wts-oidc-client-secret
    # Infra: infrastructure-values/dns-hostname
    # Action key: gen3-secret-bootstrap/wts-g3auto-action (update|none|delete)
    - id: wtsG3AutoUpdateJob
      includeWhen:
        - "${('secret-action-wts-g3auto' in infrastructureConfig.data && infrastructureConfig.data['secret-action-wts-g3auto'] == 'update') || ((!('secret-action-wts-g3auto' in infrastructureConfig.data) || infrastructureConfig.data['secret-action-wts-g3auto'] == '') && ('wts-g3auto-action' in bootstrapSecret.data ? bootstrapSecret.data['wts-g3auto-action'] : b'none') == b'update')}"
      readyWhen:
        - ${wtsG3AutoUpdateJob.status.?succeeded.orValue(0) == 1}
      template:
        apiVersion: batch/v1
        kind: Job
        metadata:
          name: ${schema.spec.name}-wts-g3auto-update
          namespace: ${schema.spec.namespace}
          labels:
            app.kubernetes.io/managed-by: kro
            gen3.io/tier: secret-dependent
            gen3.io/secret-purpose: wts-g3auto
            gen3.io/secret-action: update
        spec:
          backoffLimit: 3
          template:
            spec:
              serviceAccountName: ${secretWriterServiceAccount.metadata.name}
              restartPolicy: Never
              volumes:
                - name: bootstrap-secret
                  secret:
                    secretName: gen3-secret-bootstrap
                    optional: true
              containers:
                - name: update-secret
                  image: ${schema.spec.secretWriterImage}
                  imagePullPolicy: IfNotPresent
                  volumeMounts:
                    - name: bootstrap-secret
                      mountPath: /bootstrap-secret
                      readOnly: true
                  env:
                    - name: AWS_REGION
                      value: ${infrastructureConfig.data['aws-region']}
                    - name: SECRET_NAME
                      value: "${schema.spec.name + '-' + schema.spec.namespace + '-' + (infrastructureConfig.data['secret-name-wts-g3auto'] != '' ? infrastructureConfig.data['secret-name-wts-g3auto'] : 'wts-g3auto')}"
                    - name: HOSTNAME
                      value: ${infrastructureConfig.data['dns-hostname']}
                    - name: BOOTSTRAP_SECRET_DIR
                      value: /bootstrap-secret
                    - name: SPOKE_ROLE_ARN
                      value: ${secretWriterServiceAccount.metadata.annotations['gen3.io/spoke-role-arn']}
                  command:
                    - /bin/bash
                    - -c
                  args:
                    - |
                      set -euo pipefail

                      assume_spoke_role() {
                        if [[ -z "$SPOKE_ROLE_ARN" ]]; then
                          echo "Missing gen3.io/spoke-role-arn annotation on secret writer service account." >&2
                          exit 1
                        fi

                        local creds
                        creds="$(aws sts assume-role \
                          --region "$AWS_REGION" \
                          --role-arn "$SPOKE_ROLE_ARN" \
                          --role-session-name gen3-secret-writer \
                          --query 'Credentials.[AccessKeyId,SecretAccessKey,SessionToken]' \
                          --output text)"
                        read -r AWS_ACCESS_KEY_ID AWS_SECRET_ACCESS_KEY AWS_SESSION_TOKEN <<< "$creds"
                        export AWS_ACCESS_KEY_ID AWS_SECRET_ACCESS_KEY AWS_SESSION_TOKEN
                      }

                      ensure_secret_writable() {
                        local deleted_date
                        deleted_date="$(aws secretsmanager describe-secret \
                          --region "$AWS_REGION" \
                          --secret-id "$SECRET_NAME" \
                          --query 'DeletedDate' \
                          --output text 2>/dev/null || true)"

                        if [[ "$deleted_date" == "None" ]]; then
                          return
                        fi

                        if [[ -n "$deleted_date" ]]; then
                          aws secretsmanager restore-secret \
                            --region "$AWS_REGION" \
                            --secret-id "$SECRET_NAME" >/dev/null
                          echo "$SECRET_NAME restored before update."
                          return
                        fi

                        aws secretsmanager create-secret \
                          --region "$AWS_REGION" \
                          --name "$SECRET_NAME" \
                          --secret-string '{}' >/dev/null
                      }

                      assume_spoke_role

                      bootstrap_value() {
                        local key="$1"
                        local path="$BOOTSTRAP_SECRET_DIR/$key"
                        if [[ ! -f "$path" ]]; then
                          echo "Missing bootstrap secret key '$key'." >&2
                          exit 1
                        fi
                        cat "$path"
                      }

                      encryption_key="$(bootstrap_value "wts-encryption-key")"
                      secret_key="$(bootstrap_value "wts-secret-key")"
                      oidc_client_id="$(bootstrap_value "wts-oidc-client-id")"
                      oidc_client_secret="$(bootstrap_value "wts-oidc-client-secret")"

                      payload="$(python3 - "$encryption_key" "$secret_key" "$oidc_client_id" "$oidc_client_secret" <<'PY'
                      import json, sys, os
                      enc_key, sec_key, client_id, client_secret = sys.argv[1:5]
                      hostname = os.environ['HOSTNAME']
                      appcreds = {
                          "wts_base_url": f"https://{hostname}/wts/",
                          "encryption_key": enc_key.strip(),
                          "secret_key": sec_key.strip(),
                          "fence_base_url": f"https://{hostname}/user",
                          "oidc_client_id": client_id.strip(),
                          "oidc_client_secret": client_secret.strip(),
                          "external_oidc": [],
                      }
                      print(json.dumps({
                          "appcreds.json": json.dumps(appcreds),
                          "created": "true",
                      }))
                      PY
                      )"

                      ensure_secret_writable

                      aws secretsmanager put-secret-value \
                        --region "$AWS_REGION" \
                        --secret-id "$SECRET_NAME" \
                        --secret-string "$payload"

                      echo "wts-g3auto secret updated."

    - id: wtsG3AutoDeleteJob
      includeWhen:
        - "${('secret-action-wts-g3auto' in infrastructureConfig.data && infrastructureConfig.data['secret-action-wts-g3auto'] == 'delete') || ((!('secret-action-wts-g3auto' in infrastructureConfig.data) || infrastructureConfig.data['secret-action-wts-g3auto'] == '') && ('wts-g3auto-action' in bootstrapSecret.data ? bootstrapSecret.data['wts-g3auto-action'] : b'none') == b'delete')}"
      readyWhen:
        - ${wtsG3AutoDeleteJob.status.?succeeded.orValue(0) == 1}
      template:
        apiVersion: batch/v1
        kind: Job
        metadata:
          name: ${schema.spec.name}-wts-g3auto-delete
          namespace: ${schema.spec.namespace}
          labels:
            app.kubernetes.io/managed-by: kro
            gen3.io/tier: secret-dependent
            gen3.io/secret-purpose: wts-g3auto
            gen3.io/secret-action: delete
        spec:
          backoffLimit: 3
          template:
            spec:
              serviceAccountName: ${secretWriterServiceAccount.metadata.name}
              restartPolicy: Never
              containers:
                - name: delete-secret
                  image: ${schema.spec.secretWriterImage}
                  imagePullPolicy: IfNotPresent
                  env:
                    - name: AWS_REGION
                      value: ${infrastructureConfig.data['aws-region']}
                    - name: SECRET_NAME
                      value: "${schema.spec.name + '-' + schema.spec.namespace + '-' + (infrastructureConfig.data['secret-name-wts-g3auto'] != '' ? infrastructureConfig.data['secret-name-wts-g3auto'] : 'wts-g3auto')}"
                    - name: SPOKE_ROLE_ARN
                      value: ${secretWriterServiceAccount.metadata.annotations['gen3.io/spoke-role-arn']}
                  command:
                    - /bin/bash
                    - -c
                  args:
                    - |
                      set -euo pipefail

                      assume_spoke_role() {
                        if [[ -z "$SPOKE_ROLE_ARN" ]]; then
                          echo "Missing gen3.io/spoke-role-arn annotation on secret writer service account." >&2
                          exit 1
                        fi

                        local creds
                        creds="$(aws sts assume-role \
                          --region "$AWS_REGION" \
                          --role-arn "$SPOKE_ROLE_ARN" \
                          --role-session-name gen3-secret-writer \
                          --query 'Credentials.[AccessKeyId,SecretAccessKey,SessionToken]' \
                          --output text)"
                        read -r AWS_ACCESS_KEY_ID AWS_SECRET_ACCESS_KEY AWS_SESSION_TOKEN <<< "$creds"
                        export AWS_ACCESS_KEY_ID AWS_SECRET_ACCESS_KEY AWS_SESSION_TOKEN
                      }

                      assume_spoke_role

                      deleted_date="$(aws secretsmanager describe-secret \
                        --region "$AWS_REGION" \
                        --secret-id "$SECRET_NAME" \
                        --query 'DeletedDate' \
                        --output text 2>/dev/null || true)"

                      if [[ -n "$deleted_date" && "$deleted_date" != "None" ]]; then
                        echo "$SECRET_NAME is already scheduled for deletion."
                      elif aws secretsmanager describe-secret --region "$AWS_REGION" --secret-id "$SECRET_NAME" >/dev/null 2>&1; then
                        aws secretsmanager delete-secret \
                          --region "$AWS_REGION" \
                          --secret-id "$SECRET_NAME" \
                          --recovery-window-in-days 7 >/dev/null
                        echo "$SECRET_NAME scheduled for deletion."
                      else
                        echo "$SECRET_NAME does not exist in AWS; nothing to delete."
                      fi
    # -- Audit g3auto --------------------------------------------------------
    # Source: gen3-secret-bootstrap/audit-sqs-url (operator fills after messaging is ready)
    # Action key: gen3-secret-bootstrap/audit-g3auto-action (update|none|delete)
    - id: auditG3AutoUpdateJob
      includeWhen:
        - "${('secret-action-audit-g3auto' in infrastructureConfig.data && infrastructureConfig.data['secret-action-audit-g3auto'] == 'update') || ((!('secret-action-audit-g3auto' in infrastructureConfig.data) || infrastructureConfig.data['secret-action-audit-g3auto'] == '') && ('audit-g3auto-action' in bootstrapSecret.data ? bootstrapSecret.data['audit-g3auto-action'] : b'none') == b'update')}"
      readyWhen:
        - ${auditG3AutoUpdateJob.status.?succeeded.orValue(0) == 1}
      template:
        apiVersion: batch/v1
        kind: Job
        metadata:
          name: ${schema.spec.name}-audit-g3auto-update
          namespace: ${schema.spec.namespace}
          labels:
            app.kubernetes.io/managed-by: kro
            gen3.io/tier: secret-dependent
            gen3.io/secret-purpose: audit-g3auto
            gen3.io/secret-action: update
        spec:
          backoffLimit: 3
          template:
            spec:
              serviceAccountName: ${secretWriterServiceAccount.metadata.name}
              restartPolicy: Never
              volumes:
                - name: bootstrap-secret
                  secret:
                    secretName: gen3-secret-bootstrap
                    optional: true
              containers:
                - name: update-secret
                  image: ${schema.spec.secretWriterImage}
                  imagePullPolicy: IfNotPresent
                  volumeMounts:
                    - name: bootstrap-secret
                      mountPath: /bootstrap-secret
                      readOnly: true
                  env:
                    - name: AWS_REGION
                      value: ${infrastructureConfig.data['aws-region']}
                    - name: SECRET_NAME
                      value: "${schema.spec.name + '-' + schema.spec.namespace + '-' + (infrastructureConfig.data['secret-name-audit-g3auto'] != '' ? infrastructureConfig.data['secret-name-audit-g3auto'] : 'audit-g3auto')}"
                    - name: BOOTSTRAP_SECRET_DIR
                      value: /bootstrap-secret
                    - name: SPOKE_ROLE_ARN
                      value: ${secretWriterServiceAccount.metadata.annotations['gen3.io/spoke-role-arn']}
                  command:
                    - /bin/bash
                    - -c
                  args:
                    - |
                      set -euo pipefail

                      assume_spoke_role() {
                        if [[ -z "$SPOKE_ROLE_ARN" ]]; then
                          echo "Missing gen3.io/spoke-role-arn annotation on secret writer service account." >&2
                          exit 1
                        fi

                        local creds
                        creds="$(aws sts assume-role \
                          --region "$AWS_REGION" \
                          --role-arn "$SPOKE_ROLE_ARN" \
                          --role-session-name gen3-secret-writer \
                          --query 'Credentials.[AccessKeyId,SecretAccessKey,SessionToken]' \
                          --output text)"
                        read -r AWS_ACCESS_KEY_ID AWS_SECRET_ACCESS_KEY AWS_SESSION_TOKEN <<< "$creds"
                        export AWS_ACCESS_KEY_ID AWS_SECRET_ACCESS_KEY AWS_SESSION_TOKEN
                      }

                      ensure_secret_writable() {
                        local deleted_date
                        deleted_date="$(aws secretsmanager describe-secret \
                          --region "$AWS_REGION" \
                          --secret-id "$SECRET_NAME" \
                          --query 'DeletedDate' \
                          --output text 2>/dev/null || true)"

                        if [[ "$deleted_date" == "None" ]]; then
                          return
                        fi

                        if [[ -n "$deleted_date" ]]; then
                          aws secretsmanager restore-secret \
                            --region "$AWS_REGION" \
                            --secret-id "$SECRET_NAME" >/dev/null
                          echo "$SECRET_NAME restored before update."
                          return
                        fi

                        aws secretsmanager create-secret \
                          --region "$AWS_REGION" \
                          --name "$SECRET_NAME" \
                          --secret-string '{}' >/dev/null
                      }

                      assume_spoke_role

                      audit_sqs_url="$(cat "$BOOTSTRAP_SECRET_DIR/audit-sqs-url" 2>/dev/null || true)"
                      if [[ -z "$audit_sqs_url" ]]; then
                        echo "Missing audit-sqs-url in bootstrap secret." >&2
                        exit 1
                      fi

                      audit_config="$(python3 - "$audit_sqs_url" <<'PY'
                      import json, sys, os
                      print(json.dumps({
                          "sqs_url": sys.argv[1].strip(),
                          "aws_region": os.environ['AWS_REGION'],
                      }))
                      PY
                      )"

                      ensure_secret_writable

                      aws secretsmanager put-secret-value \
                        --region "$AWS_REGION" \
                        --secret-id "$SECRET_NAME" \
                        --secret-string "$audit_config"

                      echo "audit-g3auto secret updated."

    - id: auditG3AutoDeleteJob
      includeWhen:
        - "${('secret-action-audit-g3auto' in infrastructureConfig.data && infrastructureConfig.data['secret-action-audit-g3auto'] == 'delete') || ((!('secret-action-audit-g3auto' in infrastructureConfig.data) || infrastructureConfig.data['secret-action-audit-g3auto'] == '') && ('audit-g3auto-action' in bootstrapSecret.data ? bootstrapSecret.data['audit-g3auto-action'] : b'none') == b'delete')}"
      readyWhen:
        - ${auditG3AutoDeleteJob.status.?succeeded.orValue(0) == 1}
      template:
        apiVersion: batch/v1
        kind: Job
        metadata:
          name: ${schema.spec.name}-audit-g3auto-delete
          namespace: ${schema.spec.namespace}
          labels:
            app.kubernetes.io/managed-by: kro
            gen3.io/tier: secret-dependent
            gen3.io/secret-purpose: audit-g3auto
            gen3.io/secret-action: delete
        spec:
          backoffLimit: 3
          template:
            spec:
              serviceAccountName: ${secretWriterServiceAccount.metadata.name}
              restartPolicy: Never
              containers:
                - name: delete-secret
                  image: ${schema.spec.secretWriterImage}
                  imagePullPolicy: IfNotPresent
                  env:
                    - name: AWS_REGION
                      value: ${infrastructureConfig.data['aws-region']}
                    - name: SECRET_NAME
