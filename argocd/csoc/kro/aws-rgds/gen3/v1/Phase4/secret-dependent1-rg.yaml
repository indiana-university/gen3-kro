# AwsGen3SecretDependent1 — Phase 4 companion: three AWS SM secrets that depend on
# infrastructure being ready (WTS OIDC from fence, audit SQS URL, manifest bucket).
# Each Job reads a run-flag from gen3-secret-bootstrap K8s Secret and seeds the
# corresponding AWS Secrets Manager secret by name (no ACK Secret CRs, no bridge ConfigMaps).
apiVersion: kro.run/v1alpha1
kind: ResourceGraphDefinition
metadata:
  name: awsgen3secretdependent1
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  schema:
    apiVersion: v1alpha1
    kind: AwsGen3SecretDependent1
    spec:
      name: string | required=true
      namespace: string | required=true
      infrastructureConfigMapName: string | default="infrastructure-values"
      secretWriterImage: string | default="quay.io/cdis/awshelper:master"

    status:
      wtsG3AutoCreated: "${wtsG3AutoJob.status.?succeeded.orValue(0) == 1 ? 'true' : 'false'}"
      auditG3AutoCreated: "${auditG3AutoJob.status.?succeeded.orValue(0) == 1 ? 'true' : 'false'}"
      manifestserviceG3AutoCreated: "${manifestserviceG3AutoJob.status.?succeeded.orValue(0) == 1 ? 'true' : 'false'}"

  resources:
    - id: infrastructureConfig
      readyWhen:
        - ${infrastructureConfig.metadata.?name.orValue('null') != 'null'}
      externalRef:
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: ${schema.spec.infrastructureConfigMapName}
          namespace: ${schema.spec.namespace}

    - id: secretWriterServiceAccount
      readyWhen:
        - ${secretWriterServiceAccount.metadata.?name.orValue('null') != 'null'}
      externalRef:
        apiVersion: v1
        kind: ServiceAccount
        metadata:
          name: gen3-secret-writer-sa
          namespace: ${schema.spec.namespace}

    # ── WTS g3auto ────────────────────────────────────────────────────────────
    # Sources: gen3-secret-bootstrap/wts-encryption-key, wts-secret-key,
    #          wts-oidc-client-id, wts-oidc-client-secret
    # Infra: infrastructure-values/dns-hostname
    # Run flag: gen3-secret-bootstrap/run-wts-g3auto-job
    - id: wtsG3AutoJob
      readyWhen:
        - ${wtsG3AutoJob.status.?succeeded.orValue(0) == 1}
      template:
        apiVersion: batch/v1
        kind: Job
        metadata:
          name: ${schema.spec.name}-wts-g3auto-sync
          namespace: ${schema.spec.namespace}
          labels:
            app.kubernetes.io/managed-by: kro
            gen3.io/tier: secret-dependent
            gen3.io/secret-purpose: wts-g3auto
        spec:
          backoffLimit: 3
          template:
            spec:
              serviceAccountName: ${secretWriterServiceAccount.metadata.name}
              restartPolicy: Never
              volumes:
                - name: bootstrap-secret
                  secret:
                    secretName: gen3-secret-bootstrap
                    optional: true
              containers:
                - name: sync-secret-value
                  image: ${schema.spec.secretWriterImage}
                  imagePullPolicy: IfNotPresent
                  volumeMounts:
                    - name: bootstrap-secret
                      mountPath: /bootstrap-secret
                      readOnly: true
                  env:
                    - name: AWS_REGION
                      value: ${infrastructureConfig.data['aws-region']}
                    - name: SECRET_NAME
                      value: "${schema.spec.name + '-' + schema.spec.namespace + '-' + (infrastructureConfig.data['secret-name-wts-g3auto'] != '' ? infrastructureConfig.data['secret-name-wts-g3auto'] : 'wts-g3auto')}"
                    - name: HOSTNAME
                      value: ${infrastructureConfig.data['dns-hostname']}
                    - name: BOOTSTRAP_SECRET_DIR
                      value: /bootstrap-secret
                  command:
                    - /bin/bash
                    - -c
                  args:
                    - |
                      set -euo pipefail

                      run_flag="$(cat "${BOOTSTRAP_SECRET_DIR}/run-wts-g3auto-job" 2>/dev/null || echo "false")"
                      if [[ "$run_flag" != "true" ]]; then
                        echo "run-wts-g3auto-job != 'true'; skipping."
                        exit 0
                      fi

                      existing="$(aws secretsmanager get-secret-value \
                        --region "$AWS_REGION" \
                        --secret-id "$SECRET_NAME" \
                        --query SecretString \
                        --output text 2>/dev/null || true)"

                      if python3 - "$existing" <<'PY'
                      import json, sys
                      try:
                          data = json.loads(sys.argv[1] or "{}")
                      except Exception:
                          sys.exit(1)
                      sys.exit(0 if str(data.get("created", "")).lower() == "true" else 1)
                      PY
                      then
                        echo "wts-g3auto already marked created=true; skipping."
                        exit 0
                      fi

                      bootstrap_value() {
                        local key="$1"
                        local path="$BOOTSTRAP_SECRET_DIR/$key"
                        if [[ ! -f "$path" ]]; then
                          echo "Missing bootstrap secret key '$key'." >&2
                          exit 1
                        fi
                        cat "$path"
                      }

                      encryption_key="$(bootstrap_value "wts-encryption-key")"
                      secret_key="$(bootstrap_value "wts-secret-key")"
                      oidc_client_id="$(bootstrap_value "wts-oidc-client-id")"
                      oidc_client_secret="$(bootstrap_value "wts-oidc-client-secret")"

                      payload="$(python3 - "$encryption_key" "$secret_key" "$oidc_client_id" "$oidc_client_secret" <<'PY'
                      import json, sys, os
                      enc_key, sec_key, client_id, client_secret = sys.argv[1:5]
                      hostname = os.environ['HOSTNAME']
                      appcreds = {
                          "wts_base_url": f"https://{hostname}/wts/",
                          "encryption_key": enc_key.strip(),
                          "secret_key": sec_key.strip(),
                          "fence_base_url": f"https://{hostname}/user",
                          "oidc_client_id": client_id.strip(),
                          "oidc_client_secret": client_secret.strip(),
                          "external_oidc": [],
                      }
                      print(json.dumps({
                          "appcreds.json": json.dumps(appcreds),
                          "created": "true",
                      }))
                      PY
                      )"

                      aws secretsmanager create-secret \
                        --region "$AWS_REGION" \
                        --name "$SECRET_NAME" \
                        --secret-string '{}' \
                        2>/dev/null || true

                      aws secretsmanager put-secret-value \
                        --region "$AWS_REGION" \
                        --secret-id "$SECRET_NAME" \
                        --secret-string "$payload"

                      echo "wts-g3auto secret seeded."

    # ── Audit g3auto ──────────────────────────────────────────────────────────
    # Source: gen3-secret-bootstrap/audit-sqs-url (operator fills after messaging is ready)
    # Run flag: gen3-secret-bootstrap/run-audit-g3auto-job
    - id: auditG3AutoJob
      readyWhen:
        - ${auditG3AutoJob.status.?succeeded.orValue(0) == 1}
      template:
        apiVersion: batch/v1
        kind: Job
        metadata:
          name: ${schema.spec.name}-audit-g3auto-sync
          namespace: ${schema.spec.namespace}
          labels:
            app.kubernetes.io/managed-by: kro
            gen3.io/tier: secret-dependent
            gen3.io/secret-purpose: audit-g3auto
        spec:
          backoffLimit: 3
          template:
            spec:
              serviceAccountName: ${secretWriterServiceAccount.metadata.name}
              restartPolicy: Never
              volumes:
                - name: bootstrap-secret
                  secret:
                    secretName: gen3-secret-bootstrap
                    optional: true
              containers:
                - name: sync-secret-value
                  image: ${schema.spec.secretWriterImage}
                  imagePullPolicy: IfNotPresent
                  volumeMounts:
                    - name: bootstrap-secret
                      mountPath: /bootstrap-secret
                      readOnly: true
                  env:
                    - name: AWS_REGION
                      value: ${infrastructureConfig.data['aws-region']}
                    - name: SECRET_NAME
                      value: "${schema.spec.name + '-' + schema.spec.namespace + '-' + (infrastructureConfig.data['secret-name-audit-g3auto'] != '' ? infrastructureConfig.data['secret-name-audit-g3auto'] : 'audit-g3auto')}"
                    - name: BOOTSTRAP_SECRET_DIR
                      value: /bootstrap-secret
                  command:
                    - /bin/bash
                    - -c
                  args:
                    - |
                      set -euo pipefail

                      run_flag="$(cat "${BOOTSTRAP_SECRET_DIR}/run-audit-g3auto-job" 2>/dev/null || echo "false")"
                      if [[ "$run_flag" != "true" ]]; then
                        echo "run-audit-g3auto-job != 'true'; skipping."
                        exit 0
                      fi

                      audit_sqs_url="$(cat "${BOOTSTRAP_SECRET_DIR}/audit-sqs-url" 2>/dev/null || true)"
                      if [[ -z "$audit_sqs_url" ]]; then
                        echo "Missing audit-sqs-url in bootstrap secret." >&2
                        exit 1
                      fi

                      existing="$(aws secretsmanager get-secret-value \
                        --region "$AWS_REGION" \
                        --secret-id "$SECRET_NAME" \
                        --query SecretString \
                        --output text 2>/dev/null || true)"

                      if [[ -n "$existing" && "$existing" != "None" ]]; then
                        echo "audit-g3auto already exists in AWS; leaving it unchanged."
                        exit 0
                      fi

                      audit_config="$(python3 - "$audit_sqs_url" <<'PY'
                      import json, sys, os
                      print(json.dumps({
                          "sqs_url": sys.argv[1].strip(),
                          "aws_region": os.environ['AWS_REGION'],
                      }))
                      PY
                      )"

                      aws secretsmanager create-secret \
                        --region "$AWS_REGION" \
                        --name "$SECRET_NAME" \
                        --secret-string '{}' \
                        2>/dev/null || true

                      aws secretsmanager put-secret-value \
                        --region "$AWS_REGION" \
                        --secret-id "$SECRET_NAME" \
                        --secret-string "$audit_config"

                      echo "audit-g3auto secret seeded."

    # ── Manifestservice g3auto ────────────────────────────────────────────────
    # Infra: infrastructure-values/storage-manifest-bucket-name, dns-hostname
    # Run flag: gen3-secret-bootstrap/run-manifestservice-g3auto-job
    - id: manifestserviceG3AutoJob
      readyWhen:
        - ${manifestserviceG3AutoJob.status.?succeeded.orValue(0) == 1}
      template:
        apiVersion: batch/v1
        kind: Job
        metadata:
          name: ${schema.spec.name}-manifestservice-g3auto-sync
          namespace: ${schema.spec.namespace}
          labels:
            app.kubernetes.io/managed-by: kro
            gen3.io/tier: secret-dependent
            gen3.io/secret-purpose: manifestservice-g3auto
        spec:
          backoffLimit: 3
          template:
            spec:
              serviceAccountName: ${secretWriterServiceAccount.metadata.name}
              restartPolicy: Never
              volumes:
                - name: bootstrap-secret
                  secret:
                    secretName: gen3-secret-bootstrap
                    optional: true
              containers:
                - name: sync-secret-value
                  image: ${schema.spec.secretWriterImage}
                  imagePullPolicy: IfNotPresent
                  volumeMounts:
                    - name: bootstrap-secret
                      mountPath: /bootstrap-secret
                      readOnly: true
                  env:
                    - name: AWS_REGION
                      value: ${infrastructureConfig.data['aws-region']}
                    - name: SECRET_NAME
                      value: "${schema.spec.name + '-' + schema.spec.namespace + '-' + (infrastructureConfig.data['secret-name-manifestservice-g3auto'] != '' ? infrastructureConfig.data['secret-name-manifestservice-g3auto'] : 'manifestservice-g3auto')}"
                    - name: MANIFEST_BUCKET_NAME
                      value: ${infrastructureConfig.data['storage-manifest-bucket-name']}
                    - name: HOSTNAME
                      value: ${infrastructureConfig.data['dns-hostname']}
                    - name: GEN3_INSTANCE_NAME
                      value: ${schema.spec.name}
                    - name: BOOTSTRAP_SECRET_DIR
                      value: /bootstrap-secret
                  command:
                    - /bin/bash
                    - -c
                  args:
                    - |
                      set -euo pipefail

                      run_flag="$(cat "${BOOTSTRAP_SECRET_DIR}/run-manifestservice-g3auto-job" 2>/dev/null || echo "false")"
                      if [[ "$run_flag" != "true" ]]; then
                        echo "run-manifestservice-g3auto-job != 'true'; skipping."
                        exit 0
                      fi

                      existing="$(aws secretsmanager get-secret-value \
                        --region "$AWS_REGION" \
                        --secret-id "$SECRET_NAME" \
                        --query SecretString \
                        --output text 2>/dev/null || true)"

                      if [[ -n "$existing" && "$existing" != "None" ]]; then
                        echo "manifestservice-g3auto already exists in AWS; leaving it unchanged."
                        exit 0
                      fi

                      config="$(python3 - <<'PY'
                      import os, json
                      print(json.dumps({
                          "manifest_bucket_name": os.environ['MANIFEST_BUCKET_NAME'],
                          "hostname": os.environ['HOSTNAME'],
                          "prefix": os.environ['GEN3_INSTANCE_NAME'],
                      }))
                      PY
                      )"

                      aws secretsmanager create-secret \
                        --region "$AWS_REGION" \
                        --name "$SECRET_NAME" \
                        --secret-string '{}' \
                        2>/dev/null || true

                      aws secretsmanager put-secret-value \
                        --region "$AWS_REGION" \
                        --secret-id "$SECRET_NAME" \
                        --secret-string "$config"

                      echo "manifestservice-g3auto secret seeded."
