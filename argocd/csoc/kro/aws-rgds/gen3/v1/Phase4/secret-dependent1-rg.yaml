                    - name: SPOKE_ROLE_ARN
                      value: ${secretWriterServiceAccount.metadata.annotations['gen3.io/spoke-role-arn']}
                  command:
                    - /bin/bash
                    - -c
                  args:
                    - |
                      set -euo pipefail

                      assume_spoke_role() {
                        if [[ -z "$SPOKE_ROLE_ARN" ]]; then
                          echo "Missing gen3.io/spoke-role-arn annotation on secret writer service account." >&2
                          exit 1
                        fi

                        local creds
                        creds="$(aws sts assume-role \
                          --region "$AWS_REGION" \
                          --role-arn "$SPOKE_ROLE_ARN" \
                          --role-session-name gen3-secret-writer \
                          --query 'Credentials.[AccessKeyId,SecretAccessKey,SessionToken]' \
                          --output text)"
                        read -r AWS_ACCESS_KEY_ID AWS_SECRET_ACCESS_KEY AWS_SESSION_TOKEN <<< "$creds"
                        export AWS_ACCESS_KEY_ID AWS_SECRET_ACCESS_KEY AWS_SESSION_TOKEN
                      }

                      assume_spoke_role

                      deleted_date="$(aws secretsmanager describe-secret \
                        --region "$AWS_REGION" \
                        --secret-id "$SECRET_NAME" \
                        --query 'DeletedDate' \
                        --output text 2>/dev/null || true)"

                      if [[ -n "$deleted_date" && "$deleted_date" != "None" ]]; then
                        echo "$SECRET_NAME is already scheduled for deletion."
                      elif aws secretsmanager describe-secret --region "$AWS_REGION" --secret-id "$SECRET_NAME" >/dev/null 2>&1; then
                        aws secretsmanager delete-secret \
                          --region "$AWS_REGION" \
                          --secret-id "$SECRET_NAME" \
                          --recovery-window-in-days 7 >/dev/null
                        echo "$SECRET_NAME scheduled for deletion."
                      else
                        echo "$SECRET_NAME does not exist in AWS; nothing to delete."
                      fi
    # -- manifestservice g3auto ----------------------------------------------
    # Infra: infrastructure-values/storage-manifest-bucket-name and dns-hostname
    # Action key: gen3-secret-bootstrap/manifestservice-g3auto-action (update|none|delete)
    - id: manifestserviceG3AutoUpdateJob
      includeWhen:
        - "${('manifestservice-g3auto-action' in bootstrapSecret.data ? bootstrapSecret.data['manifestservice-g3auto-action'] : b'none') == b'update'}"
      readyWhen:
        - ${manifestserviceG3AutoUpdateJob.status.?succeeded.orValue(0) == 1}
      template:
        apiVersion: batch/v1
        kind: Job
        metadata:
          name: ${schema.spec.name}-manifestservice-g3auto-update
          namespace: ${schema.spec.namespace}
          labels:
            app.kubernetes.io/managed-by: kro
            gen3.io/tier: secret-dependent
            gen3.io/secret-purpose: manifestservice-g3auto
            gen3.io/secret-action: update
        spec:
          backoffLimit: 3
          template:
            spec:
              serviceAccountName: ${secretWriterServiceAccount.metadata.name}
              restartPolicy: Never
              volumes:
                - name: bootstrap-secret
                  secret:
                    secretName: gen3-secret-bootstrap
                    optional: true
              containers:
                - name: update-secret
                  image: ${schema.spec.secretWriterImage}
                  imagePullPolicy: IfNotPresent
                  volumeMounts:
                    - name: bootstrap-secret
                      mountPath: /bootstrap-secret
                      readOnly: true
                  env:
                    - name: AWS_REGION
                      value: ${infrastructureConfig.data['aws-region']}
                    - name: SECRET_NAME
                      value: "${schema.spec.name + '-' + schema.spec.namespace + '-' + (infrastructureConfig.data['secret-name-manifestservice-g3auto'] != '' ? infrastructureConfig.data['secret-name-manifestservice-g3auto'] : 'manifestservice-g3auto')}"
                    - name: MANIFEST_BUCKET_NAME
                      value: ${infrastructureConfig.data['storage-manifest-bucket-name']}
                    - name: HOSTNAME
                      value: ${infrastructureConfig.data['dns-hostname']}
                    - name: GEN3_INSTANCE_NAME
                      value: ${schema.spec.name}
                    - name: BOOTSTRAP_SECRET_DIR
                      value: /bootstrap-secret
                    - name: SPOKE_ROLE_ARN
                      value: ${secretWriterServiceAccount.metadata.annotations['gen3.io/spoke-role-arn']}
                  command:
                    - /bin/bash
                    - -c
                  args:
                    - |
                      set -euo pipefail

                      assume_spoke_role() {
                        if [[ -z "$SPOKE_ROLE_ARN" ]]; then
                          echo "Missing gen3.io/spoke-role-arn annotation on secret writer service account." >&2
                          exit 1
                        fi

                        local creds
                        creds="$(aws sts assume-role \
                          --region "$AWS_REGION" \
                          --role-arn "$SPOKE_ROLE_ARN" \
                          --role-session-name gen3-secret-writer \
                          --query 'Credentials.[AccessKeyId,SecretAccessKey,SessionToken]' \
                          --output text)"
                        read -r AWS_ACCESS_KEY_ID AWS_SECRET_ACCESS_KEY AWS_SESSION_TOKEN <<< "$creds"
                        export AWS_ACCESS_KEY_ID AWS_SECRET_ACCESS_KEY AWS_SESSION_TOKEN
                      }

                      ensure_secret_writable() {
                        local deleted_date
                        deleted_date="$(aws secretsmanager describe-secret \
                          --region "$AWS_REGION" \
                          --secret-id "$SECRET_NAME" \
                          --query 'DeletedDate' \
                          --output text 2>/dev/null || true)"

                        if [[ "$deleted_date" == "None" ]]; then
                          return
                        fi

                        if [[ -n "$deleted_date" ]]; then
                          aws secretsmanager restore-secret \
                            --region "$AWS_REGION" \
                            --secret-id "$SECRET_NAME" >/dev/null
                          echo "$SECRET_NAME restored before update."
                          return
                        fi

                        aws secretsmanager create-secret \
                          --region "$AWS_REGION" \
                          --name "$SECRET_NAME" \
                          --secret-string '{}' >/dev/null
                      }

                      assume_spoke_role

                      config="$(python3 - <<'PY'
                      import os, json
                      print(json.dumps({
                          "manifest_bucket_name": os.environ['MANIFEST_BUCKET_NAME'],
                          "hostname": os.environ['HOSTNAME'],
                          "prefix": os.environ['GEN3_INSTANCE_NAME'],
                      }))
                      PY
                      )"

                      ensure_secret_writable

                      aws secretsmanager put-secret-value \
                        --region "$AWS_REGION" \
                        --secret-id "$SECRET_NAME" \
                        --secret-string "$config"

                      echo "manifestservice-g3auto secret updated."

    - id: manifestserviceG3AutoDeleteJob
      includeWhen:
        - "${('manifestservice-g3auto-action' in bootstrapSecret.data ? bootstrapSecret.data['manifestservice-g3auto-action'] : b'none') == b'delete'}"
      readyWhen:
        - ${manifestserviceG3AutoDeleteJob.status.?succeeded.orValue(0) == 1}
      template:
        apiVersion: batch/v1
        kind: Job
        metadata:
          name: ${schema.spec.name}-manifestservice-g3auto-delete
