# AwsGen3WtsG3AutoSecret1 — AWS SM metadata + wts-g3auto value bootstrap
apiVersion: kro.run/v1alpha1
kind: ResourceGraphDefinition
metadata:
  name: awsgen3wtsg3autosecret1
  annotations:
    argocd.argoproj.io/sync-wave: "35"
spec:
  schema:
    apiVersion: v1alpha1
    kind: AwsGen3WtsG3AutoSecret1
    spec:
      name: string | required=true
      namespace: string | required=true
      infrastructureConfigMapName: string | default="infrastructure-values"
      adoptionPolicy: string | default="adopt-or-create"
      deletionPolicy: string | default="retain"
      secretBridgeName: string | default="wts-g3auto-secret-bridge"
      secretWriterImage: string | default="quay.io/cdis/awshelper:master"

    status:
      secretARN: ${awsSecret.status.?ackResourceMetadata.?arn.orValue("loading")}
      created: "${secretValueJob.status.?succeeded.orValue(0) == 1 ? 'true' : 'false'}"

  resources:

    - id: infrastructureConfig
      readyWhen:
        - ${infrastructureConfig.metadata.?name.orValue('null') != 'null'}
      externalRef:
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: ${schema.spec.infrastructureConfigMapName}
          namespace: ${schema.spec.namespace}

    - id: spokeNamespace
      readyWhen:
        - ${spokeNamespace.metadata.?name.orValue('null') != 'null'}
        - ${spokeNamespace.metadata.annotations['services.k8s.aws/owner-account-role-arn'] != ''}
      externalRef:
        apiVersion: v1
        kind: Namespace
        metadata:
          name: ${schema.spec.namespace}

    - id: secretWriterServiceAccount
      readyWhen:
        - ${secretWriterServiceAccount.metadata.?name.orValue('null') != 'null'}
      externalRef:
        apiVersion: v1
        kind: ServiceAccount
        metadata:
          name: gen3-secret-writer-sa
          namespace: ${schema.spec.namespace}

    - id: awsSecret
      readyWhen:
        - ${awsSecret.status.?ackResourceMetadata.?arn.orValue('null') != 'null'}
        - ${awsSecret.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
      template:
        apiVersion: secretsmanager.services.k8s.aws/v1alpha1
        kind: Secret
        metadata:
          name: ${schema.spec.name}-wts-g3auto-sm
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${infrastructureConfig.data['aws-region']}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          name: "${schema.spec.name + '-' + schema.spec.namespace + '-' + (infrastructureConfig.data['secret-name-wts-g3auto'] != '' ? infrastructureConfig.data['secret-name-wts-g3auto'] : 'wts-g3auto')}"
          description: ${"WTS g3auto config for " + schema.spec.name + " in " + schema.spec.namespace}
          tags:
            - key: ManagedBy
              value: Kro
            - key: Gen3Instance
              value: ${schema.spec.name}
            - key: Gen3Namespace
              value: ${schema.spec.namespace}
            - key: SecretPurpose
              value: wts-g3auto

    - id: secretValueJob
      readyWhen:
        - ${secretValueJob.status.?succeeded.orValue(0) == 1}
      template:
        apiVersion: batch/v1
        kind: Job
        metadata:
          name: ${schema.spec.name}-wts-g3auto-sync
          namespace: ${schema.spec.namespace}
          labels:
            app.kubernetes.io/managed-by: kro
            gen3.io/tier: secret-bootstrap
            gen3.io/secret-purpose: wts-g3auto
        spec:
          backoffLimit: 3
          template:
            spec:
              serviceAccountName: ${secretWriterServiceAccount.metadata.name}
              restartPolicy: Never
              volumes:
                - name: bootstrap-secret
                  secret:
                    secretName: gen3-secret-bootstrap
                    optional: true
              containers:
                - name: sync-secret-value
                  image: ${schema.spec.secretWriterImage}
                  imagePullPolicy: IfNotPresent
                  volumeMounts:
                    - name: bootstrap-secret
                      mountPath: /bootstrap-secret
                      readOnly: true
                  env:
                    - name: AWS_REGION
                      value: ${infrastructureConfig.data['aws-region']}
                    - name: HOSTNAME
                      value: ${infrastructureConfig.data['dns-hostname']}
                    - name: SECRET_ARN
                      value: ${awsSecret.status.ackResourceMetadata.arn}
                    - name: SPOKE_ROLE_ARN
                      value: ${spokeNamespace.metadata.annotations['services.k8s.aws/owner-account-role-arn']}
                    - name: BOOTSTRAP_SECRET_DIR
                      value: /bootstrap-secret
                  command:
                    - /bin/bash
                    - -c
                  args:
                    - |
                      set -euo pipefail
                      assume_spoke_role() {
                        local creds
                        creds="$(aws sts assume-role \
                          --role-arn "${SPOKE_ROLE_ARN}" \
                          --role-session-name "gen3-secret-bootstrap-${HOSTNAME:-job}" \
                          --query 'Credentials.[AccessKeyId,SecretAccessKey,SessionToken]' \
                          --output text)"
                        read -r AWS_ACCESS_KEY_ID AWS_SECRET_ACCESS_KEY AWS_SESSION_TOKEN <<< "$creds"
                        export AWS_ACCESS_KEY_ID AWS_SECRET_ACCESS_KEY AWS_SESSION_TOKEN
                      }

                      assume_spoke_role

                      bootstrap_value() {
                        local key="$1"
                        local path="$BOOTSTRAP_SECRET_DIR/$key"
                        if [[ ! -f "$path" ]]; then
                          echo "Missing bootstrap secret key '$key' in $BOOTSTRAP_SECRET_DIR; cannot seed $SECRET_ARN." >&2
                          exit 1
                        fi
                        cat "$path"
                      }


                      existing="$(aws secretsmanager get-secret-value --region "$AWS_REGION" --secret-id "$SECRET_ARN" --query SecretString --output text 2>/dev/null || true)"
                      if python3 - "$existing" <<'PY'
                      import json, sys
                      try:
                          data = json.loads(sys.argv[1] or "{}")
                      except Exception:
                          sys.exit(1)
                      sys.exit(0 if str(data.get("created", "")).lower() == "true" else 1)
                      PY
                      then
                        echo "wts-g3auto already marked created=true; leaving it unchanged."
                        exit 0
                      fi

                      encryption_key="$(bootstrap_value "wts-encryption-key")"
                      secret_key="$(bootstrap_value "wts-secret-key")"
                      oidc_client_id="$(bootstrap_value "wts-oidc-client-id")"
                      oidc_client_secret="$(bootstrap_value "wts-oidc-client-secret")"
                      payload="$(python3 - "$encryption_key" "$secret_key" "$oidc_client_id" "$oidc_client_secret" <<'PY'
                      import json, sys, os
                      enc_key, sec_key, client_id, client_secret = sys.argv[1:5]
                      hostname = os.environ['HOSTNAME']
                      appcreds = {
                          "wts_base_url": f"https://{hostname}/wts/",
                          "encryption_key": enc_key.strip(),
                          "secret_key": sec_key.strip(),
                          "fence_base_url": f"https://{hostname}/user",
                          "oidc_client_id": client_id.strip(),
                          "oidc_client_secret": client_secret.strip(),
                          "external_oidc": [],
                      }
                      print(json.dumps({
                          "appcreds.json": json.dumps(appcreds),
                          "created": "true",
                      }))
                      PY
                      )"
                      aws secretsmanager put-secret-value --region "$AWS_REGION" --secret-id "$SECRET_ARN" --secret-string "$payload"
                      echo "wts-g3auto secret value synced."

    - id: secretBridge
      readyWhen:
        - ${secretBridge.metadata.?name.orValue('null') != 'null'}
      template:
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: ${schema.spec.secretBridgeName}
          namespace: ${schema.spec.namespace}
          labels:
            app.kubernetes.io/managed-by: kro
            gen3.io/tier: secret-bootstrap
            gen3.io/bridge: "true"
        data:
          secret-name: "${schema.spec.name + '-' + schema.spec.namespace + '-' + (infrastructureConfig.data['secret-name-wts-g3auto'] != '' ? infrastructureConfig.data['secret-name-wts-g3auto'] : 'wts-g3auto')}"
          secret-arn: ${awsSecret.status.?ackResourceMetadata.?arn.orValue("loading")}
          created: "${secretValueJob.status.?succeeded.orValue(0) == 1 ? 'true' : 'false'}"
