# AwsGen3ManifestserviceG3AutoSecret1 — AWS SM metadata + manifestservice-g3auto value bootstrap
apiVersion: kro.run/v1alpha1
kind: ResourceGraphDefinition
metadata:
  name: awsgen3manifestserviceg3autosecret1
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  schema:
    apiVersion: v1alpha1
    kind: AwsGen3ManifestserviceG3AutoSecret1
    spec:
      name: string | required=true
      namespace: string | required=true
      infrastructureConfigMapName: string | default="infrastructure-values"
      adoptionPolicy: string | default="adopt-or-create"
      deletionPolicy: string | default="retain"
      secretBridgeName: string | default="manifestservice-g3auto-secret-bridge"
      secretWriterImage: string | default="quay.io/cdis/awshelper:master"

    status:
      secretARN: ${awsSecret.status.?ackResourceMetadata.?arn.orValue("loading")}
      created: "${secretValueJob.status.?succeeded.orValue(0) == 1 ? 'true' : 'false'}"

  resources:

    - id: infrastructureConfig
      readyWhen:
        - ${infrastructureConfig.metadata.?name.orValue('null') != 'null'}
      externalRef:
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: ${schema.spec.infrastructureConfigMapName}
          namespace: ${schema.spec.namespace}

    - id: spokeNamespace
      readyWhen:
        - ${spokeNamespace.metadata.?name.orValue('null') != 'null'}
        - ${spokeNamespace.metadata.annotations['services.k8s.aws/owner-account-role-arn'] != ''}
      externalRef:
        apiVersion: v1
        kind: Namespace
        metadata:
          name: ${schema.spec.namespace}

    - id: secretWriterServiceAccount
      readyWhen:
        - ${secretWriterServiceAccount.metadata.?name.orValue('null') != 'null'}
      externalRef:
        apiVersion: v1
        kind: ServiceAccount
        metadata:
          name: gen3-secret-writer-sa
          namespace: ${schema.spec.namespace}

    - id: awsSecret
      readyWhen:
        - ${awsSecret.status.?ackResourceMetadata.?arn.orValue('null') != 'null'}
        - ${awsSecret.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
      template:
        apiVersion: secretsmanager.services.k8s.aws/v1alpha1
        kind: Secret
        metadata:
          name: ${schema.spec.name}-manifestservice-g3auto-sm
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${infrastructureConfig.data['aws-region']}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          name: "${schema.spec.name + '-' + schema.spec.namespace + '-' + (infrastructureConfig.data['secret-name-manifestservice-g3auto'] != '' ? infrastructureConfig.data['secret-name-manifestservice-g3auto'] : 'manifestservice-g3auto')}"
          description: ${"Manifestservice g3auto config for " + schema.spec.name + " in " + schema.spec.namespace}
          tags:
            - key: ManagedBy
              value: Kro
            - key: Gen3Instance
              value: ${schema.spec.name}
            - key: Gen3Namespace
              value: ${schema.spec.namespace}
            - key: SecretPurpose
              value: manifestservice-g3auto

    - id: secretValueJob
      readyWhen:
        - ${secretValueJob.status.?succeeded.orValue(0) == 1}
      template:
        apiVersion: batch/v1
        kind: Job
        metadata:
          name: ${schema.spec.name}-manifestservice-g3auto-sync
          namespace: ${schema.spec.namespace}
          labels:
            app.kubernetes.io/managed-by: kro
            gen3.io/tier: secret-bootstrap
            gen3.io/secret-purpose: manifestservice-g3auto
        spec:
          backoffLimit: 3
          template:
            spec:
              serviceAccountName: ${secretWriterServiceAccount.metadata.name}
              restartPolicy: Never
              containers:
                - name: sync-secret-value
                  image: ${schema.spec.secretWriterImage}
                  imagePullPolicy: IfNotPresent
                  env:
                    - name: AWS_REGION
                      value: ${infrastructureConfig.data['aws-region']}
                    - name: SECRET_ARN
                      value: ${awsSecret.status.ackResourceMetadata.arn}
                    - name: MANIFEST_BUCKET_NAME
                      value: ${infrastructureConfig.data['storage-manifest-bucket-name']}
                    - name: HOSTNAME
                      value: ${infrastructureConfig.data['dns-hostname']}
                    - name: GEN3_INSTANCE_NAME
                      value: ${schema.spec.name}
                  command:
                    - /bin/bash
                    - -c
                  args:
                    - |
                      set -euo pipefail

                      existing="$(aws secretsmanager get-secret-value --region "$AWS_REGION" --secret-id "$SECRET_ARN" --query SecretString --output text 2>/dev/null || true)"
                      if [[ -n "$existing" && "$existing" != "None" ]]; then
                        echo "manifestservice-g3auto already exists in AWS; leaving it unchanged."
                        exit 0
                      fi

                      config="$(python3 - <<'PY2'
                      import os, json
                      print(json.dumps({
                          "manifest_bucket_name": os.environ['MANIFEST_BUCKET_NAME'],
                          "hostname": os.environ['HOSTNAME'],
                          "prefix": os.environ['GEN3_INSTANCE_NAME'],
                      }))
                      PY2
                      )"
                      aws secretsmanager put-secret-value --region "$AWS_REGION" --secret-id "$SECRET_ARN" --secret-string "$config"
                      echo "manifestservice-g3auto secret value synced."

    - id: secretBridge
      readyWhen:
        - ${secretBridge.metadata.?name.orValue('null') != 'null'}
      template:
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: ${schema.spec.secretBridgeName}
          namespace: ${schema.spec.namespace}
          labels:
            app.kubernetes.io/managed-by: kro
            gen3.io/tier: secret-bootstrap
            gen3.io/bridge: "true"
        data:
          secret-name: "${schema.spec.name + '-' + schema.spec.namespace + '-' + (infrastructureConfig.data['secret-name-manifestservice-g3auto'] != '' ? infrastructureConfig.data['secret-name-manifestservice-g3auto'] : 'manifestservice-g3auto')}"
          secret-arn: ${awsSecret.status.?ackResourceMetadata.?arn.orValue("loading")}
          created: "${secretValueJob.status.?succeeded.orValue(0) == 1 ? 'true' : 'false'}"
