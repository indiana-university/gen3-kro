# AwsGen3DomainSecurity1 — Tier 0.5: DNS + TLS Certificate + WAF (Modular RGD v1)
#
# Combines: Route53 hosted zone, ACM cert, DNS validation, WAFv2 WebACL.
apiVersion: kro.run/v1alpha1
kind: ResourceGraphDefinition
metadata:
  name: awsgen3domainsecurity1
  annotations:
    argocd.argoproj.io/sync-wave: "15"
spec:
  schema:
    apiVersion: v1alpha1
    kind: AwsGen3DomainSecurity1
    spec:
      name: string | required=true
      namespace: string | required=true
      adoptionPolicy: string | default="adopt-or-create"
      deletionPolicy: string | default="delete"
      infrastructureConfigMapName: string | default="infrastructure-values"
      domainSecurityBridgeName: string | default="domain-security-bridge"

    status:
      hostedZoneID: "${infrastructureConfig.data['dns-hostname'] != '' ? hostedZone.status.?id.orValue('loading') : ''}"
      wafAclARN: "${infrastructureConfig.data['domain-security-waf-enabled'] == 'true' ? wafWebAcl.status.?ackResourceMetadata.?arn.orValue('loading') : ''}"
      acmCertificateARN: "${infrastructureConfig.data['dns-hostname'] != '' ? acmCert.status.?ackResourceMetadata.?arn.orValue('loading') : ''}"
      hostname: ${infrastructureConfig.data['dns-hostname']}
      wafEnabled: ${infrastructureConfig.data['domain-security-waf-enabled']}

  resources:
  # Hosted Zone + ACM Certificate + DNS Validation
    - id: hostedZone
      includeWhen:
        - ${infrastructureConfig.data['dns-hostname'] != ''}
      readyWhen:
        - ${hostedZone.status.?id.orValue('null') != 'null'}
        - ${hostedZone.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
      template:
        apiVersion: route53.services.k8s.aws/v1alpha1
        kind: HostedZone
        metadata:
          name: ${schema.spec.name}-hosted-zone
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${infrastructureConfig.data['aws-region']}
            services.k8s.aws/adoption-policy: adopt
            # ACK Route53: use "id" (zone ID path), NOT "name" — causes "required field missing: id"
            services.k8s.aws/adoption-fields: |
              {"id":"${infrastructureConfig.data['dns-hosted-zone-id']}"}
            services.k8s.aws/deletion-policy: retain
        spec:
          name: ${infrastructureConfig.data['dns-hosted-zone-name']}

    - id: infrastructureConfig
      readyWhen:
        - ${infrastructureConfig.metadata.?name.orValue('null') != 'null'}
      externalRef:
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: ${schema.spec.infrastructureConfigMapName}
          namespace: ${schema.spec.namespace}

    - id: acmCert
      includeWhen:
        - ${infrastructureConfig.data['dns-hostname'] != ''}
      readyWhen:
        - ${acmCert.status.?ackResourceMetadata.?arn.orValue('null') != 'null'}
        - ${acmCert.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
        - ${acmCert.status.?domainValidations.orValue([]).size() > 0}
      template:
        apiVersion: acm.services.k8s.aws/v1alpha1
        kind: Certificate
        metadata:
          name: ${schema.spec.name}-acm-cert
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${infrastructureConfig.data['aws-region']}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          domainName: ${infrastructureConfig.data['dns-hostname']}
          tags:
            - key: Name
              value: ${schema.spec.name}-acm-cert
            - key: ManagedBy
              value: Kro
            - key: HostedZoneId
              value: ${hostedZone.status.?id.orValue("loading")}

    - id: dnsValidation
      includeWhen:
        - ${infrastructureConfig.data['dns-hostname'] != ''}
      readyWhen:
        - ${dnsValidation.status.?status.orValue('null') != 'null'}
        - ${dnsValidation.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
      template:
        apiVersion: route53.services.k8s.aws/v1alpha1
        kind: RecordSet
        metadata:
          name: ${schema.spec.name}-acm-validation
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${infrastructureConfig.data['aws-region']}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          hostedZoneID: ${hostedZone.status.?id.orValue("loading")}
          name: ${acmCert.status.domainValidations[0].resourceRecord.name}
          recordType: CNAME
          ttl: 300
          resourceRecords:
            - value: ${acmCert.status.domainValidations[0].resourceRecord.value}


  # WAFv2 WebACL (conditional on spec.wafEnabled == "true")

    - id: wafWebAcl
      includeWhen:
        - ${infrastructureConfig.data['domain-security-waf-enabled'] == 'true'}
      readyWhen:
        - ${wafWebAcl.status.?ackResourceMetadata.?arn.orValue('null') != 'null'}
        - ${wafWebAcl.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
      template:
        apiVersion: wafv2.services.k8s.aws/v1alpha1
        kind: WebACL
        metadata:
          name: ${schema.spec.name}-waf-acl
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${infrastructureConfig.data['aws-region']}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          name: ${schema.spec.name}-waf-acl
          scope: ${infrastructureConfig.data['domain-security-waf-scope']}
          defaultAction:
            allow: {}
          visibilityConfig:
            cloudWatchMetricsEnabled: true
            metricName: ${schema.spec.name}-waf-metrics
            sampledRequestsEnabled: true
          rules:
            - name: aws-common-rules
              priority: 1
              overrideAction:
                none: {}
              statement:
                managedRuleGroupStatement:
                  vendorName: AWS
                  name: AWSManagedRulesCommonRuleSet
              visibilityConfig:
                cloudWatchMetricsEnabled: true
                metricName: ${schema.spec.name}-common-rules
                sampledRequestsEnabled: true
            - name: aws-bad-inputs
              priority: 2
              overrideAction:
                none: {}
              statement:
                managedRuleGroupStatement:
                  vendorName: AWS
                  name: AWSManagedRulesKnownBadInputsRuleSet
              visibilityConfig:
                cloudWatchMetricsEnabled: true
                metricName: ${schema.spec.name}-bad-inputs
                sampledRequestsEnabled: true
            - name: aws-sqli-rules
              priority: 3
              overrideAction:
                none: {}
              statement:
                managedRuleGroupStatement:
                  vendorName: AWS
                  name: AWSManagedRulesSQLiRuleSet
              visibilityConfig:
                cloudWatchMetricsEnabled: true
                metricName: ${schema.spec.name}-sqli-rules
                sampledRequestsEnabled: true
          tags:
            - key: Name
              value: ${schema.spec.name}-waf-acl
            - key: ManagedBy
              value: Kro

  # Conditional duplicate bridge. Each branch uses the same ConfigMap name, but
  # only references resources that are active under the same includeWhen.
    - id: domainSecurityBridgeWithHostnameAndWaf
      includeWhen:
        - ${infrastructureConfig.data['dns-hostname'] != ''}
        - ${infrastructureConfig.data['domain-security-waf-enabled'] == 'true'}
      readyWhen:
        - ${domainSecurityBridgeWithHostnameAndWaf.metadata.?name.orValue('null') != 'null'}
      template:
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: ${schema.spec.domainSecurityBridgeName}
          namespace: ${schema.spec.namespace}
          labels:
            app.kubernetes.io/managed-by: kro
            gen3.io/tier: domain-security
            gen3.io/bridge: "true"
            gen3.io/purpose: dns
        data:
          hosted-zone-id: ${hostedZone.status.?id.orValue('loading')}
          hosted-zone-name: ${infrastructureConfig.data['dns-hosted-zone-name']}
          acm-cert-arn: ${acmCert.status.?ackResourceMetadata.?arn.orValue('loading')}
          hostname: ${infrastructureConfig.data['dns-hostname']}
          waf-acl-arn: ${wafWebAcl.status.?ackResourceMetadata.?arn.orValue('loading')}
          waf-enabled: "true"

    - id: domainSecurityBridgeWithHostnameNoWaf
      includeWhen:
        - ${infrastructureConfig.data['dns-hostname'] != ''}
        - ${infrastructureConfig.data['domain-security-waf-enabled'] != 'true'}
      readyWhen:
        - ${domainSecurityBridgeWithHostnameNoWaf.metadata.?name.orValue('null') != 'null'}
      template:
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: ${schema.spec.domainSecurityBridgeName}
          namespace: ${schema.spec.namespace}
          labels:
            app.kubernetes.io/managed-by: kro
            gen3.io/tier: domain-security
            gen3.io/bridge: "true"
            gen3.io/purpose: dns
        data:
          hosted-zone-id: ${hostedZone.status.?id.orValue('loading')}
          hosted-zone-name: ${infrastructureConfig.data['dns-hosted-zone-name']}
          acm-cert-arn: ${acmCert.status.?ackResourceMetadata.?arn.orValue('loading')}
          hostname: ${infrastructureConfig.data['dns-hostname']}
          waf-acl-arn: ""
          waf-enabled: "false"

    - id: domainSecurityBridgeNoHostnameAndWaf
      includeWhen:
        - ${infrastructureConfig.data['dns-hostname'] == ''}
        - ${infrastructureConfig.data['domain-security-waf-enabled'] == 'true'}
      readyWhen:
        - ${domainSecurityBridgeNoHostnameAndWaf.metadata.?name.orValue('null') != 'null'}
      template:
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: ${schema.spec.domainSecurityBridgeName}
          namespace: ${schema.spec.namespace}
          labels:
            app.kubernetes.io/managed-by: kro
            gen3.io/tier: domain-security
            gen3.io/bridge: "true"
            gen3.io/purpose: dns
        data:
          hosted-zone-id: ""
          hosted-zone-name: ""
          acm-cert-arn: ""
          hostname: ""
          waf-acl-arn: ${wafWebAcl.status.?ackResourceMetadata.?arn.orValue('loading')}
          waf-enabled: "true"

    - id: domainSecurityBridgeNoHostnameNoWaf
      includeWhen:
        - ${infrastructureConfig.data['dns-hostname'] == ''}
        - ${infrastructureConfig.data['domain-security-waf-enabled'] != 'true'}
      readyWhen:
        - ${domainSecurityBridgeNoHostnameNoWaf.metadata.?name.orValue('null') != 'null'}
      template:
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: ${schema.spec.domainSecurityBridgeName}
          namespace: ${schema.spec.namespace}
          labels:
            app.kubernetes.io/managed-by: kro
            gen3.io/tier: domain-security
            gen3.io/bridge: "true"
            gen3.io/purpose: dns
        data:
          hosted-zone-id: ""
          hosted-zone-name: ""
          acm-cert-arn: ""
          hostname: ""
          waf-acl-arn: ""
          waf-enabled: "false"
