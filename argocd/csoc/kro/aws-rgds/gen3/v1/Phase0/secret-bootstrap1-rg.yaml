# AwsGen3SecretBootstrap1 — Phase 0.5: Six AWS SM secrets seeded from gen3-secret-bootstrap K8s Secret.
# Each Job reads a run-flag from the bootstrap K8s Secret and seeds the corresponding
# AWS Secrets Manager secret by name (no ACK Secret CRs, no bridge ConfigMaps).
apiVersion: kro.run/v1alpha1
kind: ResourceGraphDefinition
metadata:
  name: awsgen3secretbootstrap1
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  schema:
    apiVersion: v1alpha1
    kind: AwsGen3SecretBootstrap1
    spec:
      name: string | required=true
      namespace: string | required=true
      infrastructureConfigMapName: string | default="infrastructure-values"
      secretWriterImage: string | default="quay.io/cdis/awshelper:master"

    status:
      auroraMasterPasswordCreated: "${auroraMasterPasswordJob.status.?succeeded.orValue(0) == 1 ? 'true' : 'false'}"
      fenceConfigCreated: "${fenceConfigJob.status.?succeeded.orValue(0) == 1 ? 'true' : 'false'}"
      fenceGoogleAppCredsCreated: "${fenceGoogleAppCredsJob.status.?succeeded.orValue(0) == 1 ? 'true' : 'false'}"
      fenceGoogleStorageCredsCreated: "${fenceGoogleStorageCredsJob.status.?succeeded.orValue(0) == 1 ? 'true' : 'false'}"
      indexdServiceCredsCreated: "${indexdServiceCredsJob.status.?succeeded.orValue(0) == 1 ? 'true' : 'false'}"
      metadataG3AutoCreated: "${metadataG3AutoJob.status.?succeeded.orValue(0) == 1 ? 'true' : 'false'}"

  resources:

    - id: infrastructureConfig
      readyWhen:
        - ${infrastructureConfig.metadata.?name.orValue('null') != 'null'}
      externalRef:
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: ${schema.spec.infrastructureConfigMapName}
          namespace: ${schema.spec.namespace}

    - id: secretWriterServiceAccount
      readyWhen:
        - ${secretWriterServiceAccount.metadata.?name.orValue('null') != 'null'}
      externalRef:
        apiVersion: v1
        kind: ServiceAccount
        metadata:
          name: gen3-secret-writer-sa
          namespace: ${schema.spec.namespace}

    # ── Fence config ──────────────────────────────────────────────────────────
    # Source: gen3-secret-bootstrap/fence-config.yaml
    # Run flag: gen3-secret-bootstrap/run-fence-config-job
    - id: fenceConfigJob
      readyWhen:
        - ${fenceConfigJob.status.?succeeded.orValue(0) == 1}
      template:
        apiVersion: batch/v1
        kind: Job
        metadata:
          name: ${schema.spec.name}-fence-config-sync
          namespace: ${schema.spec.namespace}
          labels:
            app.kubernetes.io/managed-by: kro
            gen3.io/tier: secret-bootstrap
            gen3.io/secret-purpose: fence-config
        spec:
          backoffLimit: 3
          template:
            spec:
              serviceAccountName: ${secretWriterServiceAccount.metadata.name}
              restartPolicy: Never
              volumes:
                - name: bootstrap-secret
                  secret:
                    secretName: gen3-secret-bootstrap
                    optional: true
              containers:
                - name: sync-secret-value
                  image: ${schema.spec.secretWriterImage}
                  imagePullPolicy: IfNotPresent
                  volumeMounts:
                    - name: bootstrap-secret
                      mountPath: /bootstrap-secret
                      readOnly: true
                  env:
                    - name: AWS_REGION
                      value: ${infrastructureConfig.data['aws-region']}
                    - name: SECRET_NAME
                      value: "${schema.spec.name + '-' + schema.spec.namespace + '-' + (infrastructureConfig.data['secret-name-fence-config'] != '' ? infrastructureConfig.data['secret-name-fence-config'] : 'fence-config')}"
                    - name: BOOTSTRAP_SECRET_DIR
                      value: /bootstrap-secret
                  command:
                    - /bin/bash
                    - -c
                  args:
                    - |
                      set -euo pipefail

                      run_flag="$(cat "$BOOTSTRAP_SECRET_DIR/run-fence-config-job" 2>/dev/null || echo "false")"
                      if [[ "$run_flag" != "true" ]]; then
                        echo "run-fence-config-job != 'true'; skipping."
                        exit 0
                      fi

                      fence_config_path="$BOOTSTRAP_SECRET_DIR/fence-config.yaml"
                      if [[ ! -f "$fence_config_path" ]]; then
                        echo "Missing fence-config.yaml in bootstrap secret." >&2
                        exit 1
                      fi

                      existing="$(aws secretsmanager get-secret-value \
                        --region "$AWS_REGION" \
                        --secret-id "$SECRET_NAME" \
                        --query SecretString \
                        --output text 2>/dev/null || true)"

                      if [[ -n "$existing" && "$existing" != "None" ]]; then
                        echo "fence-config already exists in AWS; leaving it unchanged."
                        exit 0
                      fi

                      fence_config_yaml="$(cat "$fence_config_path")"

                      aws secretsmanager create-secret \
                        --region "$AWS_REGION" \
                        --name "$SECRET_NAME" \
                        --secret-string '{}' \
                        2>/dev/null || true

                      aws secretsmanager put-secret-value \
                        --region "$AWS_REGION" \
                        --secret-id "$SECRET_NAME" \
                        --secret-string "$fence_config_yaml"

                      echo "fence-config secret seeded."

    # ── Fence Google app credentials ──────────────────────────────────────────
    # Source: gen3-secret-bootstrap/fence_google_app_creds_secret.json
    # Run flag: gen3-secret-bootstrap/run-fence-google-app-creds-job
    - id: fenceGoogleAppCredsJob
      readyWhen:
        - ${fenceGoogleAppCredsJob.status.?succeeded.orValue(0) == 1}
      template:
        apiVersion: batch/v1
        kind: Job
        metadata:
          name: ${schema.spec.name}-fence-google-app-creds-sync
          namespace: ${schema.spec.namespace}
          labels:
            app.kubernetes.io/managed-by: kro
            gen3.io/tier: secret-bootstrap
            gen3.io/secret-purpose: fence-google-app-creds
        spec:
          backoffLimit: 3
          template:
            spec:
              serviceAccountName: ${secretWriterServiceAccount.metadata.name}
              restartPolicy: Never
              volumes:
                - name: bootstrap-secret
                  secret:
                    secretName: gen3-secret-bootstrap
                    optional: true
              containers:
                - name: sync-secret-value
                  image: ${schema.spec.secretWriterImage}
                  imagePullPolicy: IfNotPresent
                  volumeMounts:
                    - name: bootstrap-secret
                      mountPath: /bootstrap-secret
                      readOnly: true
                  env:
                    - name: AWS_REGION
                      value: ${infrastructureConfig.data['aws-region']}
                    - name: SECRET_NAME
                      value: "${schema.spec.name + '-' + schema.spec.namespace + '-' + (infrastructureConfig.data['secret-name-fence-google-app-creds'] != '' ? infrastructureConfig.data['secret-name-fence-google-app-creds'] : 'fence-google-app-creds-secret')}"
                    - name: BOOTSTRAP_SECRET_DIR
                      value: /bootstrap-secret
                  command:
                    - /bin/bash
                    - -c
                  args:
                    - |
                      set -euo pipefail

                      run_flag="$(cat "$BOOTSTRAP_SECRET_DIR/run-fence-google-app-creds-job" 2>/dev/null || echo "false")"
                      if [[ "$run_flag" != "true" ]]; then
                        echo "run-fence-google-app-creds-job != 'true'; skipping."
                        exit 0
                      fi

                      existing="$(aws secretsmanager get-secret-value \
                        --region "$AWS_REGION" \
                        --secret-id "$SECRET_NAME" \
                        --query SecretString \
                        --output text 2>/dev/null || true)"

                      if python3 - "$existing" <<'PY'
                      import json, sys
                      try:
                          data = json.loads(sys.argv[1] or "{}")
                      except Exception:
                          sys.exit(1)
                      sys.exit(0 if str(data.get("created", "")).lower() == "true" else 1)
                      PY
                      then
                        echo "fence-google-app-creds already marked created=true; skipping."
                        exit 0
                      fi

                      credentials_json_path="$BOOTSTRAP_SECRET_DIR/fence_google_app_creds_secret.json"
                      if [[ ! -f "$credentials_json_path" ]]; then
                        echo "Missing fence_google_app_creds_secret.json in bootstrap secret." >&2
                        exit 1
                      fi
                      credentials_json="$(cat "$credentials_json_path")"

                      payload="$(python3 - "$credentials_json" <<'PY'
                      import json, sys
                      print(json.dumps({
                          "fence_google_app_creds_secret.json": sys.argv[1] or "{}",
                          "created": "true",
                      }))
                      PY
                      )"

                      aws secretsmanager create-secret \
                        --region "$AWS_REGION" \
                        --name "$SECRET_NAME" \
                        --secret-string '{}' \
                        2>/dev/null || true

                      aws secretsmanager put-secret-value \
                        --region "$AWS_REGION" \
                        --secret-id "$SECRET_NAME" \
                        --secret-string "$payload"

                      echo "fence-google-app-creds secret seeded."

    # ── Fence Google storage credentials ─────────────────────────────────────
    # Source: gen3-secret-bootstrap/fence_google_storage_creds_secret.json
    # Run flag: gen3-secret-bootstrap/run-fence-google-storage-creds-job
    - id: fenceGoogleStorageCredsJob
      readyWhen:
        - ${fenceGoogleStorageCredsJob.status.?succeeded.orValue(0) == 1}
      template:
        apiVersion: batch/v1
        kind: Job
        metadata:
          name: ${schema.spec.name}-fence-google-storage-creds-sync
          namespace: ${schema.spec.namespace}
          labels:
            app.kubernetes.io/managed-by: kro
            gen3.io/tier: secret-bootstrap
            gen3.io/secret-purpose: fence-google-storage-creds
        spec:
          backoffLimit: 3
          template:
            spec:
              serviceAccountName: ${secretWriterServiceAccount.metadata.name}
              restartPolicy: Never
              volumes:
                - name: bootstrap-secret
                  secret:
                    secretName: gen3-secret-bootstrap
                    optional: true
              containers:
                - name: sync-secret-value
                  image: ${schema.spec.secretWriterImage}
                  imagePullPolicy: IfNotPresent
                  volumeMounts:
                    - name: bootstrap-secret
                      mountPath: /bootstrap-secret
                      readOnly: true
                  env:
                    - name: AWS_REGION
                      value: ${infrastructureConfig.data['aws-region']}
                    - name: SECRET_NAME
                      value: "${schema.spec.name + '-' + schema.spec.namespace + '-' + (infrastructureConfig.data['secret-name-fence-google-storage-creds'] != '' ? infrastructureConfig.data['secret-name-fence-google-storage-creds'] : 'fence-google-storage-creds-secret')}"
                    - name: BOOTSTRAP_SECRET_DIR
                      value: /bootstrap-secret
                  command:
                    - /bin/bash
                    - -c
                  args:
                    - |
                      set -euo pipefail

                      run_flag="$(cat "$BOOTSTRAP_SECRET_DIR/run-fence-google-storage-creds-job" 2>/dev/null || echo "false")"
                      if [[ "$run_flag" != "true" ]]; then
                        echo "run-fence-google-storage-creds-job != 'true'; skipping."
                        exit 0
                      fi

                      existing="$(aws secretsmanager get-secret-value \
                        --region "$AWS_REGION" \
                        --secret-id "$SECRET_NAME" \
                        --query SecretString \
                        --output text 2>/dev/null || true)"

                      if python3 - "$existing" <<'PY'
                      import json, sys
                      try:
                          data = json.loads(sys.argv[1] or "{}")
                      except Exception:
                          sys.exit(1)
                      sys.exit(0 if str(data.get("created", "")).lower() == "true" else 1)
                      PY
                      then
                        echo "fence-google-storage-creds already marked created=true; skipping."
                        exit 0
                      fi

                      credentials_json_path="$BOOTSTRAP_SECRET_DIR/fence_google_storage_creds_secret.json"
                      if [[ ! -f "$credentials_json_path" ]]; then
                        echo "Missing fence_google_storage_creds_secret.json in bootstrap secret." >&2
                        exit 1
                      fi
                      credentials_json="$(cat "$credentials_json_path")"

                      payload="$(python3 - "$credentials_json" <<'PY'
                      import json, sys
                      print(json.dumps({
                          "fence_google_storage_creds_secret.json": sys.argv[1] or "{}",
                          "created": "true",
                      }))
                      PY
                      )"

                      aws secretsmanager create-secret \
                        --region "$AWS_REGION" \
                        --name "$SECRET_NAME" \
                        --secret-string '{}' \
                        2>/dev/null || true

                      aws secretsmanager put-secret-value \
                        --region "$AWS_REGION" \
                        --secret-id "$SECRET_NAME" \
                        --secret-string "$payload"

                      echo "fence-google-storage-creds secret seeded."

    # ── Indexd service credentials ────────────────────────────────────────────
    # Sources: gen3-secret-bootstrap/indexd-fence, indexd-sheepdog, indexd-ssj, indexd-gateway
    # Run flag: gen3-secret-bootstrap/run-indexd-service-creds-job
    - id: indexdServiceCredsJob
      readyWhen:
        - ${indexdServiceCredsJob.status.?succeeded.orValue(0) == 1}
      template:
        apiVersion: batch/v1
        kind: Job
        metadata:
          name: ${schema.spec.name}-indexd-service-creds-sync
          namespace: ${schema.spec.namespace}
          labels:
            app.kubernetes.io/managed-by: kro
            gen3.io/tier: secret-bootstrap
            gen3.io/secret-purpose: indexd-service-creds
        spec:
          backoffLimit: 3
          template:
            spec:
              serviceAccountName: ${secretWriterServiceAccount.metadata.name}
              restartPolicy: Never
              volumes:
                - name: bootstrap-secret
                  secret:
                    secretName: gen3-secret-bootstrap
                    optional: true
              containers:
                - name: sync-secret-value
                  image: ${schema.spec.secretWriterImage}
                  imagePullPolicy: IfNotPresent
                  volumeMounts:
                    - name: bootstrap-secret
                      mountPath: /bootstrap-secret
                      readOnly: true
                  env:
                    - name: AWS_REGION
                      value: ${infrastructureConfig.data['aws-region']}
                    - name: SECRET_NAME
                      value: "${schema.spec.name + '-' + schema.spec.namespace + '-' + (infrastructureConfig.data['secret-name-indexd-service-creds'] != '' ? infrastructureConfig.data['secret-name-indexd-service-creds'] : 'indexd-service-creds')}"
                    - name: BOOTSTRAP_SECRET_DIR
                      value: /bootstrap-secret
                  command:
                    - /bin/bash
                    - -c
                  args:
                    - |
                      set -euo pipefail

                      run_flag="$(cat "$BOOTSTRAP_SECRET_DIR/run-indexd-service-creds-job" 2>/dev/null || echo "false")"
                      if [[ "$run_flag" != "true" ]]; then
                        echo "run-indexd-service-creds-job != 'true'; skipping."
                        exit 0
                      fi

                      existing="$(aws secretsmanager get-secret-value \
                        --region "$AWS_REGION" \
                        --secret-id "$SECRET_NAME" \
                        --query SecretString \
                        --output text 2>/dev/null || true)"

                      if python3 - "$existing" <<'PY'
                      import json, sys
                      try:
                          data = json.loads(sys.argv[1] or "{}")
                      except Exception:
                          sys.exit(1)
                      sys.exit(0 if str(data.get("created", "")).lower() == "true" else 1)
                      PY
                      then
                        echo "indexd-service-creds already marked created=true; skipping."
                        exit 0
                      fi

                      bootstrap_value() {
                        local key="$1"
                        local path="$BOOTSTRAP_SECRET_DIR/$key"
                        if [[ ! -f "$path" ]]; then
                          echo "Missing bootstrap secret key '$key'." >&2
                          exit 1
                        fi
                        cat "$path"
                      }

                      indexd_fence="$(bootstrap_value "indexd-fence")"
                      indexd_sheepdog="$(bootstrap_value "indexd-sheepdog")"
                      indexd_ssj="$(bootstrap_value "indexd-ssj")"
                      indexd_gateway="$(bootstrap_value "indexd-gateway")"

                      payload="$(python3 - "$indexd_fence" "$indexd_sheepdog" "$indexd_ssj" "$indexd_gateway" <<'PY'
                      import json, sys
                      print(json.dumps({
                          "fence": sys.argv[1],
                          "sheepdog": sys.argv[2],
                          "ssj": sys.argv[3],
                          "gateway": sys.argv[4],
                          "created": "true",
                      }))
                      PY
                      )"

                      aws secretsmanager create-secret \
                        --region "$AWS_REGION" \
                        --name "$SECRET_NAME" \
                        --secret-string '{}' \
                        2>/dev/null || true

                      aws secretsmanager put-secret-value \
                        --region "$AWS_REGION" \
                        --secret-id "$SECRET_NAME" \
                        --secret-string "$payload"

                      echo "indexd-service-creds secret seeded."

    # ── Metadata g3auto ───────────────────────────────────────────────────────
    # Sources: gen3-secret-bootstrap/base64Authz.txt, dbcreds.json, metadata.env
    # Run flag: gen3-secret-bootstrap/run-metadata-g3auto-job
    - id: metadataG3AutoJob
      readyWhen:
        - ${metadataG3AutoJob.status.?succeeded.orValue(0) == 1}
      template:
        apiVersion: batch/v1
        kind: Job
        metadata:
          name: ${schema.spec.name}-metadata-g3auto-sync
          namespace: ${schema.spec.namespace}
          labels:
            app.kubernetes.io/managed-by: kro
            gen3.io/tier: secret-bootstrap
            gen3.io/secret-purpose: metadata-g3auto
        spec:
          backoffLimit: 3
          template:
            spec:
              serviceAccountName: ${secretWriterServiceAccount.metadata.name}
              restartPolicy: Never
              volumes:
                - name: bootstrap-secret
                  secret:
                    secretName: gen3-secret-bootstrap
                    optional: true
              containers:
                - name: sync-secret-value
                  image: ${schema.spec.secretWriterImage}
                  imagePullPolicy: IfNotPresent
                  volumeMounts:
                    - name: bootstrap-secret
                      mountPath: /bootstrap-secret
                      readOnly: true
                  env:
                    - name: AWS_REGION
                      value: ${infrastructureConfig.data['aws-region']}
                    - name: SECRET_NAME
                      value: "${schema.spec.name + '-' + schema.spec.namespace + '-' + (infrastructureConfig.data['secret-name-metadata-g3auto'] != '' ? infrastructureConfig.data['secret-name-metadata-g3auto'] : 'metadata-g3auto')}"
                    - name: BOOTSTRAP_SECRET_DIR
                      value: /bootstrap-secret
                  command:
                    - /bin/bash
                    - -c
                  args:
                    - |
                      set -euo pipefail

                      run_flag="$(cat "$BOOTSTRAP_SECRET_DIR/run-metadata-g3auto-job" 2>/dev/null || echo "false")"
                      if [[ "$run_flag" != "true" ]]; then
                        echo "run-metadata-g3auto-job != 'true'; skipping."
                        exit 0
                      fi

                      existing="$(aws secretsmanager get-secret-value \
                        --region "$AWS_REGION" \
                        --secret-id "$SECRET_NAME" \
                        --query SecretString \
                        --output text 2>/dev/null || true)"

                      if python3 - "$existing" <<'PY'
                      import json, sys
                      try:
                          data = json.loads(sys.argv[1] or "{}")
                      except Exception:
                          sys.exit(1)
                      sys.exit(0 if str(data.get("created", "")).lower() == "true" else 1)
                      PY
                      then
                        echo "metadata-g3auto already marked created=true; skipping."
                        exit 0
                      fi

                      bootstrap_value() {
                        local key="$1"
                        local path="$BOOTSTRAP_SECRET_DIR/$key"
                        if [[ ! -f "$path" ]]; then
                          echo "Missing bootstrap secret key '$key'." >&2
                          exit 1
                        fi
                        cat "$path"
                      }

                      base64_authz="$(bootstrap_value "base64Authz.txt")"
                      dbcreds_json="$(bootstrap_value "dbcreds.json")"
                      metadata_env="$(bootstrap_value "metadata.env")"

                      payload="$(python3 - "$base64_authz" "$dbcreds_json" "$metadata_env" <<'PY'
                      import json, sys
                      print(json.dumps({
                          "base64Authz.txt": sys.argv[1],
                          "dbcreds.json": sys.argv[2],
                          "metadata.env": sys.argv[3],
                          "created": "true",
                      }))
                      PY
                      )"

                      aws secretsmanager create-secret \
                        --region "$AWS_REGION" \
                        --name "$SECRET_NAME" \
                        --secret-string '{}' \
                        2>/dev/null || true

                      aws secretsmanager put-secret-value \
                        --region "$AWS_REGION" \
                        --secret-id "$SECRET_NAME" \
                        --secret-string "$payload"

                      echo "metadata-g3auto secret seeded."
