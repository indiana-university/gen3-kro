# AwsGen3SecretBootstrap1 — Phase 0.5: AWS SM secrets seeded from gen3-secret-bootstrap K8s Secret.
# Each secret uses one action key in gen3-secret-bootstrap: update, none, or delete.
# update creates/restores/overwrites the AWS Secrets Manager value; none creates no Job;
# delete schedules the AWS secret for deletion with the configured recovery window.
apiVersion: kro.run/v1alpha1
kind: ResourceGraphDefinition
metadata:
  name: awsgen3secretbootstrap1
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  schema:
    apiVersion: v1alpha1
    kind: AwsGen3SecretBootstrap1
    spec:
      name: string | required=true
      namespace: string | required=true
      infrastructureConfigMapName: string | default="infrastructure-values"
      secretWriterImage: string | default="quay.io/cdis/awshelper:master"

    status:
      fenceConfigCreated: "${fenceConfigUpdateJob.status.?succeeded.orValue(0) == 1 ? 'true' : 'false'}"
      fenceConfigUpdated: "${fenceConfigUpdateJob.status.?succeeded.orValue(0) == 1 ? 'true' : 'false'}"
      fenceConfigDeleted: "${fenceConfigDeleteJob.status.?succeeded.orValue(0) == 1 ? 'true' : 'false'}"
      # Backward-compatible status field retained so KRO can update the existing CRD
      # without a breaking OpenAPI schema removal. Gen3 Helm owns JWT key creation.
      fenceJwtKeysCreated: "${bootstrapSecret.metadata.?name.orValue('') != '' ? 'false' : 'false'}"
      fenceGoogleAppCredsCreated: "${fenceGoogleAppCredsUpdateJob.status.?succeeded.orValue(0) == 1 ? 'true' : 'false'}"
      fenceGoogleAppCredsUpdated: "${fenceGoogleAppCredsUpdateJob.status.?succeeded.orValue(0) == 1 ? 'true' : 'false'}"
      fenceGoogleAppCredsDeleted: "${fenceGoogleAppCredsDeleteJob.status.?succeeded.orValue(0) == 1 ? 'true' : 'false'}"
      fenceGoogleStorageCredsCreated: "${fenceGoogleStorageCredsUpdateJob.status.?succeeded.orValue(0) == 1 ? 'true' : 'false'}"
      fenceGoogleStorageCredsUpdated: "${fenceGoogleStorageCredsUpdateJob.status.?succeeded.orValue(0) == 1 ? 'true' : 'false'}"
      fenceGoogleStorageCredsDeleted: "${fenceGoogleStorageCredsDeleteJob.status.?succeeded.orValue(0) == 1 ? 'true' : 'false'}"
      indexdServiceCredsCreated: "${indexdServiceCredsUpdateJob.status.?succeeded.orValue(0) == 1 ? 'true' : 'false'}"
      indexdServiceCredsUpdated: "${indexdServiceCredsUpdateJob.status.?succeeded.orValue(0) == 1 ? 'true' : 'false'}"
      indexdServiceCredsDeleted: "${indexdServiceCredsDeleteJob.status.?succeeded.orValue(0) == 1 ? 'true' : 'false'}"
      metadataG3AutoCreated: "${metadataG3AutoUpdateJob.status.?succeeded.orValue(0) == 1 ? 'true' : 'false'}"
      metadataG3AutoUpdated: "${metadataG3AutoUpdateJob.status.?succeeded.orValue(0) == 1 ? 'true' : 'false'}"
      metadataG3AutoDeleted: "${metadataG3AutoDeleteJob.status.?succeeded.orValue(0) == 1 ? 'true' : 'false'}"

  resources:

    - id: infrastructureConfig
      readyWhen:
        - ${infrastructureConfig.metadata.?name.orValue('null') != 'null'}
      externalRef:
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: ${schema.spec.infrastructureConfigMapName}
          namespace: ${schema.spec.namespace}

    - id: secretWriterServiceAccount
      readyWhen:
        - ${secretWriterServiceAccount.metadata.?name.orValue('null') != 'null'}
      externalRef:
        apiVersion: v1
        kind: ServiceAccount
        metadata:
          name: gen3-secret-writer-sa
          namespace: ${schema.spec.namespace}

    - id: bootstrapSecret
      readyWhen:
        - ${bootstrapSecret.metadata.?name.orValue('null') != 'null'}
      externalRef:
        apiVersion: v1
        kind: Secret
        metadata:
          name: gen3-secret-bootstrap
          namespace: ${schema.spec.namespace}

    # -- Fence config --------------------------------------------------------
    # Source: gen3-secret-bootstrap/fence-config.yaml
    # Action key: gen3-secret-bootstrap/fence-config-action (update|none|delete)
    - id: fenceConfigUpdateJob
      includeWhen:
        - "${('fence-config-action' in bootstrapSecret.data ? bootstrapSecret.data['fence-config-action'] : b'none') == b'update'}"
      readyWhen:
        - ${fenceConfigUpdateJob.status.?succeeded.orValue(0) == 1}
      template:
        apiVersion: batch/v1
        kind: Job
        metadata:
          name: ${schema.spec.name}-fence-config-update
          namespace: ${schema.spec.namespace}
          labels:
            app.kubernetes.io/managed-by: kro
            gen3.io/tier: secret-bootstrap
            gen3.io/secret-purpose: fence-config
            gen3.io/secret-action: update
        spec:
          backoffLimit: 3
          template:
            spec:
              serviceAccountName: ${secretWriterServiceAccount.metadata.name}
              restartPolicy: Never
              volumes:
                - name: bootstrap-secret
                  secret:
                    secretName: gen3-secret-bootstrap
                    optional: true
              containers:
                - name: update-secret
                  image: ${schema.spec.secretWriterImage}
                  imagePullPolicy: IfNotPresent
                  volumeMounts:
                    - name: bootstrap-secret
                      mountPath: /bootstrap-secret
                      readOnly: true
                  env:
                    - name: AWS_REGION
                      value: ${infrastructureConfig.data['aws-region']}
                    - name: SECRET_NAME
                      value: "${schema.spec.name + '-' + schema.spec.namespace + '-' + (infrastructureConfig.data['secret-name-fence-config'] != '' ? infrastructureConfig.data['secret-name-fence-config'] : 'fence-config')}"
                    - name: BOOTSTRAP_SECRET_DIR
                      value: /bootstrap-secret
                    - name: SPOKE_ROLE_ARN
                      value: ${secretWriterServiceAccount.metadata.annotations['gen3.io/spoke-role-arn']}
                  command:
                    - /bin/bash
                    - -c
                  args:
                    - |
                      set -euo pipefail

                      assume_spoke_role() {
                        if [[ -z "$SPOKE_ROLE_ARN" ]]; then
                          echo "Missing gen3.io/spoke-role-arn annotation on secret writer service account." >&2
                          exit 1
                        fi

                        local creds
                        creds="$(aws sts assume-role \
                          --region "$AWS_REGION" \
                          --role-arn "$SPOKE_ROLE_ARN" \
                          --role-session-name gen3-secret-writer \
                          --query 'Credentials.[AccessKeyId,SecretAccessKey,SessionToken]' \
                          --output text)"
                        read -r AWS_ACCESS_KEY_ID AWS_SECRET_ACCESS_KEY AWS_SESSION_TOKEN <<< "$creds"
                        export AWS_ACCESS_KEY_ID AWS_SECRET_ACCESS_KEY AWS_SESSION_TOKEN
                      }

                      ensure_secret_writable() {
                        local deleted_date
                        deleted_date="$(aws secretsmanager describe-secret \
                          --region "$AWS_REGION" \
                          --secret-id "$SECRET_NAME" \
                          --query 'DeletedDate' \
                          --output text 2>/dev/null || true)"

                        if [[ "$deleted_date" == "None" ]]; then
                          return
                        fi

                        if [[ -n "$deleted_date" ]]; then
                          aws secretsmanager restore-secret \
                            --region "$AWS_REGION" \
                            --secret-id "$SECRET_NAME" >/dev/null
                          echo "$SECRET_NAME restored before update."
                          return
                        fi

                        aws secretsmanager create-secret \
                          --region "$AWS_REGION" \
                          --name "$SECRET_NAME" \
                          --secret-string '{}' >/dev/null
                      }

                      assume_spoke_role

                      fence_config_path="$BOOTSTRAP_SECRET_DIR/fence-config.yaml"
                      if [[ ! -f "$fence_config_path" ]]; then
                        echo "Missing fence-config.yaml in bootstrap secret." >&2
                        exit 1
                      fi

                      fence_config_yaml="$(cat "$fence_config_path")"

                      ensure_secret_writable

                      aws secretsmanager put-secret-value \
                        --region "$AWS_REGION" \
                        --secret-id "$SECRET_NAME" \
                        --secret-string "$fence_config_yaml"

                      echo "fence-config secret updated."

    - id: fenceConfigDeleteJob
      includeWhen:
        - "${('fence-config-action' in bootstrapSecret.data ? bootstrapSecret.data['fence-config-action'] : b'none') == b'delete'}"
      readyWhen:
        - ${fenceConfigDeleteJob.status.?succeeded.orValue(0) == 1}
      template:
        apiVersion: batch/v1
        kind: Job
        metadata:
          name: ${schema.spec.name}-fence-config-delete
          namespace: ${schema.spec.namespace}
          labels:
            app.kubernetes.io/managed-by: kro
            gen3.io/tier: secret-bootstrap
            gen3.io/secret-purpose: fence-config
            gen3.io/secret-action: delete
        spec:
          backoffLimit: 3
          template:
            spec:
              serviceAccountName: ${secretWriterServiceAccount.metadata.name}
              restartPolicy: Never
              containers:
                - name: delete-secret
                  image: ${schema.spec.secretWriterImage}
                  imagePullPolicy: IfNotPresent
                  env:
                    - name: AWS_REGION
                      value: ${infrastructureConfig.data['aws-region']}
                    - name: SECRET_NAME
                      value: "${schema.spec.name + '-' + schema.spec.namespace + '-' + (infrastructureConfig.data['secret-name-fence-config'] != '' ? infrastructureConfig.data['secret-name-fence-config'] : 'fence-config')}"
                    - name: SPOKE_ROLE_ARN
                      value: ${secretWriterServiceAccount.metadata.annotations['gen3.io/spoke-role-arn']}
                  command:
                    - /bin/bash
                    - -c
                  args:
                    - |
                      set -euo pipefail

                      assume_spoke_role() {
                        if [[ -z "$SPOKE_ROLE_ARN" ]]; then
                          echo "Missing gen3.io/spoke-role-arn annotation on secret writer service account." >&2
                          exit 1
                        fi

                        local creds
                        creds="$(aws sts assume-role \
                          --region "$AWS_REGION" \
                          --role-arn "$SPOKE_ROLE_ARN" \
                          --role-session-name gen3-secret-writer \
                          --query 'Credentials.[AccessKeyId,SecretAccessKey,SessionToken]' \
                          --output text)"
                        read -r AWS_ACCESS_KEY_ID AWS_SECRET_ACCESS_KEY AWS_SESSION_TOKEN <<< "$creds"
                        export AWS_ACCESS_KEY_ID AWS_SECRET_ACCESS_KEY AWS_SESSION_TOKEN
                      }

                      assume_spoke_role

                      deleted_date="$(aws secretsmanager describe-secret \
                        --region "$AWS_REGION" \
                        --secret-id "$SECRET_NAME" \
                        --query 'DeletedDate' \
                        --output text 2>/dev/null || true)"

                      if [[ -n "$deleted_date" && "$deleted_date" != "None" ]]; then
                        echo "$SECRET_NAME is already scheduled for deletion."
                      elif aws secretsmanager describe-secret --region "$AWS_REGION" --secret-id "$SECRET_NAME" >/dev/null 2>&1; then
                        aws secretsmanager delete-secret \
                          --region "$AWS_REGION" \
                          --secret-id "$SECRET_NAME" \
                          --recovery-window-in-days 7 >/dev/null
                        echo "$SECRET_NAME scheduled for deletion."
                      else
                        echo "$SECRET_NAME does not exist in AWS; nothing to delete."
                      fi
    # -- Fence Google app credentials ----------------------------------------
    # Source: gen3-secret-bootstrap/fence_google_app_creds_secret.json
    # Action key: gen3-secret-bootstrap/fence-google-app-creds-action (update|none|delete)
    - id: fenceGoogleAppCredsUpdateJob
      includeWhen:
        - "${('secret-action-fence-google-app-creds' in infrastructureConfig.data && infrastructureConfig.data['secret-action-fence-google-app-creds'] == 'update') || ((!('secret-action-fence-google-app-creds' in infrastructureConfig.data) || infrastructureConfig.data['secret-action-fence-google-app-creds'] == '') && ('fence-google-app-creds-action' in bootstrapSecret.data ? bootstrapSecret.data['fence-google-app-creds-action'] : b'none') == b'update')}"
      readyWhen:
        - ${fenceGoogleAppCredsUpdateJob.status.?succeeded.orValue(0) == 1}
      template:
        apiVersion: batch/v1
        kind: Job
        metadata:
          name: ${schema.spec.name}-fence-google-app-creds-update
          namespace: ${schema.spec.namespace}
          labels:
            app.kubernetes.io/managed-by: kro
            gen3.io/tier: secret-bootstrap
            gen3.io/secret-purpose: fence-google-app-creds
            gen3.io/secret-action: update
        spec:
          backoffLimit: 3
          template:
            spec:
              serviceAccountName: ${secretWriterServiceAccount.metadata.name}
              restartPolicy: Never
              volumes:
                - name: bootstrap-secret
                  secret:
                    secretName: gen3-secret-bootstrap
                    optional: true
              containers:
                - name: update-secret
                  image: ${schema.spec.secretWriterImage}
                  imagePullPolicy: IfNotPresent
                  volumeMounts:
                    - name: bootstrap-secret
                      mountPath: /bootstrap-secret
                      readOnly: true
                  env:
                    - name: AWS_REGION
                      value: ${infrastructureConfig.data['aws-region']}
                    - name: SECRET_NAME
                      value: "${schema.spec.name + '-' + schema.spec.namespace + '-' + (infrastructureConfig.data['secret-name-fence-google-app-creds'] != '' ? infrastructureConfig.data['secret-name-fence-google-app-creds'] : 'fence-google-app-creds-secret')}"
                    - name: BOOTSTRAP_SECRET_DIR
                      value: /bootstrap-secret
                    - name: SPOKE_ROLE_ARN
                      value: ${secretWriterServiceAccount.metadata.annotations['gen3.io/spoke-role-arn']}
                  command:
                    - /bin/bash
                    - -c
                  args:
                    - |
                      set -euo pipefail

                      assume_spoke_role() {
                        if [[ -z "$SPOKE_ROLE_ARN" ]]; then
                          echo "Missing gen3.io/spoke-role-arn annotation on secret writer service account." >&2
                          exit 1
                        fi

                        local creds
                        creds="$(aws sts assume-role \
                          --region "$AWS_REGION" \
                          --role-arn "$SPOKE_ROLE_ARN" \
                          --role-session-name gen3-secret-writer \
                          --query 'Credentials.[AccessKeyId,SecretAccessKey,SessionToken]' \
                          --output text)"
                        read -r AWS_ACCESS_KEY_ID AWS_SECRET_ACCESS_KEY AWS_SESSION_TOKEN <<< "$creds"
                        export AWS_ACCESS_KEY_ID AWS_SECRET_ACCESS_KEY AWS_SESSION_TOKEN
                      }

                      ensure_secret_writable() {
                        local deleted_date
                        deleted_date="$(aws secretsmanager describe-secret \
                          --region "$AWS_REGION" \
                          --secret-id "$SECRET_NAME" \
                          --query 'DeletedDate' \
                          --output text 2>/dev/null || true)"

                        if [[ "$deleted_date" == "None" ]]; then
                          return
                        fi

                        if [[ -n "$deleted_date" ]]; then
                          aws secretsmanager restore-secret \
                            --region "$AWS_REGION" \
                            --secret-id "$SECRET_NAME" >/dev/null
                          echo "$SECRET_NAME restored before update."
                          return
                        fi

                        aws secretsmanager create-secret \
                          --region "$AWS_REGION" \
                          --name "$SECRET_NAME" \
                          --secret-string '{}' >/dev/null
                      }

                      assume_spoke_role

                      credentials_json_path="$BOOTSTRAP_SECRET_DIR/fence_google_app_creds_secret.json"
                      if [[ ! -f "$credentials_json_path" ]]; then
                        echo "Missing fence_google_app_creds_secret.json in bootstrap secret." >&2
                        exit 1
                      fi
                      credentials_json="$(cat "$credentials_json_path")"

                      payload="$(python3 - "$credentials_json" <<'PY'
                      import json, sys
                      print(json.dumps({
                          "fence_google_app_creds_secret.json": sys.argv[1] or "{}",
                          "created": "true",
                      }))
                      PY
                      )"

                      ensure_secret_writable

                      aws secretsmanager put-secret-value \
                        --region "$AWS_REGION" \
                        --secret-id "$SECRET_NAME" \
                        --secret-string "$payload"

                      echo "fence-google-app-creds secret updated."

    - id: fenceGoogleAppCredsDeleteJob
      includeWhen:
        - "${('secret-action-fence-google-app-creds' in infrastructureConfig.data && infrastructureConfig.data['secret-action-fence-google-app-creds'] == 'delete') || ((!('secret-action-fence-google-app-creds' in infrastructureConfig.data) || infrastructureConfig.data['secret-action-fence-google-app-creds'] == '') && ('fence-google-app-creds-action' in bootstrapSecret.data ? bootstrapSecret.data['fence-google-app-creds-action'] : b'none') == b'delete')}"
      readyWhen:
        - ${fenceGoogleAppCredsDeleteJob.status.?succeeded.orValue(0) == 1}
      template:
        apiVersion: batch/v1
        kind: Job
        metadata:
          name: ${schema.spec.name}-fence-google-app-creds-delete
          namespace: ${schema.spec.namespace}
          labels:
            app.kubernetes.io/managed-by: kro
            gen3.io/tier: secret-bootstrap
            gen3.io/secret-purpose: fence-google-app-creds
            gen3.io/secret-action: delete
        spec:
          backoffLimit: 3
          template:
            spec:
              serviceAccountName: ${secretWriterServiceAccount.metadata.name}
              restartPolicy: Never
              containers:
                - name: delete-secret
                  image: ${schema.spec.secretWriterImage}
                  imagePullPolicy: IfNotPresent
                  env:
                    - name: AWS_REGION
                      value: ${infrastructureConfig.data['aws-region']}
                    - name: SECRET_NAME
                      value: "${schema.spec.name + '-' + schema.spec.namespace + '-' + (infrastructureConfig.data['secret-name-fence-google-app-creds'] != '' ? infrastructureConfig.data['secret-name-fence-google-app-creds'] : 'fence-google-app-creds-secret')}"
                    - name: SPOKE_ROLE_ARN
                      value: ${secretWriterServiceAccount.metadata.annotations['gen3.io/spoke-role-arn']}
                  command:
                    - /bin/bash
                    - -c
                  args:
                    - |
                      set -euo pipefail

                      assume_spoke_role() {
                        if [[ -z "$SPOKE_ROLE_ARN" ]]; then
                          echo "Missing gen3.io/spoke-role-arn annotation on secret writer service account." >&2
                          exit 1
                        fi

                        local creds
                        creds="$(aws sts assume-role \
                          --region "$AWS_REGION" \
                          --role-arn "$SPOKE_ROLE_ARN" \
                          --role-session-name gen3-secret-writer \
                          --query 'Credentials.[AccessKeyId,SecretAccessKey,SessionToken]' \
                          --output text)"
                        read -r AWS_ACCESS_KEY_ID AWS_SECRET_ACCESS_KEY AWS_SESSION_TOKEN <<< "$creds"
                        export AWS_ACCESS_KEY_ID AWS_SECRET_ACCESS_KEY AWS_SESSION_TOKEN
                      }

                      assume_spoke_role

                      deleted_date="$(aws secretsmanager describe-secret \
                        --region "$AWS_REGION" \
                        --secret-id "$SECRET_NAME" \
                        --query 'DeletedDate' \
                        --output text 2>/dev/null || true)"

                      if [[ -n "$deleted_date" && "$deleted_date" != "None" ]]; then
                        echo "$SECRET_NAME is already scheduled for deletion."
                      elif aws secretsmanager describe-secret --region "$AWS_REGION" --secret-id "$SECRET_NAME" >/dev/null 2>&1; then
                        aws secretsmanager delete-secret \
                          --region "$AWS_REGION" \
                          --secret-id "$SECRET_NAME" \
                          --recovery-window-in-days 7 >/dev/null
                        echo "$SECRET_NAME scheduled for deletion."
                      else
                        echo "$SECRET_NAME does not exist in AWS; nothing to delete."
                      fi
    # -- Fence Google storage credentials ------------------------------------
    # Source: gen3-secret-bootstrap/fence_google_storage_creds_secret.json
    # Action key: gen3-secret-bootstrap/fence-google-storage-creds-action (update|none|delete)
    - id: fenceGoogleStorageCredsUpdateJob
      includeWhen:
        - "${('secret-action-fence-google-storage-creds' in infrastructureConfig.data && infrastructureConfig.data['secret-action-fence-google-storage-creds'] == 'update') || ((!('secret-action-fence-google-storage-creds' in infrastructureConfig.data) || infrastructureConfig.data['secret-action-fence-google-storage-creds'] == '') && ('fence-google-storage-creds-action' in bootstrapSecret.data ? bootstrapSecret.data['fence-google-storage-creds-action'] : b'none') == b'update')}"
      readyWhen:
        - ${fenceGoogleStorageCredsUpdateJob.status.?succeeded.orValue(0) == 1}
      template:
        apiVersion: batch/v1
        kind: Job
        metadata:
          name: ${schema.spec.name}-fence-google-storage-creds-update
          namespace: ${schema.spec.namespace}
          labels:
            app.kubernetes.io/managed-by: kro
            gen3.io/tier: secret-bootstrap
            gen3.io/secret-purpose: fence-google-storage-creds
            gen3.io/secret-action: update
        spec:
          backoffLimit: 3
          template:
            spec:
              serviceAccountName: ${secretWriterServiceAccount.metadata.name}
              restartPolicy: Never
              volumes:
                - name: bootstrap-secret
                  secret:
                    secretName: gen3-secret-bootstrap
                    optional: true
              containers:
                - name: update-secret
                  image: ${schema.spec.secretWriterImage}
                  imagePullPolicy: IfNotPresent
                  volumeMounts:
                    - name: bootstrap-secret
                      mountPath: /bootstrap-secret
                      readOnly: true
                  env:
                    - name: AWS_REGION
                      value: ${infrastructureConfig.data['aws-region']}
                    - name: SECRET_NAME
                      value: "${schema.spec.name + '-' + schema.spec.namespace + '-' + (infrastructureConfig.data['secret-name-fence-google-storage-creds'] != '' ? infrastructureConfig.data['secret-name-fence-google-storage-creds'] : 'fence-google-storage-creds-secret')}"
                    - name: BOOTSTRAP_SECRET_DIR
                      value: /bootstrap-secret
                    - name: SPOKE_ROLE_ARN
                      value: ${secretWriterServiceAccount.metadata.annotations['gen3.io/spoke-role-arn']}
                  command:
                    - /bin/bash
                    - -c
                  args:
                    - |
                      set -euo pipefail

                      assume_spoke_role() {
                        if [[ -z "$SPOKE_ROLE_ARN" ]]; then
                          echo "Missing gen3.io/spoke-role-arn annotation on secret writer service account." >&2
                          exit 1
                        fi

                        local creds
                        creds="$(aws sts assume-role \
                          --region "$AWS_REGION" \
                          --role-arn "$SPOKE_ROLE_ARN" \
                          --role-session-name gen3-secret-writer \
                          --query 'Credentials.[AccessKeyId,SecretAccessKey,SessionToken]' \
                          --output text)"
                        read -r AWS_ACCESS_KEY_ID AWS_SECRET_ACCESS_KEY AWS_SESSION_TOKEN <<< "$creds"
                        export AWS_ACCESS_KEY_ID AWS_SECRET_ACCESS_KEY AWS_SESSION_TOKEN
                      }

                      ensure_secret_writable() {
                        local deleted_date
                        deleted_date="$(aws secretsmanager describe-secret \
                          --region "$AWS_REGION" \
                          --secret-id "$SECRET_NAME" \
                          --query 'DeletedDate' \
                          --output text 2>/dev/null || true)"

                        if [[ "$deleted_date" == "None" ]]; then
                          return
                        fi

                        if [[ -n "$deleted_date" ]]; then
                          aws secretsmanager restore-secret \
                            --region "$AWS_REGION" \
                            --secret-id "$SECRET_NAME" >/dev/null
                          echo "$SECRET_NAME restored before update."
                          return
                        fi

                        aws secretsmanager create-secret \
                          --region "$AWS_REGION" \
                          --name "$SECRET_NAME" \
                          --secret-string '{}' >/dev/null
                      }

                      assume_spoke_role

                      credentials_json_path="$BOOTSTRAP_SECRET_DIR/fence_google_storage_creds_secret.json"
                      if [[ ! -f "$credentials_json_path" ]]; then
                        echo "Missing fence_google_storage_creds_secret.json in bootstrap secret." >&2
                        exit 1
                      fi
                      credentials_json="$(cat "$credentials_json_path")"

                      payload="$(python3 - "$credentials_json" <<'PY'
                      import json, sys
                      print(json.dumps({
                          "fence_google_storage_creds_secret.json": sys.argv[1] or "{}",
                          "created": "true",
                      }))
                      PY
                      )"

                      ensure_secret_writable

                      aws secretsmanager put-secret-value \
                        --region "$AWS_REGION" \
                        --secret-id "$SECRET_NAME" \
                        --secret-string "$payload"

                      echo "fence-google-storage-creds secret updated."

    - id: fenceGoogleStorageCredsDeleteJob
      includeWhen:
        - "${('secret-action-fence-google-storage-creds' in infrastructureConfig.data && infrastructureConfig.data['secret-action-fence-google-storage-creds'] == 'delete') || ((!('secret-action-fence-google-storage-creds' in infrastructureConfig.data) || infrastructureConfig.data['secret-action-fence-google-storage-creds'] == '') && ('fence-google-storage-creds-action' in bootstrapSecret.data ? bootstrapSecret.data['fence-google-storage-creds-action'] : b'none') == b'delete')}"
      readyWhen:
        - ${fenceGoogleStorageCredsDeleteJob.status.?succeeded.orValue(0) == 1}
      template:
        apiVersion: batch/v1
        kind: Job
        metadata:
          name: ${schema.spec.name}-fence-google-storage-creds-delete
          namespace: ${schema.spec.namespace}
          labels:
            app.kubernetes.io/managed-by: kro
            gen3.io/tier: secret-bootstrap
            gen3.io/secret-purpose: fence-google-storage-creds
            gen3.io/secret-action: delete
        spec:
          backoffLimit: 3
          template:
            spec:
              serviceAccountName: ${secretWriterServiceAccount.metadata.name}
              restartPolicy: Never
              containers:
                - name: delete-secret
                  image: ${schema.spec.secretWriterImage}
                  imagePullPolicy: IfNotPresent
                  env:
                    - name: AWS_REGION
