# AwsGen3SecretBootstrap1 — Aurora master password bootstrap through spoke role
apiVersion: kro.run/v1alpha1
kind: ResourceGraphDefinition
metadata:
  name: awsgen3secretbootstrap1
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  schema:
    apiVersion: v1alpha1
    kind: AwsGen3SecretBootstrap1
    spec:
      name: string | required=true
      namespace: string | required=true
      infrastructureConfigMapName: string | default="infrastructure-values"
      adoptionPolicy: string | default="adopt-or-create"
      deletionPolicy: string | default="retain"
      secretWriterImage: string | default="quay.io/cdis/awshelper:master"
      auroraMasterPasswordSecretBridgeName: string | default="aurora-master-password-secret-bridge"
      masterUsername: string | default="postgres"
      masterPort: string | default="5432"

    status:
      spokeRoleARN: ${spokeNamespace.metadata.annotations['services.k8s.aws/owner-account-role-arn']}
      secretWriterServiceAccountName: ${secretWriterServiceAccount.metadata.name}
      auroraMasterPasswordSecretARN: ${awsSecret.status.?ackResourceMetadata.?arn.orValue("loading")}
      auroraMasterPasswordCreated: "${secretValueJob.status.?succeeded.orValue(0) == 1 ? 'true' : 'false'}"

  resources:

    - id: spokeNamespace
      readyWhen:
        - ${spokeNamespace.metadata.?name.orValue('null') != 'null'}
        - ${spokeNamespace.metadata.annotations['services.k8s.aws/owner-account-role-arn'] != ''}
      externalRef:
        apiVersion: v1
        kind: Namespace
        metadata:
          name: ${schema.spec.namespace}

    - id: secretWriterServiceAccount
      readyWhen:
        - ${secretWriterServiceAccount.metadata.?name.orValue('null') != 'null'}
      externalRef:
        apiVersion: v1
        kind: ServiceAccount
        metadata:
          name: gen3-secret-writer-sa
          namespace: ${schema.spec.namespace}

    - id: infrastructureConfig
      readyWhen:
        - ${infrastructureConfig.metadata.?name.orValue('null') != 'null'}
      externalRef:
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: ${schema.spec.infrastructureConfigMapName}
          namespace: ${schema.spec.namespace}

    - id: awsSecret
      readyWhen:
        - ${awsSecret.status.?ackResourceMetadata.?arn.orValue('null') != 'null'}
        - ${awsSecret.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
      template:
        apiVersion: secretsmanager.services.k8s.aws/v1alpha1
        kind: Secret
        metadata:
          name: ${schema.spec.name}-aurora-master-password-sm
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${infrastructureConfig.data['aws-region']}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          name: "${schema.spec.name + '-' + schema.spec.namespace + '-' + (infrastructureConfig.data['secret-name-aurora-master-password'] != '' ? infrastructureConfig.data['secret-name-aurora-master-password'] : 'aurora-master-password')}"
          description: ${"Aurora master credentials for " + schema.spec.name + " in " + schema.spec.namespace}
          tags:
            - key: ManagedBy
              value: Kro
            - key: Gen3Instance
              value: ${schema.spec.name}
            - key: Gen3Namespace
              value: ${schema.spec.namespace}
            - key: SecretPurpose
              value: aurora-master-password

    - id: secretValueJob
      readyWhen:
        - ${secretValueJob.status.?succeeded.orValue(0) == 1}
      template:
        apiVersion: batch/v1
        kind: Job
        metadata:
          name: ${schema.spec.name}-aurora-master-password-sync
          namespace: ${schema.spec.namespace}
          labels:
            app.kubernetes.io/managed-by: kro
            gen3.io/tier: secret-bootstrap
            gen3.io/secret-purpose: aurora-master-password
        spec:
          backoffLimit: 3
          template:
            spec:
              serviceAccountName: ${secretWriterServiceAccount.metadata.name}
              restartPolicy: Never
              containers:
                - name: sync-secret-value
                  image: ${schema.spec.secretWriterImage}
                  imagePullPolicy: IfNotPresent
                  env:
                    - name: AWS_REGION
                      value: ${infrastructureConfig.data['aws-region']}
                    - name: SECRET_ARN
                      value: ${awsSecret.status.ackResourceMetadata.arn}
                    - name: MASTER_USERNAME
                      value: ${schema.spec.masterUsername}
                    - name: MASTER_PORT
                      value: ${schema.spec.masterPort}
                  command:
                    - /bin/bash
                    - -c
                  args:
                    - |
                      set -euo pipefail

                      existing="$(aws secretsmanager get-secret-value \
                        --region "${AWS_REGION}" \
                        --secret-id "${SECRET_ARN}" \
                        --query SecretString \
                        --output text 2>/dev/null || true)"

                      if python3 - "$existing" <<'PY'
                      import json, sys
                      try:
                          data = json.loads(sys.argv[1] or "{}")
                      except Exception:
                          sys.exit(1)
                      sys.exit(0 if str(data.get("created", "")).lower() == "true" else 1)
                      PY
                      then
                        echo "Secret value already marked created=true; leaving it unchanged."
                        exit 0
                      fi

                      password="$(python3 - <<'PY'
                      import secrets, string
                      alphabet = string.ascii_letters + string.digits + "!#$%&*()-_=+[]{}"
                      print("".join(secrets.choice(alphabet) for _ in range(32)))
                      PY
                      )"

                      payload="$(python3 - "$MASTER_USERNAME" "$password" "$MASTER_PORT" <<'PY'
                      import json, sys
                      username, password, port = sys.argv[1:4]
                      print(json.dumps({
                          "username": username,
                          "password": password,
                          "host": "placeholder",
                          "port": port,
                          "created": "true",
                      }))
                      PY
                      )"

                      aws secretsmanager put-secret-value \
                        --region "${AWS_REGION}" \
                        --secret-id "${SECRET_ARN}" \
                        --secret-string "${payload}"

                      echo "Aurora master password secret value synced."

    - id: auroraMasterPasswordSecretBridge
      readyWhen:
        - ${auroraMasterPasswordSecretBridge.metadata.?name.orValue('null') != 'null'}
      template:
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: ${schema.spec.auroraMasterPasswordSecretBridgeName}
          namespace: ${schema.spec.namespace}
          labels:
            app.kubernetes.io/managed-by: kro
            gen3.io/tier: secret-bootstrap
            gen3.io/bridge: "true"
        data:
          secret-name: "${schema.spec.name + '-' + schema.spec.namespace + '-' + (infrastructureConfig.data['secret-name-aurora-master-password'] != '' ? infrastructureConfig.data['secret-name-aurora-master-password'] : 'aurora-master-password')}"
          secret-arn: ${awsSecret.status.?ackResourceMetadata.?arn.orValue("loading")}
          spoke-role-arn: ${spokeNamespace.metadata.annotations['services.k8s.aws/owner-account-role-arn']}
          secret-writer-sa-name: ${secretWriterServiceAccount.metadata.name}
          created: "${secretValueJob.status.?succeeded.orValue(0) == 1 ? 'true' : 'false'}"
