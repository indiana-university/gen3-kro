                        exit 0
                      fi

                      run_flag="$(flag_value "run-indexd-service-creds-job")"
                      if [[ "$run_flag" != "true" ]]; then
                        echo "run-indexd-service-creds-job != 'true'; failing because this Job should only be created when enabled." >&2
                        exit 1
                      fi


                      bootstrap_value() {
                        local key="$1"
                        local path="$BOOTSTRAP_SECRET_DIR/$key"
                        if [[ ! -f "$path" ]]; then
                          echo "Missing bootstrap secret key '$key'." >&2
                          exit 1
                        fi
                        cat "$path"
                      }

                      indexd_fence="$(bootstrap_value "indexd-fence")"
                      indexd_sheepdog="$(bootstrap_value "indexd-sheepdog")"
                      indexd_ssj="$(bootstrap_value "indexd-ssj")"
                      indexd_gateway="$(bootstrap_value "indexd-gateway")"

                      payload="$(python3 - "$indexd_fence" "$indexd_sheepdog" "$indexd_ssj" "$indexd_gateway" <<'PY'
                      import json, sys
                      print(json.dumps({
                          "fence": sys.argv[1],
                          "sheepdog": sys.argv[2],
                          "ssj": sys.argv[3],
                          "gateway": sys.argv[4],
                          "created": "true",
                      }))
                      PY
                      )"

                      ensure_secret_writable

                      aws secretsmanager put-secret-value \
                        --region "$AWS_REGION" \
                        --secret-id "$SECRET_NAME" \
                        --secret-string "$payload"

                      echo "indexd-service-creds secret seeded."

    # ── Metadata g3auto ───────────────────────────────────────────────────────
    # Sources: gen3-secret-bootstrap/base64Authz.txt, dbcreds.json, metadata.env
    # Run flag: gen3-secret-bootstrap/run-metadata-g3auto-job
    # Delete flag: gen3-secret-bootstrap/delete-metadata-g3auto-secret
    - id: metadataG3AutoJob
      includeWhen:
        - ${bootstrapSecret.data['run-metadata-g3auto-job'] == b'true' || bootstrapSecret.data['delete-metadata-g3auto-secret'] == b'true'}
      readyWhen:
        - ${metadataG3AutoJob.status.?succeeded.orValue(0) == 1}
      template:
        apiVersion: batch/v1
        kind: Job
        metadata:
          name: ${schema.spec.name}-metadata-g3auto-sync
          namespace: ${schema.spec.namespace}
          labels:
            app.kubernetes.io/managed-by: kro
            gen3.io/tier: secret-bootstrap
            gen3.io/secret-purpose: metadata-g3auto
        spec:
          backoffLimit: 3
          template:
            spec:
              serviceAccountName: ${secretWriterServiceAccount.metadata.name}
              restartPolicy: Never
              volumes:
                - name: bootstrap-secret
                  secret:
                    secretName: gen3-secret-bootstrap
                    optional: true
              containers:
                - name: sync-secret-value
                  image: ${schema.spec.secretWriterImage}
                  imagePullPolicy: IfNotPresent
                  volumeMounts:
                    - name: bootstrap-secret
                      mountPath: /bootstrap-secret
                      readOnly: true
                  env:
                    - name: AWS_REGION
                      value: ${infrastructureConfig.data['aws-region']}
                    - name: SECRET_NAME
                      value: "${schema.spec.name + '-' + schema.spec.namespace + '-' + (infrastructureConfig.data['secret-name-metadata-g3auto'] != '' ? infrastructureConfig.data['secret-name-metadata-g3auto'] : 'metadata-g3auto')}"
                    - name: BOOTSTRAP_SECRET_DIR
                      value: /bootstrap-secret
                    - name: SPOKE_ROLE_ARN
                      value: ${secretWriterServiceAccount.metadata.annotations['gen3.io/spoke-role-arn']}
                  command:
                    - /bin/bash
                    - -c
                  args:
                    - |
                      set -euo pipefail

                      assume_spoke_role() {
                        if [[ -z "$SPOKE_ROLE_ARN" ]]; then
                          echo "Missing gen3.io/spoke-role-arn annotation on secret writer service account." >&2
                          exit 1
                        fi

                        local creds
                        creds="$(aws sts assume-role \
                          --region "$AWS_REGION" \
                          --role-arn "$SPOKE_ROLE_ARN" \
                          --role-session-name gen3-secret-writer \
                          --query 'Credentials.[AccessKeyId,SecretAccessKey,SessionToken]' \
                          --output text)"
                        read -r AWS_ACCESS_KEY_ID AWS_SECRET_ACCESS_KEY AWS_SESSION_TOKEN <<< "$creds"
                        export AWS_ACCESS_KEY_ID AWS_SECRET_ACCESS_KEY AWS_SESSION_TOKEN
                      }

                      assume_spoke_role

                      flag_value() {
                        local key="$1"
                        cat "$BOOTSTRAP_SECRET_DIR/$key" 2>/dev/null || echo "false"
                      }

                      delete_secret_if_requested() {
                        local delete_flag="$1"
                        if [[ "$delete_flag" != "true" ]]; then
                          return 1
                        fi

                        local deleted_date
                        deleted_date="$(aws secretsmanager describe-secret \
                          --region "$AWS_REGION" \
                          --secret-id "$SECRET_NAME" \
                          --query 'DeletedDate' \
                          --output text 2>/dev/null || true)"

                        if [[ -n "$deleted_date" && "$deleted_date" != "None" ]]; then
                          echo "$SECRET_NAME is already scheduled for deletion."
                        elif aws secretsmanager describe-secret --region "$AWS_REGION" --secret-id "$SECRET_NAME" >/dev/null 2>&1; then
                          aws secretsmanager delete-secret \
                            --region "$AWS_REGION" \
                            --secret-id "$SECRET_NAME" \
                            --recovery-window-in-days 7 >/dev/null
                          echo "$SECRET_NAME scheduled for deletion."
                        else
                          echo "$SECRET_NAME does not exist in AWS; nothing to delete."
                        fi

                        return 0
                      }

                      ensure_secret_writable() {
                        local deleted_date
                        deleted_date="$(aws secretsmanager describe-secret \
                          --region "$AWS_REGION" \
                          --secret-id "$SECRET_NAME" \
                          --query 'DeletedDate' \
                          --output text 2>/dev/null || true)"

                        if [[ "$deleted_date" == "None" ]]; then
                          return
                        fi

                        if [[ -n "$deleted_date" ]]; then
                          aws secretsmanager restore-secret \
                            --region "$AWS_REGION" \
                            --secret-id "$SECRET_NAME" >/dev/null
                          echo "$SECRET_NAME restored before update."
                          return
                        fi

                        aws secretsmanager create-secret \
                          --region "$AWS_REGION" \
                          --name "$SECRET_NAME" \
                          --secret-string '{}' >/dev/null
                      }

                      delete_flag="$(flag_value "delete-metadata-g3auto-secret")"
                      if delete_secret_if_requested "$delete_flag"; then
                        exit 0
                      fi

                      run_flag="$(flag_value "run-metadata-g3auto-job")"
                      if [[ "$run_flag" != "true" ]]; then
                        echo "run-metadata-g3auto-job != 'true'; failing because this Job should only be created when enabled." >&2
                        exit 1
                      fi


                      bootstrap_value() {
                        local key="$1"
                        local path="$BOOTSTRAP_SECRET_DIR/$key"
                        if [[ ! -f "$path" ]]; then
                          echo "Missing bootstrap secret key '$key'." >&2
                          exit 1
                        fi
                        cat "$path"
                      }

                      base64_authz="$(bootstrap_value "base64Authz.txt")"
                      dbcreds_json="$(bootstrap_value "dbcreds.json")"
                      metadata_env="$(bootstrap_value "metadata.env")"

                      payload="$(python3 - "$base64_authz" "$dbcreds_json" "$metadata_env" <<'PY'
                      import json, sys
                      print(json.dumps({
                          "base64Authz.txt": sys.argv[1],
                          "dbcreds.json": sys.argv[2],
                          "metadata.env": sys.argv[3],
                          "created": "true",
                      }))
                      PY
                      )"

                      ensure_secret_writable

                      aws secretsmanager put-secret-value \
                        --region "$AWS_REGION" \
                        --secret-id "$SECRET_NAME" \
                        --secret-string "$payload"

                      echo "metadata-g3auto secret seeded."
