# AwsGen3DatabaseSecretMirror1 - Tier 1.5: Aurora master password mirror
#
# Mirrors the RDS-managed Aurora master password secret into the deterministic
# AWS Secrets Manager secret name that Gen3 Build already reads through ESO.
# The password value is read only by the Lambda function in the spoke account.
apiVersion: kro.run/v1alpha1
kind: ResourceGraphDefinition
metadata:
  name: awsgen3databasesecretmirror1
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  schema:
    apiVersion: v1alpha1
    kind: AwsGen3DatabaseSecretMirror1
    spec:
      name: string | required=true
      namespace: string | required=true
      adoptionPolicy: string | default="adopt-or-create"
      deletionPolicy: string | default="retain"
      infrastructureConfigMapName: string | default="infrastructure-values"
      networkSecurityBridgeName: string | default="network-security-bridge"
      storageBridgeName: string | default="storage-bridge"
      databaseBridgeName: string | default="database-bridge"
      databaseSecretMirrorBridgeName: string | default="database-secret-mirror-bridge"
      secretWriterServiceAccountName: string | default="gen3-secret-writer-sa"
      secretWriterImage: string | default="quay.io/cdis/awshelper:master"

    status:
      mirrorSecretName: ${databaseBridge.data['aurora-master-password-sm-name']}
      mirrorSecretARN: ${mirrorSecret.status.?ackResourceMetadata.?arn.orValue("loading")}
      lambdaFunctionARN: ${lambdaFunction.status.?ackResourceMetadata.?arn.orValue("loading")}
      scheduleRuleARN: ${scheduledMirrorRule.status.?ackResourceMetadata.?arn.orValue("loading")}
      schedulePermissionCreated: '${lambdaSchedulePermissionJob.status.?succeeded.orValue(0) == 1 ? "true" : "false"}'
      initialSyncCompleted: '${lambdaInitialInvokeJob.status.?succeeded.orValue(0) == 1 ? "true" : "false"}'
      changeRuleARN: ${changeEventMirrorRule.status.?ackResourceMetadata.?arn.orValue("disabled")}
      changePermissionCreated: '${lambdaChangeEventPermissionJob.status.?succeeded.orValue(0) == 1 ? "true" : "false"}'

  resources:

    - id: spokeNamespace
      readyWhen:
        - ${spokeNamespace.metadata.?name.orValue('null') != 'null'}
        - ${spokeNamespace.metadata.annotations['services.k8s.aws/owner-account-id'] != ''}
      externalRef:
        apiVersion: v1
        kind: Namespace
        metadata:
          name: ${schema.spec.namespace}

    - id: infrastructureConfig
      readyWhen:
        - ${infrastructureConfig.metadata.?name.orValue('null') != 'null'}
        - ${infrastructureConfig.data['database-secret-mirror-enabled'] == 'true'}
      externalRef:
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: ${schema.spec.infrastructureConfigMapName}
          namespace: ${schema.spec.namespace}

    - id: networkSecurityBridge
      readyWhen:
        - ${networkSecurityBridge.metadata.?name.orValue('null') != 'null'}
        - ${networkSecurityBridge.data['database-key-arn'] != ''}
        - ${networkSecurityBridge.data['database-key-arn'] != 'loading'}
      externalRef:
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: ${schema.spec.networkSecurityBridgeName}
          namespace: ${schema.spec.namespace}

    - id: storageBridge
      readyWhen:
        - ${storageBridge.metadata.?name.orValue('null') != 'null'}
        - ${storageBridge.data['logging-bucket-name'] != ''}
        - ${storageBridge.data['logging-bucket-name'] != 'loading'}
      externalRef:
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: ${schema.spec.storageBridgeName}
          namespace: ${schema.spec.namespace}

    - id: databaseBridge
      readyWhen:
        - ${databaseBridge.metadata.?name.orValue('null') != 'null'}
        - ${databaseBridge.data['aurora-cluster-endpoint'] != ''}
        - ${databaseBridge.data['aurora-cluster-endpoint'] != 'loading'}
        - ${databaseBridge.data['aurora-master-password-sm-name'] != ''}
        - ${databaseBridge.data['aurora-master-password-sm-name'] != 'loading'}
        - ${databaseBridge.data['aurora-master-password-sm-arn'] != ''}
        - ${databaseBridge.data['aurora-master-password-sm-arn'] != 'loading'}
        - ${databaseBridge.data['aurora-port'] != ''}
      externalRef:
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: ${schema.spec.databaseBridgeName}
          namespace: ${schema.spec.namespace}

    - id: secretWriterServiceAccount
      readyWhen:
        - ${secretWriterServiceAccount.metadata.?name.orValue('null') != 'null'}
      externalRef:
        apiVersion: v1
        kind: ServiceAccount
        metadata:
          name: ${schema.spec.secretWriterServiceAccountName}
          namespace: ${schema.spec.namespace}

    - id: mirrorSecret
      readyWhen:
        - ${mirrorSecret.status.?ackResourceMetadata.?arn.orValue('null') != 'null'}
        - ${mirrorSecret.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
      template:
        apiVersion: secretsmanager.services.k8s.aws/v1alpha1
        kind: Secret
        metadata:
          name: ${schema.spec.name}-aurora-master-password-mirror
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${infrastructureConfig.data['aws-region']}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          name: ${databaseBridge.data['aurora-master-password-sm-name']}
          description: Gen3-compatible mirror of the RDS-managed Aurora master credential.
          kmsKeyID: ${networkSecurityBridge.data['database-key-arn']}
          tags:
            - key: Name
              value: ${databaseBridge.data['aurora-master-password-sm-name']}
            - key: ManagedBy
              value: Gen3KRO
            - key: gen3.io/secret-purpose
              value: aurora-master-password-mirror

    - id: lambdaExecutionRole
      readyWhen:
        - ${lambdaExecutionRole.status.?ackResourceMetadata.?arn.orValue('null') != 'null'}
        - ${lambdaExecutionRole.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
      template:
        apiVersion: iam.services.k8s.aws/v1alpha1
        kind: Role
        metadata:
          name: ${schema.spec.name}-aurora-secret-mirror-role
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${infrastructureConfig.data['aws-region']}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          name: ${schema.spec.name}-aurora-secret-mirror-role
          assumeRolePolicyDocument: |
            {
              "Version": "2012-10-17",
              "Statement": [
                {
                  "Effect": "Allow",
                  "Principal": {"Service": "lambda.amazonaws.com"},
                  "Action": "sts:AssumeRole"
                }
              ]
            }
          inlinePolicies:
            aurora-secret-mirror: |
              {
                "Version": "2012-10-17",
                "Statement": [
                  {
                    "Sid": "WriteFunctionLogs",
                    "Effect": "Allow",
                    "Action": [
                      "logs:CreateLogGroup",
                      "logs:CreateLogStream",
                      "logs:PutLogEvents"
                    ],
                    "Resource": [
                      "arn:aws:logs:${infrastructureConfig.data['aws-region']}:${spokeNamespace.metadata.annotations['services.k8s.aws/owner-account-id']}:log-group:/aws/lambda/${schema.spec.name}-aurora-secret-mirror",
                      "arn:aws:logs:${infrastructureConfig.data['aws-region']}:${spokeNamespace.metadata.annotations['services.k8s.aws/owner-account-id']}:log-group:/aws/lambda/${schema.spec.name}-aurora-secret-mirror:*"
                    ]
                  },
                  {
                    "Sid": "ReadClusterMetadata",
                    "Effect": "Allow",
                    "Action": "rds:DescribeDBClusters",
                    "Resource": "*"
                  },
                  {
                    "Sid": "ReadRDSManagedSecret",
                    "Effect": "Allow",
                    "Action": [
                      "secretsmanager:DescribeSecret",
                      "secretsmanager:GetSecretValue"
                    ],
                    "Resource": "${databaseBridge.data['aurora-master-password-sm-arn']}"
                  },
                  {
                    "Sid": "WriteMirrorSecretValue",
                    "Effect": "Allow",
                    "Action": [
                      "secretsmanager:CreateSecret",
                      "secretsmanager:DescribeSecret",
                      "secretsmanager:PutSecretValue",
                      "secretsmanager:RestoreSecret",
                      "secretsmanager:TagResource",
                      "secretsmanager:UpdateSecret"
                    ],
                    "Resource": "arn:aws:secretsmanager:${infrastructureConfig.data['aws-region']}:${spokeNamespace.metadata.annotations['services.k8s.aws/owner-account-id']}:secret:${databaseBridge.data['aurora-master-password-sm-name']}-*"
                  },
                  {
                    "Sid": "UseDatabaseKMSKey",
                    "Effect": "Allow",
                    "Action": [
                      "kms:Decrypt",
                      "kms:DescribeKey",
                      "kms:Encrypt",
                      "kms:GenerateDataKey*"
                    ],
                    "Resource": "${networkSecurityBridge.data['database-key-arn']}"
                  }
                ]
              }
          tags:
            - key: Name
              value: ${schema.spec.name}-aurora-secret-mirror-role
            - key: ManagedBy
              value: Kro
            - key: gen3.io/secret-purpose
              value: aurora-master-password-mirror

    - id: lambdaFunction
      readyWhen:
        - ${lambdaFunction.status.?ackResourceMetadata.?arn.orValue('null') != 'null'}
        - ${lambdaFunction.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
      template:
        apiVersion: lambda.services.k8s.aws/v1alpha1
        kind: Function
        metadata:
          name: ${schema.spec.name}-aurora-secret-mirror
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${infrastructureConfig.data['aws-region']}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          name: ${schema.spec.name}-aurora-secret-mirror
          description: Mirrors the RDS-managed Aurora master credential into the Gen3-compatible Secrets Manager secret.
          packageType: Zip
          runtime: ${infrastructureConfig.data['database-secret-mirror-lambda-runtime']}
          handler: ${infrastructureConfig.data['database-secret-mirror-lambda-handler']}
          timeout: ${int(infrastructureConfig.data['database-secret-mirror-lambda-timeout'])}
          memorySize: ${int(infrastructureConfig.data['database-secret-mirror-lambda-memory-size'])}
          roleRef:
            from:
              name: ${lambdaExecutionRole.metadata.name}
          code:
            s3Bucket: ${storageBridge.data['logging-bucket-name']}
            s3Key: lambda/rds_master_secret_mirror.zip
            sha256: DBUxPCLQFc6KRLfOrSvwte3bANCBxNVTcZCwfb9QHNw=
          environment:
            variables:
              DB_CLUSTER_IDENTIFIER: ${schema.spec.name}-aurora
              MIRROR_SECRET_NAME: ${databaseBridge.data['aurora-master-password-sm-name']}
              MIRROR_SECRET_KMS_KEY_ID: ${networkSecurityBridge.data['database-key-arn']}
          tags:
            ManagedBy: Kro
            gen3.io/secret-purpose: aurora-master-password-mirror

    - id: scheduledMirrorRule
      readyWhen:
        - ${scheduledMirrorRule.status.?ackResourceMetadata.?arn.orValue('null') != 'null'}
        - ${scheduledMirrorRule.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
      template:
        apiVersion: eventbridge.services.k8s.aws/v1alpha1
        kind: Rule
        metadata:
          name: ${schema.spec.name}-aurora-secret-mirror-schedule
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${infrastructureConfig.data['aws-region']}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          name: ${schema.spec.name}-aurora-secret-mirror-schedule
          description: Periodically sync the RDS-managed Aurora master credential into the Gen3-compatible mirror secret.
          scheduleExpression: ${infrastructureConfig.data['database-secret-mirror-schedule-expression']}
          state: ENABLED
          targets:
            - id: ${schema.spec.name}-aurora-secret-mirror
              arn: ${lambdaFunction.status.ackResourceMetadata.arn}
              input: '{"source":"gen3-kro","detail-type":"Scheduled Aurora credential mirror sync"}'
          tags:
            - key: Name
              value: ${schema.spec.name}-aurora-secret-mirror-schedule
            - key: ManagedBy
              value: Kro
            - key: gen3.io/secret-purpose
              value: aurora-master-password-mirror

    - id: lambdaSchedulePermissionJob
      readyWhen:
        - ${lambdaSchedulePermissionJob.status.?succeeded.orValue(0) == 1}
      template:
        apiVersion: batch/v1
        kind: Job
        metadata:
          name: ${schema.spec.name}-aurora-secret-mirror-schedule-permission
          namespace: ${schema.spec.namespace}
          labels:
            app.kubernetes.io/managed-by: kro
            gen3.io/tier: database-secret-mirror
            gen3.io/permission-purpose: eventbridge-lambda-invoke
        spec:
          backoffLimit: 3
          template:
            spec:
              serviceAccountName: ${secretWriterServiceAccount.metadata.name}
              restartPolicy: Never
              containers:
                - name: add-permission
                  image: ${schema.spec.secretWriterImage}
                  imagePullPolicy: IfNotPresent
                  env:
                    - name: AWS_REGION
                      value: ${infrastructureConfig.data['aws-region']}
                    - name: FUNCTION_NAME
                      value: ${lambdaFunction.spec.name}
                    - name: STATEMENT_ID
                      value: ${schema.spec.name}-aurora-secret-mirror-schedule
                    - name: SOURCE_ARN
                      value: ${scheduledMirrorRule.status.ackResourceMetadata.arn}
                    - name: SPOKE_ROLE_ARN
                      value: ${secretWriterServiceAccount.metadata.annotations['gen3.io/spoke-role-arn']}
                  command:
                    - /bin/bash
                    - -c
                  args:
                    - |
                      set -euo pipefail

                      assume_spoke_role() {
                        if [[ -z "$SPOKE_ROLE_ARN" ]]; then
                          echo "Missing gen3.io/spoke-role-arn annotation on secret writer service account." >&2
                          exit 1
                        fi

                        local creds
                        creds="$(aws sts assume-role \
                          --region "$AWS_REGION" \
                          --role-arn "$SPOKE_ROLE_ARN" \
                          --role-session-name gen3-lambda-permission \
                          --query 'Credentials.[AccessKeyId,SecretAccessKey,SessionToken]' \
                          --output text)"
                        read -r AWS_ACCESS_KEY_ID AWS_SECRET_ACCESS_KEY AWS_SESSION_TOKEN <<< "$creds"
                        export AWS_ACCESS_KEY_ID AWS_SECRET_ACCESS_KEY AWS_SESSION_TOKEN
                      }

                      add_permission() {
                        set +e
                        output="$(aws lambda add-permission \
                          --region "$AWS_REGION" \
                          --function-name "$FUNCTION_NAME" \
                          --statement-id "$STATEMENT_ID" \
                          --action lambda:InvokeFunction \
                          --principal events.amazonaws.com \
                          --source-arn "$SOURCE_ARN" 2>&1)"
                        status=$?
                        set -e

                        if [[ $status -eq 0 ]]; then
                          echo "EventBridge permission created for $FUNCTION_NAME."
                          return
                        fi

                        if grep -q "ResourceConflictException" <<< "$output"; then
                          echo "EventBridge permission already exists for $FUNCTION_NAME."
                          return
                        fi

                        echo "$output" >&2
                        exit "$status"
                      }

                      assume_spoke_role
                      add_permission

    - id: changeEventMirrorRule
      includeWhen:
        - ${infrastructureConfig.data['database-secret-mirror-event-pattern-enabled'] == 'true'}
      readyWhen:
        - ${changeEventMirrorRule.status.?ackResourceMetadata.?arn.orValue('null') != 'null'}
        - ${changeEventMirrorRule.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
      template:
        apiVersion: eventbridge.services.k8s.aws/v1alpha1
        kind: Rule
        metadata:
          name: ${schema.spec.name}-aurora-secret-mirror-change
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${infrastructureConfig.data['aws-region']}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          name: ${schema.spec.name}-aurora-secret-mirror-change
          description: React to Secrets Manager control-plane events and refresh the Aurora credential mirror.
          eventPattern: |
            {
              "source": ["aws.secretsmanager"],
              "detail-type": ["AWS API Call via CloudTrail"],
              "detail": {
                "eventSource": ["secretsmanager.amazonaws.com"],
                "eventName": ["PutSecretValue", "UpdateSecretVersionStage", "RotateSecret"]
              }
            }
          state: ENABLED_WITH_ALL_CLOUDTRAIL_MANAGEMENT_EVENTS
          targets:
            - id: ${schema.spec.name}-aurora-secret-mirror
              arn: ${lambdaFunction.status.ackResourceMetadata.arn}
              input: '{"source":"gen3-kro","detail-type":"Secrets Manager Aurora credential mirror sync"}'
          tags:
            - key: Name
              value: ${schema.spec.name}-aurora-secret-mirror-change
            - key: ManagedBy
              value: Kro
            - key: gen3.io/secret-purpose
              value: aurora-master-password-mirror

    - id: lambdaChangeEventPermissionJob
      includeWhen:
        - ${infrastructureConfig.data['database-secret-mirror-event-pattern-enabled'] == 'true'}
      readyWhen:
        - ${lambdaChangeEventPermissionJob.status.?succeeded.orValue(0) == 1}
      template:
        apiVersion: batch/v1
        kind: Job
        metadata:
          name: ${schema.spec.name}-aurora-secret-mirror-change-permission
          namespace: ${schema.spec.namespace}
          labels:
            app.kubernetes.io/managed-by: kro
            gen3.io/tier: database-secret-mirror
            gen3.io/permission-purpose: eventbridge-lambda-invoke
        spec:
          backoffLimit: 3
          template:
            spec:
              serviceAccountName: ${secretWriterServiceAccount.metadata.name}
              restartPolicy: Never
              containers:
                - name: add-permission
                  image: ${schema.spec.secretWriterImage}
                  imagePullPolicy: IfNotPresent
                  env:
                    - name: AWS_REGION
                      value: ${infrastructureConfig.data['aws-region']}
                    - name: FUNCTION_NAME
                      value: ${lambdaFunction.spec.name}
                    - name: STATEMENT_ID
                      value: ${schema.spec.name}-aurora-secret-mirror-change
                    - name: SOURCE_ARN
                      value: ${changeEventMirrorRule.status.ackResourceMetadata.arn}
                    - name: SPOKE_ROLE_ARN
                      value: ${secretWriterServiceAccount.metadata.annotations['gen3.io/spoke-role-arn']}
                  command:
                    - /bin/bash
                    - -c
                  args:
                    - |
                      set -euo pipefail

                      assume_spoke_role() {
                        if [[ -z "$SPOKE_ROLE_ARN" ]]; then
                          echo "Missing gen3.io/spoke-role-arn annotation on secret writer service account." >&2
                          exit 1
                        fi

                        local creds
                        creds="$(aws sts assume-role \
                          --region "$AWS_REGION" \
                          --role-arn "$SPOKE_ROLE_ARN" \
                          --role-session-name gen3-lambda-permission \
                          --query 'Credentials.[AccessKeyId,SecretAccessKey,SessionToken]' \
                          --output text)"
                        read -r AWS_ACCESS_KEY_ID AWS_SECRET_ACCESS_KEY AWS_SESSION_TOKEN <<< "$creds"
                        export AWS_ACCESS_KEY_ID AWS_SECRET_ACCESS_KEY AWS_SESSION_TOKEN
                      }

                      add_permission() {
                        set +e
                        output="$(aws lambda add-permission \
                          --region "$AWS_REGION" \
                          --function-name "$FUNCTION_NAME" \
                          --statement-id "$STATEMENT_ID" \
                          --action lambda:InvokeFunction \
                          --principal events.amazonaws.com \
                          --source-arn "$SOURCE_ARN" 2>&1)"
                        status=$?
                        set -e

                        if [[ $status -eq 0 ]]; then
                          echo "EventBridge permission created for $FUNCTION_NAME."
                          return
                        fi

                        if grep -q "ResourceConflictException" <<< "$output"; then
                          echo "EventBridge permission already exists for $FUNCTION_NAME."
                          return
                        fi

                        echo "$output" >&2
                        exit "$status"
                      }

                      assume_spoke_role
                      add_permission

    - id: lambdaInitialInvokeJob
      readyWhen:
        - ${lambdaInitialInvokeJob.status.?succeeded.orValue(0) == 1}
      template:
        apiVersion: batch/v1
        kind: Job
        metadata:
          name: ${schema.spec.name}-aurora-secret-mirror-initial-sync-v2
          namespace: ${schema.spec.namespace}
          labels:
            app.kubernetes.io/managed-by: kro
            gen3.io/tier: database-secret-mirror
            gen3.io/sync-purpose: initial-aurora-secret-mirror
        spec:
          backoffLimit: 6
          template:
            spec:
              serviceAccountName: ${secretWriterServiceAccount.metadata.name}
              restartPolicy: Never
              containers:
                - name: invoke-mirror
                  image: ${schema.spec.secretWriterImage}
                  imagePullPolicy: IfNotPresent
                  env:
                    - name: AWS_REGION
                      value: ${infrastructureConfig.data['aws-region']}
                    - name: FUNCTION_NAME
                      value: ${lambdaFunction.spec.name}
                    - name: SPOKE_ROLE_ARN
                      value: ${secretWriterServiceAccount.metadata.annotations['gen3.io/spoke-role-arn']}
                  command:
                    - /bin/bash
                    - -c
                  args:
                    - |
                      set -euo pipefail

                      assume_spoke_role() {
                        if [[ -z "$SPOKE_ROLE_ARN" ]]; then
                          echo "Missing gen3.io/spoke-role-arn annotation on secret writer service account." >&2
                          exit 1
                        fi

                        local creds
                        creds="$(aws sts assume-role \
                          --region "$AWS_REGION" \
                          --role-arn "$SPOKE_ROLE_ARN" \
                          --role-session-name gen3-secret-mirror-initial-sync \
                          --query 'Credentials.[AccessKeyId,SecretAccessKey,SessionToken]' \
                          --output text)"
                        read -r AWS_ACCESS_KEY_ID AWS_SECRET_ACCESS_KEY AWS_SESSION_TOKEN <<< "$creds"
                        export AWS_ACCESS_KEY_ID AWS_SECRET_ACCESS_KEY AWS_SESSION_TOKEN
                      }

                      assume_spoke_role

                      for attempt in $(seq 1 30); do
                        aws lambda invoke \
                          --region "$AWS_REGION" \
                          --function-name "$FUNCTION_NAME" \
                          --invocation-type RequestResponse \
                          --cli-binary-format raw-in-base64-out \
                          --payload '{"source":"gen3-kro","detail-type":"Initial Aurora credential mirror sync"}' \
                          /tmp/lambda-response.json >/tmp/lambda-invoke.json

                        if grep -Eq '"FunctionError"[[:space:]]*:' /tmp/lambda-invoke.json; then
                          echo "Lambda returned a function error during initial mirror sync." >&2
                          cat /tmp/lambda-invoke.json >&2
                          exit 1
                        fi

                        if grep -Eq '"status"[[:space:]]*:[[:space:]]*"(created|updated)"' /tmp/lambda-response.json; then
                          echo "Initial Aurora credential mirror sync completed."
                          exit 0
                        fi

                        if grep -Eq '"status"[[:space:]]*:[[:space:]]*"waiting"' /tmp/lambda-response.json; then
                          echo "Mirror sync waiting for Aurora readiness, attempt $attempt/30."
                          sleep 20
                          continue
                        fi

                        echo "Lambda did not report a completed mirror sync." >&2
                        cat /tmp/lambda-response.json >&2
                        exit 1
                      done

                      echo "Timed out waiting for initial Aurora credential mirror sync." >&2
                      cat /tmp/lambda-response.json >&2
                      exit 1

    - id: databaseSecretMirrorBridge
      readyWhen:
        - ${databaseSecretMirrorBridge.metadata.?name.orValue('null') != 'null'}
      template:
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: ${schema.spec.databaseSecretMirrorBridgeName}
          namespace: ${schema.spec.namespace}
          labels:
            app.kubernetes.io/managed-by: kro
            gen3.io/tier: database-secret-mirror
            gen3.io/bridge: "true"
        data:
          enabled: ${infrastructureConfig.data['database-secret-mirror-enabled']}
          mirror-secret-name: ${databaseBridge.data['aurora-master-password-sm-name']}
          mirror-secret-arn: ${mirrorSecret.status.?ackResourceMetadata.?arn.orValue("loading")}
          rds-master-secret-arn: ${databaseBridge.data['aurora-master-password-sm-arn']}
          lambda-function-name: ${lambdaFunction.spec.name}
          lambda-function-arn: ${lambdaFunction.status.?ackResourceMetadata.?arn.orValue("loading")}
          schedule-rule-name: ${scheduledMirrorRule.spec.name}
          schedule-rule-arn: ${scheduledMirrorRule.status.?ackResourceMetadata.?arn.orValue("loading")}
          schedule-permission-created: '${lambdaSchedulePermissionJob.status.?succeeded.orValue(0) == 1 ? "true" : "false"}'
          initial-sync-completed: '${lambdaInitialInvokeJob.status.?succeeded.orValue(0) == 1 ? "true" : "false"}'
          change-event-rule-enabled: ${infrastructureConfig.data['database-secret-mirror-event-pattern-enabled']}
          change-event-rule-arn: "${infrastructureConfig.data['database-secret-mirror-event-pattern-enabled'] == 'true' ? changeEventMirrorRule.status.?ackResourceMetadata.?arn.orValue('loading') : 'disabled'}"
          change-event-permission-created: "${infrastructureConfig.data['database-secret-mirror-event-pattern-enabled'] == 'true' ? (lambdaChangeEventPermissionJob.status.?succeeded.orValue(0) == 1 ? 'true' : 'false') : 'disabled'}"
          mirror-sync-ready: '${lambdaSchedulePermissionJob.status.?succeeded.orValue(0) == 1 && lambdaInitialInvokeJob.status.?succeeded.orValue(0) == 1 ? "true" : "false"}'
