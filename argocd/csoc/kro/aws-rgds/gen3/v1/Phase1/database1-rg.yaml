# AwsGen3Database1 — Tier 1: Database (Modular RGD v1)
apiVersion: kro.run/v1alpha1
kind: ResourceGraphDefinition
metadata:
  name: awsgen3database1
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  schema:
    apiVersion: v1alpha1
    kind: AwsGen3Database1
    spec:
      name: string | required=true
      namespace: string | required=true
      adoptionPolicy: string | default="adopt-or-create"
      deletionPolicy: string | default="delete"
      infrastructureConfigMapName: string | default="infrastructure-values"
      networkSecurityBridgeName: string | default="network-security-bridge"
      databaseBridgeName: string | default="database-bridge"

    status:
      # Aurora
      auroraClusterEndpoint: ${auroraCluster.status.?endpoint.orValue("loading")}
      auroraReaderEndpoint: ${auroraCluster.status.?readerEndpoint.orValue("loading")}
      auroraClusterARN: ${auroraCluster.status.?ackResourceMetadata.?arn.orValue("loading")}
      auroraInstanceARN: ${auroraInstance[0].status.?ackResourceMetadata.?arn.orValue("loading")}
      auroraInstanceARNs: ${auroraInstance.map(i, i.status.?ackResourceMetadata.?arn.orValue("loading"))}

  resources:

    - id: spokeNamespace
      externalRef:
        apiVersion: v1
        kind: Namespace
        metadata:
          name: ${schema.spec.namespace}

    - id: infrastructureConfig
      readyWhen:
        - ${infrastructureConfig.metadata.?name.orValue('null') != 'null'}
      externalRef:
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: ${schema.spec.infrastructureConfigMapName}
          namespace: ${schema.spec.namespace}

    - id: networkSecurityBridge
      readyWhen:
        - ${networkSecurityBridge.metadata.?name.orValue('null') != 'null'}
      externalRef:
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: ${schema.spec.networkSecurityBridgeName}
          namespace: ${schema.spec.namespace}

    - id: auroraCluster
      readyWhen:
        - ${auroraCluster.status.?ackResourceMetadata.?arn.orValue('null') != 'null'}
        - ${auroraCluster.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
        - ${auroraCluster.status.?status.orValue('null') == 'available'}
      template:
        apiVersion: rds.services.k8s.aws/v1alpha1
        kind: DBCluster
        metadata:
          name: ${schema.spec.name}-aurora
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${infrastructureConfig.data['aws-region']}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          dbClusterIdentifier: ${schema.spec.name}-aurora
          engine: aurora-postgresql
          engineVersion: ${infrastructureConfig.data['database-aurora-engine-version']}
          databaseName: ${infrastructureConfig.data['database-aurora-db-name']}
          port: ${int(infrastructureConfig.data['database-aurora-port'])}
          masterUsername: ${infrastructureConfig.data['database-aurora-master-username']}
          # RDS creates and manages the master password in Secrets Manager automatically.
          # ARN is available at auroraCluster.status.masterUserSecret.secretARN after cluster is available.
          manageMasterUserPassword: true
          masterUserSecretKMSKeyID: ${networkSecurityBridge.data['database-key-arn']}
          dbSubnetGroupName: ${networkSecurityBridge.data['db-subnet-group-name']}
          vpcSecurityGroupIDs:
            - ${networkSecurityBridge.data['aurora-sg-id']}
          storageEncrypted: true
          kmsKeyID: ${networkSecurityBridge.data['database-key-arn']}
          serverlessV2ScalingConfiguration:
            minCapacity: ${double(infrastructureConfig.data['database-aurora-min-capacity'])}
            maxCapacity: ${double(infrastructureConfig.data['database-aurora-max-capacity'])}
          backupRetentionPeriod: 7
          enableCloudwatchLogsExports:
            - postgresql
          tags:
            - key: Name
              value: ${schema.spec.name}-aurora
            - key: ManagedBy
              value: Kro

    - id: auroraInstance
      forEach:
        - idx: ${lists.range(size(infrastructureConfig.data['database-aurora-instance-names'].split(',')))}
      readyWhen:
        - ${each.status.?ackResourceMetadata.?arn.orValue('null') != 'null'}
        - ${each.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
        - ${each.status.?dbInstanceStatus.orValue('null') == 'available'}
      template:
        apiVersion: rds.services.k8s.aws/v1alpha1
        kind: DBInstance
        metadata:
          name: ${schema.spec.name + '-aurora-' + infrastructureConfig.data['database-aurora-instance-names'].split(',')[idx]}
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${infrastructureConfig.data['aws-region']}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          dbInstanceIdentifier: ${schema.spec.name + '-aurora-' + infrastructureConfig.data['database-aurora-instance-names'].split(',')[idx]}
          dbClusterIdentifier: ${auroraCluster.spec.dbClusterIdentifier}
          dbInstanceClass: ${infrastructureConfig.data['database-aurora-instance-classes'].split(',')[idx]}
          engine: aurora-postgresql
          availabilityZone: ${infrastructureConfig.data['database-aurora-instance-azs'].split(',')[idx]}
          promotionTier: ${int(infrastructureConfig.data['database-aurora-instance-promotion-tiers'].split(',')[idx])}
          tags:
            - key: Name
              value: ${schema.spec.name + '-aurora-' + infrastructureConfig.data['database-aurora-instance-names'].split(',')[idx]}
            - key: ManagedBy
              value: Kro

    - id: databaseBridge
      readyWhen:
        - ${databaseBridge.metadata.?name.orValue('null') != 'null'}
      template:
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: ${schema.spec.databaseBridgeName}
          namespace: ${schema.spec.namespace}
          labels:
            app.kubernetes.io/managed-by: kro
            gen3.io/tier: database
            gen3.io/bridge: "true"
        data:
          aurora-cluster-endpoint: ${auroraCluster.status.?endpoint}
          aurora-reader-endpoint: ${auroraCluster.status.?readerEndpoint}
          aurora-cluster-arn: ${auroraCluster.status.?ackResourceMetadata.?arn}
          aurora-port: ${infrastructureConfig.data['database-aurora-port']}
          aurora-master-username: ${infrastructureConfig.data['database-aurora-master-username']}
          aurora-database-name: ${infrastructureConfig.data['database-aurora-db-name']}
          # SM ARN for the RDS-managed master password secret (set after Aurora cluster is available)
          aurora-master-password-sm-arn: ${auroraCluster.status.?masterUserSecret.?secretARN.orValue("loading")}
