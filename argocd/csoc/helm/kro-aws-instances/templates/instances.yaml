# KRO instance CRs — rendered from .Values.instances
# Dependency order (sync-wave enforces sequencing within ArgoCD):
#
#  Wave 15  NetworkSecurity1 → produces network-security-bridge (VPC + KMS + SGs)
#  Wave 15  DomainSecurity1  → produces domain-security-bridge (Route53 + ACM + WAF)
#  Wave 15  Messaging1       → standalone             → produces messaging-bridge
#  Wave 20  Storage1         → reads network-security-bridge → produces storage-bridge
#  Wave 26  SecretBootstrap1 → seeds 6 AWS SM secrets from gen3-secret-bootstrap K8s Secret
#  Wave 27  Database1        → reads network-security-bridge + gen3-secret-bootstrap → database-bridge
#  Wave 20  Compute1         → reads network-security-bridge → compute-bridge (EKS + IAM + OpenSearch)
#  Wave 25  SpokeAccess1     → reads compute-bridge  → produces spoke-access-bridge
#  Wave 25  PlatformIAM1     → reads compute-bridge + storage-bridge → platform-iam-bridge
#  Wave 25  AppIAM1          → reads compute-bridge + storage-bridge → app-iam-bridge
#  Wave 30  PlatformHelm1    → reads compute-bridge + platform-iam-bridge + spoke-access-bridge
#  Wave 34  SecretDependent1 → seeds 3 infra-dependent AWS SM secrets from gen3-secret-bootstrap
#  Wave 35  AppHelm1         → reads infrastructure bridges and passes values through
#
# Toggle instances on/off in values.yaml (or per-spoke override file).
# Change version: "1" → "2" to swap RGD version without touching the spec.
{{ include "gen3kro.instance" (list . .Values.instances.networkSecurity  "AwsGen3NetworkSecurity") }}
{{ include "gen3kro.instance" (list . .Values.instances.domainSecurity   "AwsGen3DomainSecurity")  }}
{{ include "gen3kro.instance" (list . .Values.instances.storage          "AwsGen3Storage")         }}
{{ include "gen3kro.instance" (list . .Values.instances.secretBootstrap  "AwsGen3SecretBootstrap") }}
{{ include "gen3kro.instance" (list . .Values.instances.database         "AwsGen3Database")        }}
{{ include "gen3kro.instance" (list . .Values.instances.compute          "AwsGen3Compute")         }}
{{ include "gen3kro.instance" (list . .Values.instances.spokeAccess      "AwsGen3SpokeAccess")     }}
{{ include "gen3kro.instance" (list . .Values.instances.platformIam      "AwsGen3PlatformIAM")     }}
{{ include "gen3kro.instance" (list . .Values.instances.appIam           "AwsGen3AppIAM")          }}
{{ include "gen3kro.instance" (list . .Values.instances.messaging        "AwsGen3Messaging")       }}
{{ include "gen3kro.instance" (list . .Values.instances.platformHelm     "AwsGen3PlatformHelm")    }}
{{ include "gen3kro.instance" (list . .Values.instances.secretDependent  "AwsGen3SecretDependent") }}
{{ include "gen3kro.instance" (list . .Values.instances.appHelm          "AwsGen3AppHelm")         }}
