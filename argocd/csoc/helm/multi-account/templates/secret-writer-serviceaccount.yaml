{{- /*
  Creates one per-spoke ServiceAccount used by KRO secret bootstrap Jobs.

  The service account is annotated with the CSOC source role. Jobs then use
  STS AssumeRole to enter the Terraform-created <spoke-alias>-spoke-role from
  the namespace annotation. This avoids coupling early secret bootstrap to the
  spoke EKS cluster or its OIDC provider.
*/}}
{{- if .Values.secretWriterServiceAccount.enabled }}
{{- $root := . }}
{{- $clusters := .Values.clustersJson | fromJson }}
{{- range $alias, $accountId := $clusters }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ $root.Values.secretWriterServiceAccount.name | quote }}
  namespace: {{ $alias | quote }}
  annotations:
    argocd.argoproj.io/sync-wave: "-5"
    {{- if $root.Values.csocAssumeRoleArn }}
    eks.amazonaws.com/role-arn: {{ $root.Values.csocAssumeRoleArn | quote }}
    {{- end }}
    gen3.io/spoke-role-arn: {{ printf "arn:aws:iam::%s:role/%s-spoke-role" $accountId $alias | quote }}
  labels:
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/part-of: multi-account
    gen3.io/spoke: {{ $alias | quote }}
    gen3.io/purpose: secret-bootstrap
{{- end }}
{{- end }}
