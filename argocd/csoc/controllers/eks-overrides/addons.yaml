# EKS cluster override. Applied on top of ../values.yaml when cluster_type=eks.
# Base values define versions, chart repositories, selectors, namespaces, and
# shared Helm values. This file only enables addons and adds EKS-specific IRSA.

globalSelectors:
  cluster_type: eks

########################################
# CSOC platform components
########################################

self-managed-kro:
  enabled: true

external-secrets:
  enabled: true

########################################
# ACK controllers
########################################

ack-cloudtrail:
  enabled: true
  valuesObject:
    serviceAccount:
      annotations:
        eks.amazonaws.com/role-arn: '{{.metadata.annotations.ack_self_managed_role_arn}}'

