syncPolicy:
  automated:
    selfHeal: true
    allowEmpty: true
    prune: true
  retry:
    limit: 5
    backoff:
      duration: 5s
      factor: 2
      maxDuration: 10m
  syncOptions:
    - CreateNamespace=true
    - ServerSideApply=true
syncPolicyAppSet:
  preserveResourcesOnDeletion: false
useSelectors: true
repoURLGit: '{{.metadata.annotations.addons_repo_url}}'
repoURLGitRevision: '{{.metadata.annotations.addons_repo_revision}}'
repoURLGitBasePath: '{{.metadata.annotations.addons_repo_basepath}}'
valueFiles:
  - spokes/{{.name}}/addons

########################################
# Controller definitions — all disabled.
# Enable and configure per cluster-type in:
#   eks-overrides/addons.yaml   (cluster_type=eks)
#   kind-overrides/addons.yaml  (cluster_type=kind)
#
# Fields here: common non-cluster-specific config only.
#   chartRepository, defaultVersion, chartName, namespace,
#   annotationsAppSet, type/path, selectorMatchLabels — shared identifiers
#   valuesObject — common Helm values (serviceAccount.create/name, aws.region,
#                  enableCARM, featureGates)
# Fields in overrides: enabled, globalSelectors.cluster_type, and cluster-specific
#   additions only (EKS IRSA annotations, Kind credentials/ignoreDifferences).
########################################

########################################
# CSOC Platform Components
########################################

self-managed-kro:
  enabled: false
  namespace: kro-system
  annotationsAppSet:
    argocd.argoproj.io/sync-wave: "-30"
  chartName: kro
  chartRepository: "registry.k8s.io/kro/charts"
  defaultVersion: "0.9.1"
  selectorMatchLabels:
    fleet_member: control-plane
  valuesObject:
    serviceAccount:
      create: true
    config:
      dynamicControllerConcurrentReconciles: 5

external-secrets:
  enabled: false
  enableACK: false
  annotationsAppSet:
    argocd.argoproj.io/sync-wave: "15"
  namespace: external-secrets
  chartName: external-secrets
  defaultVersion: "2.0.1"
  chartRepository: "https://charts.external-secrets.io"
  selectorMatchLabels:
    fleet_member: control-plane
    enable_external_secrets: "true"
  valuesObject:
    serviceAccount:
      name: "external-secrets-sa"

########################################
# ACK Controllers (wave 1)
# All disabled here — enabled per cluster-type in override files.
# ACK controllers are only selected when ack_management_mode=self_managed.
########################################

ack-cloudtrail:
  enabled: false
  namespace: ack
  chartName: cloudtrail-chart
  chartRepository: "public.ecr.aws/aws-controllers-k8s"
  defaultVersion: "1.2.1"
  annotationsAppSet:
    argocd.argoproj.io/sync-wave: "1"
  selectorMatchLabels:
    fleet_member: control-plane
    ack_management_mode: self_managed
  valuesObject:
    serviceAccount:
      annotations: {}
      create: true
      name: "ack-cloudtrail-controller"
    aws:
      region: '{{.metadata.annotations.aws_region}}'
    enableCARM: false
    featureGates:
      IAMRoleSelector: "true"

