apiVersion: kro.run/v1alpha1
kind: AwsDataT1
metadata:
  name: spoke1-data
  namespace: spoke1
spec:
  # Basic metadata
  name: spoke1-data
  namespace: spoke1
  region: us-east-1
  environment: dev
  project: Gen3-KRO

  # Network Configuration (from network instance)
  vpcID: ""  # Will be populated from network instance status
  subnetIDs: []  # Will be populated from network instance status
  dbSubnetIDs: []  # Will be populated from network instance status
  securityGroupIDs: []

  # KMS Encryption (from security instance)
  kmsKeyARN: ""  # Will be populated from security instance status

  # Aurora Configuration
  auroraEngine: "aurora-postgresql"
  auroraEngineVersion: "15.4"
  auroraMasterUsername: "postgres"
  auroraMasterUserPasswordSecretRef: "spoke1-aurora-master-password"
  auroraDatabaseName: "gen3"
  auroraInstanceClass: "db.r6g.large"
  auroraInstanceCount: 2

  # EFS Configuration
  efsPerformanceMode: "generalPurpose"
  efsThroughputMode: "bursting"

  # S3 Configuration
  loggingBucketName: "spoke1-gen3-logging"
  dataBucketName: "spoke1-gen3-data"
  uploadBucketName: "spoke1-gen3-upload"

  # Resource management policies
  adoptionPolicy: "adopt-or-create"
  deletionPolicy: "delete"
