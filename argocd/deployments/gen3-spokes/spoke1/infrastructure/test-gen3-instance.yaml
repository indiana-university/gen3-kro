apiVersion: kro.run/v1alpha1
kind: AwsGen3T3
metadata:
  name: test-gen3-t3
  namespace: spoke1
spec:
  # Basic metadata
  name: test-gen3
  namespace: spoke1
  region: us-east-1
  environment: dev
  project: kro-test

  # Network Configuration
  vpcCIDR: "10.100.0.0/16"

  # Subnet CIDRs
  publicSubnetCIDRs:
    - "10.100.1.0/24"
    - "10.100.2.0/24"

  privateSubnetCIDRs:
    - "10.100.11.0/24"
    - "10.100.12.0/24"

  dbSubnetCIDRs:
    - "10.100.21.0/24"
    - "10.100.22.0/24"

  # Availability Zones
  availabilityZones:
    - us-east-1a
    - us-east-1b

  # Aurora Configuration
  auroraMasterUserPasswordSecretRef: test-gen3-aurora-password

  # OpenSearch Configuration
  openSearchMasterPasswordSecretRef: test-gen3-opensearch-password

  # ElastiCache Configuration
  elastiCacheAuthTokenSecretRef: test-gen3-redis-token

  # S3 Configuration
  loggingBucketName: test-gen3-logs
  dataBucketName: test-gen3-data
  uploadBucketName: test-gen3-uploads

  # Resource Management
  adoptionPolicy: adopt-or-create
  deletionPolicy: delete
