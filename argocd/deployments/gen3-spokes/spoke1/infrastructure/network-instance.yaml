apiVersion: kro.run/v1alpha1
kind: AwsGen3NetworkT1
metadata:
  name: spoke1-network
  namespace: spoke1
spec:
  # Basic metadata
  name: spoke1-network
  namespace: spoke1
  region: us-east-1
  environment: dev
  project: Gen3-KRO

  # VPC Configuration
  vpcCIDR: "10.1.0.0/16"

  # Subnet CIDRs - organized for high availability
  publicSubnetCIDRs:
    - "10.1.1.0/24"    # us-east-1a public
    - "10.1.2.0/24"    # us-east-1b public
    - "10.1.3.0/24"    # us-east-1c public

  privateSubnetCIDRs:
    - "10.1.11.0/24"   # us-east-1a private
    - "10.1.12.0/24"   # us-east-1b private
    - "10.1.13.0/24"   # us-east-1c private

  dbSubnetCIDRs:
    - "10.1.24.0/24"   # us-east-1a database
    - "10.1.25.0/24"   # us-east-1b database
    - "10.1.26.0/24"   # us-east-1c database

  # Availability Zones
  availabilityZones:
    - us-east-1a
    - us-east-1b
    - us-east-1c

  # NAT Gateway configuration - one per AZ for high availability
  # Note: Reduced to 2 due to AWS account EIP limit (default: 5 per region)
  natGatewayCount: 2

  # Resource management policies
  adoptionPolicy: "adopt-or-create"
  deletionPolicy: "delete"

  # Additional resource tags
  additionalTags:
    {}
