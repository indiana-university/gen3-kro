# gen3-secret-bootstrap — Centralized bootstrap secret for all KRO secret writer Jobs
#
# HOW TO USE:
#   1. Fill in all placeholder values below (never commit real values — this file is a template).
#   2. Apply once to the spoke namespace on the CSOC cluster BEFORE enabling secret RGDs:
#        kubectl apply -n spoke1 -f argocd/spokes/spoke1/secret/graph-secret.yaml
#   3. Each secret writer Job mounts this Secret at /bootstrap-secret and reads
#      individual keys by name. Jobs are idempotent — they skip if the SM secret
#      value already exists.
#
# KEY INVENTORY:
#
# - fence-config.yaml                     → fence-config-secret1-rg.yaml
# - fence_google_app_creds_secret.json    → fence-google-app-creds-secret1-rg.yaml
# - fence_google_storage_creds_secret.json → fence-google-storage-creds-secret1-rg.yaml
# - wts-encryption-key                    → wts-g3auto-secret1-rg.yaml
# - wts-secret-key                        → wts-g3auto-secret1-rg.yaml
# - wts-oidc-client-id                    → wts-g3auto-secret1-rg.yaml
# - wts-oidc-client-secret                → wts-g3auto-secret1-rg.yaml
# - base64Authz.txt                       → metadata-g3auto-secret1-rg.yaml
# - dbcreds.json                          → metadata-g3auto-secret1-rg.yaml
# - metadata.env                          → metadata-g3auto-secret1-rg.yaml
# - indexd-fence                          → indexd-service-creds-secret1-rg.yaml
# - indexd-sheepdog                       → indexd-service-creds-secret1-rg.yaml
# - indexd-ssj                            → indexd-service-creds-secret1-rg.yaml
# - indexd-gateway                        → indexd-service-creds-secret1-rg.yaml
#
# NOT in this secret (computed at runtime from infrastructure-values / messaging-bridge):
# - audit-g3auto config (sqs_url, aws_region)       → audit-g3auto-secret1-rg.yaml
# - manifestservice-g3auto config (bucket, hostname) → manifestservice-g3auto-secret1-rg.yaml
#
# NOTE: secret-bootstrap1-rg.yaml does NOT read from this secret —
#       it generates the Aurora master password itself at deploy time.
#
# SECURITY: This file contains sensitive credentials. Store it encrypted or in
#           a secrets manager. Never commit with real values.
#           Recommended: use 'kubectl create secret' piped from a secrets store.
#
# EXAMPLE CREATE (from a secure source):
#   kubectl create secret generic gen3-secret-bootstrap -n spoke1 \
#     --from-literal=fence-config.yaml="$(cat /path/to/fence-config.yaml)" \
#     --from-literal=wts-encryption-key="$(openssl rand -base64 32)" \
#     --from-literal=wts-oidc-client-id="<CLIENT_ID>" \
#     ...
#
apiVersion: v1
kind: Secret
metadata:
  name: gen3-secret-bootstrap
  namespace: spoke1    # change to match your spoke namespace
  labels:
    app.kubernetes.io/managed-by: manual
    gen3.io/purpose: secret-bootstrap
  annotations:
    # Applied manually before ArgoCD Wave 34. Not ArgoCD-managed.
    gen3.io/rotate-after: "2026-05-14"
type: Opaque
stringData:

  # ─── fence-config ────────────────────────────────────────────────────────────
  # Full Fence configuration YAML. Value for AWS SM key "fence-config.yaml".
  # - Generate ENCRYPTION_KEY: python3 -c "import base64,os; print(base64.urlsafe_b64encode(os.urandom(32)).decode())"
  # - Google OAuth2 app: https://console.cloud.google.com/apis/credentials
  #   - Authorized redirect URI: https://spoke1dev.rds-pla.net/user/login/google/login/
  fence-config.yaml: |
    APP_NAME: "Gen3 Data Commons"
    BASE_URL: "https://spoke1dev.rds-pla.net/user"
    ENCRYPTION_KEY: "<base64-urlsafe-32-bytes>"
    OPENID_CONNECT:
      google:
        client_id: "<GOOGLE_CLIENT_ID>"
        client_secret: "<GOOGLE_CLIENT_SECRET>"
        discovery_url: "https://accounts.google.com/.well-known/openid-configuration"
        redirect_url: "https://spoke1dev.rds-pla.net/user/login/google/login/"

  # ─── fence-google-app-creds-secret ───────────────────────────────────────────
  # Google OAuth service account JSON for Fence's Google API integration.
  # If not using Google Cloud Storage, set to '{}' (placeholder).
  fence_google_app_creds_secret.json: |
    {}

  # ─── fence-google-storage-creds-secret ───────────────────────────────────────
  # Google service account JSON for Fence's Google Cloud Storage integration.
  # If not using Google Cloud Storage, set to '{}' (placeholder).
  fence_google_storage_creds_secret.json: |
    {}

  # ─── wts-g3auto (4 keys) ─────────────────────────────────────────────────────
  # Secret values only — wts_base_url, fence_base_url, external_oidc are computed from dns-hostname.
  # - Generate encryption/secret keys: python3 -c "import base64,os; print(base64.urlsafe_b64encode(os.urandom(32)).decode())"
  # - oidc_client_id / oidc_client_secret: run fence-create client-create AFTER Fence is running
  wts-encryption-key: "<base64-urlsafe-32-bytes>"
  wts-secret-key: "<base64-urlsafe-32-bytes>"
  wts-oidc-client-id: "<WTS_CLIENT_ID_FROM_FENCE>"
  wts-oidc-client-secret: "<WTS_CLIENT_SECRET_FROM_FENCE>"

  # ─── metadata-g3auto (3 keys) ────────────────────────────────────────────────
  # - base64Authz.txt: base64-encoded "user:password" for metadata service auth.
  # - dbcreds.json: database credentials for the metadata service (overridden by ESO normally).
  # - metadata.env: environment overrides for the metadata service.
  base64Authz.txt: "<BASE64_ENCODED_USER_COLON_PASSWORD>"

  dbcreds.json: |
    {
      "db_host": "<AURORA_ENDPOINT>",
      "db_username": "metadata",
      "db_password": "<PASSWORD>",
      "db_database": "metadata"
    }

  metadata.env: |
    GEN3_PUBLIC_DATASETS=false

  # ─── indexd-service-creds (4 keys) ───────────────────────────────────────────
  # Per-service indexd access credentials. Values are hashed passwords or tokens.
  # Format: plain strings — the job wraps them in the expected JSON structure.
  indexd-fence: "<INDEXD_FENCE_PASSWORD>"
  indexd-sheepdog: "<INDEXD_SHEEPDOG_PASSWORD>"
  indexd-ssj: "<INDEXD_SSJ_PASSWORD>"
  indexd-gateway: "<INDEXD_GATEWAY_PASSWORD>"

  # ─── manifestservice-g3auto ──────────────────────────────────────────────────
  # No bootstrap keys needed — manifest_bucket_name, hostname, and prefix are
  # computed at runtime from infrastructure-values (storage-manifest-bucket-name, dns-hostname).
