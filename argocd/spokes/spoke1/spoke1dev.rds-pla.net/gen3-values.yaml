# ── Operator preferences for spoke1 / spoke1dev.rds-pla.net ──────────────────
# Layer 1 of the 3-layer values architecture.
# Fields marked [RGD] are overridden at deploy-time by app-helm1-rg.yaml helm.parameters.
# Placeholder values shown for documentation; actual runtime values come from KRO bridges.
# ---------------------------------------------------------------------------

global:
  aws:
    enabled: true
    region: ""  # [RGD] app-helm1: ${infrastructureConfig.data['aws-region']}
    scheme: ""  # [RGD] app-helm1: ${platformHelmBridge.data['platform-helm-alb-scheme']}
    account: ""  # [RGD] app-helm1: ${spokeNamespace.metadata.annotations['services.k8s.aws/owner-account-id']}
    wafv2:
      enabled: false  # [RGD] app-helm1: ${domainSecurityBridge.data['waf-enabled']}
      wafAclArn: ""  # [RGD] app-helm1: ${domainSecurityBridge.data['waf-acl-arn']}
    secretStoreServiceAccount:
      enabled: true
      name: external-secrets-sa
      roleArn: ""  # [RGD] app-helm1: ${appIamBridge.data['external-secrets-role-arn']}
  dev: false
  clusterName: ""  # [RGD] app-helm1: ${computeBridge.data['eks-cluster-name']}
  environment: ""  # [RGD] app-helm1: ${schema.spec.namespace}
  hostname: ""  # [RGD] app-helm1: ${domainSecurityBridge.data['hostname']}
  revproxyArn: ""  # [RGD] app-helm1: ${domainSecurityBridge.data['acm-cert-arn']}
  dataUploadBucket: ""  # [RGD] app-helm1: ${storageBridge.data['upload-bucket-name']}
  externalSecrets:
    deploy: true
    pushSecret: true  # enables automatic DB credential push to AWS Secrets Manager for all 15 supporting services
  postgres:
    dbCreate: true
    externalSecret: ""  # [RGD] app-helm1: ${databaseBridge.data['aurora-master-password-sm-name']}
    externalSecretRemoteKey: ""  # [RGD] app-helm1: ${databaseBridge.data['aurora-master-password-sm-arn']}
    master:
      host: ""  # [RGD] app-helm1: ${databaseBridge.data['aurora-cluster-endpoint']}
      port: ""  # [RGD] app-helm1: ${databaseBridge.data['aurora-port']}
  dictionaryUrl: "https://dictionary.ardac.org/2.2.2/schema.json"
  portalApp: gitops
  publicDataSets: false
  tierAccessLevel: private
  tierAccessLimit: "100"
  netPolicy:
    enabled: false
  dispatcherJobNum: "10"
  frontendRoot: portal
  ddEnabled: false

ambassador:
  enabled: true

arborist:
  enabled: true
  externalSecrets:
    dbcreds: gen3-spoke1-arborist-creds

argo-wrapper:
  enabled: false

audit:
  enabled: true
  serviceAccount:
    annotations:
      eks.amazonaws.com/role-arn: ""  # [RGD] app-helm1: ${appIamBridge.data['audit-role-arn']}
  externalSecrets:
    dbcreds: gen3-spoke1-audit-creds
    auditG3auto: gen3-spoke1-audit-g3auto
    createK8sAuditSecret: false
  server:
    sqs:
      region: ""  # [RGD] app-helm1: ${infrastructureConfig.data['aws-region']}
      url: ""  # [RGD] app-helm1: ${messagingBridge.data['audit-sqs-url']}

aws-es-proxy:
  enabled: false  # enable when Search1 (OpenSearch) is deployed
  esEndpoint: ""  # [RGD] app-helm1: ${computeBridge.data['opensearch-endpoint']}
  serviceAccount:
    annotations:
      eks.amazonaws.com/role-arn: ""  # [RGD] app-helm1: ${appIamBridge.data['aws-es-proxy-role-arn']}

dashboard:
  enabled: false
  dashboardConfig:
    bucket: ""  # [RGD] app-helm1: ${storageBridge.data['dashboard-bucket-name']}
  serviceAccount:
    annotations:
      eks.amazonaws.com/role-arn: ""  # [RGD] app-helm1: ${appIamBridge.data['dashboard-role-arn']}

dicom-server:
  enabled: false

dicom-viewer:
  enabled: false

etl:
  enabled: false  # requires OpenSearch + data dictionary ETL setup

fence:
  enabled: true
  resources:
    requests:
      memory: "105Mi"
      cpu: "15m"
  replicaCount: 2
  serviceAccount:
    annotations:
      eks.amazonaws.com/role-arn: ""  # [RGD] app-helm1: ${appIamBridge.data['fence-role-arn']}
  externalSecrets:
    dbcreds: gen3-spoke1-fence-creds
    fenceConfig: gen3-spoke1-fence-config
    fenceJwtKeys: gen3-spoke1-fence-jwt-keys
    fenceGoogleAppCredsSecret: gen3-spoke1-fence-google-app-creds-secret
    fenceGoogleStorageCredsSecret: gen3-spoke1-fence-google-storage-creds-secret
    fenceSshKeys: gen3-spoke1-fence-ssh-keys
    createK8sFenceConfigSecret: false
    createK8sJwtKeysSecret: true
    createK8sGoogleAppSecrets: false
  USER_YAML: |
    authz:
      anonymous_policies: []
      all_users_policies: []

      groups:
        - name: spoke1_admins
          policies:
            - spoke1_admin
            - mds_admin
            - workspace
            - data_upload
            - services.sheepdog-admin
            - indexd_admin
            - all_programs_reader
          users:
            - babasanmiadeyemi@gmail.com
            - boadeyem@iu.edu
            - alwalsh@iu.edu

      resources:
        - name: mds_gateway
          description: metadata service administration
        - name: workspace
        - name: data_file
        - name: services
          subresources:
            - name: sheepdog
              subresources:
                - name: submission
                  subresources:
                    - name: program
                    - name: project
            - name: indexd
              subresources:
                - name: admin
        - name: open
        - name: programs

      policies:
        - id: spoke1_admin
          description: Full administrative access across registered Arborist resources.
          role_ids:
            - admin
          resource_paths:
            - /programs
            - /services
            - /data_file
            - /workspace
            - /mds_gateway
        - id: mds_admin
          description: Administrative access to metadata service.
          role_ids:
            - mds_user
          resource_paths:
            - /mds_gateway
        - id: workspace
          description: Workspace access.
          role_ids:
            - workspace_user
          resource_paths:
            - /workspace
        - id: data_upload
          description: Upload raw data files to S3.
          role_ids:
            - file_uploader
          resource_paths:
            - /data_file
        - id: services.sheepdog-admin
          description: CRUD access to programs and projects.
          role_ids:
            - sheepdog_admin
          resource_paths:
            - /services/sheepdog/submission/program
            - /services/sheepdog/submission/project
        - id: indexd_admin
          description: Full access to indexd administration paths.
          role_ids:
            - indexd_admin
          resource_paths:
            - /services/indexd/admin
            - /programs
        - id: all_programs_reader
          description: Read access across all programs.
          role_ids:
            - guppy_reader
            - fence_reader
            - peregrine_reader
            - sheepdog_reader
            - storage_reader
          resource_paths:
            - /programs

      roles:
        - id: admin
          permissions:
            - id: admin
              action:
                service: '*'
                method: '*'
        - id: mds_user
          permissions:
            - id: mds_access
              action:
                service: mds_gateway
                method: access
        - id: file_uploader
          permissions:
            - id: file_upload
              action:
                service: fence
                method: file_upload
        - id: workspace_user
          permissions:
            - id: workspace_access
              action:
                service: jupyterhub
                method: access
        - id: sheepdog_admin
          description: CRUD access to programs and projects.
          permissions:
            - id: sheepdog_admin_action
              action:
                service: sheepdog
                method: '*'
        - id: indexd_admin
          description: Full access to indexd API.
          permissions:
            - id: indexd_admin
              action:
                service: indexd
                method: '*'
        - id: guppy_reader
          permissions:
            - id: guppy_reader
              action:
                service: guppy
                method: read
        - id: fence_reader
          permissions:
            - id: fence_reader
              action:
                service: fence
                method: read
            - id: fence_storage_reader
              action:
                service: fence
                method: read-storage
        - id: peregrine_reader
          permissions:
            - id: peregrine_reader
              action:
                service: peregrine
                method: read
        - id: sheepdog_reader
          permissions:
            - id: sheepdog_reader
              action:
                service: sheepdog
                method: read
        - id: storage_reader
          permissions:
            - id: storage_reader
              action:
                service: fence
                method: read-storage
            - id: storage_reader_peregrine
              action:
                service: peregrine
                method: read
            - id: storage_reader_guppy
              action:
                service: guppy
                method: read

    users:
      babasanmiadeyemi@gmail.com:
        tags:
          name: Babasanmi Adeyemi
        policies:
          - spoke1_admin
          - mds_admin
          - workspace
          - data_upload
          - services.sheepdog-admin
          - indexd_admin
          - all_programs_reader
      boadeyem@iu.edu:
        tags:
          name: Boadeyem IU
        policies:
          - spoke1_admin
          - mds_admin
          - workspace
          - data_upload
          - services.sheepdog-admin
          - indexd_admin
          - all_programs_reader
      alwalsh@iu.edu:
        tags:
          name: Al Walsh
        policies:
          - spoke1_admin
          - mds_admin
          - workspace
          - data_upload
          - services.sheepdog-admin
          - indexd_admin
          - all_programs_reader
  usersync:
    usersync: true
    schedule: "*/30 * * * *"
    syncFromDbgap: false
    userYamlS3Path: "none"
    slack_webhook: "None"
    slack_send_dbgap: false
    env:
      - name: HOME
        value: /tmp

guppy:
  enabled: false

hatchery:
  enabled: false
  serviceAccount:
    annotations:
      eks.amazonaws.com/role-arn: ""  # [RGD] app-helm1: ${appIamBridge.data['hatchery-role-arn']}

indexd:
  enabled: true
  externalSecrets:
    dbcreds: gen3-spoke1-indexd-creds
    serviceCreds: gen3-spoke1-indexd-service-creds
    createK8sServiceCredsSecret: false

manifestservice:
  enabled: false  # user-controlled; AppHelm only passes bucket/role data when available
  manifestserviceG3auto:
    bucketName: ""  # [RGD] app-helm1: ${storageBridge.data['manifest-bucket-name']}
  externalSecrets:
    manifestserviceG3auto: gen3-spoke1-manifestservice-g3auto
  serviceAccount:
    annotations:
      eks.amazonaws.com/role-arn: ""  # [RGD] app-helm1: ${appIamBridge.data['manifestservice-role-arn']}

metadata:
  enabled: true
  externalSecrets:
    dbcreds: gen3-spoke1-metadata-creds
    metadataG3auto: gen3-spoke1-metadata-g3auto

peregrine:
  enabled: true
  externalSecrets:
    dbcreds: gen3-spoke1-peregrine-creds

pidgin:
  enabled: false

portal:
  enabled: true

requestor:
  enabled: false

revproxy:
  enabled: true
  ingress:
    aws:
      group: ""  # [RGD] app-helm1: ${schema.spec.name}

sheepdog:
  enabled: true
  externalSecrets:
    dbcreds: gen3-spoke1-sheepdog-creds

ssjdispatcher:
  enabled: false
  serviceAccount:
    annotations:
      eks.amazonaws.com/role-arn: ""  # [RGD] app-helm1: ${appIamBridge.data['ssjdispatcher-role-arn']}
  ssjcreds:
    sqsUrl: ""  # [RGD] app-helm1: ${messagingBridge.data['ssjdispatcher-sqs-url']}

