# gen3-secret-bootstrap — Centralized bootstrap secret for all KRO secret writer Jobs
#
# HOW TO USE:
#   1. Fill in all placeholder values below (never commit real values — this file is a template).
#   2. Apply once to the spoke namespace on the CSOC cluster BEFORE ArgoCD wave 26:
#        kubectl apply -n spoke1 -f argocd/spokes/spoke1/gen3-secret-bootstrap-example copy.yaml
#   3. AwsGen3SecretBootstrap1 / AwsGen3SecretDependent1 reference this Secret
#      directly. KRO creates each Job when its run-<name>-job flag or
#      delete-<name>-secret flag is "true"; delete flags schedule the AWS secret
#      for deletion and run flags create, restore, or overwrite the AWS secret.
#
# KEY INVENTORY — run-job flags (AwsGen3SecretBootstrap1, wave 26):
#
#   run-fence-config-job: "true"/"false"            → fenceConfigJob
#   delete-fence-config-secret: "true"/"false"
#   fence-config.yaml                               → full Fence config YAML
#   run-fence-google-app-creds-job: "true"/"false"  → fenceGoogleAppCredsJob
#   delete-fence-google-app-creds-secret: "true"/"false"
#   fence_google_app_creds_secret.json              → Google OAuth SA JSON
#   run-fence-google-storage-creds-job: "true"/"false" → fenceGoogleStorageCredsJob
#   delete-fence-google-storage-creds-secret: "true"/"false"
#   fence_google_storage_creds_secret.json          → GCS SA JSON
#   run-indexd-service-creds-job: "true"/"false"    → indexdServiceCredsJob
#   delete-indexd-service-creds-secret: "true"/"false"
#   indexd-fence / indexd-sheepdog / indexd-ssj / indexd-gateway
#   run-metadata-g3auto-job: "true"/"false"         → metadataG3AutoJob
#   delete-metadata-g3auto-secret: "true"/"false"
#   base64Authz.txt / dbcreds.json / metadata.env
#
# KEY INVENTORY — run-job flags (AwsGen3SecretDependent1, wave 34):
#
#   run-wts-g3auto-job: "true"/"false"              → wtsG3AutoJob
#   delete-wts-g3auto-secret: "true"/"false"
#   wts-encryption-key / wts-secret-key / wts-oidc-client-id / wts-oidc-client-secret
#   run-audit-g3auto-job: "true"/"false"            → auditG3AutoJob
#   delete-audit-g3auto-secret: "true"/"false"
#   audit-sqs-url                                   → SQS queue URL (fill after messaging ready)
#   run-manifestservice-g3auto-job: "true"/"false"  → manifestserviceG3AutoJob
#   delete-manifestservice-g3auto-secret: "true"/"false"
#   (no additional keys — bucket/hostname come from infrastructure-values)
#
# SECURITY: Never commit with real values. Rotate immediately if exposed.
#           Recommended: store encrypted (SOPS / AWS SSM) and apply with a pipeline.
#
apiVersion: v1
kind: Secret
metadata:
  name: gen3-secret-bootstrap
  namespace: spoke1    # change to match your spoke namespace
  labels:
    app.kubernetes.io/managed-by: manual
    gen3.io/purpose: secret-bootstrap
  annotations:
    # Applied manually before ArgoCD Wave 26. Not ArgoCD-managed.
    gen3.io/rotate-after: "2026-12-31"
type: Opaque
stringData:

  # ─── fence-config ────────────────────────────────────────────────────────────
  # Full Fence configuration YAML. Value for AWS SM key "fence-config.yaml".
  # - Generate ENCRYPTION_KEY: python3 -c "import base64,os; print(base64.urlsafe_b64encode(os.urandom(32)).decode())"
  # - Google OAuth2 app: https://console.cloud.google.com/apis/credentials
  #   - Authorized redirect URI: https://spoke1dev.rds-pla.net/user/login/google/login/
  run-fence-config-job: "true"
  delete-fence-config-secret: "false"
  fence-config.yaml: |
    APP_NAME: "Gen3 Data Commons"
    BASE_URL: "https://spoke1dev.rds-pla.net/user"
    ENCRYPTION_KEY: "<base64-urlsafe-32-bytes>"
    LOGIN_OPTIONS:
      - name: "Login from Google"
        idp: google
    DEFAULT_LOGIN_IDP: google
    DEFAULT_LOGIN_URL: "{{BASE_URL}}/login/google"
    LOGIN_REDIRECT_WHITELIST:
      - "."
      - "/login"
      - "https://spoke1dev.rds-pla.net"
      - "https://spoke1dev.rds-pla.net/"
    OPENID_CONNECT:
      google:
        client_id: "<GOOGLE_CLIENT_ID>"
        client_secret: "<GOOGLE_CLIENT_SECRET>"
        discovery_url: "https://accounts.google.com/.well-known/openid-configuration"
        redirect_url: "https://spoke1dev.rds-pla.net/user/login/google/login/"

  # ─── fence-google-app-creds-secret ───────────────────────────────────────────
  # Google OAuth service account JSON for Fence's Google API integration.
  # If not using Google Cloud Storage, set to '{}' (placeholder).
  run-fence-google-app-creds-job: "true"
  delete-fence-google-app-creds-secret: "false"
  fence_google_app_creds_secret.json: |
    {}

  # ─── fence-google-storage-creds-secret ───────────────────────────────────────
  # Google service account JSON for Fence's Google Cloud Storage integration.
  # If not using Google Cloud Storage, set to '{}' (placeholder).
  run-fence-google-storage-creds-job: "true"
  delete-fence-google-storage-creds-secret: "false"
  fence_google_storage_creds_secret.json: |
    {}

  # ─── indexd-service-creds (4 keys) ───────────────────────────────────────────
  # Per-service indexd access credentials. Values are hashed passwords or tokens.
  # Format: plain strings — the job wraps them in the expected JSON structure.
  run-indexd-service-creds-job: "true"
  delete-indexd-service-creds-secret: "false"
  indexd-fence: "<INDEXD_FENCE_PASSWORD>"
  indexd-sheepdog: "<INDEXD_SHEEPDOG_PASSWORD>"
  indexd-ssj: "<INDEXD_SSJ_PASSWORD>"
  indexd-gateway: "<INDEXD_GATEWAY_PASSWORD>"

  # ─── metadata-g3auto (3 keys) ────────────────────────────────────────────────
  # - base64Authz.txt: base64-encoded "user:password" for metadata service auth.
  # - dbcreds.json: database credentials for the metadata service.
  # - metadata.env: environment overrides for the metadata service.
  run-metadata-g3auto-job: "true"
  delete-metadata-g3auto-secret: "false"
  base64Authz.txt: "<BASE64_ENCODED_USER_COLON_PASSWORD>"

  dbcreds.json: |
    {
      "db_host": "<AURORA_ENDPOINT>",
      "db_username": "metadata",
      "db_password": "<PASSWORD>",
      "db_database": "metadata"
    }

  metadata.env: |
    GEN3_PUBLIC_DATASETS=false

  # ─── wts-g3auto (4 keys) ─────────────────────────────────────────────────────
  # Secret values only — wts_base_url, fence_base_url, external_oidc are computed from dns-hostname.
  # - Generate encryption/secret keys: python3 -c "import base64,os; print(base64.urlsafe_b64encode(os.urandom(32)).decode())"
  # - oidc_client_id / oidc_client_secret: run fence-create client-create AFTER Fence is running,
  #   then set run-wts-g3auto-job: "true" and kubectl apply this secret again.
  run-wts-g3auto-job: "false"   # enable AFTER fence-create client-create
  delete-wts-g3auto-secret: "false"
  wts-encryption-key: "<base64-urlsafe-32-bytes>"
  wts-secret-key: "<base64-urlsafe-32-bytes>"
  wts-oidc-client-id: "<WTS_CLIENT_ID_FROM_FENCE>"
  wts-oidc-client-secret: "<WTS_CLIENT_SECRET_FROM_FENCE>"

  # ─── audit-g3auto ────────────────────────────────────────────────────────────
  # Fill after messaging (SQS) is provisioned, then set run-audit-g3auto-job: "true"
  # and kubectl apply this secret again.
  run-audit-g3auto-job: "false" # enable AFTER filling audit-sqs-url below
  delete-audit-g3auto-secret: "false"
  audit-sqs-url: "<AUDIT_SQS_QUEUE_URL>"

  # ─── manifestservice-g3auto ──────────────────────────────────────────────────
  # No additional keys needed — bucket/hostname come from infrastructure-values.
  run-manifestservice-g3auto-job: "true"
  delete-manifestservice-g3auto-secret: "false"
