########################################
# Kind (Local CSOC) Addons
#
# Kind cluster uses K8s Secret for AWS credentials (no IRSA).
# ignoreDifferences prevents ArgoCD from reverting env vars
# injected by `kind-local-test.sh inject-creds`.
# Selector: cluster_type=kind distinguishes from EKS entries.
########################################

self-managed-kro-kind:
  enabled: true
  namespace: kro-system
  annotationsAppSet:
    argocd.argoproj.io/sync-wave: "-30"
  chartName: kro
  chartRepository: 'registry.k8s.io/kro/charts'
  defaultVersion: "0.9.1"
  selector:
    matchExpressions:
      - key: fleet_member
        operator: In
        values: ['control-plane']
      - key: cluster_type
        operator: In
        values: ['kind']
  valuesObject:
    serviceAccount:
      create: true
    config:
      dynamicControllerConcurrentReconciles: 5

kro-csoc-rgs-kind:
  enabled: true
  type: manifest
  namespace: kro
  annotationsAppSet:
    argocd.argoproj.io/sync-wave: "10"
  path: 'argocd/charts/resource-groups'
  chartRepository: '{{.metadata.annotations.addons_repo_url}}'
  targetRevision: '{{.metadata.annotations.addons_repo_revision}}'
  selector:
    matchExpressions:
      - key: fleet_member
        operator: In
        values: ['control-plane']
      - key: cluster_type
        operator: In
        values: ['kind']

external-secrets-kind:
  enabled: true
  enableACK: false
  annotationsAppSet:
    argocd.argoproj.io/sync-wave: "15"
  namespace: external-secrets
  chartName: external-secrets
  defaultVersion: "2.0.1"
  chartRepository: "https://charts.external-secrets.io"
  selector:
    matchExpressions:
      - key: fleet_member
        operator: In
        values: ['control-plane']
      - key: enable_external_secrets
        operator: In
        values: ['true']
      - key: cluster_type
        operator: In
        values: ['kind']
  valuesObject:
    serviceAccount:
      name: "external-secrets-sa"

########################################
# Kind ACK Controllers (wave 1)
#
# No IRSA — credentials via K8s Secret injection.
# ignoreDifferences prevents ArgoCD from reverting injected env vars.
########################################

ack-ec2-kind:
  enabled: true
  namespace: ack
  chartName: ec2-chart
  chartRepository: "public.ecr.aws/aws-controllers-k8s"
  defaultVersion: "1.10.1"
  annotationsAppSet:
    argocd.argoproj.io/sync-wave: "1"
  selector:
    matchExpressions:
      - key: ack_management_mode
        operator: In
        values: ['self_managed']
      - key: fleet_member
        operator: In
        values: ['control-plane']
      - key: cluster_type
        operator: In
        values: ['kind']
  valuesObject:
    serviceAccount:
      create: true
      name: "ack-ec2-controller"
    aws:
      region: '{{.metadata.annotations.aws_region}}'
    enableCARM: false
    featureGates:
      IAMRoleSelector: "true"
