syncPolicy:
  automated:
    selfHeal: true
    allowEmpty: true
    prune: true
  retry:
    limit: -1
    backoff:
      duration: 5s
      factor: 2
      maxDuration: 10m
  syncOptions:
    - CreateNamespace=true
    - ServerSideApply=true
syncPolicyAppSet:
  preserveResourcesOnDeletion: false
useSelectors: true
repoURLGit: '{{.metadata.annotations.addons_repo_url}}'
repoURLGitRevision: '{{.metadata.annotations.addons_repo_revision}}'
repoURLGitBasePath: '{{.metadata.annotations.addons_repo_basepath}}'
valueFiles:
  - addons/csoc/addons
  - cluster-fleet/{{.name}}/addons

########################################
# CSOC Addons
########################################

self-managed-kro:
  enabled: true
  namespace: kro-system
  annotationsAppSet:
    argocd.argoproj.io/sync-wave: "-30"
  chartName: kro
  chartRepository: 'oci://registry.k8s.io/kro/charts/kro'
  defaultVersion: "0.8.5"
  selector:
    matchExpressions:
      - key: fleet_member
        operator: In
        values: ['control-plane']
  valuesObject:
    serviceAccount:
      create: true
    config:
      # Enable parallel resource syncing within RGDs (default: 1)
      dynamicControllerConcurrentReconciles: 5

kro-eks-rgs:
  enabled: true
  type: manifest
  namespace: kro
  annotationsAppSet:
    argocd.argoproj.io/sync-wave: "10"
  path: 'argocd/charts/resource-groups'
  chartRepository: '{{.metadata.annotations.addons_repo_url}}'
  targetRevision: '{{.metadata.annotations.addons_repo_revision}}'
  selector:
    matchExpressions:
      - key: fleet_member
        operator: In
        values: ['control-plane']
      - key: enable_kro_eks_rgs
        operator: In
        values: ['true']

external-secrets:
  enabled: true
  enableACK: false
  annotationsAppSet:
    argocd.argoproj.io/sync-wave: "15"
  namespace: external-secrets
  chartName: external-secrets
  defaultVersion: "2.0.1"
  chartRepository: "https://charts.external-secrets.io"
  selector:
    matchExpressions:
      - key: fleet_member
        operator: In
        values: ['control-plane']
      - key: enable_external_secrets
        operator: In
        values: ['true']
  valuesObject:
    serviceAccount:
      name: "external-secrets-sa"
