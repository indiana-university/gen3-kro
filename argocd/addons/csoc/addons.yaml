  defaultVersion: "1.2.1"
  annotationsAppSet:
    argocd.argoproj.io/sync-wave: "1"
  selector:
    matchExpressions:
      - key: ack_management_mode
        operator: In
        values: ['self_managed']
      - key: fleet_member
        operator: In
        values: ['control-plane']
  valuesObject:
    serviceAccount:
      create: true
      name: "ack-cloudtrail-controller"
      annotations:
        eks.amazonaws.com/role-arn: '{{.metadata.annotations.ack_self_managed_role_arn}}'
    aws:
      region: '{{.metadata.annotations.aws_region}}'
    enableCARM: false
    featureGates:
      IAMRoleSelector: "true"

