# Environment-specific addon overrides for 'prod'.
# Currently identical to dev/addons.yaml — environment-specific differentiation
# (e.g., different chart versions, replica counts, resource limits) is not yet
# implemented. Both files are intentionally identical for now.
# See docs/platform-status.md L1 for details.

syncPolicy:
  automated:
    selfHeal: true
    allowEmpty: true
    prune: true
  retry:
    limit: -1
    backoff:
      duration: 5s
      factor: 2
      maxDuration: 10m
  syncOptions:
    - CreateNamespace=true
    - ServerSideApply=true
syncPolicyAppSet:
  preserveResourcesOnDeletion: false
useSelectors: true
repoURLGit: '{{.metadata.annotations.addons_repo_url}}'
repoURLGitRevision: '{{.metadata.annotations.addons_repo_revision}}'
repoURLGitBasePath: '{{.metadata.annotations.addons_repo_basepath}}'
valueFiles:
  - addons/environments/{{.metadata.labels.environment}}/addons
  - cluster-fleet/{{.name}}/addons

external-secrets:
  enabled: true
  enableACK: false
  annotationsAppSet:
    argocd.argoproj.io/sync-wave: "15"
  namespace: external-secrets
  chartName: external-secrets
  defaultVersion: "0.10.3"
  chartRepository: "https://charts.external-secrets.io"
  selector:
    matchExpressions:
      - key: fleet_member
        operator: In
        values: ['spoke']
  valuesObject:
    serviceAccount:
      name: "external-secrets-sa"
