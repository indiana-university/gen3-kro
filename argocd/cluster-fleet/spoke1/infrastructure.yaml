# Spoke1 infrastructure instance overlay. Consumed by CSOC fleet ApplicationSet.
# Values are rendered by argocd/charts/instances/ into KRO custom resources on the CSOC cluster.
# Required: populate csocVpcId after initial CSOC terraform apply:
#   terraform -chdir=terraform/env/aws/csoc-cluster output -raw vpc_id
instances:
  spoke1-dev:
    kind: AwsGen3Infra1Flat
    namespace: spoke1
    syncWave: "30"
    environment: dev
    spec:
      # ── Basic metadata ──────────────────────────────────────────────
      name: spoke1-dev
      namespace: spoke1
      region: us-east-1
      environment: dev
      project: gen3-spoke1
      adoptionPolicy: adopt-or-create
      deletionPolicy: delete

      # ── Network Configuration ───────────────────────────────────────
      vpcCIDR: "10.1.0.0/16"
      publicSubnetCIDRs:
        - "10.1.240.0/24"
        - "10.1.241.0/24"
      privateSubnetCIDRs:
        - "10.1.0.0/20"
        - "10.1.16.0/20"
      dbSubnetCIDRs:
        - "10.1.32.0/24"
        - "10.1.33.0/24"
      availabilityZones:
        - "us-east-1a"
        - "us-east-1b"

      # ── S3 Buckets ─────────────────────────────────────────────────
      loggingBucketName: gen3-spoke1-dev-logging
      dataBucketName: gen3-spoke1-dev-data
      uploadBucketName: gen3-spoke1-dev-upload

      # ── Aurora PostgreSQL ───────────────────────────────────────────
      auroraEngine: aurora-postgresql
      auroraEngineMode: provisioned
      auroraEngineVersion: "14.19"
      auroraMasterUsername: postgres
      auroraDatabaseName: app
      auroraInstanceClass: db.r6g.large
      auroraInstanceCount: 2

      # ── EKS ─────────────────────────────────────────────────────────
      eksVersion: "1.35"

      # ── KMS ─────────────────────────────────────────────────────────
      kmsKeyDescription: Gen3 spoke1 encryption key
      kmsKeyAlias: gen3-spoke1-key

      # ── ArgoCD Cluster Registration ─────────────────────────────────
      argoCDNamespace: argocd
      # argoCDRoleArn is derived by the RGD from the CARM namespace annotation:
      #   arn:aws:iam::<spokeAccountId>:role/<namespace>-argocd-spoke-role

      # ── EKS Access ──────────────────────────────────────────────────
      # Uses the same derived role for EKS access entry + pod identity

      # ── Application defaults (indexd — will move to workloads chart) ──
      indexdEnabled: true
      indexdDefaultPrefix: "dg.TEST/"
      indexdHelmRepo: "https://github.com/uc-cdis/gen3-helm"
      indexdHelmPath: "helm/indexd"
      indexdHelmRevision: master
      indexdNamespace: default

      # ── OpenSearch (disabled but schema-required) ───────────────────
      openSearchMasterPasswordSecretRef: opensearch-master-password
