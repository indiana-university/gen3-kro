# ── Gen3 Helm Values ─────────────────────────────────────────────────────────
# ConfigMap providing operator preferences for the gen3-helm gen3 umbrella chart.
#
# The AwsGen3Helm1 RGD reads this ConfigMap's "values.yaml" key (via externalRef)
# and passes it directly as ArgoCD Application helm.values. Bridge-derived
# infrastructure data (IRSA role ARNs, endpoints, SQS URLs, S3 buckets, etc.)
# is injected via helm.parameters overrides in the RGD.
#
# Structure follows the Su-informatics-lab gen3-gitops pattern:
#   ConfigMap values.yaml  → helm.values   (operator preferences)
#   Bridge data            → helm.parameters (infrastructure outputs)
#
# The flat keys below are duplicated outside values.yaml so other RGDs can
# reference them without parsing nested YAML. Today they drive the gen3Helm
# bridge/status, DNS hostname, and storage's optional app-driven buckets.
#
# Ref: https://github.com/uc-cdis/gen3-helm/tree/master/helm/gen3
# Ref: https://github.com/Su-informatics-lab/gen3-gitops/blob/main/ardac1prd/portal.ardac.org/values.yaml
# ----------------------------------------------------------------------------
apiVersion: v1
kind: ConfigMap
metadata:
  name: gen3helm-values
  namespace: spoke1
  labels:
    app.kubernetes.io/managed-by: gen3-kro
    gen3.io/tier: application
    gen3.io/config-type: values
  annotations:
    argocd.argoproj.io/sync-wave: "25"
data:
  # ── Flat keys for other RGDs ──────────────────────────────────────────────
  hostname: "spoke1dev.rds-pla.net"
  manifestservice-enabled: "false"
  portal-enabled: "false"

  # ── Full Helm values (nested YAML string) ─────────────────────────────────
  values.yaml: |
    # ── Global ─────────────────────────────────────────────────────
    global:
      hostname: "spoke1dev.rds-pla.net"
      dev: false
      tierAccessLevel: "private"
      tierAccessLimit: 100
      publicDataSets: true
      frontendRoot: portal
      portalApp: gitops
      dictionaryUrl: "https://s3.amazonaws.com/dictionary-artifacts/datadictionary/develop/schema.json"
      aws:
        enabled: true
      postgres:
        dbCreate: true
        externalSecret: "spoke1-aurora-master-credentials"
      externalSecrets:
        deploy: true

    # ── Core Infrastructure ────────────────────────────────────────
    ambassador:
      enabled: true
    arborist:
      enabled: true
      externalSecrets:
        dbcreds: "spoke1-arborist-dbcreds"
    revproxy:
      enabled: true

    # ── Database-Dependent Services ────────────────────────────────
    fence:
      enabled: true
      externalSecrets:
        fenceJwtKeys: ""
        fenceConfig: ""
        fenceGoogleAppCredsSecret: ""
        fenceGoogleStorageCredsSecret: ""
        createK8sJwtKeysSecret: true
        createK8sGoogleAppSecrets: true
        createK8sFenceConfigSecret: true
        dbcreds: "spoke1-fence-dbcreds"
    indexd:
      enabled: true
      defaultPrefix: "dg.XXXX/"
      externalSecrets:
        dbcreds: "spoke1-indexd-dbcreds"
        createK8sServiceCredsSecret: true
    peregrine:
      enabled: true
      externalSecrets:
        dbcreds: "spoke1-peregrin-dbcreds"
    sheepdog:
      enabled: true
      externalSecrets:
        dbcreds: "spoke1-sheepdog-dbcreds"
    metadata:
      enabled: true
      externalSecrets:
        createK8sMetadataSecret: true
        dbcreds: "spoke1-metadata-dbcreds"

    # ── Application Services ───────────────────────────────────────
    audit:
      enabled: true
      externalSecrets:
        dbcreds: "spoke1-audit-dbcreds"
        createK8sAuditSecret: true
      server:
        pull_from_queue: true
        type: aws_sqs
    hatchery:
      enabled: false
    manifestservice:
      enabled: false
    portal:
      enabled: false
    requestor:
      enabled: false
      externalSecrets:
        dbcreds: ""
    wts:
      enabled: false
      externalSecrets:
        dbcreds: ""
    guppy:
      enabled: false

    # ── Search ─────────────────────────────────────────────────────
    aws-es-proxy:
      enabled: false

    # ── Data Pipeline ──────────────────────────────────────────────
    ssjdispatcher:
      enabled: false
    etl:
      esEndpoint: gen3-elasticsearch-master
