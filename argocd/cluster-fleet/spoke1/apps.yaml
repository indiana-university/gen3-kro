# Spoke1 Gen3 application values. ONE per namespace/environment.
# Consumed by the fleet-apps ApplicationSet.
#
# Matches gen3-gitops's per-environment values pattern:
#   <cluster>/<hostname>/values/values.yaml
#
# Infrastructure connection values (Aurora endpoint, VPC ID, etc.) are NOT
# hardcoded here. They are injected automatically by the fleet-apps
# ApplicationSet from the argoCDClusterSecret annotations (gen3.io/*).
#
# DB passwords are NOT passed via annotations — they are managed by AWS
# (manageMasterUserPassword: true) and stored in AWS Secrets Manager.
# Use ExternalSecrets on the spoke cluster to pull them into K8s secrets.
#
# DATABASE-ONLY DEPLOYMENT: Sets up PostgreSQL databases on external Aurora
# with only the core database-dependent Gen3 services enabled.

global:
  # ── External Database Mode (no local postgres) ────────────
  dev: false
  aws:
    enabled: true
    region: us-east-1
  # ── External Aurora PostgreSQL ─────────────────────────────
  # host and username are injected by the fleet-apps ApplicationSet
  # from infraOutputs (via helm.parameters — overrides this block).
  # Password comes from ExternalSecrets on the spoke cluster.
  postgres:
    dbCreate: true
    master:
      port: "5432"
  # ── Common settings ──────────────────────────────────────
  environment: dev
  hostname: spoke1-dev.example.com
  dictionaryUrl: "https://s3.amazonaws.com/dictionary-artifacts/datadictionary/develop/schema.json"

# ── Local dev databases — DISABLED (using external Aurora) ──
postgresql:
  enabled: false
elasticsearch:
  enabled: false

# ── Database-dependent services (create schemas on Aurora) ──
indexd:
  enabled: true
  defaultPrefix: "dg.TEST/"
fence:
  enabled: true
  usersync:
    usersync: false
sheepdog:
  enabled: true
peregrine:
  enabled: true
arborist:
  enabled: true
metadata:
  enabled: true

# ── ALL other services DISABLED (database-only setup) ───────
ambassador:
  enabled: false
audit:
  enabled: false
portal:
  enabled: false
revproxy:
  enabled: false
etl:
  enabled: false
guppy:
  enabled: false
hatchery:
  enabled: false
manifestservice:
  enabled: false
ssjdispatcher:
  enabled: false
sower:
  enabled: false
wts:
  enabled: false
requestor:
  enabled: false
access-backend:
  enabled: false
argo-wrapper:
  enabled: false
aws-es-proxy:
  enabled: false
cohort-middleware:
  enabled: false
dashboard:
  enabled: false
datareplicate:
  enabled: false
frontend-framework:
  enabled: false
cedar:
  enabled: false
gen3-user-data-library:
  enabled: false
gen3-workflow:
  enabled: false
data-upload-cron:
  enabled: false
gen3-analysis:
  enabled: false
