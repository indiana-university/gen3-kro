# Spoke1 workload definitions. Consumed by argocd/charts/workloads/ via
# the fleet-workloads ApplicationSet.
#
# Infrastructure connection values (Aurora endpoint, VPC ID, etc.) are NOT
# hardcoded here. They are injected automatically by the fleet-workloads
# ApplicationSet from the argoCDClusterSecret annotations (gen3.io/*) into
# .Values.infraOutputs, then the workloads chart template adds them as
# helm.parameters on the generated ArgoCD Application.
#
# DB passwords are NOT passed via annotations — they are managed by AWS
# (manageMasterUserPassword: true) and stored in AWS Secrets Manager.
# Use ExternalSecrets on the spoke cluster to pull them into K8s secrets.
#
# DATABASE-ONLY DEPLOYMENT: Sets up PostgreSQL databases on external Aurora
# with only the core database-dependent Gen3 services enabled. Each enabled
# service triggers a db-create Job (via common._db_setup_job) that creates
# its database schema on the Aurora cluster.

# ── Cluster-Level Resources ──────────────────────────────────────────
# Deploys cluster-wide infrastructure to the spoke before Gen3 services.
# These run at syncWave "20" so they are ready before workloads (wave "50").
#
# IMPORTANT: Deploy Helm charts DIRECTLY here (not gen3-helm's
# cluster-level-resources chart, which is an app-of-apps that renders
# ArgoCD Application CRDs — the spoke has no ArgoCD CRDs).
clusterResources:
  external-secrets:
    enabled: true
    syncWave: "20"
    namespace: external-secrets
    spec:
      helmRepo: "https://charts.external-secrets.io"
      helmChart: external-secrets
      helmRevision: "0.10.3"
      values: |
        serviceAccount:
          name: "external-secrets-sa"

# ── Application Workloads ────────────────────────────────────────────
workloads:
  # ── Gen3 umbrella chart (database-only setup) ─────────────────────
  # Deploys the minimum set of services needed to create and validate
  # PostgreSQL databases on the external Aurora cluster provisioned by KRO.
  gen3:
    enabled: true
    syncWave: "50"
    namespace: default
    spec:
      helmRepo: "https://github.com/uc-cdis/gen3-helm"
      helmPath: "helm/gen3"
      helmRevision: master
      values: |
        global:
          # ── External Database Mode (no local postgres) ────────────
          dev: false
          aws:
            enabled: true
            region: us-east-1
          # ── External Aurora PostgreSQL ─────────────────────────────
          # host and username are injected by the workloads chart from
          # infraOutputs (via helm.parameters — overrides this block).
          # Password comes from ExternalSecrets on the spoke cluster.
          postgres:
            dbCreate: true
            master:
              port: "5432"
          # ── Common settings ──────────────────────────────────────
          environment: dev
          hostname: spoke1-dev.example.com
          dictionaryUrl: "https://s3.amazonaws.com/dictionary-artifacts/datadictionary/develop/schema.json"
        # ── Local dev databases — DISABLED (using external Aurora) ──
        postgresql:
          enabled: false
        elasticsearch:
          enabled: false
        # ── Database-dependent services (create schemas on Aurora) ──
        indexd:
          enabled: true
          defaultPrefix: "dg.TEST/"
        fence:
          enabled: true
          usersync:
            usersync: false
        sheepdog:
          enabled: true
        peregrine:
          enabled: true
        arborist:
          enabled: true
        metadata:
          enabled: true
        # ── ALL other services DISABLED (database-only setup) ───────
        ambassador:
          enabled: false
        audit:
          enabled: false
        portal:
          enabled: false
        revproxy:
          enabled: false
        etl:
          enabled: false
        guppy:
          enabled: false
        hatchery:
          enabled: false
        manifestservice:
          enabled: false
        ssjdispatcher:
          enabled: false
        sower:
          enabled: false
        wts:
          enabled: false
        requestor:
          enabled: false
        access-backend:
          enabled: false
        argo-wrapper:
          enabled: false
        aws-es-proxy:
          enabled: false
        cohort-middleware:
          enabled: false
        dashboard:
          enabled: false
        datareplicate:
          enabled: false
        frontend-framework:
          enabled: false
        cedar:
          enabled: false
        gen3-user-data-library:
          enabled: false
        gen3-workflow:
          enabled: false
        data-upload-cron:
          enabled: false
        gen3-analysis:
          enabled: false
