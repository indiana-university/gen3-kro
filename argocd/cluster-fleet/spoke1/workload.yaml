# Spoke1 workload definitions. Consumed by argocd/charts/workloads/ via
# the fleet-workloads ApplicationSet.
#
# Infrastructure connection values (Aurora endpoint, VPC ID, etc.) are NOT
# hardcoded here. They are injected automatically by the fleet-workloads
# ApplicationSet from the argoCDClusterSecret annotations (gen3.io/*) into
# .Values.infraOutputs, then the workloads chart template adds them as
# helm.parameters on the generated ArgoCD Application.
#
# DB passwords are NOT passed via annotations — they are managed by AWS
# (manageMasterUserPassword: true) and stored in AWS Secrets Manager.
# Use ExternalSecrets on the spoke cluster to pull them into K8s secrets.
#
# Database testing: Deploys the gen3 umbrella chart with only the
# database-dependent services enabled, pointing at the external Aurora
# cluster provisioned by the RGD.
workloads:
  # ── Gen3 umbrella chart (database-focused subset) ──────────────────
  # Deploys indexd + fence + sheepdog + peregrine + their dependencies
  # against the external Aurora PostgreSQL cluster.
  gen3:
    enabled: true
    syncWave: "50"
    namespace: default
    # clusterName is optional — defaults to the top-level clusterName
    # set by the fleet-workloads ApplicationSet (argoCDClusterSecret name).
    # Override here to target a specific cluster within this spoke:
    # clusterName: spoke1-spoke1-staging
    spec:
      helmRepo: "https://github.com/uc-cdis/gen3-helm"
      helmPath: "helm/gen3"
      helmRevision: master
      values: |
        global:
          # ── AWS / External Database Mode ──────────────────────────
          dev: false
          aws:
            enabled: true
            region: us-east-1
          # ── External Aurora PostgreSQL ─────────────────────────────
          # host and username are injected by the workloads chart from
          # infraOutputs (via helm.parameters — overrides this block).
          # Password comes from ExternalSecrets on the spoke cluster.
          postgres:
            dbCreate: true
            master:
              port: "5432"
              # password is managed by AWS Secrets Manager via
              # manageMasterUserPassword — use ExternalSecrets to pull it.
          # ── ExternalSecrets for credentials ──────────────────────
          externalSecrets:
            deploy: true
          # ── Common settings ──────────────────────────────────────
          environment: dev
          hostname: spoke1-dev.example.com
          dictionaryUrl: "https://s3.amazonaws.com/dictionary-artifacts/datadictionary/develop/schema.json"
        # ── Database-dependent services (enabled for testing) ───────
        indexd:
          enabled: true
          defaultPrefix: "dg.TEST/"
        fence:
          enabled: true
        sheepdog:
          enabled: true
        peregrine:
          enabled: true
        arborist:
          enabled: true
        # ── Supporting services ─────────────────────────────────────
        revproxy:
          enabled: true
        portal:
          enabled: false
        # ── Disabled services (not needed for DB testing) ───────────
        ambassador:
          enabled: false
        audit:
          enabled: false
        etl:
          enabled: false
        guppy:
          enabled: false
        hatchery:
          enabled: false
        manifestservice:
          enabled: false
        metadata:
          enabled: false
        ssjdispatcher:
          enabled: false
        sower:
          enabled: false
        wts:
          enabled: false
