# # ── AwsGen3Database1 — Tier 1: Thin Database (~$45–350/mo) ───────────────────
# # Reads the single networkBridge (DB subnet group, Aurora SG, DB KMS
# # key) from Network. Creates: SecretStore + ExternalSecret (Aurora master password),
# # Aurora Serverless v2 Cluster + Instance(s) + databaseBridge ConfigMap.
# #
# # RGD: 02-database1-rg.yaml  |  Kind: AwsGen3Database1
# #
# # PREREQUISITES:
# #   - Tier 0 (spoke1-network) must be Ready with databaseEnabled: true
# #   - networkBridge must exist in namespace spoke1
# #   - External Secrets Operator must be running on the CSOC cluster
# #   - Aurora master password must exist in AWS Secrets Manager
# #   - ACK controller 'rds' must be running
# # ----------------------------------------------------------------------------
# apiVersion: kro.run/v1alpha1
# kind: AwsGen3Database1
# metadata:
#   name: database
#   namespace: spoke1
#   annotations:
#     argocd.argoproj.io/sync-wave: "20"
#     argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true,ServerSideApply=true
# spec:
#   name: spoke1
#   namespace: spoke1
#   adoptionPolicy: adopt-or-create
#   deletionPolicy: delete
#   # ── External Secrets Operator (Aurora master password) ────────────────────
#   esoUseIRSA: true
#   esoAwsCredsSecretName: eso-aws-credentials
