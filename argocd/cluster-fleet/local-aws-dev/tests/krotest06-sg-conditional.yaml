# ── Test 06: SecurityGroup & RouteTable conditional — KroTest06SgConditional ──
# Validates: Pattern A (multiple SGs with includeWhen per tier).
# FINDING: KRO cannot add conditional entries within a single SG array.
# SOLUTION: Separate SG/RT resource per tier with includeWhen (Pattern A).
#
# RGD: krotest06-sg-conditional-rg.yaml  |  Kind: KroTest06SgConditional
#
# !! REAL AWS RESOURCES — INCURS COST if using non-free-tier account !!
# Creates: VPC, IGW, SecurityGroup(s), RouteTable(s) — ~$0/mo (no NAT GW)
#
# PREREQUISITES:
#   - ACK controller 'ec2' must be running
#   - Namespace must have services.k8s.aws/owner-account-id annotation
#     (created by kind-local-test.sh stage_install for kro-test-sg namespace)
#
# Uncomment ONE or BOTH blocks below to deploy.
# ----------------------------------------------------------------------------

