# # ── AwsGen3Helm1 — Tier 5: Gen3 Application via ArgoCD (~$0, pods only) ───────
# # Creates an ArgoCD Application CR that deploys the gen3-helm umbrella chart
# # onto the spoke EKS cluster (registered by AwsGen3ClusterResources1, Tier 4.5).
# # Reads ALL upstream bridge ConfigMaps for complete gen3-helm values.
# #
# # RGD: awsgen3helm1-rg.yaml  |  Kind: AwsGen3Helm1
# #
# # PREREQUISITES:
# #   - Tier 0 (Foundation1) → foundationBridge + acmBridge (S3, KMS, ACM cert)
# #   - Tier 1 (Database2) → databaseBridge (Aurora endpoint, credentials)
# #   - Tier 2 (Search1) → searchBridge (OpenSearch endpoint)
# #   - Tier 3 (Compute2) → computeBridge (EKS endpoint, CA, OIDC, ArgoCD role)
# #   - Tier 4 (AppIAM2) → appIAMBridge (IRSA role ARNs, SQS URLs)
# #   - Tier 4.5 (ClusterResources1) → clusterResourcesBridge (ArgoCD cluster name, ESO ready)
# #   - AWS SM secrets for all enabled services (dbcreds + fence-config)
# #
# # Sync wave 35 — after cluster-resources (wave 30).
# # ----------------------------------------------------------------------------
# apiVersion: kro.run/v1alpha1
# kind: AwsGen3Helm1
# metadata:
#   name: spoke1-gen3helm
#   namespace: spoke1
#   annotations:
#     argocd.argoproj.io/sync-wave: "35"
#     argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true,ServerSideApply=true
# spec:
#   name: spoke1
#   namespace: spoke1
#   region: us-east-1
#   environment: local
#   project: gen3-kro

#   # ── ArgoCD ─────────────────────────────────────────────────────────────────
#   argoCDNamespace: argocd
#   argoCDProject: default

#   # ── Gen3 configuration ──────────────────────────────────────────────────────
#   hostname: spoke1dev.rds-pla.net
#   dictionaryUrl: "https://dictionary.ardac.org/2.2.2/schema.json"
#   auroraMasterUsername: postgres
#   auroraDBName: gen3
#   tierAccessLevel: private
#   tierAccessLimit: 100
#   dataUploadBucket: gen3-spoke1-upload
#   indexdDefaultPrefix: "dg.XXXX/"

#   # ── Gen3-Helm Source ───────────────────────────────────────────────────────
#   gen3HelmRepoURL: "https://helm.gen3.org"
#   gen3HelmChart: "gen3"
#   gen3HelmTargetRevision: "0.3.25"

#   # ── Bridge references (ALL tiers, all in spoke1 namespace) ─────────────────
#   foundationBridgeName: spoke1-foundation-bridge
#   computeBridgeName: spoke1-compute-bridge
#   databaseBridgeName: spoke1-database-bridge
#   searchBridgeName: spoke1-search-bridge
#   appIAMBridgeName: spoke1-appiam-bridge
#   acmBridgeName: spoke1-acm-bridge
#   clusterResourcesBridgeName: spoke1-cluster-resources-bridge
#   foundationNamespace: spoke1
#   computeNamespace: spoke1
#   databaseNamespace: spoke1
#   searchNamespace: spoke1
#   appIAMNamespace: spoke1
#   acmNamespace: spoke1
#   clusterResourcesNamespace: spoke1

#   # ── Gen3 service flags ──────────────────────────────────────────────────────
#   fenceEnabled: true
#   auditEnabled: true
#   hatcheryEnabled: false
#   manifestserviceEnabled: false
#   indexdEnabled: true
#   metadataEnabled: true
#   peregrinEnabled: true
#   sheepdogEnabled: true
#   guppyEnabled: false
#   portalEnabled: false
#   ssjdispatcherEnabled: false
#   wtsEnabled: false
#   requestorEnabled: false

#   # ── External Secrets (stanfordaimi pattern) ─────────────────────────────────
#   externalSecretsEnabled: true
#   postgresExternalSecret: "spoke1_aurora-master-password"
#   # Per-service DB credential SM secret names
#   fenceDbcredsSM: "spoke1_default-fence-creds"
#   arboristDbcredsSM: "spoke1_default-arborist-creds"
#   auditDbcredsSM: "spoke1_default-audit-creds"
#   indexdDbcredsSM: "spoke1_default-indexd-creds"
#   metadataDbcredsSM: "spoke1_default-metadata-creds"
#   peregrinDbcredsSM: "spoke1_default-sheepdog-creds"
#   sheepdogDbcredsSM: "spoke1_default-sheepdog-creds"
#   # Fence config from SM (JWT keys auto-generated by chart)
#   fenceConfigSM: "spoke1_default-fence-config"

#   # ── Auto Sync ──────────────────────────────────────────────────────────────
#   autoSync: false
