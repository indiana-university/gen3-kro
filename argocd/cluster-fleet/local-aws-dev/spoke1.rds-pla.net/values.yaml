# Spoke1 Gen3 application values — spoke1dev.rds-pla.net
#
# Consumed by the fleet-gen3 ApplicationSet (EKS CSOC production path).
# NOT used in the local CSOC workflow — the Helm1 RGD constructs
# gen3-helm values internally from bridge ConfigMaps.
#
# Kept up-to-date for future promotion to EKS CSOC.
#
# Infrastructure connection values (Aurora endpoint, VPC ID, etc.) are NOT
# hardcoded here. They are injected automatically by the fleet-gen3
# ApplicationSet from the argoCDClusterSecret annotations (gen3.io/*).
#
# DB passwords are NOT passed via annotations — they are managed by AWS
# (manageMasterUserPassword: true) and stored in AWS Secrets Manager.
# ExternalSecrets on the spoke cluster pull them into K8s Secrets.
#
# DATABASE-ONLY DEPLOYMENT: Sets up PostgreSQL databases on external Aurora
# with only the core database-dependent Gen3 services enabled.

global:
  # ── External Database Mode (no local postgres) ────────────
  dev: false
  aws:
    enabled: true
    region: us-east-1
    # ExternalSecrets SA is managed by the cluster-resources chart (not gen3-helm).
    # Disable gen3-helm's SA creation to avoid nil IRSA annotation errors.
    secretStoreServiceAccount:
      enabled: false
      name: external-secrets-sa
  # ── ExternalSecrets integration ───────────────────────────
  # Deploy ExternalSecret CRDs that pull DB passwords from AWS SM
  externalSecrets:
    deploy: true
  # ── External Aurora PostgreSQL ────────────────────────────
  # host and username are injected by the fleet-gen3 ApplicationSet
  # from infraOutputs (via helm.parameters — overrides this block).
  # Password comes from ExternalSecrets on the spoke cluster.
  postgres:
    dbCreate: true
    master:
      port: "5432"
    # ExternalSecret for Aurora master password (from AWS SM)
    externalSecret: "spoke1-dev-aurora-master-password"
  # ── Common settings ──────────────────────────────────────
  environment: dev
  hostname: spoke1dev.rds-pla.net
  dictionaryUrl: "https://s3.amazonaws.com/dictionary-artifacts/datadictionary/develop/schema.json"

# ── Local dev databases — DISABLED (using external Aurora) ──
postgresql:
  enabled: false
elasticsearch:
  enabled: false

# ── Database-dependent services (create schemas on Aurora) ──
indexd:
  enabled: true
  defaultPrefix: "dg.TEST/"

fence:
  enabled: true

peregrine:
  enabled: true

sheepdog:
  enabled: true
