# ── AwsGen3Search1 — Tier 2: Thin Search (~$30–200/mo) ───────────────────────
# Reads searchPrepBridge (Search KMS Key ARN, OpenSearch SG ID) and
# foundationBridge (VPC ID, private subnet IDs) from Foundation.
# Only creates: OpenSearch Domain + searchBridge ConfigMap.
#
# RGD: awsgen3search1-rg.yaml  |  Kind: AwsGen3Search1
#
# PREREQUISITES:
#   - Tier 0 (spoke1-foundation) must be Ready with searchEnabled: true
#   - foundationBridge + searchPrepBridge ConfigMaps must exist in namespace spoke1
#   - ACK controller 'opensearchservice' must be running
# ----------------------------------------------------------------------------
apiVersion: kro.run/v1alpha1
kind: AwsGen3Search1
metadata:
  name: spoke1-search
  namespace: spoke1
  annotations:
    argocd.argoproj.io/sync-wave: "20"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true,ServerSideApply=true,Prune=false
spec:
  name: spoke1
  namespace: spoke1
  region: us-east-1
  environment: local
  project: gen3-kro
  adoptionPolicy: adopt-or-create
  deletionPolicy: delete

  # ── Bridge references to Foundation's search prep + foundation ────────────
  searchPrepBridgeName: spoke1-search-prep-bridge
  foundationBridgeName: spoke1-foundation-bridge
  foundationNamespace: spoke1

  # ── OpenSearch configuration ──────────────────────────────────────────────
  opensearchVersion: "OpenSearch_2.11"
  opensearchInstanceType: "t3.small.search"
  opensearchInstanceCount: 1
  opensearchVolumeSize: 10

  # ── Bridge (creates searchBridge for downstream tiers) ────────────────────
  createBridgeSecret: true
