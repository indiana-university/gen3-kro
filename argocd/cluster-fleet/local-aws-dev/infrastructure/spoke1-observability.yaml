# ── AwsGen3Observability1 — Tier 6: LGTM Stack via ArgoCD (~$0–50/mo) ─────────
# Creates ArgoCD Application CRs for Grafana, Loki, Tempo, Alloy.
# Each component conditional via feature flags. Reads computeBridge.
#
# RGD: awsgen3observability1-rg.yaml  |  Kind: AwsGen3Observability1
#
# PREREQUISITES:
#   - Tier 3 (spoke1-compute) must be Ready (provides computeBridge)
#   - Spoke EKS cluster must be registered in CSOC ArgoCD
#
# ----------------------------------------------------------------------------
apiVersion: kro.run/v1alpha1
kind: AwsGen3Observability1
metadata:
  name: spoke1-observability
  namespace: spoke1
  annotations:
    argocd.argoproj.io/sync-wave: "25"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true,ServerSideApply=true,Prune=false
spec:
  name: spoke1
  namespace: spoke1
  region: us-east-1
  environment: local
  project: gen3-kro

  # ── Bridge references (all in spoke1 namespace) ───────────────────────────
  computeBridgeName: spoke1-compute-bridge
  computeNamespace: spoke1

  # ── Observability components (all optional) ───────────────────────────────
  grafanaEnabled: true
  lokiEnabled: true
  tempoEnabled: true
  alloyEnabled: true
  observabilityNamespace: monitoring
  autoSync: false
