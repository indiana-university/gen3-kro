# ── AwsGen3IAM1 — Tier 4: Application IAM (~$5/mo) ───────────────────────────
# OIDC Provider + 11 IRSA roles (all unconditional — IAM roles are free).
# Reads foundationBridge, computeBridge, storageBridge from upstream tiers.
# Creates: OIDC Provider + 11 IAM Roles + iamBridge.
#
# RGD: awsgen3iam1-rg.yaml  |  Kind: AwsGen3IAM1
#
# PREREQUISITES:
#   - Tier 0 (spoke1-foundation) must be Ready (provides foundationBridge)
#   - Tier 0.5 (spoke1-storage) must be Ready (provides storageBridge)
#   - Tier 3 (spoke1-compute) must be Ready (provides computeBridge with OIDC endpoint)
#   - ACK controller 'iam' must be running
# ----------------------------------------------------------------------------
apiVersion: kro.run/v1alpha1
kind: AwsGen3IAM1
metadata:
  name: spoke1-iam
  namespace: spoke1
  annotations:
    argocd.argoproj.io/sync-wave: "25"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true,ServerSideApply=true
spec:
  name: spoke1
  namespace: spoke1
  region: us-east-1
  environment: local
  project: gen3-kro
  adoptionPolicy: adopt-or-create
  deletionPolicy: delete

  # ── Bridge references (all in spoke1 namespace) ───────────────────────────
  foundationBridgeName: spoke1-foundation-bridge
  computeBridgeName: spoke1-compute-bridge
  storageBridgeName: spoke1-storage-bridge
  foundationNamespace: spoke1
  computeNamespace: spoke1
  storageNamespace: spoke1

  # ── Bridge (creates iamBridge for downstream tiers) ───────────────────────
  createBridgeSecret: true
  iamBridgeName: spoke1-iam-bridge
