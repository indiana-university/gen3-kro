# # ── AwsGen3Foundation1 — Tier 0: Foundation-heavy (~$37/mo) ──────────────────
# # 31 resources: VPC + gateways + subnets + route tables + KMS + S3 +
# # conditional DB subnets/SGs + conditional IAM roles + conditional search
# # KMS/SGs. Feature flags control prep resource groups.
# # Creates up to 4 bridge ConfigMaps (foundationBridge + 3 conditional prep bridges).
# #
# # RGD: awsgen3foundation1-rg.yaml  |  Kind: AwsGen3Foundation1
# #
# # PREREQUISITES:
# #   - Namespace 'spoke1' must exist on the CSOC cluster with
# #     services.k8s.aws/owner-account-id annotation (created by kind-csoc.sh)
# #   - ACK controllers (ec2, iam, kms, s3) must be running
# #   - KRO controller and awsgen3foundation1-rg RGD must be registered
# #
# # Uncomment the YAML block below and populate your values to deploy.
# #
# # Note: argocd.argoproj.io/sync-options SkipDryRunOnMissingResource=true is
# # required because KRO CRDs are not registered at ApplicationSet creation time.
# # Uses 10.1.0.0/16 CIDR.
# # ----------------------------------------------------------------------------
# apiVersion: kro.run/v1alpha1
# kind: AwsGen3Foundation1
# metadata:
#   name: spoke1-foundation
#   namespace: spoke1
#   annotations:
#     argocd.argoproj.io/sync-wave: "15"
#     argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true,ServerSideApply=true
# spec:
#   name: spoke1
#   namespace: spoke1
#   region: us-east-1
#   environment: local
#   project: gen3-kro
#   adoptionPolicy: adopt-or-create
#   deletionPolicy: delete

#   # ── Network ──────────────────────────────────────────────────────────────
#   vpcCIDR: "10.1.0.0/16"
#   publicSubnetCIDRs:
#     - "10.1.240.0/24"
#     - "10.1.241.0/24"
#   privateSubnetCIDRs:
#     - "10.1.0.0/20"
#     - "10.1.16.0/20"
#   availabilityZones:
#     - "us-east-1a"
#     - "us-east-1b"

#   # ── Storage (S3 bucket names must be globally unique) ─────────────────────
#   loggingBucketName: gen3-spoke1-logging
#   dataBucketName: gen3-spoke1-data
#   uploadBucketName: gen3-spoke1-upload

#   # ── KMS ───────────────────────────────────────────────────────────────────
#   kmsKeyDescription: spoke1 foundation encryption key

#   # ── Feature flags (control conditional resource groups) ───────────────────
#   databaseEnabled: true    # DB subnets, DB RT, DB subnet group, DB KMS, Aurora SG
#   computeEnabled: true     # EKS SG, Cluster IAM Role (6 policies), Node IAM Role (4 policies)
#   searchEnabled: true      # Search KMS, OpenSearch SG

#   # ── ACM / TLS (provides ACM cert ARN via acmBridge for ALB HTTPS) ────────
#   # route53HostedZoneName: zone name only — zone ID is resolved at runtime via
#   # ACK Route53 HostedZone adoption (never stored in git)
#   # DISABLED: Route53 ACK controller v1.3.1 bug — "unexpected end of JSON input"
#   # on HostedZone adoption. Re-enable after controller fix.
#   # hostname: spoke1dev.rds-pla.net
#   # route53HostedZoneName: rds-pla.net
#   hostname: ""
#   route53HostedZoneName: ""

#   # ── Database prep (only when databaseEnabled: true) ───────────────────────
#   dbSubnetCIDRs:
#     - "10.1.32.0/24"
#     - "10.1.33.0/24"

#   # ── Bridge (always: foundationBridge; conditional: prep bridges) ──────────
#   createBridgeSecret: true
