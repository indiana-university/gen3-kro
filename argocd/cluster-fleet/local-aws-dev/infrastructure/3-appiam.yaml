# ── AwsGen3AppIAM1 — Tier 4: Application IAM (~$5/mo) ────────────────────────
# OIDC Provider + IRSA roles (fence, audit, hatchery, manifestservice,
# externalSecrets) + SQS queues (audit, ssjdispatcher) + Secrets Manager.
# All resources conditional via feature flags.
#
# RGD: awsgen3appiam1-rg.yaml  |  Kind: AwsGen3AppIAM1
#
# PREREQUISITES:
#   - Tier 0 (spoke1-foundation) must be Ready (provides foundationBridge)
#   - Tier 3 (spoke1-compute) must be Ready (provides computeBridge with OIDC endpoint)
#   - ACK controllers (sqs, iam, secretsmanager) must be running
# ----------------------------------------------------------------------------
# apiVersion: kro.run/v1alpha1
# kind: AwsGen3AppIAM1
# metadata:
#   name: spoke1-appiam
#   namespace: spoke1
#   annotations:
#     argocd.argoproj.io/sync-wave: "25"
#     argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true,ServerSideApply=true,Prune=false
# spec:
#   name: spoke1
#   namespace: spoke1
#   region: us-east-1
#   environment: local
#   project: gen3-kro
#   adoptionPolicy: adopt-or-create
#   deletionPolicy: delete
#
#   # ── Bridge references (all in spoke1 namespace) ───────────────────────────
#   foundationBridgeName: spoke1-foundation-bridge
#   computeBridgeName: spoke1-compute-bridge
#   foundationNamespace: spoke1
#   computeNamespace: spoke1
#
#   # ── Feature flags (all optional) ──────────────────────────────────────────
#   fenceEnabled: true
#   auditEnabled: true
#   hatcheryEnabled: true
#   manifestserviceEnabled: true
#   externalSecretsEnabled: true
#   ssjdispatcherEnabled: true
#
#   # ── Bridge (creates appIAMBridge for downstream tiers) ────────────────────
#   createBridgeSecret: true
