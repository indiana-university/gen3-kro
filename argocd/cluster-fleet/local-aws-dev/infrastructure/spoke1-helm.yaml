# ── AwsGen3Helm1 — Tier 5: Gen3 Application via ArgoCD (~$0, pods only) ───────
# Creates an ArgoCD Application CR that deploys the gen3-helm umbrella chart
# onto the spoke EKS cluster. Reads foundationBridge + computeBridge.
#
# RGD: awsgen3helm1-rg.yaml  |  Kind: AwsGen3Helm1
#
# PREREQUISITES:
#   - Tier 0 (spoke1-foundation) must be Ready (provides foundationBridge)
#   - Tier 3 (spoke1-compute) must be Ready (provides computeBridge)
#   - Spoke EKS cluster must be registered in CSOC ArgoCD
#
# Uncomment the YAML block below and populate your values to deploy.
# ----------------------------------------------------------------------------
# apiVersion: kro.run/v1alpha1
# kind: AwsGen3Helm1
# metadata:
#   name: spoke1-gen3helm
#   namespace: spoke1
#   annotations:
#     argocd.argoproj.io/sync-wave: "25"
#     argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true,ServerSideApply=true,Prune=false
# spec:
#   name: spoke1
#   namespace: spoke1
#   region: us-east-1
#   environment: local
#   project: gen3-kro
#
#   # ── Gen3 configuration ────────────────────────────────────────────────────
#   hostname: spoke1.gen3.local
#   gen3HelmChartVersion: "0.1.104"
#   gen3HelmTargetRevision: "0.1.104"
#
#   # ── Bridge references (all in spoke1 namespace) ───────────────────────────
#   foundationBridgeName: spoke1-foundation-bridge
#   computeBridgeName: spoke1-compute-bridge
#   foundationNamespace: spoke1
#   computeNamespace: spoke1
#
#   # ── Gen3 service flags ────────────────────────────────────────────────────
#   fenceEnabled: true
#   auditEnabled: true
#   hatcheryEnabled: true
#   manifestserviceEnabled: true
#   indexdEnabled: true
#   metadataEnabled: true
#   peregrinEnabled: true
#   sheepdogEnabled: true
#   guppyEnabled: true
#   portalEnabled: true
#   autoSync: false
