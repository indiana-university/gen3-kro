# ── AwsGen3ClusterResources1 — Tier 4.5: Spoke Registration + ESO (~$0) ──────
# Registers the spoke EKS cluster in CSOC ArgoCD and deploys cluster-wide
# prerequisites (external-secrets, cert-manager) before Gen3 services arrive.
# Must reconcile before AwsGen3Helm1 (Tier 5), which reads the
# clusterResourcesBridge to gate on ESO being installed on the spoke.
#
# RGD: awsgen3clusterresources1-rg.yaml  |  Kind: AwsGen3ClusterResources1
#
# PREREQUISITES:
#   - Tier 3 (spoke1-compute) must be Ready (provides computeBridge with
#     eks-cluster-endpoint, eks-cluster-ca, eks-cluster-name, argocd-spoke-role-arn)
#   - ArgoCD server must have credentials for spoke EKS IAM auth
#
# Sync wave 30 — after infrastructure tiers (15-25) but before applications (35+).
# The clusterResourcesApp readyWhen gates on ArgoCD Application health/sync,
# so the bridge is only produced once ESO is actually running on the spoke.
# ----------------------------------------------------------------------------
# apiVersion: kro.run/v1alpha1
# kind: AwsGen3ClusterResources1
# metadata:
#   name: spoke1-cluster-resources
#   namespace: spoke1
#   annotations:
#     argocd.argoproj.io/sync-wave: "30"
#     argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true,ServerSideApply=true,Prune=false
# spec:
#   name: spoke1
#   namespace: spoke1
#   region: us-east-1
#   environment: local
#   project: gen3-kro
#
#   # ── ArgoCD ───────────────────────────────────────────────────────────────
#   argoCDNamespace: argocd
#   argoCDProject: default
#
#   # ── Compute Bridge Reference ─────────────────────────────────────────────
#   computeBridgeName: spoke1-compute-bridge
#   computeNamespace: spoke1
#
#   # ── Fleet / Git Configuration ────────────────────────────────────────────
#   fleetRepoURL: "https://github.com/indiana-university/gen3-kro.git"
#   fleetRepoRevision: "main"
#   fleetRepoBasepath: "argocd/"
#   spokeAlias: "local-aws-dev"
#
#   # ── Cluster-Resources Feature Flags ──────────────────────────────────────
#   externalSecretsEnabled: true
#   certManagerEnabled: false
#
#   # ── Auto Sync ────────────────────────────────────────────────────────────
#   autoSync: false
