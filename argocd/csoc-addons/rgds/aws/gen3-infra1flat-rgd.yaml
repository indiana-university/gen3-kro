apiVersion: kro.run/v1alpha1
kind: ResourceGraphDefinition
metadata:
  name: awsgen3infra1flat
spec:
  schema:
    apiVersion: v1alpha1
    kind: AwsGen3Infra1Flat
    spec:
      # Basic metadata
      name: string | required=true
      namespace: string | default="default"
      region: string | default="us-east-1"
      environment: string | default="dev"
      project: string | default="kro-managed"

      # ==================== Network Configuration ====================
      # VPC Configuration
      vpcCIDR: string | required=true

      # Subnet CIDRs
      publicSubnetCIDRs: "[]string | required=true"
      privateSubnetCIDRs: "[]string | required=true"
      dbSubnetCIDRs: "[]string | required=true"

      # Availability Zones
      availabilityZones: "[]string | required=true"

      # ==================== Security Configuration ====================
      # KMS Configuration
      kmsKeyDescription: string | default="Gen3 encryption key"
      kmsKeyAlias: string | default="gen3-key"

      # ==================== Data Configuration ====================
      # Aurora Configuration
      auroraEngine: string | default="aurora-postgresql"
      auroraEngineMode: string | default="provisioned"
      auroraEngineVersion: string | default="14.19"
      auroraMasterUsername: string | default="postgres"
      auroraDatabaseName: string | default="app"
      auroraInstanceClass: string | default="db.r6g.large"
      auroraInstanceCount: integer | default=2

      # EKS Configuration
      eksVersion: string | default="1.32"
      eksNodeInstanceTypes: '[]string | default=["t3.large"]'
      eksNodeDesiredSize: integer | default=3
      eksNodeMinSize: integer | default=2
      eksNodeMaxSize: integer | default=6
      eksNodeDiskSize: integer | default=100
      eksEnableOIDCProvider: boolean | default=true
      eksEnableCoreAddons: boolean | default=true

      # ElastiCache Configuration
      elastiCacheEngine: string | default="redis"
      elastiCacheEngineVersion: string | default="7.0"
      elastiCacheNodeType: string | default="cache.t3.micro"
      elastiCacheNumCacheNodes: integer | default=2
      elastiCacheAuthTokenSecretRef: string

      # OpenSearch Configuration
      openSearchVersion: string | default="2.11"
      openSearchInstanceType: string | default="t3.small.search"
      openSearchInstanceCount: integer | default=2
      openSearchMasterUsername: string | default="admin"
      openSearchMasterPasswordSecretRef: string | required=true
      openSearchVolumeSize: integer | default=100
      openSearchVolumeType: string | default="gp3"

      # EFS Configuration
      efsPerformanceMode: string | default="generalPurpose"
      efsThroughputMode: string | default="bursting"

      # S3 Configuration
      loggingBucketName: string
      dataBucketName: string
      uploadBucketName: string

      # ==================== Resource Management ====================
      adoptionPolicy: string | default="adopt-or-create"
      deletionPolicy: string | default="delete"

      # Tags
      additionalTags: "map[string]string"

    # status:
    #   # Security Status (KMS)
    #   loggingKeyARN: ${loggingKey.status.?ackResourceMetadata.?arn.orValue("loading")}
    #   databaseKeyARN: ${databaseKey.status.?ackResourceMetadata.?arn.orValue("loading")}
    #   searchKeyARN: ${searchKey.status.?ackResourceMetadata.?arn.orValue("loading")}
    #   platformKeyARN: ${platformKey.status.?ackResourceMetadata.?arn.orValue("loading")}

    #   # Network Status
    #   vpcID: ${vpc.status.?vpcID.orValue("loading")}
    #   internetGatewayID: ${igw.status.?internetGatewayID.orValue("loading")}
    #   publicSubnetIDs:
    #     - ${publicsubnet1.status.?subnetID.orValue("loading")}
    #     - ${publicsubnet2.status.?subnetID.orValue("loading")}
    #   privateSubnetIDs:
    #     - ${privatesubnet1.status.?subnetID.orValue("loading")}
    #     - ${privatesubnet2.status.?subnetID.orValue("loading")}
    #   dbSubnetIDs:
    #     - ${dbsubnet1.status.?subnetID.orValue("loading")}
    #     - ${dbsubnet2.status.?subnetID.orValue("loading")}
    #   natGatewayIDs:
    #     - ${natGateway1.status.?natGatewayID.orValue("loading")}
    #   elasticIPAllocationIDs:
    #     - ${eip1.status.?allocationID.orValue("loading")}
    #   routeTableIDs:
    #     public: ${publicRouteTable.status.?routeTableID.orValue("loading")}
    #     private: ${privateRouteTable.status.?routeTableID.orValue("loading")}
    #     database: ${dbRouteTable.status.?routeTableID.orValue("loading")}

    #   # Storage Status (S3)
    #   loggingBucketARN: ${loggingBucket.status.?ackResourceMetadata.?arn.orValue("loading")}
    #   dataBucketARN: ${dataBucket.status.?ackResourceMetadata.?arn.orValue("loading")}
    #   uploadBucketARN: ${uploadBucket.status.?ackResourceMetadata.?arn.orValue("loading")}

    #   # Database Status (Aurora)
    #   auroraClusterARN: ${auroraCluster.status.?ackResourceMetadata.?arn.orValue("loading")}
    #   auroraEndpoint: ${auroraCluster.status.?endpoint.orValue("loading")}
    #   auroraReaderEndpoint: ${auroraCluster.status.?readerEndpoint.orValue("loading")}

    #   # Compute Status (EKS)
    #   eksClusterARN: ${eksCluster.status.?ackResourceMetadata.?arn.orValue("loading")}
    #   eksEndpoint: ${eksCluster.status.?endpoint.orValue("loading")}
    #   eksCertificateAuthority: ${eksCluster.status.?certificateAuthority.?data.orValue("loading")}

      # # Cache Status (ElastiCache)
      # elastiCacheARN: ${replicationGroup.status.?ackResourceMetadata.?arn.orValue("loading")}
      # elastiCacheEndpoint: ${replicationGroup.status.?configurationEndpoint.?address.orValue("loading")}
      # elastiCachePort: ${replicationGroup.status.?configurationEndpoint.?port.orValue("loading")}

      # # Search Status (OpenSearch)
      # openSearchDomainARN: ${openSearchDomain.status.?ackResourceMetadata.?arn.orValue("loading")}
      # openSearchEndpoint: ${openSearchDomain.status.?endpoint.orValue("loading")}

  resources:
  # ==================== SECURITY: KMS Keys ====================
    # ==================== Logging/Audit Key ====================
    - id: loggingKey
      readyWhen:
        - ${loggingKey.status.?keyID.orValue('null') != 'null'}
        - ${loggingKey.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
        - ${loggingKey.status.?enabled.orValue(false) == true}
      template:
        apiVersion: kms.services.k8s.aws/v1alpha1
        kind: Key
        metadata:
          name: ${schema.spec.name}-logging-key
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${schema.spec.region}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          description: "KMS key for logging and audit data (CloudTrail, VPC Flow Logs, security logs)"
          keyUsage: "ENCRYPT_DECRYPT"
          enableKeyRotation: true
          tags:
            - tagKey: Name
              tagValue: ${schema.spec.name}-logging-key
            - tagKey: Environment
              tagValue: ${schema.spec.environment}
            - tagKey: ManagedBy
              tagValue: Kro
            - tagKey: Project
              tagValue: ${schema.spec.project}
            - tagKey: KeyPurpose
              tagValue: logging-audit
    # ==================== Database Key ====================
    - id: databaseKey
      readyWhen:
        - ${databaseKey.status.?keyID.orValue('null') != 'null'}
        - ${databaseKey.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
        - ${databaseKey.status.?enabled.orValue(false) == true}
      template:
        apiVersion: kms.services.k8s.aws/v1alpha1
        kind: Key
        metadata:
          name: ${schema.spec.name}-database-key
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${schema.spec.region}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          description: "KMS key for database encryption (Aurora, RDS)"
          keyUsage: "ENCRYPT_DECRYPT"
          enableKeyRotation: true
          policy: |
            {
              "Version": "2012-10-17",
              "Statement": [
                {
                  "Sid": "Enable IAM User Permissions",
                  "Effect": "Allow",
                  "Principal": {"AWS": "arn:aws:iam::123456789012:root"},
                  "Action": "kms:*",
                  "Resource": "*"
                },
                {
                  "Sid": "Allow RDS to use the key",
                  "Effect": "Allow",
                  "Principal": {"Service": "rds.amazonaws.com"},
                  "Action": [
                    "kms:Decrypt",
                    "kms:GenerateDataKey",
                    "kms:CreateGrant",
                    "kms:DescribeKey"
                  ],
                  "Resource": "*"
                }
              ]
            }
          tags:
            - tagKey: Name
              tagValue: ${schema.spec.name}-database-key
            - tagKey: Environment
              tagValue: ${schema.spec.environment}
            - tagKey: ManagedBy
              tagValue: Kro
            - tagKey: Project
              tagValue: ${schema.spec.project}
            - tagKey: KeyPurpose
              tagValue: database
    # ==================== Search/Index Key ====================
    - id: searchKey
      readyWhen:
        - ${searchKey.status.?keyID.orValue('null') != 'null'}
        - ${searchKey.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
        - ${searchKey.status.?enabled.orValue(false) == true}
      template:
        apiVersion: kms.services.k8s.aws/v1alpha1
        kind: Key
        metadata:
          name: ${schema.spec.name}-search-key
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${schema.spec.region}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          description: "KMS key for search and indexing services (OpenSearch, ElastiCache)"
          keyUsage: "ENCRYPT_DECRYPT"
          enableKeyRotation: true
          policy: |
            {
              "Version": "2012-10-17",
              "Statement": [
                {
                  "Sid": "Enable IAM User Permissions",
                  "Effect": "Allow",
                  "Principal": {"AWS": "arn:aws:iam::123456789012:root"},
                  "Action": "kms:*",
                  "Resource": "*"
                },
                {
                  "Sid": "Allow ElastiCache to use the key",
                  "Effect": "Allow",
                  "Principal": {"Service": "elasticache.amazonaws.com"},
                  "Action": [
                    "kms:Decrypt",
                    "kms:GenerateDataKey",
                    "kms:CreateGrant",
                    "kms:DescribeKey"
                  ],
                  "Resource": "*"
                },
                {
                  "Sid": "Allow OpenSearch to use the key",
                  "Effect": "Allow",
                  "Principal": {"Service": "es.amazonaws.com"},
                  "Action": [
                    "kms:Decrypt",
                    "kms:GenerateDataKey",
                    "kms:CreateGrant",
                    "kms:DescribeKey"
                  ],
                  "Resource": "*"
                }
              ]
            }
          tags:
            - tagKey: Name
              tagValue: ${schema.spec.name}-search-key
            - tagKey: Environment
              tagValue: ${schema.spec.environment}
            - tagKey: ManagedBy
              tagValue: Kro
            - tagKey: Project
              tagValue: ${schema.spec.project}
            - tagKey: KeyPurpose
              tagValue: search-index
    # ==================== Platform/Cluster Key ====================
    - id: platformKey
      readyWhen:
        - ${platformKey.status.?keyID.orValue('null') != 'null'}
        - ${platformKey.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
        - ${platformKey.status.?enabled.orValue(false) == true}
      template:
        apiVersion: kms.services.k8s.aws/v1alpha1
        kind: Key
        metadata:
          name: ${schema.spec.name}-platform-key
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${schema.spec.region}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          description: "KMS key for platform services (EKS secrets, S3 app buckets, EFS)"
          keyUsage: "ENCRYPT_DECRYPT"
          enableKeyRotation: true
          policy: |
            {
              "Version": "2012-10-17",
              "Statement": [
                {
                  "Sid": "Enable IAM User Permissions",
                  "Effect": "Allow",
                  "Principal": {"AWS": "arn:aws:iam::123456789012:root"},
                  "Action": "kms:*",
                  "Resource": "*"
                },
                {
                  "Sid": "Allow EKS to use the key",
                  "Effect": "Allow",
                  "Principal": {"Service": "eks.amazonaws.com"},
                  "Action": [
                    "kms:Decrypt",
                    "kms:GenerateDataKey",
                    "kms:CreateGrant",
                    "kms:DescribeKey"
                  ],
                  "Resource": "*"
                }
              ]
            }
          tags:
            - tagKey: Name
              tagValue: ${schema.spec.name}-platform-key
            - tagKey: Environment
              tagValue: ${schema.spec.environment}
            - tagKey: ManagedBy
              tagValue: Kro
            - tagKey: Project
              tagValue: ${schema.spec.project}
            - tagKey: KeyPurpose
              tagValue: platform
  # ==================== SECRETS: AWS Secrets Manager ====================
    # ==================== Aurora Master Password Secret ====================
    - id: auroraMasterPasswordSecret
      readyWhen:
        - ${auroraMasterPasswordSecret.status.?ackResourceMetadata.?arn.orValue('null') != 'null'}
        - ${auroraMasterPasswordSecret.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
      template:
        apiVersion: secretsmanager.services.k8s.aws/v1alpha1
        kind: Secret
        metadata:
          name: ${schema.spec.name}-aurora-master-password
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${schema.spec.region}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          name: ${schema.spec.name}-aurora-master-password
          description: Aurora PostgreSQL master password
          kmsKeyID: ${databaseKey.status.ackResourceMetadata.arn}
          generateSecretString:
            excludeCharacters: "\"'@/\\<>"
            passwordLength: 32
            requireEachIncludedType: true
          tags:
            - key: Name
              value: ${schema.spec.name}-aurora-master-password
            - key: Environment
              value: ${schema.spec.environment}
            - key: ManagedBy
              value: Kro
            - key: Project
              value: ${schema.spec.project}
    # ==================== Gen3 Fence DB Password Secret ====================
    - id: fenceDBPasswordSecret
      readyWhen:
        - ${fenceDBPasswordSecret.status.?ackResourceMetadata.?arn.orValue('null') != 'null'}
        - ${fenceDBPasswordSecret.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
      template:
        apiVersion: secretsmanager.services.k8s.aws/v1alpha1
        kind: Secret
        metadata:
          name: ${schema.spec.name}-fence-db-password
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${schema.spec.region}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          name: ${schema.spec.name}-fence-db-password
          description: Fence database user password
          kmsKeyID: ${databaseKey.status.ackResourceMetadata.arn}
          generateSecretString:
            excludeCharacters: "\"'@/\\<>"
            passwordLength: 32
            requireEachIncludedType: true
          tags:
            - key: Name
              value: ${schema.spec.name}-fence-db-password
            - key: Environment
              value: ${schema.spec.environment}
            - key: ManagedBy
              value: Kro
            - key: Project
              value: ${schema.spec.project}
            - key: Service
              value: fence
    # ==================== Gen3 Indexd DB Password Secret ====================
    - id: indexdDBPasswordSecret
      readyWhen:
        - ${indexdDBPasswordSecret.status.?ackResourceMetadata.?arn.orValue('null') != 'null'}
        - ${indexdDBPasswordSecret.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
      template:
        apiVersion: secretsmanager.services.k8s.aws/v1alpha1
        kind: Secret
        metadata:
          name: ${schema.spec.name}-indexd-db-password
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${schema.spec.region}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          name: ${schema.spec.name}-indexd-db-password
          description: Indexd database user password
          kmsKeyID: ${databaseKey.status.ackResourceMetadata.arn}
          generateSecretString:
            excludeCharacters: "\"'@/\\<>"
            passwordLength: 32
            requireEachIncludedType: true
          tags:
            - key: Name
              value: ${schema.spec.name}-indexd-db-password
            - key: Environment
              value: ${schema.spec.environment}
            - key: ManagedBy
              value: Kro
            - key: Project
              value: ${schema.spec.project}
            - key: Service
              value: indexd
    # ==================== Gen3 Sheepdog DB Password Secret ====================
    - id: sheepdogDBPasswordSecret
      readyWhen:
        - ${sheepdogDBPasswordSecret.status.?ackResourceMetadata.?arn.orValue('null') != 'null'}
        - ${sheepdogDBPasswordSecret.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
      template:
        apiVersion: secretsmanager.services.k8s.aws/v1alpha1
        kind: Secret
        metadata:
          name: ${schema.spec.name}-sheepdog-db-password
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${schema.spec.region}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          name: ${schema.spec.name}-sheepdog-db-password
          description: Sheepdog database user password
          kmsKeyID: ${databaseKey.status.ackResourceMetadata.arn}
          generateSecretString:
            excludeCharacters: "\"'@/\\<>"
            passwordLength: 32
            requireEachIncludedType: true
          tags:
            - key: Name
              value: ${schema.spec.name}-sheepdog-db-password
            - key: Environment
              value: ${schema.spec.environment}
            - key: ManagedBy
              value: Kro
            - key: Project
              value: ${schema.spec.project}
            - key: Service
              value: sheepdog
    # ==================== Gen3 Arborist DB Password Secret ====================
    - id: arboristDBPasswordSecret
      readyWhen:
        - ${arboristDBPasswordSecret.status.?ackResourceMetadata.?arn.orValue('null') != 'null'}
        - ${arboristDBPasswordSecret.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
      template:
        apiVersion: secretsmanager.services.k8s.aws/v1alpha1
        kind: Secret
        metadata:
          name: ${schema.spec.name}-arborist-db-password
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${schema.spec.region}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          name: ${schema.spec.name}-arborist-db-password
          description: Arborist database user password
          kmsKeyID: ${databaseKey.status.ackResourceMetadata.arn}
          generateSecretString:
            excludeCharacters: "\"'@/\\<>"
            passwordLength: 32
            requireEachIncludedType: true
          tags:
            - key: Name
              value: ${schema.spec.name}-arborist-db-password
            - key: Environment
              value: ${schema.spec.environment}
            - key: ManagedBy
              value: Kro
            - key: Project
              value: ${schema.spec.project}
            - key: Service
              value: arborist
  # ==================== NETWORK: VPC & Subnets ====================
    # ==================== VPC ====================
    - id: vpc
      readyWhen:
        - ${vpc.status.?vpcID.orValue('null') != 'null'}
        - ${vpc.status.?state.orValue('null') == 'available'}
        - ${vpc.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
      template:
        apiVersion: ec2.services.k8s.aws/v1alpha1
        kind: VPC
        metadata:
          name: ${schema.spec.name}-vpc
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${schema.spec.region}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          cidrBlocks:
            - ${schema.spec.vpcCIDR}
          enableDNSHostnames: true
          enableDNSSupport: true
          tags:
            - key: Name
              value: ${schema.spec.name}-vpc
            - key: Environment
              value: ${schema.spec.environment}
            - key: ManagedBy
              value: Kro
            - key: Project
              value: ${schema.spec.project}
    # ==================== Internet Gateway ====================
    - id: igw
      readyWhen:
        - ${igw.status.?internetGatewayID.orValue('null') != 'null'}
        - ${igw.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
        - ${igw.status.?attachments.orValue([]).exists(a, a.state == "available")}
      template:
        apiVersion: ec2.services.k8s.aws/v1alpha1
        kind: InternetGateway
        metadata:
          name: ${schema.spec.name}-igw
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${schema.spec.region}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          vpcRef:
            from:
              name: ${schema.spec.name}-vpc
          tags:
            - key: Name
              value: ${schema.spec.name}-igw
            - key: Environment
              value: ${schema.spec.environment}
            - key: ManagedBy
              value: Kro
            - key: Project
              value: ${schema.spec.project}
    # ==================== Public Route Table ====================
    - id: publicRouteTable
      readyWhen:
        - ${publicRouteTable.status.?routeTableID.orValue('null') != 'null'}
        - ${publicRouteTable.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
      template:
        apiVersion: ec2.services.k8s.aws/v1alpha1
        kind: RouteTable
        metadata:
          name: ${schema.spec.name}-public-rt
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${schema.spec.region}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          vpcID: ${vpc.status.vpcID}
          routes:
            - destinationCIDRBlock: "0.0.0.0/0"
              gatewayID: ${igw.status.internetGatewayID}
          tags:
            - key: Name
              value: ${schema.spec.name}-public-rt
            - key: Environment
              value: ${schema.spec.environment}
            - key: ManagedBy
              value: Kro
            - key: Project
              value: ${schema.spec.project}
    # ==================== Public Subnet 1 (Required) ====================
    - id: publicsubnet1
      readyWhen:
        - ${publicsubnet1.status.?subnetID.orValue('null') != 'null'}
        - ${publicsubnet1.status.?state.orValue('null') == 'available'}
        - ${publicsubnet1.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
      template:
        apiVersion: ec2.services.k8s.aws/v1alpha1
        kind: Subnet
        metadata:
          name: ${schema.spec.name}-public-subnet-1
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${schema.spec.region}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          vpcID: ${vpc.status.vpcID}
          cidrBlock: ${schema.spec.publicSubnetCIDRs[0]}
          availabilityZone: ${schema.spec.availabilityZones[0]}
          mapPublicIPOnLaunch: true
          routeTableRefs:
            - from:
                name: ${publicRouteTable.metadata.name}
          tags:
            - key: Name
              value: ${schema.spec.name}-public-subnet-1
            - key: Environment
              value: ${schema.spec.environment}
            - key: ManagedBy
              value: Kro
            - key: Project
              value: ${schema.spec.project}
            - key: kubernetes.io/role/elb
              value: "1"
    # ==================== Public Subnet 2 (Required) ====================
    - id: publicsubnet2
      readyWhen:
        - ${publicsubnet2.status.?subnetID.orValue('null') != 'null'}
        - ${publicsubnet2.status.?state.orValue('null') == 'available'}
        - ${publicsubnet2.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
      template:
