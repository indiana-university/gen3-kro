  # ==================== DATABASE INITIALIZATION: Lambda ====================
    # ==================== Lambda IAM Role ====================
    - id: lambdaExecutionRole
      readyWhen:
        - ${lambdaExecutionRole.status.?ackResourceMetadata.?arn.orValue('null') != 'null'}
        - ${lambdaExecutionRole.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
      template:
        apiVersion: iam.services.k8s.aws/v1alpha1
        kind: Role
        metadata:
          name: ${schema.spec.name}-lambda-initdb-role
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${schema.spec.region}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          name: ${schema.spec.name}-lambda-initdb-role
          description: IAM role for Gen3 database initialization Lambda
          assumeRolePolicyDocument: |
            {
              "Version": "2012-10-17",
              "Statement": [
                {
                  "Effect": "Allow",
                  "Principal": {
                    "Service": "lambda.amazonaws.com"
                  },
                  "Action": "sts:AssumeRole"
                }
              ]
            }
          policies:
            - policyName: lambda-vpc-execution
              policyDocument: |
                {
                  "Version": "2012-10-17",
                  "Statement": [
                    {
                      "Effect": "Allow",
                      "Action": [
                        "logs:CreateLogGroup",
                        "logs:CreateLogStream",
                        "logs:PutLogEvents"
                      ],
                      "Resource": "arn:aws:logs:*:*:*"
                    },
                    {
                      "Effect": "Allow",
                      "Action": [
                        "ec2:CreateNetworkInterface",
                        "ec2:DescribeNetworkInterfaces",
                        "ec2:DeleteNetworkInterface",
                        "ec2:AssignPrivateIpAddresses",
                        "ec2:UnassignPrivateIpAddresses"
                      ],
                      "Resource": "*"
                    },
                    {
                      "Effect": "Allow",
                      "Action": [
                        "secretsmanager:GetSecretValue",
                        "secretsmanager:DescribeSecret"
                      ],
                      "Resource": "arn:aws:secretsmanager:*:*:secret:*"
                    }
                  ]
                }
          tags:
            - key: Name
              value: ${schema.spec.name}-lambda-initdb-role
            - key: Environment
              value: ${schema.spec.environment}
            - key: ManagedBy
              value: Kro
            - key: Project
              value: ${schema.spec.project}
    # ==================== Lambda Function ====================
    - id: lambdaInitDbFunction
      readyWhen:
        - ${lambdaInitDbFunction.status.?state.orValue('null') == 'Active'}
        - ${lambdaInitDbFunction.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
      template:
        apiVersion: lambda.services.k8s.aws/v1alpha1
        kind: Function
        metadata:
          name: ${schema.spec.name}-initdb
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${schema.spec.region}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          name: ${schema.spec.name}-initdb-lambda
          description: Initialize Gen3 databases in Aurora (managed by infrastructure)
          runtime: python3.12
          role: ${lambdaExecutionRole.status.ackResourceMetadata.arn}
          handler: index.lambda_handler
          timeout: 300
          memorySize: 512
          environment:
            variables:
              AURORA_ENDPOINT: ${auroraCluster.status.endpoint}
              AURORA_PORT: "5432"
              AURORA_USER: ${schema.spec.auroraMasterUsername}
              AURORA_SECRET: ${auroraMasterPasswordSecret.status.name}
              FENCE_SECRET: ${fenceDBPasswordSecret.status.name}
              INDEXD_SECRET: ${indexdDBPasswordSecret.status.name}
              SHEEPDOG_SECRET: ${sheepdogDBPasswordSecret.status.name}
              ARBORIST_SECRET: ${arboristDBPasswordSecret.status.name}
              AWS_REGION_NAME: ${schema.spec.region}
          vpcConfig:
            securityGroupIDs:
              - ${lambdaSecurityGroup.status.id}
            subnetIDs:
              - ${privatesubnet1.status.subnetID}
              - ${privatesubnet2.status.subnetID}
          layers:
            - arn:aws:lambda:us-east-1:177933569100:layer:AWS-Parameters-and-Secrets-Lambda-Extension:11
          code:
            zipFile: |
              import json
              import boto3
              import os
              try:
                  import psycopg2
              except:
                  print("psycopg2 not available, using psycopg2-binary layer")
                  import psycopg2

              sm = boto3.client('secretsmanager')

              def get_secret(name):
                  """Retrieve secret value from AWS Secrets Manager"""
                  try:
                      resp = sm.get_secret_value(SecretId=name)
                      secret = json.loads(resp['SecretString']) if 'SecretString' in resp else resp['SecretBinary']
                      return secret.get('password', secret) if isinstance(secret, dict) else secret
                  except Exception as e:
                      print(f"Error getting secret {name}: {str(e)}")
                      raise

              def create_db_user(cur, db, user, pwd):
                  """Create database and user with appropriate permissions"""
                  # Check if database exists
                  cur.execute("SELECT 1 FROM pg_database WHERE datname=%s", (db,))
                  if not cur.fetchone():
                      cur.execute(f"CREATE DATABASE {db}")
                      print(f"Created database: {db}")
                  else:
                      print(f"Database already exists: {db}")

                  # Check if user exists
                  cur.execute("SELECT 1 FROM pg_user WHERE usename=%s", (user,))
                  if not cur.fetchone():
                      cur.execute(f"CREATE USER {user} WITH PASSWORD %s", (pwd,))
                      print(f"Created user: {user}")
                  else:
                      cur.execute(f"ALTER USER {user} WITH PASSWORD %s", (pwd,))
                      print(f"Updated password for user: {user}")

                  # Grant permissions
                  cur.execute(f"GRANT ALL PRIVILEGES ON DATABASE {db} TO {user}")
                  print(f"Granted privileges on {db} to {user}")

              def lambda_handler(event, context):
                  """
                  Lambda handler to initialize Gen3 databases.
                  This function is triggered by the app RGD but managed by the infrastructure RGD.
                  """
                  print(f"Event: {json.dumps(event)}")

                  # Get configuration from event or use environment variables
                  config = event.get('config', {})

                  # Fetch master password
                  master_pwd = get_secret(os.environ['AURORA_SECRET'])

                  # Connect to PostgreSQL
                  conn = psycopg2.connect(
                      host=os.environ['AURORA_ENDPOINT'],
                      port=int(os.environ['AURORA_PORT']),
                      user=os.environ['AURORA_USER'],
                      password=master_pwd,
                      database='postgres'
                  )
                  conn.autocommit = True
                  cur = conn.cursor()

                  created_dbs = []

                  # Process each service database based on event config
                  if config.get('fence', {}).get('enabled', False):
                      fence_pwd = get_secret(os.environ['FENCE_SECRET'])
                      create_db_user(cur,
                                   config['fence'].get('dbName', 'fence'),
                                   config['fence'].get('dbUser', 'fence_user'),
                                   fence_pwd)
                      created_dbs.append('fence')

                  if config.get('indexd', {}).get('enabled', False):
                      indexd_pwd = get_secret(os.environ['INDEXD_SECRET'])
                      create_db_user(cur,
                                   config['indexd'].get('dbName', 'indexd'),
                                   config['indexd'].get('dbUser', 'indexd_user'),
                                   indexd_pwd)
                      created_dbs.append('indexd')

                  if config.get('sheepdog', {}).get('enabled', False):
                      sheepdog_pwd = get_secret(os.environ['SHEEPDOG_SECRET'])
                      create_db_user(cur,
                                   config['sheepdog'].get('dbName', 'sheepdog'),
                                   config['sheepdog'].get('dbUser', 'sheepdog'),
                                   sheepdog_pwd)
                      created_dbs.append('sheepdog')

                  if config.get('arborist', {}).get('enabled', False):
                      arborist_pwd = get_secret(os.environ['ARBORIST_SECRET'])
                      create_db_user(cur,
                                   config['arborist'].get('dbName', 'arborist'),
                                   config['arborist'].get('dbUser', 'arborist_user'),
                                   arborist_pwd)
                      created_dbs.append('arborist')

                  cur.close()
                  conn.close()

                  return {
                      'statusCode': 200,
                      'body': json.dumps({
                          'message': 'Databases initialized successfully',
                          'databases': created_dbs
                      })
                  }
          tags:
            - key: Name
              value: ${schema.spec.name}-initdb-lambda
            - key: Environment
              value: ${schema.spec.environment}
            - key: ManagedBy
              value: Kro
            - key: Project
              value: ${schema.spec.project}
