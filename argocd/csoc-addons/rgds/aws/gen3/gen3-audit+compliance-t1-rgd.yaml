apiVersion: kro.run/v1alpha1
kind: ResourceGraphDefinition
metadata:
  name: auditcompliance
spec:
  schema:
    apiVersion: v1alpha1
    kind: AuditCompliance

    spec:
      # Basic metadata
      name: string | required=true
      namespace: string | default="default"
      region: string | default="us-east-1"
      environment: string | default="dev"
      project: string | default="gen3-commons"

      # KMS Key for encryption
      kmsKeyARN: string | required=true

      # Logging Bucket Configuration
      loggingBucketName: string | required=true
      loggingBucketARN: string

      # CloudWatch Logs Configuration
      enableCloudWatchLogs: boolean | default=true
      vpcFlowLogsRetentionDays: integer | default=30
      auditLogsRetentionDays: integer | default=90
      applicationLogsRetentionDays: integer | default=7

      # VPC Flow Logs Configuration
      enableVPCFlowLogs: boolean | default=true
      vpcID: string
      vpcFlowLogsTrafficType: string | default="ALL"  # ALL, ACCEPT, or REJECT

      # CloudTrail Configuration
      enableCloudTrail: boolean | default=true
      cloudTrailName: string | default=""
      includeGlobalServiceEvents: boolean | default=true
      isMultiRegionTrail: boolean | default=true
      enableLogFileValidation: boolean | default=true

      # SNS Topic for Alerts (optional)
      enableSNSAlerts: boolean | default=false
      snsTopicName: string | default=""
      snsEmailEndpoint: string | default=""

      # Config Rules (optional)
      enableAWSConfig: boolean | default=false
      configBucketName: string | default=""

      # CloudWatch Alarms Configuration
      enableCloudWatchAlarms: boolean | default=true
      albARN: string | default=""
      auroraClusterIdentifier: string | default=""
      elasticacheClusterID: string | default=""

      # Alarm Thresholds
      albUnhealthyHostThreshold: integer | default=1
      albHighLatencyThresholdMs: integer | default=1000
      auroraHighCPUThreshold: integer | default=80
      auroraDatabaseConnectionsThreshold: integer | default=100
      elasticacheCPUThreshold: integer | default=75
      elasticacheMemoryThreshold: integer | default=90

      # Resource management
      adoptionPolicy: string | default="adopt-or-create"
      deletionPolicy: string | default="delete"

    status:
      # CloudWatch Log Groups
      vpcFlowLogGroupARN: ${vpcFlowLogGroup.status.?ackResourceMetadata.arn.orValue('')}
      auditLogGroupARN: ${auditLogGroup.status.?ackResourceMetadata.arn.orValue('')}
      applicationLogGroupARN: ${applicationLogGroup.status.?ackResourceMetadata.arn.orValue('')}

      # VPC Flow Logs
      vpcFlowLogID: ${vpcFlowLog.status.?flowLogID.orValue('')}

      # CloudTrail
      cloudTrailARN: ${cloudTrail.status.?ackResourceMetadata.arn.orValue('')}

      # SNS Topic
      snsTopicARN: ${snsTopic.status.?ackResourceMetadata.arn.orValue('')}

      # CloudWatch Alarms
      alarmsCreated: |
        ${
          [
            has(albUnhealthyHostAlarm.spec.alarmName) ? albUnhealthyHostAlarm.status.?alarmARN.orValue('') : '',
            has(albLatencyAlarm.spec.alarmName) ? albLatencyAlarm.status.?alarmARN.orValue('') : '',
            has(auroraCPUAlarm.spec.alarmName) ? auroraCPUAlarm.status.?alarmARN.orValue('') : '',
            has(auroraConnectionsAlarm.spec.alarmName) ? auroraConnectionsAlarm.status.?alarmARN.orValue('') : '',
            has(elasticacheCPUAlarm.spec.alarmName) ? elasticacheCPUAlarm.status.?alarmARN.orValue('') : '',
            has(elasticacheMemoryAlarm.spec.alarmName) ? elasticacheMemoryAlarm.status.?alarmARN.orValue('') : ''
          ].filter(arn, arn != '').size()
        }

      # Ready status
      ready: |
        ${
          (has(vpcFlowLogGroup.metadata.name) ? vpcFlowLogGroup.status.?ackResourceMetadata.arn.orValue('') != '' : true) &&
          (has(auditLogGroup.metadata.name) ? auditLogGroup.status.?ackResourceMetadata.arn.orValue('') != '' : true) &&
          (has(applicationLogGroup.metadata.name) ? applicationLogGroup.status.?ackResourceMetadata.arn.orValue('') != '' : true) &&
          (has(vpcFlowLog.metadata.name) ? vpcFlowLog.status.?flowLogID.orValue('') != '' : true) &&
          (has(cloudTrail.metadata.name) ? cloudTrail.status.?ackResourceMetadata.arn.orValue('') != '' : true) &&
          (has(snsTopic.metadata.name) ? snsTopic.status.?ackResourceMetadata.arn.orValue('') != '' : true) &&
          (has(albUnhealthyHostAlarm.metadata.name) ? albUnhealthyHostAlarm.status.?ackResourceMetadata.arn.orValue('') != '' : true) &&
          (has(albLatencyAlarm.metadata.name) ? albLatencyAlarm.status.?ackResourceMetadata.arn.orValue('') != '' : true) &&
          (has(auroraCPUAlarm.metadata.name) ? auroraCPUAlarm.status.?ackResourceMetadata.arn.orValue('') != '' : true) &&
          (has(auroraConnectionsAlarm.metadata.name) ? auroraConnectionsAlarm.status.?ackResourceMetadata.arn.orValue('') != '' : true) &&
          (has(elasticacheCPUAlarm.metadata.name) ? elasticacheCPUAlarm.status.?ackResourceMetadata.arn.orValue('') != '' : true) &&
          (has(elasticacheMemoryAlarm.metadata.name) ? elasticacheMemoryAlarm.status.?ackResourceMetadata.arn.orValue('') != '' : true)
        }

      message: |
        ${
          (has(vpcFlowLogGroup.metadata.name) ? vpcFlowLogGroup.status.?ackResourceMetadata.arn.orValue('Creating vpc flow log group') != 'vpc flow log group created' : ) &&
          (has(auditLogGroup.metadata.name) ? auditLogGroup.status.?ackResourceMetadata.arn.orValue('Creating audit log group') != 'audit log group created' : ) &&
          (has(applicationLogGroup.metadata.name) ? applicationLogGroup.status.?ackResourceMetadata.arn.orValue('Creating application log group') != 'application log group created' : ) &&
          (has(vpcFlowLog.metadata.name) ? vpcFlowLog.status.?flowLogID.orValue('Creating vpc flow log') != 'vpc flow log created' : ) &&
          (has(cloudTrail.metadata.name) ? cloudTrail.status.?ackResourceMetadata.arn.orValue('Creating cloudtrail') != 'cloudtrail created' : ) &&
          (has(snsTopic.metadata.name) ? snsTopic.status.?ackResourceMetadata.arn.orValue('Creating sns topic') != 'sns topic created' : ) &&
          (has(albUnhealthyHostAlarm.metadata.name) ? albUnhealthyHostAlarm.status.?ackResourceMetadata.arn.orValue('Creating alb unhealthy host alarm') != 'alb unhealthy host alarm created' : ) &&
          (has(albLatencyAlarm.metadata.name) ? albLatencyAlarm.status.?ackResourceMetadata.arn.orValue('Creating alb latency alarm') != 'alb latency alarm created' : ) &&
          (has(auroraCPUAlarm.metadata.name) ? auroraCPUAlarm.status.?ackResourceMetadata.arn.orValue('Creating aurora cpu alarm') != 'aurora cpu alarm created' : ) &&
          (has(auroraConnectionsAlarm.metadata.name) ? auroraConnectionsAlarm.status.?ackResourceMetadata.arn.orValue('Creating aurora connections alarm') != 'aurora connections alarm created' : ) &&
          (has(elasticacheCPUAlarm.metadata.name) ? elasticacheCPUAlarm.status.?ackResourceMetadata.arn.orValue('Creating elasticache cpu alarm') != 'elasticache cpu alarm created' : ) &&
          (has(elasticacheMemoryAlarm.metadata.name) ? elasticacheMemoryAlarm.status.?ackResourceMetadata.arn.orValue('Creating elasticache memory alarm') != 'elasticache memory alarm created' : )
            ? "Creating audit and compliance resources..."
            : "All audit and compliance resources ready"
        }

  resources:
    # ==================== CloudWatch Log Groups ====================

    # VPC Flow Logs Group
    - id: vpcFlowLogGroup
      includeWhen:
        - ${schema.spec.enableCloudWatchLogs}
        - ${schema.spec.enableVPCFlowLogs}
      readyWhen:
        - ${vpcFlowLogGroup.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
        - ${vpcFlowLogGroup.status.?ackResourceMetadata.arn.orValue('') != ""}
      template:
        apiVersion: cloudwatchlogs.services.k8s.aws/v1alpha1
        kind: LogGroup
        metadata:
          name: ${schema.spec.name}-vpc-flow-logs
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${schema.spec.region}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          name: /aws/vpc/${schema.spec.name}/flow-logs
          retentionDays: ${schema.spec.vpcFlowLogsRetentionDays}
          kmsKeyID: ${schema.spec.kmsKeyARN}
          tags:
            Name: /aws/vpc/${schema.spec.name}/flow-logs
            Environment: ${schema.spec.environment}
            ManagedBy: Kro
            Project: ${schema.spec.project}

    # Audit Logs Group
    - id: auditLogGroup
      includeWhen:
        - ${schema.spec.enableCloudWatchLogs}
      readyWhen:
        - ${auditLogGroup.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
        - ${auditLogGroup.status.?ackResourceMetadata.arn.orValue('') != ""}
      template:
        apiVersion: cloudwatchlogs.services.k8s.aws/v1alpha1
        kind: LogGroup
        metadata:
          name: ${schema.spec.name}-audit-logs
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${schema.spec.region}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          name: /aws/audit/${schema.spec.name}
          retentionDays: ${schema.spec.auditLogsRetentionDays}
          kmsKeyID: ${schema.spec.kmsKeyARN}
          tags:
            Name: /aws/audit/${schema.spec.name}
            Environment: ${schema.spec.environment}
            ManagedBy: Kro
            Project: ${schema.spec.project}

    # Application Logs Group
    - id: applicationLogGroup
      includeWhen:
        - ${schema.spec.enableCloudWatchLogs}
      readyWhen:
        - ${applicationLogGroup.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
        - ${applicationLogGroup.status.?ackResourceMetadata.arn.orValue('') != ""}
      template:
        apiVersion: cloudwatchlogs.services.k8s.aws/v1alpha1
        kind: LogGroup
        metadata:
          name: ${schema.spec.name}-app-logs
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${schema.spec.region}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          name: /aws/application/${schema.spec.name}
          retentionDays: ${schema.spec.applicationLogsRetentionDays}
          kmsKeyID: ${schema.spec.kmsKeyARN}
          tags:
            Name: /aws/application/${schema.spec.name}
            Environment: ${schema.spec.environment}
            ManagedBy: Kro
            Project: ${schema.spec.project}

    # ==================== VPC Flow Logs ====================

    # IAM Role for VPC Flow Logs
    - id: vpcFlowLogsRole
      includeWhen:
        - ${schema.spec.enableVPCFlowLogs}
        - ${schema.spec.vpcID != ""}
      readyWhen:
        - ${vpcFlowLogsRole.status.?ackResourceMetadata.arn.orValue('') != ''}
      template:
        apiVersion: iam.services.k8s.aws/v1alpha1
        kind: Role
        metadata:
          name: ${schema.spec.name}-vpc-flow-logs-role
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${schema.spec.region}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          name: ${schema.spec.name}-vpc-flow-logs-role
          description: IAM role for VPC Flow Logs
          assumeRolePolicyDocument: |
            {
              "Version": "2012-10-17",
              "Statement": [
                {
                  "Effect": "Allow",
                  "Principal": {
                    "Service": "vpc-flow-logs.amazonaws.com"
                  },
                  "Action": "sts:AssumeRole"
                }
              ]
            }
          inlinePolicies:
            VPCFlowLogsPolicy: |
              {
                "Version": "2012-10-17",
                "Statement": [
                  {
                    "Effect": "Allow",
                    "Action": [
                      "logs:CreateLogGroup",
                      "logs:CreateLogStream",
                      "logs:PutLogEvents",
                      "logs:DescribeLogGroups",
                      "logs:DescribeLogStreams"
                    ],
                    "Resource": "*"
                  }
                ]
              }
          tags:
            - key: Name
              value: ${schema.spec.name}-vpc-flow-logs-role
            - key: Environment
              value: ${schema.spec.environment}
            - key: ManagedBy
              value: Kro
            - key: Project
              value: ${schema.spec.project}

    # VPC Flow Log
    - id: vpcFlowLog
      includeWhen:
        - ${schema.spec.enableVPCFlowLogs}
        - ${schema.spec.vpcID != ""}
      readyWhen:
        - ${vpcFlowLog.status.?flowLogID.orValue('') != ''}
      template:
        apiVersion: ec2.services.k8s.aws/v1alpha1
        kind: FlowLog
        metadata:
          name: ${schema.spec.name}-vpc-flow-log
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${schema.spec.region}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          resourceID: ${schema.spec.vpcID}
          resourceType: VPC
          trafficType: ${schema.spec.vpcFlowLogsTrafficType}
          logDestinationType: cloud-watch-logs
          logGroupName: /aws/vpc/${schema.spec.name}/flow-logs
          deliverLogsPermissionARN: ${vpcFlowLogsRole.status.ackResourceMetadata.arn}
          tags:
            - key: Name
              value: ${schema.spec.name}-vpc-flow-log
            - key: Environment
              value: ${schema.spec.environment}
            - key: ManagedBy
              value: Kro
            - key: Project
              value: ${schema.spec.project}

    # ==================== CloudTrail ====================

    # IAM Role for CloudTrail
    - id: cloudTrailRole
      includeWhen:
        - ${schema.spec.enableCloudTrail}
      readyWhen:
        - ${cloudTrailRole.status.?ackResourceMetadata.?arn.orValue('') != ''}
      template:
        apiVersion: iam.services.k8s.aws/v1alpha1
        kind: Role
        metadata:
          name: ${schema.spec.name}-cloudtrail-role
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${schema.spec.region}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          name: ${schema.spec.name}-cloudtrail-role
          description: IAM role for CloudTrail
          assumeRolePolicyDocument: |
            {
              "Version": "2012-10-17",
              "Statement": [
                {
                  "Effect": "Allow",
                  "Principal": {
                    "Service": "cloudtrail.amazonaws.com"
                  },
                  "Action": "sts:AssumeRole"
                }
              ]
            }
          inlinePolicies:
            CloudTrailLogsPolicy: |
              {
                "Version": "2012-10-17",
                "Statement": [
                  {
                    "Effect": "Allow",
                    "Action": [
                      "logs:CreateLogGroup",
                      "logs:CreateLogStream",
                      "logs:PutLogEvents",
                      "logs:DescribeLogGroups",
                      "logs:DescribeLogStreams"
                    ],
                    "Resource": "*"
                  }
                ]
              }
          tags:
            - key: Name
              value: ${schema.spec.name}-cloudtrail-role
            - key: Environment
              value: ${schema.spec.environment}
            - key: ManagedBy
              value: Kro
            - key: Project
              value: ${schema.spec.project}

    # CloudTrail
    - id: cloudTrail
      includeWhen:
        - ${schema.spec.enableCloudTrail}
      readyWhen:
        - ${cloudTrail.status.?trailARN.orValue('') != ''}
      template:
        apiVersion: cloudtrail.services.k8s.aws/v1alpha1
        kind: Trail
        metadata:
          name: ${schema.spec.name}-trail
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${schema.spec.region}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          name: ${schema.spec.name}-trail
          s3BucketName: ${schema.spec.loggingBucketName}
          includeGlobalServiceEvents: ${schema.spec.includeGlobalServiceEvents}
          isMultiRegionTrail: ${schema.spec.isMultiRegionTrail}
          enableLogFileValidation: ${schema.spec.enableLogFileValidation}
          cloudWatchLogsLogGroupARN: ${auditLogGroup.status.ackResourceMetadata.arn}
          cloudWatchLogsRoleARN: ${cloudTrailRole.status.ackResourceMetadata.arn}
          kmsKeyID: ${schema.spec.kmsKeyARN}
          tags:
            - key: Name
              value: ${schema.spec.name}-trail
            - key: Environment
              value: ${schema.spec.environment}
            - key: ManagedBy
              value: Kro
            - key: Project
              value: ${schema.spec.project}

    # ==================== SNS Topic for Alerts ====================

    - id: snsTopic
      includeWhen:
        - ${schema.spec.enableSNSAlerts}
      readyWhen:
        - ${snsTopic.status.?topicARN.orValue('') != ''}
      template:
        apiVersion: kro.run/v1alpha1
        kind: AwsSNSTopic
        metadata:
          name: ${schema.spec.name}-alerts
          namespace: ${schema.spec.namespace}
        spec:
          name: ${schema.spec.name}-alerts
          namespace: ${schema.spec.namespace}
          region: ${schema.spec.region}
          environment: ${schema.spec.environment}
          project: ${schema.spec.project}
          topicName: ${schema.spec.name}-alerts
          displayName: ${schema.spec.name} Audit Alerts
          kmsKeyARN: ${schema.spec.kmsKeyARN}
          adoptionPolicy: ${schema.spec.adoptionPolicy}
          deletionPolicy: ${schema.spec.deletionPolicy}

    # SNS Email Subscription
    - id: snsSubscription
      includeWhen:
        - ${schema.spec.enableSNSAlerts}
        - ${schema.spec.snsEmailEndpoint != ""}
      readyWhen:
        - ${snsSubscription.status.?subscriptionARN.orValue('') != ''}
      template:
        apiVersion: kro.run/v1alpha1
        kind: AwsSNSSubscription
        metadata:
          name: ${schema.spec.name}-email-subscription
        spec:
          name: ${schema.spec.name}-email-subscription
          namespace: ${schema.spec.namespace}
          region: ${schema.spec.region}
          environment: ${schema.spec.environment}
          project: ${schema.spec.project}
          topicARN: ${snsTopic.status.topicARN}
          protocol: email
          endpoint: ${schema.spec.snsEmailEndpoint}
          adoptionPolicy: ${schema.spec.adoptionPolicy}
          deletionPolicy: ${schema.spec.deletionPolicy}

    # ==================== CLOUDWATCH ALARMS ====================

    # ALB Unhealthy Host Count Alarm
    - id: albUnhealthyHostAlarm
      includeWhen:
        - ${schema.spec.enableCloudWatchAlarms}
        - ${schema.spec.albARN != ""}
      readyWhen:
        - ${albUnhealthyHostAlarm.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
        - ${albUnhealthyHostAlarm.status.?alarmARN.orValue('') != ""}
      template:
        apiVersion: cloudwatch.services.k8s.aws/v1alpha1
        kind: MetricAlarm
        metadata:
          name: ${schema.spec.name}-alb-unhealthy-hosts
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${schema.spec.region}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          alarmName: ${schema.spec.name}-alb-unhealthy-hosts
          alarmDescription: Alert when ALB has unhealthy targets
          metricName: UnHealthyHostCount
          namespace: AWS/ApplicationELB
          statistic: Average
          period: 300  # 5 minutes
          evaluationPeriods: 2
          threshold: ${schema.spec.albUnhealthyHostThreshold}
          comparisonOperator: GreaterThanThreshold
          dimensions:
            - name: LoadBalancer
              value: ${schema.spec.albARN}
          alarmActions:
            - ${schema.spec.snsTopicARN}
          tags:
            - key: Name
              value: ${schema.spec.name}-alb-unhealthy-hosts
            - key: Environment
              value: ${schema.spec.environment}
            - key: ManagedBy
              value: Kro
            - key: Project
              value: ${schema.spec.project}

    # ALB High Latency Alarm
    - id: albLatencyAlarm
      includeWhen:
        - ${schema.spec.enableCloudWatchAlarms}
        - ${schema.spec.albARN != ""}
      readyWhen:
        - ${albLatencyAlarm.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
        - ${albLatencyAlarm.status.?alarmARN.orValue('') != ""}
      template:
        apiVersion: cloudwatch.services.k8s.aws/v1alpha1
        kind: MetricAlarm
        metadata:
          name: ${schema.spec.name}-alb-high-latency
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${schema.spec.region}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          alarmName: ${schema.spec.name}-alb-high-latency
          alarmDescription: Alert when ALB latency exceeds threshold
          metricName: TargetResponseTime
          namespace: AWS/ApplicationELB
          statistic: Average
          period: 300  # 5 minutes
          evaluationPeriods: 2
          threshold: ${schema.spec.albHighLatencyThresholdMs / 1000}  # Convert to seconds
          comparisonOperator: GreaterThanThreshold
          dimensions:
            - name: LoadBalancer
              value: ${schema.spec.albARN}
          alarmActions:
            - ${schema.spec.snsTopicARN}
          tags:
            - key: Name
              value: ${schema.spec.name}-alb-high-latency
            - key: Environment
              value: ${schema.spec.environment}
            - key: ManagedBy
              value: Kro
            - key: Project
              value: ${schema.spec.project}

    # Aurora High CPU Alarm
    - id: auroraCPUAlarm
      includeWhen:
        - ${schema.spec.enableCloudWatchAlarms}
        - ${schema.spec.auroraClusterIdentifier != ""}
      readyWhen:
        - ${auroraCPUAlarm.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
        - ${auroraCPUAlarm.status.?alarmARN.orValue('') != ""}
      template:
        apiVersion: cloudwatch.services.k8s.aws/v1alpha1
        kind: MetricAlarm
        metadata:
          name: ${schema.spec.name}-aurora-high-cpu
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${schema.spec.region}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          alarmName: ${schema.spec.name}-aurora-high-cpu
          alarmDescription: Alert when Aurora CPU utilization is high
          metricName: CPUUtilization
          namespace: AWS/RDS
          statistic: Average
          period: 300  # 5 minutes
          evaluationPeriods: 2
          threshold: ${schema.spec.auroraHighCPUThreshold}
          comparisonOperator: GreaterThanThreshold
          dimensions:
            - name: DBClusterIdentifier
              value: ${schema.spec.auroraClusterIdentifier}
          alarmActions:
            - ${schema.spec.snsTopicARN}
          tags:
            - key: Name
              value: ${schema.spec.name}-aurora-high-cpu
            - key: Environment
              value: ${schema.spec.environment}
            - key: ManagedBy
              value: Kro
            - key: Project
              value: ${schema.spec.project}

    # Aurora Database Connections Alarm
    - id: auroraConnectionsAlarm
      includeWhen:
        - ${schema.spec.enableCloudWatchAlarms}
        - ${schema.spec.auroraClusterIdentifier != ""}
      readyWhen:
        - ${auroraConnectionsAlarm.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
        - ${auroraConnectionsAlarm.status.?alarmARN.orValue('') != ""}
      template:
        apiVersion: cloudwatch.services.k8s.aws/v1alpha1
        kind: MetricAlarm
        metadata:
          name: ${schema.spec.name}-aurora-connections
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${schema.spec.region}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          alarmName: ${schema.spec.name}-aurora-connections
          alarmDescription: Alert when Aurora database connections are high
          metricName: DatabaseConnections
          namespace: AWS/RDS
          statistic: Average
          period: 300  # 5 minutes
          evaluationPeriods: 2
          threshold: ${schema.spec.auroraDatabaseConnectionsThreshold}
          comparisonOperator: GreaterThanThreshold
          dimensions:
            - name: DBClusterIdentifier
              value: ${schema.spec.auroraClusterIdentifier}
          alarmActions:
            - ${schema.spec.snsTopicARN}
          tags:
            - key: Name
              value: ${schema.spec.name}-aurora-connections
            - key: Environment
              value: ${schema.spec.environment}
            - key: ManagedBy
              value: Kro
            - key: Project
              value: ${schema.spec.project}

    # ElastiCache High CPU Alarm
    - id: elasticacheCPUAlarm
      includeWhen:
        - ${schema.spec.enableCloudWatchAlarms}
        - ${schema.spec.elasticacheClusterID != ""}
      readyWhen:
        - ${elasticacheCPUAlarm.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
        - ${elasticacheCPUAlarm.status.?alarmARN.orValue('') != ""}
      template:
        apiVersion: cloudwatch.services.k8s.aws/v1alpha1
        kind: MetricAlarm
