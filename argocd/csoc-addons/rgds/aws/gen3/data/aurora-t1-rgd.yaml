apiVersion: kro.run/v1alpha1
kind: ResourceGraphDefinition
metadata:
  name: awsaurorat1
spec:
  schema:
    apiVersion: v1alpha1
    kind: AwsAuroraT1
    spec:
      # Basic metadata
      name: string
      namespace: string | default="default"
      region: string | default="us-east-1"
      environment: string | default="dev"
      project: string | default="kro-managed"

      # Aurora Configuration
      engine: string | default="aurora-postgresql"
      engineVersion: string | default="15.4"
      masterUsername: string | default="postgres"
      masterUserPasswordSecretRef: string
      databaseName: string | default="app"

      # Network Configuration
      vpcID: string
      subnetIDs: "[]string"
      securityGroupIDs: "[]string"

      # Capacity Configuration
      instanceClass: string | default="db.r6g.large"
      instanceCount: integer | default=2

      # Encryption Configuration
      kmsKeyARN: string | default=""
      storageEncrypted: boolean | default=true

      # Backup Configuration
      backupRetentionPeriod: integer | default=7
      preferredBackupWindow: string | default="03:00-04:00"
      preferredMaintenanceWindow: string | default="sun:04:00-sun:05:00"

      # Performance & Monitoring
      enablePerformanceInsights: boolean | default=true
      performanceInsightsRetentionPeriod: integer | default=7
      enableEnhancedMonitoring: boolean | default=true
      monitoringInterval: integer | default=60
      monitoringRoleARN: string | default=""

      # Auto Upgrades
      autoMinorVersionUpgrade: boolean | default=true

      # Parameter Group
      dbClusterParameterGroupName: string | default=""
      dbParameterGroupName: string | default=""

      # Resource management
      adoptionPolicy: string | default="adopt-or-create"
      deletionPolicy: string | default="retain"

    status:
      clusterARN: "${auroraCluster.status.ackResourceMetadata.arn}"
      endpoint: "${auroraCluster.status.endpoint}"
      readerEndpoint: "${auroraCluster.status.readerEndpoint}"
      status: "${auroraCluster.status.status}"
      conditions: "${auroraCluster.status.conditions}"

  resources:
  - id: dbSubnetGroup
    readyWhen:
      - ${dbSubnetGroup.status.conditions.exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
      - ${dbSubnetGroup.status.ackResourceMetadata.arn != ""}
    template:
      apiVersion: rds.services.k8s.aws/v1alpha1
      kind: DBSubnetGroup
      metadata:
        name: ${schema.spec.name}-subnet-group
        namespace: ${schema.spec.namespace}
        annotations:
          services.k8s.aws/region: ${schema.spec.region}
          services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
          services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
      spec:
        name: ${schema.spec.name}-subnet-group
        description: Subnet group for ${schema.spec.name} Aurora cluster
        subnetIDs: ${schema.spec.subnetIDs}
        tags:
          - key: Name
            value: ${schema.spec.name}-subnet-group
          - key: Environment
            value: ${schema.spec.environment}
          - key: ManagedBy
            value: Kro
          - key: Project
            value: ${schema.spec.project}

  - id: auroraCluster
    readyWhen:
      - ${auroraCluster.status.conditions.exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
      - ${auroraCluster.status.ackResourceMetadata.arn != ""}
      - ${auroraCluster.status.status == "available"}
    template:
      apiVersion: rds.services.k8s.aws/v1alpha1
      kind: DBCluster
      metadata:
        name: ${schema.spec.name}
        namespace: ${schema.spec.namespace}
        annotations:
          services.k8s.aws/region: ${schema.spec.region}
          services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
          services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
      spec:
        dbClusterIdentifier: ${schema.spec.name}
        engine: ${schema.spec.engine}
        engineVersion: ${schema.spec.engineVersion}
        masterUsername: ${schema.spec.masterUsername}
        masterUserPassword:
          namespace: ${schema.spec.namespace}
          name: ${schema.spec.masterUserPasswordSecretRef}
          key: password
        databaseName: ${schema.spec.databaseName}
        dbSubnetGroupName: ${schema.spec.name}-subnet-group
        vpcSecurityGroupIDs: ${schema.spec.securityGroupIDs}
        kmsKeyID: ${schema.spec.kmsKeyARN}
        storageEncrypted: ${schema.spec.storageEncrypted}
        backupRetentionPeriod: ${schema.spec.backupRetentionPeriod}
        preferredBackupWindow: ${schema.spec.preferredBackupWindow}
        preferredMaintenanceWindow: ${schema.spec.preferredMaintenanceWindow}
        tags:
          - key: Name
            value: ${schema.spec.name}
          - key: Environment
            value: ${schema.spec.environment}
          - key: ManagedBy
            value: Kro
          - key: Project
            value: ${schema.spec.project}

  - id: auroraInstance
    readyWhen:
      - ${auroraInstance.status.conditions.exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
      - ${auroraInstance.status.ackResourceMetadata.arn != ""}
      - ${auroraInstance.status.dbInstanceStatus == "available"}
    template:
      apiVersion: rds.services.k8s.aws/v1alpha1
      kind: DBInstance
      metadata:
        name: ${schema.spec.name}-instance-1
        namespace: ${schema.spec.namespace}
        annotations:
          services.k8s.aws/region: ${schema.spec.region}
          services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
          services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
      spec:
        dbInstanceIdentifier: ${schema.spec.name}-instance-1
        dbInstanceClass: ${schema.spec.instanceClass}
        engine: ${schema.spec.engine}
        dbClusterIdentifier: ${schema.spec.name}
        tags:
          - key: Name
            value: ${schema.spec.name}-instance-1
          - key: Environment
            value: ${schema.spec.environment}
          - key: ManagedBy
            value: Kro
          - key: Project
            value: ${schema.spec.project}
