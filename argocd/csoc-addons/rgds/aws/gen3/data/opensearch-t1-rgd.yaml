apiVersion: kro.run/v1alpha1
kind: ResourceGraphDefinition
metadata:
  name: awsopensearcht1
spec:
  schema:
    apiVersion: v1alpha1
    kind: AwsOpensearchT1
    spec:
      # Basic metadata
      name: string
      namespace: string | default="default"
      region: string | default="us-east-1"
      environment: string | default="dev"
      project: string | default="kro-managed"

      # OpenSearch Configuration
      engineVersion: string | default="OpenSearch_2.11"

      # Network Configuration
      vpcID: string
      subnetIDs: "[]string"
      securityGroupIDs: "[]string"

      # Capacity Configuration
      instanceType: string | default="r6g.large.search"
      instanceCount: integer | default=3

      # Storage Configuration
      volumeSize: integer | default=100
      volumeType: string | default="gp3"

      # Encryption Configuration
      encryptAtRest: boolean | default=true
      kmsKeyARN: string | default=""
      nodeToNodeEncryption: boolean | default=true

      # Access Configuration
      masterUserName: string | default="admin"
      masterUserPasswordSecretRef: string

      # Advanced Security
      enableFineGrainedAccessControl: boolean | default=true
      enforceHTTPS: boolean | default=true
      tlsSecurityPolicy: string | default="Policy-Min-TLS-1-2-2019-07"

      # Domain Policy
      accessPolicies: string | default=""

      # Auto Upgrades
      autoSoftwareUpdateEnabled: boolean | default=true

      # Logging
      enableIndexSlowLogs: boolean | default=false
      enableSearchSlowLogs: boolean | default=false
      enableAuditLogs: boolean | default=true
      cloudWatchLogGroupARN: string | default=""

      # Resource management
      adoptionPolicy: string | default="adopt-or-create"
      deletionPolicy: string | default="retain"

    status:
      domainID: "${openSearchDomain.status.domainID}"
      domainARN: "${openSearchDomain.status.ackResourceMetadata.arn}"
      endpoint: "${openSearchDomain.status.endpoint}"
      domainStatus: "${openSearchDomain.status.processing}"
      conditions: "${openSearchDomain.status.conditions}"

  resources:
  - id: openSearchDomain
    readyWhen:
      - ${openSearchDomain.status.conditions.exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
      - ${openSearchDomain.status.domainID != ""}
      - ${openSearchDomain.status.processing == false}
    template:
      apiVersion: opensearchservice.services.k8s.aws/v1alpha1
      kind: Domain
      metadata:
        name: ${schema.spec.name}
        namespace: ${schema.spec.namespace}
        annotations:
          services.k8s.aws/region: ${schema.spec.region}
          services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
          services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
      spec:
        name: ${schema.spec.name}
        engineVersion: ${schema.spec.engineVersion}
        clusterConfig:
          instanceType: ${schema.spec.instanceType}
          instanceCount: ${schema.spec.instanceCount}
          dedicatedMasterEnabled: false
          zoneAwarenessEnabled: true
          zoneAwarenessConfig:
            availabilityZoneCount: 3
        ebsOptions:
          ebsEnabled: true
          volumeSize: ${schema.spec.volumeSize}
          volumeType: ${schema.spec.volumeType}
        vpcOptions:
          subnetIDs: ${schema.spec.subnetIDs}
          securityGroupIDs: ${schema.spec.securityGroupIDs}
        encryptionAtRestOptions:
          enabled: ${schema.spec.encryptAtRest}
          kmsKeyID: ${schema.spec.kmsKeyARN}
        nodeToNodeEncryptionOptions:
          enabled: ${schema.spec.nodeToNodeEncryption}
        advancedSecurityOptions:
          enabled: true
          internalUserDatabaseEnabled: true
          masterUserOptions:
            masterUserName: ${schema.spec.masterUserName}
            masterUserPassword:
              namespace: ${schema.spec.namespace}
              name: ${schema.spec.masterUserPasswordSecretRef}
              key: password
        domainEndpointOptions:
          enforceHTTPS: true
          tlsSecurityPolicy: Policy-Min-TLS-1-2-2019-07
        tags:
          - key: Name
            value: ${schema.spec.name}
          - key: Environment
            value: ${schema.spec.environment}
          - key: ManagedBy
            value: Kro
          - key: Project
            value: ${schema.spec.project}
