apiVersion: kro.run/v1alpha1
kind: ResourceGraphDefinition
metadata:
  name: awsgen3sgst1
spec:
  schema:
    apiVersion: v1alpha1
    kind: AwsGen3SgsT1

    spec:
      # Basic metadata
      name: string | required=true
      namespace: string | default="default"
      region: string | default="us-east-1"
      environment: string | default="dev"
      project: string | default="kro-managed"

      # VPC Configuration
      vpcID: string | required=true
      vpcCIDR: string | default="10.0.0.0/16"
      privateSubnetIDs: "[]string"

      # Network Layer - Endpoint Configuration
      enableS3Gateway: boolean | default=true
      enableECRApi: boolean | default=true
      enableECRDocker: boolean | default=true
      enableSTS: boolean | default=true
      enableLogs: boolean | default=true
      enableEC2: boolean | default=true
      enableECRPublic: boolean | default=true
      enableKMS: boolean | default=true
      enableSecretsManager: boolean | default=true

      # Data Layer - Enable flags for conditional deployment
      enableALB: boolean | default=true
      enableEKSCluster: boolean | default=true
      enableEKSNode: boolean | default=true
      enableAurora: boolean | default=false
      enableElastiCache: boolean | default=false
      enableOpenSearch: boolean | default=false
      enableEFS: boolean | default=false
      enableVPCEndpoints: boolean | default=true

      # Resource management
      adoptionPolicy: string | default="adopt-or-create"
      deletionPolicy: string | default="delete"

    status:
      # Security Group ID Lists (format: [emptySGID, sgID])
      # Network Layer - Gateway Endpoints
      s3GatewayEndpointSGIDs: |
        ${
          [
            s3GatewayEndpointSG.status.?emptySecurityGroupID.orValue(''),
            s3GatewayEndpointSG.status.?securityGroupID.orValue('')
          ].filter(id, id != '')
        }

      # Network Layer - Interface Endpoints
      ecrApiEndpointSGIDs: |
        ${
          [
            ecrApiEndpointSG.status.?emptySecurityGroupID.orValue(''),
            ecrApiEndpointSG.status.?securityGroupID.orValue('')
          ].filter(id, id != '')
        }
      ecrDockerEndpointSGIDs: |
        ${
          [
            ecrDockerEndpointSG.status.?emptySecurityGroupID.orValue(''),
            ecrDockerEndpointSG.status.?securityGroupID.orValue('')
          ].filter(id, id != '')
        }
      stsEndpointSGIDs: |
        ${
          [
            stsEndpointSG.status.?emptySecurityGroupID.orValue(''),
            stsEndpointSG.status.?securityGroupID.orValue('')
          ].filter(id, id != '')
        }
      logsEndpointSGIDs: |
        ${
          [
            logsEndpointSG.status.?emptySecurityGroupID.orValue(''),
            logsEndpointSG.status.?securityGroupID.orValue('')
          ].filter(id, id != '')
        }
      ec2EndpointSGIDs: |
        ${
          [
            ec2EndpointSG.status.?emptySecurityGroupID.orValue(''),
            ec2EndpointSG.status.?securityGroupID.orValue('')
          ].filter(id, id != '')
        }
      ecrPublicEndpointSGIDs: |
        ${
          [
            ecrPublicEndpointSG.status.?emptySecurityGroupID.orValue(''),
            ecrPublicEndpointSG.status.?securityGroupID.orValue('')
          ].filter(id, id != '')
        }
      kmsEndpointSGIDs: |
        ${
          [
            kmsEndpointSG.status.?emptySecurityGroupID.orValue(''),
            kmsEndpointSG.status.?securityGroupID.orValue('')
          ].filter(id, id != '')
        }
      secretsManagerEndpointSGIDs: |
        ${
          [
            secretsManagerEndpointSG.status.?emptySecurityGroupID.orValue(''),
            secretsManagerEndpointSG.status.?securityGroupID.orValue('')
          ].filter(id, id != '')
        }

      # Data Layer - ALB Security Groups
      albSGIDs: |
        ${
          [
            albSG.status.?emptySecurityGroupID.orValue(''),
            albSG.status.?securityGroupID.orValue('')
          ].filter(id, id != '')
        }

      # Data Layer - EKS Cluster Security Groups
      eksClusterSGIDs: |
        ${
          [
            eksClusterSG.status.?emptySecurityGroupID.orValue(''),
            eksClusterSG.status.?securityGroupID.orValue('')
          ].filter(id, id != '')
        }

      # Data Layer - EKS Node Security Groups
      eksNodeSGIDs: |
        ${
          [
            eksNodeSG.status.?emptySecurityGroupID.orValue(''),
            eksNodeSG.status.?securityGroupID.orValue('')
          ].filter(id, id != '')
        }

      # Data Layer - Aurora Security Groups
      auroraSGIDs: |
        ${
          [
            auroraSG.status.?emptySecurityGroupID.orValue(''),
            auroraSG.status.?securityGroupID.orValue('')
          ].filter(id, id != '')
        }

      # Data Layer - ElastiCache Security Groups
      elastiCacheSGIDs: |
        ${
          [
            elastiCacheSG.status.?emptySecurityGroupID.orValue(''),
            elastiCacheSG.status.?securityGroupID.orValue('')
          ].filter(id, id != '')
        }

      # Data Layer - OpenSearch Security Groups
      openSearchSGIDs: |
        ${
          [
            openSearchSG.status.?emptySecurityGroupID.orValue(''),
            openSearchSG.status.?securityGroupID.orValue('')
          ].filter(id, id != '')
        }

      # Data Layer - EFS Security Groups
      efsSGIDs: |
        ${
          [
            efsSG.status.?emptySecurityGroupID.orValue(''),
            efsSG.status.?securityGroupID.orValue('')
          ].filter(id, id != '')
        }

      # Data Layer - VPC Endpoints Security Groups
      vpcEndpointsSGIDs: |
        ${
          [
            vpcEndpointsSG.status.?emptySecurityGroupID.orValue(''),
            vpcEndpointsSG.status.?securityGroupID.orValue('')
          ].filter(id, id != '')
        }

      ready: |
        ${
          (has(s3GatewayEndpointSG.spec.name) ? s3GatewayEndpointSG.status.?ready.orValue(false) : true) &&
          (has(ecrApiEndpointSG.spec.name) ? ecrApiEndpointSG.status.?ready.orValue(false) : true) &&
          (has(ecrDockerEndpointSG.spec.name) ? ecrDockerEndpointSG.status.?ready.orValue(false) : true) &&
          (has(stsEndpointSG.spec.name) ? stsEndpointSG.status.?ready.orValue(false) : true) &&
          (has(logsEndpointSG.spec.name) ? logsEndpointSG.status.?ready.orValue(false) : true) &&
          (has(ec2EndpointSG.spec.name) ? ec2EndpointSG.status.?ready.orValue(false) : true) &&
          (has(ecrPublicEndpointSG.spec.name) ? ecrPublicEndpointSG.status.?ready.orValue(false) : true) &&
          (has(kmsEndpointSG.spec.name) ? kmsEndpointSG.status.?ready.orValue(false) : true) &&
          (has(secretsManagerEndpointSG.spec.name) ? secretsManagerEndpointSG.status.?ready.orValue(false) : true) &&
          (has(albSG.spec.name) ? albSG.status.?ready.orValue(false) : true) &&
          (has(eksClusterSG.spec.name) ? eksClusterSG.status.?ready.orValue(false) : true) &&
          (has(eksNodeSG.spec.name) ? eksNodeSG.status.?ready.orValue(false) : true) &&
          (has(auroraSG.spec.name) ? auroraSG.status.?ready.orValue(false) : true) &&
          (has(elastiCacheSG.spec.name) ? elastiCacheSG.status.?ready.orValue(false) : true) &&
          (has(openSearchSG.spec.name) ? openSearchSG.status.?ready.orValue(false) : true) &&
          (has(efsSG.spec.name) ? efsSG.status.?ready.orValue(false) : true) &&
          (has(vpcEndpointsSG.spec.name) ? vpcEndpointsSG.status.?ready.orValue(false) : true)
        }

  resources:
    # ==================== S3 Gateway Endpoint ====================
    - id: s3GatewayEndpointSG
      includeWhen:
        - ${schema.spec.enableS3Gateway}
      readyWhen:
        - ${s3GatewayEndpointSG.status.?ready.orValue(false)}
      template:
        apiVersion: kro.run/v1alpha1
        kind: AwsSgVpcEndpointsT1
        metadata:
          name: ${schema.spec.name}-s3-gateway-endpoint-sg
          namespace: ${schema.spec.namespace}
        spec:
          name: ${schema.spec.name}-s3-gateway-endpoint-sg
          namespace: ${schema.spec.namespace}
          region: ${schema.spec.region}
          environment: ${schema.spec.environment}
          project: ${schema.spec.project}
          vpcID: ${schema.spec.vpcID}
          vpcCIDR: ${schema.spec.vpcCIDR}
          adoptionPolicy: ${schema.spec.adoptionPolicy}
          deletionPolicy: ${schema.spec.deletionPolicy}
    # ==================== ECR API Interface Endpoint ====================
    - id: ecrApiEndpointSG
      includeWhen:
        - ${schema.spec.enableECRApi}
      readyWhen:
        - ${ecrApiEndpointSG.status.?ready.orValue(false)}
      template:
        apiVersion: kro.run/v1alpha1
        kind: AwsSgVpcEndpointsT1
        metadata:
          name: ${schema.spec.name}-ecr-api-endpoint-sg
          namespace: ${schema.spec.namespace}
        spec:
          name: ${schema.spec.name}-ecr-api-endpoint-sg
          namespace: ${schema.spec.namespace}
          region: ${schema.spec.region}
          environment: ${schema.spec.environment}
          project: ${schema.spec.project}
          vpcID: ${schema.spec.vpcID}
          vpcCIDR: ${schema.spec.vpcCIDR}
          adoptionPolicy: ${schema.spec.adoptionPolicy}
          deletionPolicy: ${schema.spec.deletionPolicy}
    # ==================== ECR Docker Interface Endpoint ====================
    - id: ecrDockerEndpointSG
      includeWhen:
        - ${schema.spec.enableECRDocker}
      readyWhen:
        - ${ecrDockerEndpointSG.status.?ready.orValue(false)}
      template:
        apiVersion: kro.run/v1alpha1
        kind: AwsSgVpcEndpointsT1
        metadata:
          name: ${schema.spec.name}-ecr-docker-endpoint-sg
          namespace: ${schema.spec.namespace}
        spec:
          name: ${schema.spec.name}-ecr-docker-endpoint-sg
          namespace: ${schema.spec.namespace}
          region: ${schema.spec.region}
          environment: ${schema.spec.environment}
          project: ${schema.spec.project}
          vpcID: ${schema.spec.vpcID}
          vpcCIDR: ${schema.spec.vpcCIDR}
          adoptionPolicy: ${schema.spec.adoptionPolicy}
          deletionPolicy: ${schema.spec.deletionPolicy}
    # ==================== STS Interface Endpoint ====================
    - id: stsEndpointSG
      includeWhen:
        - ${schema.spec.enableSTS}
      readyWhen:
        - ${stsEndpointSG.status.?ready.orValue(false)}
      template:
        apiVersion: kro.run/v1alpha1
        kind: AwsSgVpcEndpointsT1
        metadata:
          name: ${schema.spec.name}-sts-endpoint-sg
          namespace: ${schema.spec.namespace}
        spec:
          name: ${schema.spec.name}-sts-endpoint-sg
          namespace: ${schema.spec.namespace}
          region: ${schema.spec.region}
          environment: ${schema.spec.environment}
          project: ${schema.spec.project}
          vpcID: ${schema.spec.vpcID}
          vpcCIDR: ${schema.spec.vpcCIDR}
          adoptionPolicy: ${schema.spec.adoptionPolicy}
          deletionPolicy: ${schema.spec.deletionPolicy}
    # ==================== CloudWatch Logs Interface Endpoint ====================
    - id: logsEndpointSG
      includeWhen:
        - ${schema.spec.enableLogs}
      readyWhen:
        - ${logsEndpointSG.status.?ready.orValue(false)}
      template:
        apiVersion: kro.run/v1alpha1
        kind: AwsSgVpcEndpointsT1
        metadata:
          name: ${schema.spec.name}-logs-endpoint-sg
          namespace: ${schema.spec.namespace}
        spec:
          name: ${schema.spec.name}-logs-endpoint-sg
          namespace: ${schema.spec.namespace}
          region: ${schema.spec.region}
          environment: ${schema.spec.environment}
          project: ${schema.spec.project}
          vpcID: ${schema.spec.vpcID}
          vpcCIDR: ${schema.spec.vpcCIDR}
          adoptionPolicy: ${schema.spec.adoptionPolicy}
          deletionPolicy: ${schema.spec.deletionPolicy}
    # ==================== EC2 Interface Endpoint ====================
    - id: ec2EndpointSG
      includeWhen:
        - ${schema.spec.enableEC2}
      readyWhen:
        - ${ec2EndpointSG.status.?ready.orValue(false)}
      template:
        apiVersion: kro.run/v1alpha1
        kind: AwsSgVpcEndpointsT1
        metadata:
          name: ${schema.spec.name}-ec2-endpoint-sg
          namespace: ${schema.spec.namespace}
        spec:
          name: ${schema.spec.name}-ec2-endpoint-sg
          namespace: ${schema.spec.namespace}
          region: ${schema.spec.region}
          environment: ${schema.spec.environment}
          project: ${schema.spec.project}
          vpcID: ${schema.spec.vpcID}
          vpcCIDR: ${schema.spec.vpcCIDR}
          adoptionPolicy: ${schema.spec.adoptionPolicy}
          deletionPolicy: ${schema.spec.deletionPolicy}
    # ==================== ECR Public Interface Endpoint ====================
    - id: ecrPublicEndpointSG
      includeWhen:
        - ${schema.spec.enableECRPublic}
      readyWhen:
        - ${ecrPublicEndpointSG.status.?ready.orValue(false)}
      template:
        apiVersion: kro.run/v1alpha1
        kind: AwsSgVpcEndpointsT1
        metadata:
          name: ${schema.spec.name}-ecr-public-endpoint-sg
          namespace: ${schema.spec.namespace}
        spec:
          name: ${schema.spec.name}-ecr-public-endpoint-sg
          namespace: ${schema.spec.namespace}
          region: ${schema.spec.region}
          environment: ${schema.spec.environment}
          project: ${schema.spec.project}
          vpcID: ${schema.spec.vpcID}
          vpcCIDR: ${schema.spec.vpcCIDR}
          adoptionPolicy: ${schema.spec.adoptionPolicy}
          deletionPolicy: ${schema.spec.deletionPolicy}
    # ==================== KMS Interface Endpoint ====================
    - id: kmsEndpointSG
      includeWhen:
        - ${schema.spec.enableKMS}
      readyWhen:
        - ${kmsEndpointSG.status.?ready.orValue(false)}
      template:
        apiVersion: kro.run/v1alpha1
        kind: AwsSgVpcEndpointsT1
        metadata:
          name: ${schema.spec.name}-kms-endpoint-sg
          namespace: ${schema.spec.namespace}
        spec:
          name: ${schema.spec.name}-kms-endpoint-sg
          namespace: ${schema.spec.namespace}
          region: ${schema.spec.region}
          environment: ${schema.spec.environment}
          project: ${schema.spec.project}
          vpcID: ${schema.spec.vpcID}
          vpcCIDR: ${schema.spec.vpcCIDR}
          adoptionPolicy: ${schema.spec.adoptionPolicy}
          deletionPolicy: ${schema.spec.deletionPolicy}
    # ==================== Secrets Manager Interface Endpoint ====================
    - id: secretsManagerEndpointSG
      includeWhen:
        - ${schema.spec.enableSecretsManager}
      readyWhen:
        - ${secretsManagerEndpointSG.status.?ready.orValue(false)}
      template:
        apiVersion: kro.run/v1alpha1
        kind: AwsSgVpcEndpointsT1
        metadata:
          name: ${schema.spec.name}-secretsmanager-endpoint-sg
          namespace: ${schema.spec.namespace}
        spec:
          name: ${schema.spec.name}-secretsmanager-endpoint-sg
          namespace: ${schema.spec.namespace}
          region: ${schema.spec.region}
          environment: ${schema.spec.environment}
          project: ${schema.spec.project}
          vpcID: ${schema.spec.vpcID}
          vpcCIDR: ${schema.spec.vpcCIDR}
          adoptionPolicy: ${schema.spec.adoptionPolicy}
          deletionPolicy: ${schema.spec.deletionPolicy}

    # ==================== DATA LAYER SECURITY GROUPS ====================

    # ==================== ALB Security Groups ====================
    - id: albSG
      includeWhen:
        - ${schema.spec.enableALB}
      readyWhen:
        - ${albSG.status.?ready.orValue(false)}
      template:
        apiVersion: kro.run/v1alpha1
        kind: AwsSgAlbT1
        metadata:
          name: ${schema.spec.name}-alb
          namespace: ${schema.spec.namespace}
        spec:
          name: ${schema.spec.name}-alb
          namespace: ${schema.spec.namespace}
          region: ${schema.spec.region}
          environment: ${schema.spec.environment}
          project: ${schema.spec.project}
          vpcID: ${schema.spec.vpcID}
          adoptionPolicy: ${schema.spec.adoptionPolicy}
          deletionPolicy: ${schema.spec.deletionPolicy}

    # ==================== EKS Cluster Security Groups ====================
    - id: eksClusterSG
      includeWhen:
        - ${schema.spec.enableEKSCluster}
      readyWhen:
        - ${eksClusterSG.status.?ready.orValue(false)}
      template:
        apiVersion: kro.run/v1alpha1
        kind: AwsSgEksClusterT1
        metadata:
          name: ${schema.spec.name}-eks-cluster
          namespace: ${schema.spec.namespace}
        spec:
          name: ${schema.spec.name}-eks-cluster
          namespace: ${schema.spec.namespace}
          region: ${schema.spec.region}
          environment: ${schema.spec.environment}
          project: ${schema.spec.project}
          vpcID: ${schema.spec.vpcID}
          nodeSecurityGroupID: ${eksNodeSG.status.?emptySecurityGroupID.orValue('')}
          adoptionPolicy: ${schema.spec.adoptionPolicy}
          deletionPolicy: ${schema.spec.deletionPolicy}

    # ==================== EKS Node Security Groups ====================
    - id: eksNodeSG
      includeWhen:
        - ${schema.spec.enableEKSNode}
      readyWhen:
        - ${eksNodeSG.status.?ready.orValue(false)}
      template:
        apiVersion: kro.run/v1alpha1
        kind: AwsSgEksNodeT1
        metadata:
          name: ${schema.spec.name}-eks-node
          namespace: ${schema.spec.namespace}
        spec:
          name: ${schema.spec.name}-eks-node
          namespace: ${schema.spec.namespace}
          region: ${schema.spec.region}
          environment: ${schema.spec.environment}
          project: ${schema.spec.project}
          vpcID: ${schema.spec.vpcID}
          clusterSecurityGroupID: ${eksClusterSG.status.?emptySecurityGroupID.orValue('')}
          albSecurityGroupID: ${albSG.status.?emptySecurityGroupID.orValue('')}
          adoptionPolicy: ${schema.spec.adoptionPolicy}
          deletionPolicy: ${schema.spec.deletionPolicy}

    # ==================== Aurora Security Groups ====================
    - id: auroraSG
      includeWhen:
        - ${schema.spec.enableAurora}
      readyWhen:
        - ${auroraSG.status.?ready.orValue(false)}
      template:
        apiVersion: kro.run/v1alpha1
        kind: AwsSgAuroraT1
        metadata:
          name: ${schema.spec.name}-aurora
          namespace: ${schema.spec.namespace}
        spec:
          name: ${schema.spec.name}-aurora
          namespace: ${schema.spec.namespace}
          region: ${schema.spec.region}
          environment: ${schema.spec.environment}
          project: ${schema.spec.project}
          vpcID: ${schema.spec.vpcID}
          eksNodeSecurityGroupID: ${eksNodeSG.status.?emptySecurityGroupID.orValue('')}
          port: 5432
          adoptionPolicy: ${schema.spec.adoptionPolicy}
          deletionPolicy: ${schema.spec.deletionPolicy}

    # ==================== ElastiCache Security Groups ====================
    - id: elastiCacheSG
      includeWhen:
        - ${schema.spec.enableElastiCache}
      readyWhen:
        - ${elastiCacheSG.status.?ready.orValue(false)}
      template:
        apiVersion: kro.run/v1alpha1
        kind: AwsSgElasticacheT1
        metadata:
          name: ${schema.spec.name}-elasticache
          namespace: ${schema.spec.namespace}
        spec:
          name: ${schema.spec.name}-elasticache
          namespace: ${schema.spec.namespace}
          region: ${schema.spec.region}
          environment: ${schema.spec.environment}
          project: ${schema.spec.project}
          vpcID: ${schema.spec.vpcID}
          eksNodeSecurityGroupID: ${eksNodeSG.status.?emptySecurityGroupID.orValue('')}
          port: 6379
          adoptionPolicy: ${schema.spec.adoptionPolicy}
          deletionPolicy: ${schema.spec.deletionPolicy}

    # ==================== OpenSearch Security Groups ====================
    - id: openSearchSG
      includeWhen:
        - ${schema.spec.enableOpenSearch}
      readyWhen:
        - ${openSearchSG.status.?ready.orValue(false)}
      template:
        apiVersion: kro.run/v1alpha1
        kind: AwsSgOpensearchT1
        metadata:
          name: ${schema.spec.name}-opensearch
          namespace: ${schema.spec.namespace}
        spec:
          name: ${schema.spec.name}-opensearch
          namespace: ${schema.spec.namespace}
          region: ${schema.spec.region}
          environment: ${schema.spec.environment}
          project: ${schema.spec.project}
          vpcID: ${schema.spec.vpcID}
          eksNodeSecurityGroupID: ${eksNodeSG.status.?emptySecurityGroupID.orValue('')}
          port: 443
          adoptionPolicy: ${schema.spec.adoptionPolicy}
          deletionPolicy: ${schema.spec.deletionPolicy}

    # ==================== EFS Security Groups ====================
    - id: efsSG
      includeWhen:
        - ${schema.spec.enableEFS}
      readyWhen:
        - ${efsSG.status.?ready.orValue(false)}
      template:
        apiVersion: kro.run/v1alpha1
        kind: AwsSgEfsT1
        metadata:
          name: ${schema.spec.name}-efs
          namespace: ${schema.spec.namespace}
        spec:
          name: ${schema.spec.name}-efs
          namespace: ${schema.spec.namespace}
          region: ${schema.spec.region}
          environment: ${schema.spec.environment}
          project: ${schema.spec.project}
          vpcID: ${schema.spec.vpcID}
          eksNodeSecurityGroupID: ${eksNodeSG.status.?emptySecurityGroupID.orValue('')}
          port: 2049
          adoptionPolicy: ${schema.spec.adoptionPolicy}
          deletionPolicy: ${schema.spec.deletionPolicy}

    # ==================== VPC Endpoints Security Groups ====================
    - id: vpcEndpointsSG
      includeWhen:
        - ${schema.spec.enableVPCEndpoints}
      readyWhen:
        - ${vpcEndpointsSG.status.?ready.orValue(false)}
      template:
        apiVersion: kro.run/v1alpha1
        kind: AwsSgVpcEndpointsT1
        metadata:
          name: ${schema.spec.name}-vpc-endpoints
          namespace: ${schema.spec.namespace}
        spec:
          name: ${schema.spec.name}-vpc-endpoints
          namespace: ${schema.spec.namespace}
          region: ${schema.spec.region}
          environment: ${schema.spec.environment}
          project: ${schema.spec.project}
          vpcID: ${schema.spec.vpcID}
          vpcCIDR: ${schema.spec.vpcCIDR}
          adoptionPolicy: ${schema.spec.adoptionPolicy}
          deletionPolicy: ${schema.spec.deletionPolicy}
