apiVersion: kro.run/v1alpha1
kind: ResourceGraphDefinition
metadata:
  name: awssgeksclustert1
spec:
  schema:
    apiVersion: v1alpha1
    kind: AwsSgEksClusterT1
    spec:
      name: string
      namespace: string | default="default"
      region: string | default="us-east-1"
      environment: string | default="dev"
      project: string | default="kro-managed"
      vpcID: string
      nodeSecurityGroupID: string
      adoptionPolicy: string | default="adopt-or-create"
      deletionPolicy: string | default="delete"
    status:
      securityGroupID: "${eksClusterSG.status.?id.orValue('')}"
      emptySecurityGroupID: "${eksClusterEmptySG.status.?id.orValue('')}"
      conditions: "${eksClusterSG.status.?conditions.orValue([])}"
      ready: "${eksClusterSG.status.?id.orValue('') != '' && eksClusterEmptySG.status.?id.orValue('') != ''}"
  resources:
  - id: eksClusterEmptySG
    readyWhen:
      - ${eksClusterEmptySG.status.conditions.exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
      - ${eksClusterEmptySG.status.id != ""}
    template:
      apiVersion: ec2.services.k8s.aws/v1alpha1
      kind: SecurityGroup
      metadata:
        name: ${schema.spec.name}-eks-cluster-empty-sg
        namespace: ${schema.spec.namespace}
        annotations:
          services.k8s.aws/region: ${schema.spec.region}
          services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
          services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
      spec:
        name: ${schema.spec.name}-eks-cluster-empty-sg
        description: Empty security group for EKS cluster control plane (no rules)
        vpcID: ${schema.spec.vpcID}
        tags:
          - key: Name
            value: ${schema.spec.name}-eks-cluster-empty-sg
          - key: Environment
            value: ${schema.spec.environment}
          - key: ManagedBy
            value: Kro
          - key: Project
            value: ${schema.spec.project}
          - key: Purpose
            value: EKS-ControlPlane-Empty
  - id: eksClusterSG
    readyWhen:
      - ${eksClusterSG.status.conditions.exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
      - ${eksClusterSG.status.id != ""}
    template:
      apiVersion: ec2.services.k8s.aws/v1alpha1
      kind: SecurityGroup
      metadata:
        name: ${schema.spec.name}-eks-cluster-sg
        namespace: ${schema.spec.namespace}
        annotations:
          services.k8s.aws/region: ${schema.spec.region}
          services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
          services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
      spec:
        name: ${schema.spec.name}-eks-cluster-sg
        description: Security group for EKS cluster control plane
        vpcID: ${schema.spec.vpcID}
        ingressRules:
          - ipProtocol: tcp
            fromPort: 443
            toPort: 443
            userIDGroupPairs:
              - groupID: ${schema.spec.nodeSecurityGroupID}
                description: Allow nodes to communicate with API server
        egressRules:
          - ipProtocol: "-1"
            ipRanges:
              - cidrIP: 0.0.0.0/0
                description: Allow all outbound
        tags:
          - key: Name
            value: ${schema.spec.name}-eks-cluster-sg
          - key: Environment
            value: ${schema.spec.environment}
          - key: ManagedBy
            value: Kro
          - key: Project
            value: ${schema.spec.project}
          - key: Purpose
            value: EKS-ControlPlane
