apiVersion: kro.run/v1alpha1
kind: ResourceGraphDefinition
metadata:
  name: awssgelasticachet1
spec:
  schema:
    apiVersion: v1alpha1
    kind: AwsSgElasticacheT1
    spec:
      name: string
      namespace: string | default="default"
      region: string | default="us-east-1"
      environment: string | default="dev"
      project: string | default="kro-managed"
      vpcID: string
      eksNodeSecurityGroupID: string
      port: integer | default=6379
      adoptionPolicy: string | default="adopt-or-create"
      deletionPolicy: string | default="retain"
    status:
      securityGroupID: "${elasticacheSG.status.?id.orValue('')}"
      emptySecurityGroupID: "${elasticacheEmptySG.status.?id.orValue('')}"
      conditions: "${elasticacheSG.status.?conditions.orValue([])}"
      ready: "${elasticacheSG.status.?id.orValue('') != '' && elasticacheEmptySG.status.?id.orValue('') != ''}"
  resources:
  - id: elasticacheEmptySG
    readyWhen:
      - ${elasticacheEmptySG.status.conditions.exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
      - ${elasticacheEmptySG.status.id != ""}
    template:
      apiVersion: ec2.services.k8s.aws/v1alpha1
      kind: SecurityGroup
      metadata:
        name: ${schema.spec.name}-elasticache-empty-sg
        namespace: ${schema.spec.namespace}
        annotations:
          services.k8s.aws/region: ${schema.spec.region}
          services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
          services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
      spec:
        name: ${schema.spec.name}-elasticache-empty-sg
        description: Empty security group for ElastiCache Redis (no rules)
        vpcID: ${schema.spec.vpcID}
        tags:
          - key: Name
            value: ${schema.spec.name}-elasticache-empty-sg
          - key: Environment
            value: ${schema.spec.environment}
          - key: ManagedBy
            value: Kro
          - key: Project
            value: ${schema.spec.project}
          - key: Purpose
            value: ElastiCache-Empty
  - id: elasticacheSG
    readyWhen:
      - ${elasticacheSG.status.conditions.exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
      - ${elasticacheSG.status.id != ""}
    template:
      apiVersion: ec2.services.k8s.aws/v1alpha1
      kind: SecurityGroup
      metadata:
        name: ${schema.spec.name}-elasticache-sg
        namespace: ${schema.spec.namespace}
        annotations:
          services.k8s.aws/region: ${schema.spec.region}
          services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
          services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
      spec:
        name: ${schema.spec.name}-elasticache-sg
        description: Security group for ElastiCache Redis cluster
        vpcID: ${schema.spec.vpcID}
        ingressRules:
          - ipProtocol: tcp
            fromPort: ${schema.spec.port}
            toPort: ${schema.spec.port}
            userIDGroupPairs:
              - groupID: ${schema.spec.eksNodeSecurityGroupID}
                description: Redis from EKS nodes
        egressRules:
          - ipProtocol: "-1"
            ipRanges:
              - cidrIP: 0.0.0.0/0
                description: Allow all outbound
        tags:
          - key: Name
            value: ${schema.spec.name}-elasticache-sg
          - key: Environment
            value: ${schema.spec.environment}
          - key: ManagedBy
            value: Kro
          - key: Project
            value: ${schema.spec.project}
          - key: Purpose
            value: ElastiCache-Redis
