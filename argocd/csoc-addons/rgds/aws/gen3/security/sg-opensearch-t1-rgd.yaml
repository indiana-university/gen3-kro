apiVersion: kro.run/v1alpha1
kind: ResourceGraphDefinition
metadata:
  name: awssgopensearcht1
spec:
  schema:
    apiVersion: v1alpha1
    kind: AwsSgOpensearchT1
    spec:
      name: string
      namespace: string | default="default"
      region: string | default="us-east-1"
      environment: string | default="dev"
      project: string | default="kro-managed"
      vpcID: string
      eksNodeSecurityGroupID: string
      port: integer | default=443
      adoptionPolicy: string | default="adopt-or-create"
      deletionPolicy: string | default="retain"
    status:
      securityGroupID: "${opensearchSG.status.?id.orValue('')}"
      emptySecurityGroupID: "${opensearchEmptySG.status.?id.orValue('')}"
      conditions: "${opensearchSG.status.?conditions.orValue([])}"
      ready: "${opensearchSG.status.?id.orValue('') != '' && opensearchEmptySG.status.?id.orValue('') != ''}"
  resources:
  - id: opensearchEmptySG
    readyWhen:
      - ${opensearchEmptySG.status.conditions.exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
      - ${opensearchEmptySG.status.id != ""}
    template:
      apiVersion: ec2.services.k8s.aws/v1alpha1
      kind: SecurityGroup
      metadata:
        name: ${schema.spec.name}-opensearch-empty-sg
        namespace: ${schema.spec.namespace}
        annotations:
          services.k8s.aws/region: ${schema.spec.region}
          services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
          services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
      spec:
        name: ${schema.spec.name}-opensearch-empty-sg
        description: Empty security group for OpenSearch (no rules)
        vpcID: ${schema.spec.vpcID}
        tags:
          - key: Name
            value: ${schema.spec.name}-opensearch-empty-sg
          - key: Environment
            value: ${schema.spec.environment}
          - key: ManagedBy
            value: Kro
          - key: Project
            value: ${schema.spec.project}
          - key: Purpose
            value: OpenSearch-Empty
  - id: opensearchSG
    readyWhen:
      - ${opensearchSG.status.conditions.exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
      - ${opensearchSG.status.id != ""}
    template:
      apiVersion: ec2.services.k8s.aws/v1alpha1
      kind: SecurityGroup
      metadata:
        name: ${schema.spec.name}-opensearch-sg
        namespace: ${schema.spec.namespace}
        annotations:
          services.k8s.aws/region: ${schema.spec.region}
          services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
          services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
      spec:
        name: ${schema.spec.name}-opensearch-sg
        description: Security group for OpenSearch domain
        vpcID: ${schema.spec.vpcID}
        ingressRules:
          - ipProtocol: tcp
            fromPort: ${schema.spec.port}
            toPort: ${schema.spec.port}
            userIDGroupPairs:
              - groupID: ${schema.spec.eksNodeSecurityGroupID}
                description: HTTPS from EKS nodes
        egressRules:
          - ipProtocol: "-1"
            ipRanges:
              - cidrIP: 0.0.0.0/0
                description: Allow all outbound
        tags:
          - key: Name
            value: ${schema.spec.name}-opensearch-sg
          - key: Environment
            value: ${schema.spec.environment}
          - key: ManagedBy
            value: Kro
          - key: Project
            value: ${schema.spec.project}
          - key: Purpose
            value: OpenSearch
