apiVersion: kro.run/v1alpha1
kind: ResourceGraphDefinition
metadata:
  name: awssgflexiblet1
spec:
  schema:
    apiVersion: v1alpha1
    kind: AwsSgFlexibleT1

    types:
      IngressRule:
        ipProtocol: string | required=true
        fromPort: integer
        toPort: integer
        cidrIP: string
        description: string

      EgressRule:
        ipProtocol: string | required=true
        fromPort: integer
        toPort: integer
        cidrIP: string
        description: string

      Tag:
        key: string | required=true
        value: string

    spec:
      # Required fields
      name: string | required=true
      description: string | required=true

      # Optional metadata
      namespace: string | default="default"
      region: string | default="us-east-1"
      environment: string | default="dev"
      project: string | default="kro-managed"

      # VPC Configuration
      vpcID: string

      # Conditional ingress and egress rules
      ingressRules: "[]IngressRule"
      egressRules: "[]EgressRule"

      # Conditional tags
      additionalTags: "map[string]string"

      # Resource management
      adoptionPolicy: string | default="adopt-or-create"
      deletionPolicy: string | default="delete"

    status:
      securityGroupID: "${securityGroup.status.?id.orValue('')}"
      conditions: "${securityGroup.status.?conditions.orValue([])}"
      ready: "${securityGroup.status.?id.orValue('') != ''}"

  resources:
    - id: securityGroup
      readyWhen:
        - ${securityGroup.status.conditions.exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
        - ${securityGroup.status.id != ""}
      template:
        apiVersion: ec2.services.k8s.aws/v1alpha1
        kind: SecurityGroup
        metadata:
          name: ${schema.spec.name}
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${schema.spec.region}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          name: ${schema.spec.name}
          description: ${schema.spec.description}
          vpcID: ${schema.spec.vpcID}
          ingressRules: |-
            ${
              schema.spec.ingressRules.size() > 0 ? [
                schema.spec.ingressRules.map(rule, {
                  "ipProtocol": rule.ipProtocol,
                  "fromPort": rule.fromPort,
                  "toPort": rule.toPort,
                  "ipRanges": rule.cidrIP != '' ? [
                    {
                      "cidrIP": rule.cidrIP,
                      "description": rule.description
                    }
                  ] : []
                })
              ].flatten() : []
            }
          egressRules: |-
            ${
              schema.spec.egressRules.size() > 0 ? [
                schema.spec.egressRules.map(rule, {
                  "ipProtocol": rule.ipProtocol,
                  "fromPort": rule.fromPort,
                  "toPort": rule.toPort,
                  "ipRanges": rule.cidrIP != '' ? [
                    {
                      "cidrIP": rule.cidrIP,
                      "description": rule.description
                    }
                  ] : []
                })
              ].flatten() : [
                {
                  "ipProtocol": "-1",
                  "ipRanges": [
                    {
                      "cidrIP": "0.0.0.0/0",
                      "description": "Allow all outbound"
                    }
                  ]
                }
              ]
            }
          tags: |-
            ${
              [
                {
                  "key": "Name",
                  "value": schema.spec.name
                },
                {
                  "key": "Environment",
                  "value": schema.spec.environment
                },
                {
                  "key": "ManagedBy",
                  "value": "Kro"
                },
                {
                  "key": "Project",
                  "value": schema.spec.project
                }
              ].concat(
                schema.spec.additionalTags.size() > 0 ? 
                schema.spec.additionalTags.map(k, {"key": k, "value": schema.spec.additionalTags[k]}) : 
                []
              )
            }
