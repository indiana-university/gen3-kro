apiVersion: kro.run/v1alpha1
kind: ResourceGraphDefinition
metadata:
  name: awssgvpcendpointst1
spec:
  schema:
    apiVersion: v1alpha1
    kind: AwsSgVpcEndpointsT1
    spec:
      name: string
      namespace: string | default="default"
      region: string | default="us-east-1"
      environment: string | default="dev"
      project: string | default="kro-managed"
      vpcID: string
      vpcCIDR: string | default="10.0.0.0/16"
      adoptionPolicy: string | default="adopt-or-create"
      deletionPolicy: string | default="delete"
    status:
      securityGroupID: "${vpcEndpointsSG.status.?id.orValue('')}"
      emptySecurityGroupID: "${vpcEndpointsEmptySG.status.?id.orValue('')}"
      conditions: "${vpcEndpointsSG.status.?conditions.orValue([])}"
      ready: "${vpcEndpointsSG.status.?id.orValue('') != '' && vpcEndpointsEmptySG.status.?id.orValue('') != ''}"
  resources:
  - id: vpcEndpointsEmptySG
    readyWhen:
      - ${vpcEndpointsEmptySG.status.conditions.exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
      - ${vpcEndpointsEmptySG.status.id != ""}
    template:
      apiVersion: ec2.services.k8s.aws/v1alpha1
      kind: SecurityGroup
      metadata:
        name: ${schema.spec.name}-vpc-endpoints-empty-sg
        namespace: ${schema.spec.namespace}
        annotations:
          services.k8s.aws/region: ${schema.spec.region}
          services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
          services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
      spec:
        name: ${schema.spec.name}-vpc-endpoints-empty-sg
        description: Empty security group for VPC interface endpoints (no rules)
        vpcID: ${schema.spec.vpcID}
        tags:
          - key: Name
            value: ${schema.spec.name}-vpc-endpoints-empty-sg
          - key: Environment
            value: ${schema.spec.environment}
          - key: ManagedBy
            value: Kro
          - key: Project
            value: ${schema.spec.project}
          - key: Purpose
            value: VPC-Endpoints-Empty
  - id: vpcEndpointsSG
    readyWhen:
      - ${vpcEndpointsSG.status.conditions.exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
      - ${vpcEndpointsSG.status.id != ""}
    template:
      apiVersion: ec2.services.k8s.aws/v1alpha1
      kind: SecurityGroup
      metadata:
        name: ${schema.spec.name}-vpc-endpoints-sg
        namespace: ${schema.spec.namespace}
        annotations:
          services.k8s.aws/region: ${schema.spec.region}
          services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
          services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
      spec:
        name: ${schema.spec.name}-vpc-endpoints-sg
        description: Security group for VPC interface endpoints
        vpcID: ${schema.spec.vpcID}
        ingressRules:
          - ipProtocol: tcp
            fromPort: 443
            toPort: 443
            ipRanges:
              - cidrIP: ${schema.spec.vpcCIDR}
                description: HTTPS from VPC
        egressRules:
          - ipProtocol: "-1"
            ipRanges:
              - cidrIP: 0.0.0.0/0
                description: Allow all outbound
        tags:
          - key: Name
            value: ${schema.spec.name}-vpc-endpoints-sg
          - key: Environment
            value: ${schema.spec.environment}
          - key: ManagedBy
            value: Kro
          - key: Project
            value: ${schema.spec.project}
          - key: Purpose
            value: VPC-Endpoints
