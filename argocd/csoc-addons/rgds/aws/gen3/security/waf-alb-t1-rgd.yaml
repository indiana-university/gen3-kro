apiVersion: kro.run/v1alpha1
kind: ResourceGraphDefinition
metadata:
  name: awswafalbt1
spec:
  schema:
    apiVersion: v1alpha1
    kind: AwsWafAlbT1

    spec:
      # Basic metadata
      name: string
      namespace: string | default="default"
      region: string | default="us-east-1"
      environment: string | default="dev"
      project: string | default="kro-managed"

      # ALB ARN to protect
      albARN: string | required=true

      # WAF Configuration
      enableRateLimit: boolean | default=true
      rateLimitRequests: integer | default=2000  # Requests per 5 minutes
      enableGeoBlocking: boolean | default=false
      blockedCountries: "[]string | default=[]"  # ISO 3166-1 alpha-2 codes
      enableSQLInjectionProtection: boolean | default=true
      enableXSSProtection: boolean | default=true
      enableSizeConstraints: boolean | default=true
      maxBodySizeKB: integer | default=8  # KB

      # Resource management
      adoptionPolicy: string | default="adopt-or-create"
      deletionPolicy: string | default="delete"

    status:
      webACLARN: "${webACL.status.ackResourceMetadata.arn}"
      webACLID: "${webACL.status.id}"

      ready: |
        ${
          webACL.status.id != '' &&
          webACL.status.ackResourceMetadata.arn != ''
        }

  resources:
    # ==================== WAF Web ACL ====================
    - id: webACL
      readyWhen:
        - ${webACL.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
        - ${webACL.status.?id.orValue('') != ""}
      template:
        apiVersion: wafv2.services.k8s.aws/v1alpha1
        kind: WebACL
        metadata:
          name: ${schema.spec.name}-alb-waf
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${schema.spec.region}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          name: ${schema.spec.name}-alb-waf
          description: WAF for Application Load Balancer DDoS protection
          scope: REGIONAL
          defaultAction:
            allow: {}
          rules:
            # Rate limiting rule
            - name: RateLimitRule
              priority: 1
              statement:
                rateBasedStatement:
                  limit: ${schema.spec.rateLimitRequests}
                  aggregateKeyType: IP
              action:
                block:
                  customResponse:
                    responseCode: 429
              visibilityConfig:
                sampledRequestsEnabled: true
                cloudWatchMetricsEnabled: true
                metricName: ${schema.spec.name}-rate-limit

            # AWS Managed Rules - Core Rule Set
            - name: AWSManagedRulesCommonRuleSet
              priority: 2
              overrideAction:
                none: {}
              statement:
                managedRuleGroupStatement:
                  vendorName: AWS
                  name: AWSManagedRulesCommonRuleSet
              visibilityConfig:
                sampledRequestsEnabled: true
                cloudWatchMetricsEnabled: true
                metricName: ${schema.spec.name}-aws-common-rules

            # AWS Managed Rules - Known Bad Inputs
            - name: AWSManagedRulesKnownBadInputsRuleSet
              priority: 3
              overrideAction:
                none: {}
              statement:
                managedRuleGroupStatement:
                  vendorName: AWS
                  name: AWSManagedRulesKnownBadInputsRuleSet
              visibilityConfig:
                sampledRequestsEnabled: true
                cloudWatchMetricsEnabled: true
                metricName: ${schema.spec.name}-bad-inputs

            # SQL Injection Protection
            - name: SQLInjectionProtection
              priority: 4
              statement:
                managedRuleGroupStatement:
                  vendorName: AWS
                  name: AWSManagedRulesSQLiRuleSet
              overrideAction:
                none: {}
              visibilityConfig:
                sampledRequestsEnabled: true
                cloudWatchMetricsEnabled: true
                metricName: ${schema.spec.name}-sqli-protection

          visibilityConfig:
            sampledRequestsEnabled: true
            cloudWatchMetricsEnabled: true
            metricName: ${schema.spec.name}-waf
          tags:
            - key: Name
              value: ${schema.spec.name}-alb-waf
            - key: Environment
              value: ${schema.spec.environment}
            - key: ManagedBy
              value: Kro
            - key: Project
              value: ${schema.spec.project}
            - key: Purpose
              value: ALB-DDoS-Protection
