apiVersion: kro.run/v1alpha1
kind: ResourceGraphDefinition
metadata:
  name: awssgalbt1
spec:
  schema:
    apiVersion: v1alpha1
    kind: AwsSgAlbT1
    spec:
      name: string
      namespace: string | default="default"
      region: string | default="us-east-1"
      environment: string | default="dev"
      project: string | default="kro-managed"
      vpcID: string
      allowedCIDRs: "[]string | default=[\"0.0.0.0/0\"]"
      adoptionPolicy: string | default="adopt-or-create"
      deletionPolicy: string | default="delete"
    status:
      securityGroupID: "${albSG.status.?id.orValue('')}"
      emptySecurityGroupID: "${albEmptySG.status.?id.orValue('')}"
      conditions: "${albSG.status.?conditions.orValue([])}"
      ready: "${albSG.status.?id.orValue('') != '' && albEmptySG.status.?id.orValue('') != ''}"
  resources:
  - id: albEmptySG
    readyWhen:
      - ${albEmptySG.status.conditions.exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
      - ${albEmptySG.status.id != ""}
    template:
      apiVersion: ec2.services.k8s.aws/v1alpha1
      kind: SecurityGroup
      metadata:
        name: ${schema.spec.name}-alb-empty-sg
        namespace: ${schema.spec.namespace}
        annotations:
          services.k8s.aws/region: ${schema.spec.region}
          services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
          services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
      spec:
        name: ${schema.spec.name}-alb-empty-sg
        description: Empty security group for ALB (no rules)
        vpcID: ${schema.spec.vpcID}
        tags:
          - key: Name
            value: ${schema.spec.name}-alb-empty-sg
          - key: Environment
            value: ${schema.spec.environment}
          - key: ManagedBy
            value: Kro
          - key: Project
            value: ${schema.spec.project}
          - key: Purpose
            value: ALB-Empty
  - id: albSG
    readyWhen:
      - ${albSG.status.conditions.exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
      - ${albSG.status.id != ""}
    template:
      apiVersion: ec2.services.k8s.aws/v1alpha1
      kind: SecurityGroup
      metadata:
        name: ${schema.spec.name}-alb-sg
        namespace: ${schema.spec.namespace}
        annotations:
          services.k8s.aws/region: ${schema.spec.region}
          services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
          services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
      spec:
        name: ${schema.spec.name}-alb-sg
        description: Security group for Application Load Balancer
        vpcID: ${schema.spec.vpcID}
        ingressRules:
          - ipProtocol: tcp
            fromPort: 80
            toPort: 80
            ipRanges:
              - cidrIP: 0.0.0.0/0
                description: Allow HTTP from Internet
          - ipProtocol: tcp
            fromPort: 443
            toPort: 443
            ipRanges:
              - cidrIP: 0.0.0.0/0
                description: Allow HTTPS from Internet
        egressRules:
          - ipProtocol: "-1"
            ipRanges:
              - cidrIP: 0.0.0.0/0
                description: Allow all outbound
        tags:
          - key: Name
            value: ${schema.spec.name}-alb-sg
          - key: Environment
            value: ${schema.spec.environment}
          - key: ManagedBy
            value: Kro
          - key: Project
            value: ${schema.spec.project}
          - key: Purpose
            value: ALB
