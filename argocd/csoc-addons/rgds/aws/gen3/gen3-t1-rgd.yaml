apiVersion: kro.run/v1alpha1
kind: ResourceGraphDefinition
metadata:
  name: awsgen3t1
spec:
  schema:
    apiVersion: v1alpha1
    kind: AwsGen3T1
    spec:
      # Basic metadata
      name: string | required=true
      namespace: string | default="default"
      region: string | default="us-east-1"
      environment: string | default="dev"
      project: string | default="kro-managed"

      # ==================== Network Configuration ====================
      # VPC Configuration
      vpcCIDR: string | required=true

      # Subnet CIDRs
      publicSubnetCIDRs: "[]string | required=true"
      privateSubnetCIDRs: "[]string | required=true"
      dbSubnetCIDRs: "[]string | required=true"

      # Availability Zones
      availabilityZones: "[]string | required=true"

      # NAT Gateway configuration
      natGatewayCount: integer | default=3 minimum=1 maximum=3

      # ==================== Security Configuration ====================
      # KMS Configuration
      kmsKeyDescription: string | default="Gen3 encryption key"
      kmsKeyAlias: string | default="gen3-key"

      # ==================== Data Configuration ====================
      # Aurora Configuration
      enableAurora: boolean | default=false
      auroraEngine: string | default="aurora-postgresql"
      auroraEngineVersion: string | default="15.4"
      auroraMasterUsername: string | default="postgres"
      auroraMasterUserPasswordSecretRef: string
      auroraDatabaseName: string | default="app"
      auroraInstanceClass: string | default="db.r6g.large"
      auroraInstanceCount: integer | default=2

      # EKS Configuration
      enableEKS: boolean | default=false
      eksVersion: string | default="1.28"
      eksNodeInstanceTypes: "[]string | default=[\"t3.large\"]"
      eksNodeDesiredSize: integer | default=3
      eksNodeMinSize: integer | default=2
      eksNodeMaxSize: integer | default=6

      # ElastiCache Configuration
      enableElastiCache: boolean | default=false
      elastiCacheEngine: string | default="redis"
      elastiCacheEngineVersion: string | default="7.0"
      elastiCacheNodeType: string | default="cache.t3.micro"
      elastiCacheNumCacheNodes: integer | default=2

      # OpenSearch Configuration
      enableOpenSearch: boolean | default=false
      openSearchVersion: string | default="2.11"
      openSearchInstanceType: string | default="t3.small.search"
      openSearchInstanceCount: integer | default=3

      # EFS Configuration
      enableEFS: boolean | default=false
      efsPerformanceMode: string | default="generalPurpose"
      efsThroughputMode: string | default="bursting"

      # S3 Configuration
      enableS3: boolean | default=false
      s3BucketNames: "[]string | default=[]"

      # ==================== Resource Management ====================
      adoptionPolicy: string | default="adopt-or-create"
      deletionPolicy: string | default="delete"

      # Tags
      additionalTags: "map[string]string"

    status:
      # Network Status
      vpcID: "${network.status.?vpcID.orValue('')}"
      publicSubnetIDs: "${network.status.?publicSubnetIDs.orValue([])}"
      privateSubnetIDs: "${network.status.?privateSubnetIDs.orValue([])}"
      dbSubnetIDs: "${network.status.?dbSubnetIDs.orValue([])}"
      publicRouteTableID: "${network.status.?publicRouteTableID.orValue('')}"
      privateRouteTableIDs: "${network.status.?privateRouteTableIDs.orValue([])}"
      dbRouteTableID: "${network.status.?dbRouteTableID.orValue('')}"
      natGatewayIDs: "${network.status.?natGatewayIDs.orValue([])}"
      elasticIPAllocationIDs: "${network.status.?elasticIPAllocationIDs.orValue([])}"

      # Security Status
      kmsKeyID: "${security.status.?kmsKeyID.orValue('')}"
      kmsKeyARN: "${security.status.?kmsKeyARN.orValue('')}"

      # Data Status
      auroraClusterARN: "${data.status.?auroraClusterARN.orValue('')}"
      auroraEndpoint: "${data.status.?auroraEndpoint.orValue('')}"
      eksClusterARN: "${data.status.?eksClusterARN.orValue('')}"
      eksEndpoint: "${data.status.?eksEndpoint.orValue('')}"
      elastiCacheClusterARN: "${data.status.?elastiCacheClusterARN.orValue('')}"
      openSearchDomainARN: "${data.status.?openSearchDomainARN.orValue('')}"
      efsFileSystemID: "${data.status.?efsFileSystemID.orValue('')}"
      s3BucketARNs: "${data.status.?s3BucketARNs.orValue([])}"

      # Overall Ready Status
      ready: |-
        ${
          network.status.?ready.orValue(false) &&
          security.status.?ready.orValue(false) &&
          data.status.?ready.orValue(false)
        }

  resources:
    # ==================== Network Infrastructure ====================
    - id: network
      readyWhen:
        - ${network.status.?ready.orValue(false)}
      template:
        apiVersion: kro.run/v1alpha1
        kind: AwsNetworkT1
        metadata:
          name: ${schema.spec.name}-network
          namespace: ${schema.spec.namespace}
        spec:
          name: ${schema.spec.name}
          namespace: ${schema.spec.namespace}
          region: ${schema.spec.region}
          environment: ${schema.spec.environment}
          project: ${schema.spec.project}
          vpcCIDR: ${schema.spec.vpcCIDR}
          publicSubnetCIDRs: ${schema.spec.publicSubnetCIDRs}
          privateSubnetCIDRs: ${schema.spec.privateSubnetCIDRs}
          dbSubnetCIDRs: ${schema.spec.dbSubnetCIDRs}
          availabilityZones: ${schema.spec.availabilityZones}
          natGatewayCount: ${schema.spec.natGatewayCount}
          adoptionPolicy: ${schema.spec.adoptionPolicy}
          deletionPolicy: ${schema.spec.deletionPolicy}

    # ==================== Security Infrastructure ====================
    - id: security
      readyWhen:
        - ${security.status.?ready.orValue(false)}
      template:
        apiVersion: kro.run/v1alpha1
        kind: AwsSecurityT1
        metadata:
          name: ${schema.spec.name}-security
          namespace: ${schema.spec.namespace}
        spec:
          name: ${schema.spec.name}
          namespace: ${schema.spec.namespace}
          region: ${schema.spec.region}
          environment: ${schema.spec.environment}
          project: ${schema.spec.project}
          kmsKeyDescription: ${schema.spec.kmsKeyDescription}
          kmsKeyAlias: ${schema.spec.kmsKeyAlias}
          adoptionPolicy: ${schema.spec.adoptionPolicy}
          deletionPolicy: ${schema.spec.deletionPolicy}

    # ==================== Data Infrastructure ====================
    - id: data
      readyWhen:
        - ${data.status.?ready.orValue(false)}
      template:
        apiVersion: kro.run/v1alpha1
        kind: AwsDataT1
        metadata:
          name: ${schema.spec.name}-data
          namespace: ${schema.spec.namespace}
        spec:
          name: ${schema.spec.name}
          namespace: ${schema.spec.namespace}
          region: ${schema.spec.region}
          environment: ${schema.spec.environment}
          project: ${schema.spec.project}
          vpcID: ${network.status.vpcID}
          subnetIDs: ${network.status.privateSubnetIDs}
          dbSubnetIDs: ${network.status.dbSubnetIDs}
          securityGroupIDs: []
          kmsKeyARN: ${security.status.kmsKeyARN}
          enableAurora: ${schema.spec.enableAurora}
          auroraEngine: ${schema.spec.auroraEngine}
          auroraEngineVersion: ${schema.spec.auroraEngineVersion}
          auroraMasterUsername: ${schema.spec.auroraMasterUsername}
          auroraMasterUserPasswordSecretRef: ${schema.spec.auroraMasterUserPasswordSecretRef}
          auroraDatabaseName: ${schema.spec.auroraDatabaseName}
          auroraInstanceClass: ${schema.spec.auroraInstanceClass}
          auroraInstanceCount: ${schema.spec.auroraInstanceCount}
          enableEKS: ${schema.spec.enableEKS}
          eksVersion: ${schema.spec.eksVersion}
          eksNodeInstanceTypes: ${schema.spec.eksNodeInstanceTypes}
          eksNodeDesiredSize: ${schema.spec.eksNodeDesiredSize}
          eksNodeMinSize: ${schema.spec.eksNodeMinSize}
          eksNodeMaxSize: ${schema.spec.eksNodeMaxSize}
          enableElastiCache: ${schema.spec.enableElastiCache}
          elastiCacheEngine: ${schema.spec.elastiCacheEngine}
          elastiCacheEngineVersion: ${schema.spec.elastiCacheEngineVersion}
          elastiCacheNodeType: ${schema.spec.elastiCacheNodeType}
          elastiCacheNumCacheNodes: ${schema.spec.elastiCacheNumCacheNodes}
          enableOpenSearch: ${schema.spec.enableOpenSearch}
          openSearchVersion: ${schema.spec.openSearchVersion}
          openSearchInstanceType: ${schema.spec.openSearchInstanceType}
          openSearchInstanceCount: ${schema.spec.openSearchInstanceCount}
          enableEFS: ${schema.spec.enableEFS}
          efsPerformanceMode: ${schema.spec.efsPerformanceMode}
          efsThroughputMode: ${schema.spec.efsThroughputMode}
          enableS3: ${schema.spec.enableS3}
          s3BucketNames: ${schema.spec.s3BucketNames}
          adoptionPolicy: ${schema.spec.adoptionPolicy}
          deletionPolicy: ${schema.spec.deletionPolicy}
