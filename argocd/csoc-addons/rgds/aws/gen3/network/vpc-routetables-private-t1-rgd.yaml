apiVersion: kro.run/v1alpha1
kind: ResourceGraphDefinition
metadata:
  name: awsprivateroutetablest1
spec:
  schema:
    apiVersion: v1alpha1
    kind: AwsPrivateRouteTablesT1

    types:
      Route:
        destinationCIDRBlock: string
        gatewayID: string
        natGatewayID: string

    spec:
      # Basic metadata
      name: "[]string"
      namespace: string | default="default"
      region: string | default="us-east-1"
      environment: string | default="dev"
      project: string | default="kro-managed"

      # VPC Configuration
      vpcID: string | required=true
      natGatewayIDs: map[string]string

      # Resource management
      adoptionPolicy: string | default="adopt-or-create"
      deletionPolicy: string | default="delete"

    status:
      # List outputs for reusability
      routeTableIDs: |
        ${
          [
            routeTable1.status.routeTableID,
            routeTable2.status.routeTableID,
            routeTable3.status.?routeTableID.orValue('')
          ].filter(id, id != '')
        }

      ready: |
        ${
          routeTable1.status.routeTableID != '' &&
          routeTable2.status.routeTableID != ''
        }

  resources:
    # ==================== Route Table 1 (Required) ====================
    - id: routeTable1
      readyWhen:
        - ${routeTable1.status.conditions.exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
        - ${routeTable1.status.routeTableID != ""}
      template:
        apiVersion: ec2.services.k8s.aws/v1alpha1
        kind: RouteTable
        metadata:
          name: ${schema.spec.name[0]}
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${schema.spec.region}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          vpcID: ${schema.spec.vpcID}
          routes: |-
            ${
              schema.spec.natGatewayIDs["0"] != '' ? [
                {
                "destinationCIDRBlock": "0.0.0.0/0",
                "natGatewayID": schema.spec.natGatewayIDs["0"]
                }
              ] : []
            }
          tags:
            - key: Name
              value: ${schema.spec.name[0]}
            - key: Environment
              value: ${schema.spec.environment}
            - key: ManagedBy
              value: Kro
            - key: Project
              value: ${schema.spec.project}

    # ==================== Route Table 2 (Required) ====================
    - id: routeTable2
      readyWhen:
        - ${routeTable2.status.conditions.exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
        - ${routeTable2.status.routeTableID != ""}
      template:
        apiVersion: ec2.services.k8s.aws/v1alpha1
        kind: RouteTable
        metadata:
          name: ${schema.spec.name[1]}
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${schema.spec.region}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          vpcID: ${schema.spec.vpcID}
          routes: |-
            ${
              schema.spec.natGatewayIDs["1"] != '' ? [
                {"destinationCIDRBlock": "0.0.0.0/0", "natGatewayID": schema.spec.natGatewayIDs["1"]}
              ] : (schema.spec.natGatewayIDs["0"] != '' ? [
                {"destinationCIDRBlock": "0.0.0.0/0", "natGatewayID": schema.spec.natGatewayIDs["0"]}
              ] : [])
            }
          tags:
            - key: Name
              value: ${schema.spec.name[1]}
            - key: Environment
              value: ${schema.spec.environment}
            - key: ManagedBy
              value: Kro
            - key: Project
              value: ${schema.spec.project}

    # ==================== Route Table 3 (Optional) ====================
    - id: routeTable3
      includeWhen:
        - ${schema.spec.name.size() > 2}
      readyWhen:
        - ${routeTable3.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
        - ${routeTable3.status.?routeTableID.orValue('') != ""}
      template:
        apiVersion: ec2.services.k8s.aws/v1alpha1
        kind: RouteTable
        metadata:
          name: ${schema.spec.name[2]}
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${schema.spec.region}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          vpcID: ${schema.spec.vpcID}
          routes: |-
            ${
              schema.spec.natGatewayIDs["2"] != '' ? [
                {"destinationCIDRBlock": "0.0.0.0/0", "natGatewayID": schema.spec.natGatewayIDs["2"]}
              ] : (schema.spec.natGatewayIDs["0"] != '' ? [
                {"destinationCIDRBlock": "0.0.0.0/0", "natGatewayID": schema.spec.natGatewayIDs["0"]}
              ] : [])
            }
          tags:
            - key: Name
              value: ${schema.spec.name[2]}
            - key: Environment
              value: ${schema.spec.environment}
            - key: ManagedBy
              value: Kro
            - key: Project
              value: ${schema.spec.project}
