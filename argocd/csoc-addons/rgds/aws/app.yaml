# ============================================================================
# COMPLETE Gen3 AWS Test Configuration with Aurora RDS
# ============================================================================

# -----------------------------------------------------------------------------
# Global Configuration
# -----------------------------------------------------------------------------
global:
  # -- Environment name used in secret naming
  environment: "test"

  # -- Your Gen3 hostname
  hostname: "test.yourdomain.com"

  # -- Set to false for production-like Aurora setup
  dev: false

  # -- AWS Configuration
  aws:
    enabled: true
    region: "us-east-1"
    awsAccessKeyId: ""  # Leave empty if using IRSA
    awsSecretAccessKey: ""  # Leave empty if using IRSA

    # -- (Optional) Use IRSA for service account authentication
    secretStoreServiceAccount:
      enabled: true
      name: "gen3-secret-store-sa"

  # -- PostgreSQL/Aurora Configuration
  postgres:
    dbCreate: true
    externalSecret: "test-postgres-master"  # Secret name in AWS Secrets Manager
    master:
      host: "test-aurora-cluster.cluster-xxxxx.us-east-1.rds.amazonaws.com"
      username: "postgres"
      password: ""  # Will be pulled from AWS Secrets Manager
      port: "5432"

  # -- External Secrets Configuration
  externalSecrets:
    deploy: true
    createLocalK8sSecret: false  # Don't create local K8s secrets
    pushSecret: true  # Push generated DB creds to Secrets Manager
    clusterSecretStoreRef: "gen3-secret-store"
    separateSecretStore: false  # Use cluster-wide secret store

# -----------------------------------------------------------------------------
# Services Requiring Databases
# -----------------------------------------------------------------------------

# Fence - Authentication & Authorization Service
fence:
  enabled: true
  postgres:
    dbCreate: true
  externalSecrets:
    pushSecret: true
    dbcreds: "test-fence-creds"
  FENCE_CONFIG:
    # Add your fence configuration here
    OPENID_CONNECT:
      google:
        client_id: "your-google-client-id"
        client_secret: "your-google-client-secret"

# Arborist - Policy Engine
arborist:
  enabled: true
  postgres:
    dbCreate: true
  externalSecrets:
    pushSecret: true
    dbcreds: "test-arborist-creds"

# Audit - Audit Logging Service
audit:
  enabled: true
  postgres:
    dbCreate: true
  externalSecrets:
    pushSecret: true
    dbcreds: "test-audit-creds"
    createK8sAuditSecret: false

# Indexd - GUID/Index Service
indexd:
  enabled: true
  postgres:
    dbCreate: true
  externalSecrets:
    pushSecret: true
    dbcreds: "test-indexd-creds"
    createK8sServiceCredsSecret: false
  defaultPrefix: "dg.TEST/"
  secrets:
    userdb:
      fence: ""  # Will be auto-generated
      sheepdog: ""  # Will be auto-generated

# Sheepdog - Data Submission Service
sheepdog:
  enabled: true
  postgres:
    dbCreate: true
  externalSecrets:
    pushSecret: true
    dbcreds: "test-sheepdog-creds"

# Peregrine - GraphQL Query Service
peregrine:
  enabled: true
  postgres:
    dbCreate: true
  externalSecrets:
    pushSecret: true
    dbcreds: "test-peregrine-creds"

# WTS - Workspace Token Service
wts:
  enabled: true
  postgres:
    dbCreate: true
  externalSecrets:
    pushSecret: true
    dbcreds: "test-wts-creds"
    createWtsOidcClientSecret: true
    createK8sWtsSecret: false

# Requestor - Access Request Service
requestor:
  enabled: true
  postgres:
    dbCreate: true
  externalSecrets:
    pushSecret: true
    dbcreds: "test-requestor-creds"

# Metadata - Metadata Service
metadata:
  enabled: true
  postgres:
    dbCreate: true
  externalSecrets:
    pushSecret: true
    dbcreds: "test-metadata-creds"

# Gen3 User Data Library
gen3-user-data-library:
  enabled: false  # Enable if needed
  postgres:
    dbCreate: true
  externalSecrets:
    pushSecret: true
    dbcreds: "test-gen3-user-data-library-creds"

# Access Backend - Access Management
access-backend:
  enabled: false  # Enable if needed
  postgres:
    dbCreate: true
  externalSecrets:
    pushSecret: true
    dbcreds: "test-access-backend-creds"

# -----------------------------------------------------------------------------
# Services NOT Requiring Databases (but commonly enabled)
# -----------------------------------------------------------------------------

# Ambassador - API Gateway
ambassador:
  enabled: true

# RevProxy - Reverse Proxy
revproxy:
  enabled: true

# Portal - Web UI
portal:
  enabled: true
  image:
    repository: quay.io/cdis/data-portal-prebuilt
    tag: "master"

# Guppy - ElasticSearch Query Service
guppy:
  enabled: false  # Enable if you have ElasticSearch

# Hatchery - Workspace Launcher
hatchery:
  enabled: false  # Enable if you want workspaces

# Manifestservice - Manifest Management
manifestservice:
  enabled: false  # Enable if needed

# Sower - Job Dispatcher
sower:
  enabled: false  # Enable if needed

# -----------------------------------------------------------------------------
# Optional: Aurora Database Copy Job (for cloning databases)
# -----------------------------------------------------------------------------
auroraRdsCopyJob:
  enabled: false  # Set to true if you want to test database cloning
  auroraMasterSecret: "test-postgres-master"
  sourceNamespace: "test"
  targetNamespace: "test-clone"
  writeToK8sSecret: true
  writeToAwsSecret: true
  services:
    - serviceName: fence
      sourceSecret: fence-dbcreds
      targetSecret: fence-dbcreds
    - serviceName: indexd
      sourceSecret: indexd-dbcreds
      targetSecret: indexd-dbcreds

# -----------------------------------------------------------------------------
# Bundled Services (disabled for Aurora/production setup)
# -----------------------------------------------------------------------------

# PostgreSQL - Bundled postgres (disabled when using Aurora)
postgresql:
  enabled: false

# Elasticsearch - Bundled ES (consider using AWS OpenSearch instead)
elasticsearch:
  enabled: false  # Set to true only for testing
