apiVersion: kro.run/v1alpha1
kind: ResourceGraphDefinition
metadata:
  name: awsdatat1
spec:
  schema:
    apiVersion: v1alpha1
    kind: AwsDataT1
    spec:
      # Basic metadata
      name: string | required=true
      namespace: string | default="default"
      region: string | default="us-east-1"
      environment: string | default="dev"
      project: string | default="kro-managed"

      # Network Configuration (provided by parent graph or external resources)
      vpcID: string | required=true
      subnetIDs: "[]string | required=true"
      dbSubnetIDs: "[]string | required=true"
      securityGroupIDs: "[]string"

      # KMS Encryption (provided by parent graph or external resources)
      kmsKeyARN: string

      # Aurora Configuration
      auroraEngine: string | default="aurora-postgresql"
      auroraEngineVersion: string | default="15.4"
      auroraMasterUsername: string | default="postgres"
      auroraMasterUserPasswordSecretRef: string
      auroraDatabaseName: string | default="app"
      auroraInstanceClass: string | default="db.r6g.large"
      auroraInstanceCount: integer | default=2

      # EFS Configuration
      efsPerformanceMode: string | default="generalPurpose"
      efsThroughputMode: string | default="bursting"

      # S3 Configuration
      loggingBucketName: string
      dataBucketName: string
      uploadBucketName: string

      # Resource management
      adoptionPolicy: string | default="adopt-or-create"
      deletionPolicy: string | default="delete"

    status:
      auroraClusterARN: "${aurora.status.?clusterARN.orValue('')}"
      auroraEndpoint: "${aurora.status.?endpoint.orValue('')}"
      efsFileSystemID: "${efs.status.?fileSystemID.orValue('')}"
      loggingBucketARN: "${s3Storage.status.?loggingBucketARN.orValue('')}"
      dataBucketARN: "${s3Storage.status.?dataBucketARN.orValue('')}"
      uploadBucketARN: "${s3Storage.status.?uploadBucketARN.orValue('')}"
      ready: |-
        ${
          aurora.status.?clusterARN.orValue('') != '' &&
          efs.status.?fileSystemID.orValue('') != '' &&
          (s3Storage.status.?loggingBucketARN.orValue('') != '' || s3Storage.status.?dataBucketARN.orValue('') != '' || s3Storage.status.?uploadBucketARN.orValue('') != '')
        }

  resources:
    # ==================== Aurora ====================
    - id: aurora
      readyWhen:
        - ${aurora.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
      template:
        apiVersion: kro.run/v1alpha1
        kind: AwsAuroraT1
        metadata:
          name: ${schema.spec.name}-aurora
          namespace: ${schema.spec.namespace}
        spec:
          name: ${schema.spec.name}-aurora
          namespace: ${schema.spec.namespace}
          region: ${schema.spec.region}
          environment: ${schema.spec.environment}
          project: ${schema.spec.project}
          engine: ${schema.spec.auroraEngine}
          engineVersion: ${schema.spec.auroraEngineVersion}
          masterUsername: ${schema.spec.auroraMasterUsername}
          masterUserPasswordSecretRef: ${schema.spec.auroraMasterUserPasswordSecretRef}
          databaseName: ${schema.spec.auroraDatabaseName}
          vpcID: ${schema.spec.vpcID}
          subnetIDs: ${schema.spec.dbSubnetIDs}
          securityGroupIDs: ${schema.spec.securityGroupIDs}
          instanceClass: ${schema.spec.auroraInstanceClass}
          instanceCount: ${schema.spec.auroraInstanceCount}
          kmsKeyARN: ${schema.spec.kmsKeyARN}
          adoptionPolicy: ${schema.spec.adoptionPolicy}
          deletionPolicy: ${schema.spec.deletionPolicy}

    # ==================== EFS ====================
    - id: efs
      readyWhen:
        - ${efs.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
      template:
        apiVersion: kro.run/v1alpha1
        kind: AwsEfsT1
        metadata:
          name: ${schema.spec.name}-efs
          namespace: ${schema.spec.namespace}
        spec:
          name: ${schema.spec.name}-efs
          namespace: ${schema.spec.namespace}
          region: ${schema.spec.region}
          environment: ${schema.spec.environment}
          project: ${schema.spec.project}
          performanceMode: ${schema.spec.efsPerformanceMode}
          throughputMode: ${schema.spec.efsThroughputMode}
          subnetIDs: ${schema.spec.subnetIDs}
          securityGroupIDs: ${schema.spec.securityGroupIDs}
          kmsKeyID: ${schema.spec.kmsKeyARN}
          adoptionPolicy: ${schema.spec.adoptionPolicy}
          deletionPolicy: ${schema.spec.deletionPolicy}

    # ==================== S3 Storage ====================
    - id: s3Storage
      readyWhen:
        - ${s3Storage.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
      template:
        apiVersion: kro.run/v1alpha1
        kind: AwsS3StorageT1
        metadata:
          name: ${schema.spec.name}-s3
          namespace: ${schema.spec.namespace}
        spec:
          name: ${schema.spec.name}-s3
          namespace: ${schema.spec.namespace}
          region: ${schema.spec.region}
          environment: ${schema.spec.environment}
          project: ${schema.spec.project}
          loggingBucketName: ${schema.spec.loggingBucketName}
          dataBucketName: ${schema.spec.dataBucketName}
          uploadBucketName: ${schema.spec.uploadBucketName}
          kmsKeyARN: ${schema.spec.kmsKeyARN}
          adoptionPolicy: ${schema.spec.adoptionPolicy}
          deletionPolicy: ${schema.spec.deletionPolicy}

