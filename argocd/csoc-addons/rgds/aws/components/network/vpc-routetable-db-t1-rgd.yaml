
apiVersion: kro.run/v1alpha1
kind: ResourceGraphDefinition
metadata:
  name: awsvpcdbroutetablet1
spec:
  schema:
    apiVersion: v1alpha1
    kind: AwsVpcDbRouteTableT1

    types:
      Route:
        destinationCIDRBlock: string
        gatewayID: string
        natGatewayID: string

    spec:
      # Basic metadata
      name: string
      namespace: string | default="default"
      region: string | default="us-east-1"
      environment: string | default="dev"
      project: string | default="kro-managed"

      # VPC Configuration
      vpcID: string | required=true
      routes: "[]Route"

      # Resource management
      adoptionPolicy: string | default="adopt-or-create"
      deletionPolicy: string | default="delete"

    status:
      routeTableID: "${dbRouteTable.status.?routeTableID.orValue('')}"

      ready: |
        ${
          dbRouteTable.status.?routeTableID.orValue('') != '' &&
          dbRouteTable.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")
        }

  resources:
    # ==================== DB Route Table (Isolated) ====================
    - id: dbRouteTable
      readyWhen:
        - ${dbRouteTable.status.conditions.exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
        - ${dbRouteTable.status.routeTableID != ""}
      template:
        apiVersion: ec2.services.k8s.aws/v1alpha1
        kind: RouteTable
        metadata:
          name: ${schema.spec.name}-db-rt
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${schema.spec.region}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          vpcID: ${schema.spec.vpcID}
          routes: ${schema.spec.routes}
          # CRITICAL: NO routes defined = only local VPC traffic allowed
          # This ensures database subnets are completely isolated from internet
          # Note: Subnet associations must be configured via separate RouteTableAssociation resources
          tags:
            - key: Name
              value: ${schema.spec.name}-db-rt
            - key: Environment
              value: ${schema.spec.environment}
            - key: ManagedBy
              value: Kro
            - key: Project
              value: ${schema.spec.project}

