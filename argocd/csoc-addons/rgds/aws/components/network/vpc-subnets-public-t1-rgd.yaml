apiVersion: kro.run/v1alpha1
kind: ResourceGraphDefinition
metadata:
  name: awsvpcsubnetspublict1
spec:
  schema:
    apiVersion: v1alpha1
    kind: AwsVpcSubnetsPublicT1

    spec:
      # Basic metadata
      name: "[]string"
      namespace: string | default="default"
      region: string | default="us-east-1"
      environment: string | default="dev"
      project: string | default="kro-managed"

      # VPC Configuration
      vpcID: string | required=true
      routeTableIDs: "map[string]string"

      # Subnet configurations
      cidrBlocks: "[]string"
      availabilityZones: "[]string"
      mapPublicIPOnLaunch: boolean | default=true

      # Resource management
      adoptionPolicy: string | default="adopt-or-create"
      deletionPolicy: string | default="delete"

    status:
      # List outputs for reusability
      subnetIDs: |
        ${
          [
            subnet1.status.subnetID,
            subnet2.status.subnetID,
            subnet3.status.?subnetID.orValue('')
          ].filter(id, id != '')
        }

      ready: |
        ${
          subnet1.status.subnetID != '' &&
          subnet2.status.subnetID != '' &&
          (has(subnet3.metadata.name) ? subnet3.status.?subnetID.orValue('') != '' : true)
        }

  resources:
    # ==================== Public Subnet 1 (Required) ====================
    - id: subnet1
      readyWhen:
        - ${subnet1.status.conditions.exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
        - ${subnet1.status.subnetID != ""}
      template:
        apiVersion: ec2.services.k8s.aws/v1alpha1
        kind: Subnet
        metadata:
          name: ${schema.spec.name[0]}
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${schema.spec.region}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          vpcID: ${schema.spec.vpcID}
          cidrBlock: ${schema.spec.cidrBlocks[0]}
          availabilityZone: ${schema.spec.availabilityZones[0]}
          mapPublicIPOnLaunch: ${schema.spec.mapPublicIPOnLaunch}
          routeTables: |-
            ${[
              schema.spec.routeTableIDs['0']
            ].filter(id, id != '')}
          tags:
            - key: Name
              value: ${schema.spec.name[0]}
            - key: Environment
              value: ${schema.spec.environment}
            - key: ManagedBy
              value: Kro
            - key: Project
              value: ${schema.spec.project}
            - key: kubernetes.io/role/elb
              value: "1"

    # ==================== Public Subnet 2 (Required) ====================
    - id: subnet2
      readyWhen:
        - ${subnet2.status.conditions.exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
        - ${subnet2.status.subnetID != ""}
      template:
        apiVersion: ec2.services.k8s.aws/v1alpha1
        kind: Subnet
        metadata:
          name: ${schema.spec.name[1]}
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${schema.spec.region}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          vpcID: ${schema.spec.vpcID}
          cidrBlock: ${schema.spec.cidrBlocks[1]}
          availabilityZone: ${schema.spec.availabilityZones[1]}
          mapPublicIPOnLaunch: ${schema.spec.mapPublicIPOnLaunch}
          routeTables: |-
            ${[
              schema.spec.routeTableIDs['0']
            ].filter(id, id != '')}
          tags:
            - key: Name
              value: ${schema.spec.name[1]}
            - key: Environment
              value: ${schema.spec.environment}
            - key: ManagedBy
              value: Kro
            - key: Project
              value: ${schema.spec.project}
            - key: kubernetes.io/role/elb
              value: "1"

    # ==================== Public Subnet 3 (Optional) ====================
    - id: subnet3
      includeWhen:
        - ${schema.spec.name.size() > 2}
      readyWhen:
        - ${subnet3.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
        - ${subnet3.status.?subnetID.orValue('') != ""}
      template:
        apiVersion: ec2.services.k8s.aws/v1alpha1
        kind: Subnet
        metadata:
          name: ${schema.spec.name[2]}
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${schema.spec.region}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          vpcID: ${schema.spec.vpcID}
          cidrBlock: ${schema.spec.cidrBlocks[2]}
          availabilityZone: ${schema.spec.availabilityZones[2]}
          mapPublicIPOnLaunch: ${schema.spec.mapPublicIPOnLaunch}
          routeTables: |-
            ${[
              schema.spec.routeTableIDs['0']
            ].filter(id, id != '')}
          tags:
            - key: Name
              value: ${schema.spec.name[2]}
            - key: Environment
              value: ${schema.spec.environment}
            - key: ManagedBy
              value: Kro
            - key: Project
              value: ${schema.spec.project}
            - key: kubernetes.io/role/elb
              value: "1"
