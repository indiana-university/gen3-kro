apiVersion: kro.run/v1alpha1
kind: ResourceGraphDefinition
metadata:
  name: awsvpcnatgatewayst1
spec:
  schema:
    apiVersion: v1alpha1
    kind: AwsVpcNatGatewaysT1

    spec:
      # Basic metadata
      name: "[]string"
      namespace: string | default="default"
      region: string | default="us-east-1"
      environment: string | default="dev"
      project: string | default="kro-managed"

      # NAT Gateway configuration
      publicSubnetIDs: "[]string"
      natGatewayCount: integer | default=3 minimum=1 maximum=3

      # Resource management
      adoptionPolicy: string | default="adopt-or-create"
      deletionPolicy: string | default="delete"

    status:
      # List outputs for reusability
      natGatewayIDs: |
        "${
          [
            natGateway1.status.?natGatewayID.orValue(''),
            has(natGateway2) ? natGateway2.status.?natGatewayID.orValue('') : '',
            has(natGateway3) ? natGateway3.status.?natGatewayID.orValue('') : ''
          ].filter(id, id != '')
        }"

      elasticIPAllocationIDs: |
        "${
          [
            eip1.status.?allocationID.orValue(''),
            has(eip2) ? eip2.status.?allocationID.orValue('') : '',
            has(eip3) ? eip3.status.?allocationID.orValue('') : ''
          ].filter(id, id != '')
        }"
      ready: |-
        ${

          natGateway1.status.?natGatewayID.orValue('') != '' &&
          (!has(natGateway2) || natGateway2.status.?natGatewayID.orValue('') != '') &&
          (!has(natGateway3) || natGateway3.status.?natGatewayID.orValue('') != '')
        }

  resources:
    # ==================== Elastic IP 1 (Required) ====================
    - id: eip1
      readyWhen:
        - ${eip1.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
        - ${eip1.status.?allocationID.orValue('') != ''}
      template:
        apiVersion: ec2.services.k8s.aws/v1alpha1
        kind: ElasticIPAddress
        metadata:
          name: ${schema.spec.name[0]}-eip
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${schema.spec.region}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          tags:
            - key: Name
              value: ${schema.spec.name[0]}-eip
            - key: Environment
              value: ${schema.spec.environment}
            - key: ManagedBy
              value: Kro
            - key: Project
              value: ${schema.spec.project}

    # ==================== NAT Gateway 1 (Required) ====================
    - id: natGateway1
      readyWhen:
        - ${natGateway1.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
        - ${natGateway1.status.?natGatewayID.orValue('') != ''}
        - ${natGateway1.status.?state.orValue('') == 'available'}
      template:
        apiVersion: ec2.services.k8s.aws/v1alpha1
        kind: NATGateway
        metadata:
          name: ${schema.spec.name[0]}
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${schema.spec.region}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          allocationID: ${eip1.status.allocationID}
          subnetID: ${schema.spec.publicSubnetIDs[0]}
          tags:
            - key: Name
              value: ${schema.spec.name[0]}
            - key: Environment
              value: ${schema.spec.environment}
            - key: ManagedBy
              value: Kro
            - key: Project
              value: ${schema.spec.project}

    # ==================== Elastic IP 2 (Optional) ====================
    - id: eip2
      includeWhen:
        - ${schema.spec.natGatewayCount >= 2}
      readyWhen:
        - ${eip2.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
        - ${eip2.status.?allocationID.orValue('') != ''}
      template:
        apiVersion: ec2.services.k8s.aws/v1alpha1
        kind: ElasticIPAddress
        metadata:
          name: ${schema.spec.name[1]}-eip
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${schema.spec.region}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          tags:
            - key: Name
              value: ${schema.spec.name[1]}-eip
            - key: Environment
              value: ${schema.spec.environment}
            - key: ManagedBy
              value: Kro
            - key: Project
              value: ${schema.spec.project}

    # ==================== NAT Gateway 2 (Optional) ====================
    - id: natGateway2
      includeWhen:
        - ${schema.spec.natGatewayCount >= 2}
      readyWhen:
        - ${natGateway2.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
        - ${natGateway2.status.?natGatewayID.orValue('') != ''}
        - ${natGateway2.status.?state.orValue('') == 'available'}
      template:
        apiVersion: ec2.services.k8s.aws/v1alpha1
        kind: NATGateway
        metadata:
          name: ${schema.spec.name[1]}
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${schema.spec.region}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          allocationID: ${eip2.status.allocationID}
          subnetID: ${schema.spec.publicSubnetIDs[1]}
          tags:
            - key: Name
              value: ${schema.spec.name[1]}
            - key: Environment
              value: ${schema.spec.environment}
            - key: ManagedBy
              value: Kro
            - key: Project
              value: ${schema.spec.project}

    # ==================== Elastic IP 3 (Optional) ====================
    - id: eip3
      includeWhen:
        - ${schema.spec.natGatewayCount >= 3}
      readyWhen:
        - ${eip3.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
        - ${eip3.status.?allocationID.orValue('') != ''}
      template:
        apiVersion: ec2.services.k8s.aws/v1alpha1
        kind: ElasticIPAddress
        metadata:
          name: ${schema.spec.name[2]}-eip
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${schema.spec.region}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          tags:
            - key: Name
              value: ${schema.spec.name[2]}-eip
            - key: Environment
              value: ${schema.spec.environment}
            - key: ManagedBy
              value: Kro
            - key: Project
              value: ${schema.spec.project}

    # ==================== NAT Gateway 3 (Optional) ====================
    - id: natGateway3
      includeWhen:
        - ${schema.spec.natGatewayCount >= 3}
      readyWhen:
        - ${natGateway3.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
        - ${natGateway3.status.?natGatewayID.orValue('') != ''}
        - ${natGateway3.status.?state.orValue('') == 'available'}
      template:
        apiVersion: ec2.services.k8s.aws/v1alpha1
        kind: NATGateway
        metadata:
          name: ${schema.spec.name[2]}
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${schema.spec.region}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          allocationID: ${eip3.status.allocationID}
          subnetID: ${schema.spec.publicSubnetIDs[2]}
          tags:
            - key: Name
              value: ${schema.spec.name[2]}
            - key: Environment
              value: ${schema.spec.environment}
            - key: ManagedBy
              value: Kro
            - key: Project
              value: ${schema.spec.project}
