apiVersion: kro.run/v1alpha1
kind: ResourceGraphDefinition
metadata:
  name: awsvpccoret1
spec:
  schema:
    apiVersion: v1alpha1
    kind: AwsVpcCoreT1

    spec:
      # Basic metadata
      name: string | required=true
      namespace: string | default="default"
      region: string | default="us-east-1"
      environment: string | default="dev"
      project: string | default="kro-managed"

      # VPC Configuration
      vpcCidr: string | required=true
      enableDnsHostnames: boolean | default=true
      enableDnsSupport: boolean | default=true

      # Resource management
      adoptionPolicy: string | default="adopt-or-create"
      deletionPolicy: string | default="delete"

    status:
      # VPC identifiers
      vpcID: ${vpc.status.vpcID}
      internetGatewayID: ${igw.status.internetGatewayID}

      # Ready status
      ready: |
        ${
          vpc.status.vpcID != '' &&
          igw.status.internetGatewayID != ''
        }

  resources:
    # ==================== VPC ====================
    - id: vpc
      readyWhen:
        - ${vpc.status.conditions.exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
        - ${vpc.status.vpcID != ""}
      template:
        apiVersion: ec2.services.k8s.aws/v1alpha1
        kind: VPC
        metadata:
          name: ${schema.spec.name}-vpc
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${schema.spec.region}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          cidrBlocks:
            - ${schema.spec.vpcCidr}
          enableDNSHostnames: ${schema.spec.enableDnsHostnames}
          enableDNSSupport: ${schema.spec.enableDnsSupport}
          tags:
            - key: Name
              value: ${schema.spec.name}-vpc
            - key: Environment
              value: ${schema.spec.environment}
            - key: ManagedBy
              value: Kro
            - key: Project
              value: ${schema.spec.project}

    # ==================== Internet Gateway ====================
    - id: igw
      readyWhen:
        - ${igw.status.conditions.exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
        - ${igw.status.internetGatewayID != ""}
      template:
        apiVersion: ec2.services.k8s.aws/v1alpha1
        kind: InternetGateway
        metadata:
          name: ${schema.spec.name}-igw
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${schema.spec.region}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          vpcRef:
            from:
              name: ${schema.spec.name}-vpc
          tags:
            - key: Name
              value: ${schema.spec.name}-igw
            - key: Environment
              value: ${schema.spec.environment}
            - key: ManagedBy
              value: Kro
            - key: Project
              value: ${schema.spec.project}
