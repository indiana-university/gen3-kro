apiVersion: kro.run/v1alpha1
kind: ResourceGraphDefinition
metadata:
  name: awss3storaget1
spec:
  schema:
    apiVersion: v1alpha1
    kind: AwsS3StorageT1

    spec:
      # Basic metadata
      n ame: string | required=true
      namespace: string | default="default"
      region: string | default="us-east-1"
      environment: string | default="dev"
      project: string | default="kro-managed"

      # KMS Configuration
      kmsKeyARN: string | default=""

      # S3 Bucket Names (must be globally unique)
      loggingBucketName: string | required=true
      dataBucketName: string | required=true
      uploadBucketName: string | required=true

      # Resource management
      adoptionPolicy: string | default="adopt-or-create"
      deletionPolicy: string | default="delete"

    status:
      # S3 Bucket ARNs
      loggingBucketARN: ${loggingBucket.status.ackResourceMetadata.arn.orValue('')}
      dataBucketARN: ${dataBucket.status.ackResourceMetadata.arn.orValue('')}
      uploadBucketARN: ${uploadBucket.status.ackResourceMetadata.arn.orValue('')}

      ready: |
        ${
          loggingBucket.status.?ackResourceMetadata.arn.orValue('') != '' ||
          dataBucket.status.?ackResourceMetadata.arn.orValue('') != '' ||
          uploadBucket.status.?ackResourceMetadata.arn.orValue('') != ''
        }

  resources:
    # ==================== Logging S3 Bucket ====================
    - id: loggingBucket
      includeWhen:
        - ${schema.spec.enableLoggingBucket}
      readyWhen:
        - ${loggingBucket.status.conditions.exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
        - ${loggingBucket.status.ackResourceMetadata.arn != ""}
      template:
        apiVersion: s3.services.k8s.aws/v1alpha1
        kind: Bucket
        metadata:
          name: ${schema.spec.name}-logging-bucket
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${schema.spec.region}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          name: ${schema.spec.loggingBucketName}
          versioning:
            status: "Enabled"
          encryption:
            rules:
              - applyServerSideEncryptionByDefault:
                  sseAlgorithm: |
                    ${schema.spec.kmsKeyARN != "" ? "aws:kms" : "AES256"}
                  kmsMasterKeyID: ${schema.spec.kmsKeyARN}
          publicAccessBlock:
            blockPublicACLs: true
            blockPublicPolicy: true
            ignorePublicACLs: true
            restrictPublicBuckets: true
          tagging:
            tagSet:
              - key: Name
                value: ${schema.spec.loggingBucketName}
              - key: Environment
                value: ${schema.spec.environment}
              - key: ManagedBy
                value: Kro
              - key: Project
                value: ${schema.spec.project}
              - key: BucketType
                value: logging

    # ==================== Data S3 Bucket ====================
    - id: dataBucket
      includeWhen:
        - ${schema.spec.enableDataBucket}
      readyWhen:
        - ${dataBucket.status.conditions.exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
        - ${dataBucket.status.ackResourceMetadata.arn != ""}
      template:
        apiVersion: s3.services.k8s.aws/v1alpha1
        kind: Bucket
        metadata:
          name: ${schema.spec.name}-data-bucket
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${schema.spec.region}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          name: ${schema.spec.dataBucketName}
          versioning:
            status: "Enabled"
          encryption:
            rules:
              - applyServerSideEncryptionByDefault:
                  sseAlgorithm: |
                    ${schema.spec.kmsKeyARN != "" ? "aws:kms" : "AES256"}
                  kmsMasterKeyID: ${schema.spec.kmsKeyARN}
          publicAccessBlock:
            blockPublicACLs: true
            blockPublicPolicy: true
            ignorePublicACLs: true
            restrictPublicBuckets: true
          tagging:
            tagSet:
              - key: Name
                value: ${schema.spec.dataBucketName}
              - key: Environment
                value: ${schema.spec.environment}
              - key: ManagedBy
                value: Kro
              - key: Project
                value: ${schema.spec.project}
              - key: BucketType
                value: data

    # ==================== Upload S3 Bucket ====================
    - id: uploadBucket
      includeWhen:
        - ${schema.spec.enableUploadBucket}
      readyWhen:
        - ${uploadBucket.status.conditions.exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
        - ${uploadBucket.status.ackResourceMetadata.arn != ""}
      template:
        apiVersion: s3.services.k8s.aws/v1alpha1
        kind: Bucket
        metadata:
          name: ${schema.spec.name}-upload-bucket
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${schema.spec.region}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          name: ${schema.spec.uploadBucketName}
          versioning:
            status: "Enabled"
          encryption:
            rules:
              - applyServerSideEncryptionByDefault:
                  sseAlgorithm: |
                    ${schema.spec.kmsKeyARN != "" ? "aws:kms" : "AES256"}
                  kmsMasterKeyID: ${schema.spec.kmsKeyARN}
          publicAccessBlock:
            blockPublicACLs: true
            blockPublicPolicy: true
            ignorePublicACLs: true
            restrictPublicBuckets: true
          tagging:
            tagSet:
              - key: Name
                value: ${schema.spec.uploadBucketName}
              - key: Environment
                value: ${schema.spec.environment}
              - key: ManagedBy
                value: Kro
              - key: Project
                value: ${schema.spec.project}
              - key: BucketType
                value: upload
