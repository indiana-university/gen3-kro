apiVersion: kro.run/v1alpha1
kind: ResourceGraphDefinition
metadata:
  name: awsefst1
spec:
  schema:
    apiVersion: v1alpha1
    kind: AwsEfsT1
    spec:
      name: string
      namespace: string | default="default"
      region: string | default="us-east-1"
      environment: string | default="dev"
      project: string | default="kro-managed"
      kmsKeyID: string
      subnetIDs: "[]string"
      securityGroupIDs: "[]string"
      performanceMode: string | default="generalPurpose"
      throughputMode: string | default="bursting"
      encrypted: boolean | default=true
      lifecyclePolicy: string | default="AFTER_30_DAYS"
      adoptionPolicy: string | default="adopt-or-create"
      deletionPolicy: string | default="retain"
    status:
      fileSystemID: "${fileSystem.status.fileSystemID}"
      fileSystemARN: "${fileSystem.status.ackResourceMetadata.arn}"
      conditions: "${fileSystem.status.conditions}"
      monthlyCost: "$0.30/GB-month"
  resources:
  - id: fileSystem
    readyWhen:
      - ${fileSystem.status.conditions.exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
      - ${fileSystem.status.fileSystemID != ""}
      - ${fileSystem.status.lifeCycleState == "available"}
    template:
      apiVersion: efs.services.k8s.aws/v1alpha1
      kind: FileSystem
      metadata:
        name: ${schema.spec.name}-efs
        namespace: ${schema.spec.namespace}
        annotations:
          services.k8s.aws/region: ${schema.spec.region}
          services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
          services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
      spec:
        encrypted: ${schema.spec.encrypted}
        kmsKeyID: ${schema.spec.kmsKeyID}
        performanceMode: ${schema.spec.performanceMode}
        throughputMode: ${schema.spec.throughputMode}
        lifecyclePolicies:
          - transitionToIA: ${schema.spec.lifecyclePolicy}
        tags:
          - key: Name
            value: ${schema.spec.name}-efs
          - key: Environment
            value: ${schema.spec.environment}
          - key: ManagedBy
            value: Kro
          - key: Project
            value: ${schema.spec.project}
  - id: mountTarget1
    readyWhen:
      - ${mountTarget1.status.conditions.exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
      - ${mountTarget1.status.mountTargetID != ""}
      - ${mountTarget1.status.lifeCycleState == "available"}
    template:
      apiVersion: efs.services.k8s.aws/v1alpha1
      kind: MountTarget
      metadata:
        name: ${schema.spec.name}-efs-mt1
        namespace: ${schema.spec.namespace}
        annotations:
          services.k8s.aws/region: ${schema.spec.region}
          services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
          services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
      spec:
        fileSystemID: ${fileSystem.status.fileSystemID}
        subnetID: ${schema.spec.subnetIDs[0]}
        securityGroups: ${schema.spec.securityGroupIDs}
  - id: mountTarget2
    includeWhen:
      - ${schema.spec.subnetIDs.size() > 1}
    readyWhen:
      - ${mountTarget2.status.conditions.exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
      - ${mountTarget2.status.mountTargetID != ""}
      - ${mountTarget2.status.lifeCycleState == "available"}
    template:
      apiVersion: efs.services.k8s.aws/v1alpha1
      kind: MountTarget
      metadata:
        name: ${schema.spec.name}-efs-mt2
        namespace: ${schema.spec.namespace}
        annotations:
          services.k8s.aws/region: ${schema.spec.region}
          services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
          services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
      spec:
        fileSystemID: ${fileSystem.status.fileSystemID}
        subnetID: ${schema.spec.subnetIDs[1]}
        securityGroups: ${schema.spec.securityGroupIDs}
  - id: mountTarget3
    includeWhen:
      - ${schema.spec.subnetIDs.size() > 2}
    readyWhen:
      - ${mountTarget3.status.conditions.exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
      - ${mountTarget3.status.mountTargetID != ""}
      - ${mountTarget3.status.lifeCycleState == "available"}
    template:
      apiVersion: efs.services.k8s.aws/v1alpha1
      kind: MountTarget
      metadata:
        name: ${schema.spec.name}-efs-mt3
        namespace: ${schema.spec.namespace}
        annotations:
          services.k8s.aws/region: ${schema.spec.region}
          services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
          services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
      spec:
        fileSystemID: ${fileSystem.status.fileSystemID}
        subnetID: ${schema.spec.subnetIDs[2]}
        securityGroups: ${schema.spec.securityGroupIDs}
