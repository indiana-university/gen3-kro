apiVersion: kro.run/v1alpha1
kind: ResourceGraphDefinition
metadata:
  name: awsekst1
spec:
  schema:
    apiVersion: v1alpha1
    kind: AwsEksT1
    spec:
      # Basic metadata
      name: string
      namespace: string | default="default"
      region: string | default="us-east-1"
      environment: string | default="dev"
      project: string | default="kro-managed"

      # EKS Configuration
      version: string | default="1.28"

      # Network Configuration
      vpcID: string
      subnetIDs: "[]string"
      securityGroupIDs: "[]string"
      endpointPrivateAccess: boolean | default=true
      endpointPublicAccess: boolean | default=true

      # Encryption Configuration
      encryptSecrets: boolean | default=true
      kmsKeyARN: string | default=""

      # Logging Configuration
      enabledClusterLogTypes: "[]string | default=[\"api\", \"audit\", \"authenticator\", \"controllerManager\", \"scheduler\"]"

      # IAM Role Configuration
      createClusterRole: boolean | default=true
      createNodeRole: boolean | default=true
      roleARN: string | default=""
      nodeRoleARN: string | default=""

      # OIDC Provider
      enableOIDCProvider: boolean | default=true

      # Add-ons
      enableCoreAddons: boolean | default=true
      vpcCniAddonVersion: string | default="latest"
      coreDnsAddonVersion: string | default="latest"
      kubeProxyAddonVersion: string | default="latest"
      ebsCsiAddonVersion: string | default="latest"

      # Node Group Configuration
      nodeGroupName: string | default=""
      nodeInstanceTypes: "[]string | default=[\"t3.large\"]"
      nodeDesiredSize: integer | default=3
      nodeMinSize: integer | default=2
      nodeMaxSize: integer | default=6
      nodeDiskSize: integer | default=100
      nodeSubnetIDs: "[]string | default=[]"

      # Resource management
      adoptionPolicy: string | default="adopt-or-create"
      deletionPolicy: string | default="delete"

    status:
      clusterARN: "${eksCluster.status.ackResourceMetadata.arn}"
      endpoint: "${eksCluster.status.endpoint}"
      status: "${eksCluster.status.status}"
      certificateAuthority: "${eksCluster.status.certificateAuthority.data}"
      clusterRoleARN: "${clusterRole.status.?ackResourceMetadata.?arn.orValue('')}"
      nodeRoleARN: "${nodeRole.status.?ackResourceMetadata.?arn.orValue('')}"
      conditions: "${eksCluster.status.conditions}"

  resources:
  # IAM Cluster Role
  - id: clusterRole
    includeWhen:
      - ${schema.spec.createClusterRole}
    readyWhen:
      - ${clusterRole.status.conditions.exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
      - ${clusterRole.status.ackResourceMetadata.arn != ""}
    template:
      apiVersion: iam.services.k8s.aws/v1alpha1
      kind: Role
      metadata:
        name: ${schema.spec.name}-eks-cluster-role
        namespace: ${schema.spec.namespace}
        annotations:
          services.k8s.aws/region: ${schema.spec.region}
          services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
          services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
      spec:
        name: ${schema.spec.name}-eks-cluster-role
        description: IAM role for EKS cluster control plane
        assumeRolePolicyDocument: |
          {
            "Version": "2012-10-17",
            "Statement": [
              {
                "Effect": "Allow",
                "Principal": {
                  "Service": "eks.amazonaws.com"
                },
                "Action": "sts:AssumeRole"
              }
            ]
          }
        policies:
          - arn:aws:iam::aws:policy/AmazonEKSClusterPolicy
          - arn:aws:iam::aws:policy/AmazonEKSVPCResourceController
        tags:
          - key: Name
            value: ${schema.spec.name}-eks-cluster-role
          - key: Environment
            value: ${schema.spec.environment}
          - key: ManagedBy
            value: Kro
          - key: Project
            value: ${schema.spec.project}
          - key: Purpose
            value: EKSCluster

  # IAM Node Role
  - id: nodeRole
    includeWhen:
      - ${schema.spec.createNodeRole}
    readyWhen:
      - ${nodeRole.status.conditions.exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
      - ${nodeRole.status.ackResourceMetadata.arn != ""}
    template:
      apiVersion: iam.services.k8s.aws/v1alpha1
      kind: Role
      metadata:
        name: ${schema.spec.name}-eks-node-role
        namespace: ${schema.spec.namespace}
        annotations:
          services.k8s.aws/region: ${schema.spec.region}
          services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
          services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
      spec:
        name: ${schema.spec.name}-eks-node-role
        description: IAM role for EKS worker nodes
        assumeRolePolicyDocument: |
          {
            "Version": "2012-10-17",
            "Statement": [
              {
                "Effect": "Allow",
                "Principal": {
                  "Service": "ec2.amazonaws.com"
                },
                "Action": "sts:AssumeRole"
              }
            ]
          }
        policies:
          - arn:aws:iam::aws:policy/AmazonEKSWorkerNodePolicy
          - arn:aws:iam::aws:policy/AmazonEKS_CNI_Policy
          - arn:aws:iam::aws:policy/AmazonEC2ContainerRegistryReadOnly
        tags:
          - key: Name
            value: ${schema.spec.name}-eks-node-role
          - key: Environment
            value: ${schema.spec.environment}
          - key: ManagedBy
            value: Kro
          - key: Project
            value: ${schema.spec.project}
          - key: Purpose
            value: EKSNodes

  - id: eksCluster
    readyWhen:
      - ${eksCluster.status.conditions.exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
      - ${eksCluster.status.ackResourceMetadata.arn != ""}
      - ${eksCluster.status.status == "ACTIVE"}
    template:
      apiVersion: eks.services.k8s.aws/v1alpha1
      kind: Cluster
      metadata:
        name: ${schema.spec.name}
        namespace: ${schema.spec.namespace}
        annotations:
          services.k8s.aws/region: ${schema.spec.region}
          services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
          services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
      spec:
        name: ${schema.spec.name}
        version: ${schema.spec.version}
        roleARN: ${clusterRole.status.ackResourceMetadata.arn}
        resourcesVPCConfig:
          subnetIDs: ${schema.spec.subnetIDs}
          securityGroupIDs: ${schema.spec.securityGroupIDs}
          endpointPrivateAccess: ${schema.spec.endpointPrivateAccess}
          endpointPublicAccess: ${schema.spec.endpointPublicAccess}
        computeConfig:
          enabled: true
          nodeRoleARN: ${nodeRole.status.ackResourceMetadata.arn}
          nodePools:
            - system
            - general-purpose
        encryptionConfig:
          - resources:
              - secrets
            provider:
              keyARN: ${schema.spec.kmsKeyARN}
        kubernetesNetworkConfig:
          ipFamily: ipv4
          elasticLoadBalancing:
            enabled: true
        storageConfig:
          blockStorage:
            enabled: true
        accessConfig:
          authenticationMode: "API"
          bootstrapClusterCreatorAdminPermissions: true
        logging:
          clusterLogging:
            - types: ${schema.spec.enabledClusterLogTypes}
              enabled: true
        tags:
          Name: ${schema.spec.name}
          Environment: ${schema.spec.environment}
          ManagedBy: Kro
          Project: ${schema.spec.project}
