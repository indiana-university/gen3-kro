apiVersion: kro.run/v1alpha1
kind: ResourceGraphDefinition
metadata:
  name: awsgen3t2
spec:
  schema:
    apiVersion: v1alpha1
    kind: AwsGen3T2
    spec:
      # Basic metadata
      name: string | required=true
      namespace: string | default="default"
      region: string | default="us-east-1"
      environment: string | default="dev"
      project: string | default="kro-managed"

      # ==================== Network Configuration ====================
      # VPC Configuration
      vpcCIDR: string | required=true

      # Subnet CIDRs
      publicSubnetCIDRs: "[]string | required=true"
      privateSubnetCIDRs: "[]string | required=true"
      dbSubnetCIDRs: "[]string | required=true"

      # Availability Zones
      availabilityZones: "[]string | required=true"

      # ==================== Security Configuration ====================
      # KMS Configuration
      kmsKeyDescription: string | default="Gen3 encryption key"
      kmsKeyAlias: string | default="gen3-key"

      # ==================== Data Configuration ====================
      # Aurora Configuration
      auroraEngine: string | default="aurora-postgresql"
      auroraEngineVersion: string | default="15.4"
      auroraMasterUsername: string | default="postgres"
      auroraMasterUserPasswordSecretRef: string
      auroraDatabaseName: string | default="app"
      auroraInstanceClass: string | default="db.r6g.large"
      auroraInstanceCount: integer | default=2

      # EKS Configuration
      eksVersion: string | default="1.28"
      eksNodeInstanceTypes: '[]string | default=["t3.large"]'
      eksNodeDesiredSize: integer | default=3
      eksNodeMinSize: integer | default=2
      eksNodeMaxSize: integer | default=6
      eksNodeDiskSize: integer | default=100
      eksEnableOIDCProvider: boolean | default=true
      eksEnableCoreAddons: boolean | default=true

      # ElastiCache Configuration
      elastiCacheEngine: string | default="redis"
      elastiCacheEngineVersion: string | default="7.0"
      elastiCacheNodeType: string | default="cache.t3.micro"
      elastiCacheNumCacheNodes: integer | default=2
      elastiCacheAuthTokenSecretRef: string

      # OpenSearch Configuration
      openSearchVersion: string | default="2.11"
      openSearchInstanceType: string | default="t3.small.search"
      openSearchInstanceCount: integer | default=3
      openSearchMasterUsername: string | default="admin"
      openSearchMasterPasswordSecretRef: string | required=true
      openSearchVolumeSize: integer | default=100
      openSearchVolumeType: string | default="gp3"

      # EFS Configuration
      efsPerformanceMode: string | default="generalPurpose"
      efsThroughputMode: string | default="bursting"

      # S3 Configuration
      loggingBucketName: string
      dataBucketName: string
      uploadBucketName: string

      # ==================== Resource Management ====================
      adoptionPolicy: string | default="adopt-or-create"
      deletionPolicy: string | default="delete"

      # Tags
      additionalTags: "map[string]string"

    status:
      # Network Status
      vpcID: has(vpc.status) ? ${vpc.status.vpcID}
      internetGatewayID: has(igw.status) ? ${igw.status.internetGatewayID}
      publicSubnetIDs:
        - has(publicsubnet1.status) ? ${publicsubnet1.status.subnetID}
        - has(publicsubnet2.status) ? ${publicsubnet2.status.subnetID}
      privateSubnetIDs:
        - has(privatesubnet1.status) ? ${privatesubnet1.status.subnetID}
        - has(privatesubnet2.status) ? ${privatesubnet2.status.subnetID}
      dbSubnetIDs:
        - has(dbsubnet1.status) ? ${dbsubnet1.status.subnetID}
        - has(dbsubnet2.status) ? ${dbsubnet2.status.subnetID}
    #   natGatewayIDs:
    #     - has(natGateway1.status) ? ${natGateway1.status.natGatewayID}
    #   elasticIPAllocationIDs:
    #     - has(eip1.status) ? ${eip1.status.allocationID}
    #   routeTableIDs:
    #     public: ${publicRouteTable.status.?routeTableID.orValue('string')}
    #     private: ${privateRouteTable.status.?routeTableID.orValue('string')}
    #     database: ${dbRouteTable.status.?routeTableID.orValue('string')}
    #   # Security Status (KMS)
    #   loggingKeyARN: ${loggingKey.status.?ackResourceMetadata.?arn.orValue('string')}
    #   databaseKeyARN: ${databaseKey.status.?ackResourceMetadata.?arn.orValue('string')}
    #   searchKeyARN: ${searchKey.status.?ackResourceMetadata.?arn.orValue('string')}
    #   platformKeyARN: ${platformKey.status.?ackResourceMetadata.?arn.orValue('string')}

    #   # Storage Status (S3)
    #   loggingBucketARN: ${loggingBucket.status.?ackResourceMetadata.?arn.orValue('string')}
    #   dataBucketARN: ${dataBucket.status.?ackResourceMetadata.?arn.orValue('string')}
    #   uploadBucketARN: ${uploadBucket.status.?ackResourceMetadata.?arn.orValue('string')}

      # # Storage Status (EFS)
      # fileSystemID: ${fileSystem.status.fileSystemID}
      # fileSystemARN: ${fileSystem.status.ackResourceMetadata.arn}

      # # Database Status (Aurora)
      # auroraClusterARN: ${auroraCluster.status.ackResourceMetadata.arn}
      # auroraEndpoint: ${auroraCluster.status.endpoint}
      # auroraReaderEndpoint: ${auroraCluster.status.readerEndpoint}

      # # Cache Status (ElastiCache)
      # elastiCacheARN: ${replicationGroup.status.ackResourceMetadata.arn}
      # elastiCacheEndpoint: ${replicationGroup.status.configurationEndpoint.address}
      # elastiCachePort: ${replicationGroup.status.configurationEndpoint.port}

      # # Search Status (OpenSearch)
      # openSearchDomainARN: ${openSearchDomain.status.ackResourceMetadata.arn}
      # openSearchEndpoint: ${openSearchDomain.status.endpoint}

      # # Compute Status (EKS)
      # eksClusterARN: ${eksCluster.status.ackResourceMetadata.arn}
      # eksEndpoint: ${eksCluster.status.endpoint}
      # eksCertificateAuthority: ${eksCluster.status.certificateAuthority.data}

  resources:
    # ==================== VPC ====================
    - id: vpc
      # readyWhen:
      #   - ${vpc.status.vpcID != 'null'}
      template:
        apiVersion: ec2.services.k8s.aws/v1alpha1
        kind: VPC
        metadata:
          name: ${schema.spec.name}-vpc
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${schema.spec.region}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          cidrBlocks:
            - ${schema.spec.vpcCIDR}
          enableDNSHostnames: true
          enableDNSSupport: true
          tags:
            - key: Name
              value: ${schema.spec.name}-vpc
            - key: Environment
              value: ${schema.spec.environment}
            - key: ManagedBy
              value: Kro
            - key: Project
              value: ${schema.spec.project}

    # ==================== Internet Gateway ====================
    - id: igw
      # readyWhen:
      #   - ${igw.status.internetGatewayID != 'null'}
      template:
        apiVersion: ec2.services.k8s.aws/v1alpha1
        kind: InternetGateway
        metadata:
          name: ${schema.spec.name}-igw
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${schema.spec.region}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          vpcRef:
            from:
              name: ${schema.spec.name}-vpc
          tags:
            - key: Name
              value: ${schema.spec.name}-igw
            - key: Environment
              value: ${schema.spec.environment}
            - key: ManagedBy
              value: Kro
            - key: Project
              value: ${schema.spec.project}

    # ==================== Public Subnet 1 (Required) ====================
    - id: publicsubnet1
      # readyWhen:
      #   - ${publicsubnet1.status.subnetID != 'null'}
      template:
        apiVersion: ec2.services.k8s.aws/v1alpha1
        kind: Subnet
        metadata:
          name: ${schema.spec.name}-public-subnet-1
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${schema.spec.region}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          vpcID: ${vpc.status.vpcID}
          cidrBlock: ${schema.spec.publicSubnetCIDRs[0]}
          availabilityZone: ${schema.spec.availabilityZones[0]}
          mapPublicIPOnLaunch: true
          tags:
            - key: Name
              value: ${schema.spec.name}-public-subnet-1
            - key: Environment
              value: ${schema.spec.environment}
            - key: ManagedBy
              value: Kro
            - key: Project
              value: ${schema.spec.project}
            - key: kubernetes.io/role/elb
              value: "1"

    # ==================== Public Subnet 2 (Required) ====================
    - id: publicsubnet2
      # readyWhen:
      #   - ${publicsubnet2.status.subnetID != 'null'}
      template:
        apiVersion: ec2.services.k8s.aws/v1alpha1
        kind: Subnet
        metadata:
          name: ${schema.spec.name}-public-subnet-2
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${schema.spec.region}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          vpcID: ${vpc.status.vpcID}
          cidrBlock: ${schema.spec.publicSubnetCIDRs[1]}
          availabilityZone: ${schema.spec.availabilityZones[1]}
          mapPublicIPOnLaunch: true
          tags:
            - key: Name
              value: ${schema.spec.name}-public-subnet-2
            - key: Environment
              value: ${schema.spec.environment}
            - key: ManagedBy
              value: Kro
            - key: Project
              value: ${schema.spec.project}
            - key: kubernetes.io/role/elb
              value: "1"
    # ==================== Private Subnet 1 (Required) ====================
    - id: privatesubnet1
      # readyWhen:
      #   - ${privatesubnet1.status.subnetID != 'null'}
      template:
        apiVersion: ec2.services.k8s.aws/v1alpha1
        kind: Subnet
        metadata:
          name: ${schema.spec.name}-private-subnet-1
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${schema.spec.region}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          vpcID: ${vpc.status.vpcID}
          cidrBlock: ${schema.spec.privateSubnetCIDRs[0]}
          availabilityZone: ${schema.spec.availabilityZones[0]}
          mapPublicIPOnLaunch: false
          tags:
            - key: Name
              value: ${schema.spec.name}-private-subnet-1
            - key: Environment
              value: ${schema.spec.environment}
            - key: ManagedBy
              value: Kro
            - key: Project
              value: ${schema.spec.project}
            - key: kubernetes.io/role/internal-elb
              value: "1"

    # ==================== Private Subnet 2 (Required) ====================
    - id: privatesubnet2
      # readyWhen:
      #   - ${privatesubnet2.status.subnetID != 'null'}
      template:
        apiVersion: ec2.services.k8s.aws/v1alpha1
        kind: Subnet
        metadata:
          name: ${schema.spec.name}-private-subnet-2
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${schema.spec.region}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          vpcID: ${vpc.status.vpcID}
          cidrBlock: ${schema.spec.privateSubnetCIDRs[1]}
          availabilityZone: ${schema.spec.availabilityZones[1]}
          mapPublicIPOnLaunch: false
          tags:
            - key: Name
              value: ${schema.spec.name}-private-subnet-2
            - key: Environment
              value: ${schema.spec.environment}
            - key: ManagedBy
              value: Kro
            - key: Project
              value: ${schema.spec.project}
            - key: kubernetes.io/role/internal-elb
              value: "1"
    # ==================== DB Subnet 1 (Required) ====================
    - id: dbsubnet1
      # readyWhen:
      #   - ${dbsubnet1.status.subnetID != 'null'}
      template:
        apiVersion: ec2.services.k8s.aws/v1alpha1
        kind: Subnet
        metadata:
          name: ${schema.spec.name}-db-subnet-1
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${schema.spec.region}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          vpcID: ${vpc.status.vpcID}
          cidrBlock: ${schema.spec.dbSubnetCIDRs[0]}
          availabilityZone: ${schema.spec.availabilityZones[0]}
          mapPublicIPOnLaunch: false
          tags:
            - key: Name
              value: ${schema.spec.name}-db-subnet-1
            - key: Environment
              value: ${schema.spec.environment}
            - key: ManagedBy
              value: Kro
            - key: Project
              value: ${schema.spec.project}
            - key: Type
              value: Database

    # ==================== DB Subnet 2 (Required) ====================
    - id: dbsubnet2
      # readyWhen:
      #   - ${dbsubnet2.status.subnetID != 'null'}
