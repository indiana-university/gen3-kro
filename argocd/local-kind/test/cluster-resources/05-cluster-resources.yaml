# # ── AwsGen3ClusterResources1 — Tier 4.5: Spoke Cluster Registration (~$0) ────
# # Registers the spoke EKS cluster in the CSOC ArgoCD instance and deploys
# # the upstream uc-cdis/gen3-helm cluster-level-resources app-of-apps chart
# # (ALB controller, Karpenter, external-secrets, cert-manager, metrics-server).
# # Creates: ArgoCD Cluster Secret + ArgoCD Application + clusterResourcesBridge.
# #
# # RGD: awsgen3clusterresources1-rg.yaml  |  Kind: AwsGen3ClusterResources1
# #
# # PREREQUISITES:
# #   - Tier 3 (spoke1-compute) must be Ready (provides computeBridge with EKS endpoint)
# #   - ArgoCD must be running in the CSOC cluster
# #   - KRO controller and awsgen3clusterresources1-rg RGD must be registered
# # ----------------------------------------------------------------------------
# apiVersion: kro.run/v1alpha1
# kind: AwsGen3ClusterResources1
# metadata:
#   name: cluster-resources
#   namespace: spoke1
#   annotations:
#     argocd.argoproj.io/sync-wave: "27"
#     argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true,ServerSideApply=true
# spec:
#   name: spoke1
#   namespace: spoke1
#   environment: local
#   project: gen3-kro

#   # ── ArgoCD configuration ──────────────────────────────────────────────────
#   argoCDNamespace: argocd
#   argoCDProject: default

#   # ── Fleet repo (ArgoCD cluster Secret metadata) ─────────────────────────
#   fleetRepoURL: https://github.com/indiana-university/gen3-kro.git
#   fleetRepoRevision: main
#   fleetRepoBasepath: "argocd/"

#   # ── Spoke alias (used in ArgoCD cluster naming) ───────────────────────────
#   spokeAlias: spoke1

#   # ── Upstream gen3-helm chart (cluster-level-resources) ────────────────────
#   gen3HelmRepoURL: https://github.com/uc-cdis/gen3-helm.git
#   gen3HelmTargetRevision: master

