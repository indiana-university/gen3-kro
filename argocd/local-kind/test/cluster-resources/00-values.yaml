# ── Spoke1 Cluster-Level-Resources Helm Values ──────────────────────────────
# ConfigMap providing operator preferences for the upstream uc-cdis/gen3-helm
# cluster-level-resources app-of-apps chart.
#
# The AwsGen3ClusterResources1 RGD reads this ConfigMap's "values.yaml" key
# (via externalRef) and passes it directly as ArgoCD Application helm.values.
# Bridge-derived values (cluster name, EKS endpoint) are injected via
# helm.parameters overrides in the RGD.
#
# Structure follows the Su-informatics-lab gen3-gitops pattern:
#   ConfigMap values.yaml  → helm.values   (operator preferences)
#   Bridge data            → helm.parameters (infrastructure outputs)
#
# Ref: https://github.com/uc-cdis/gen3-helm/tree/master/helm/cluster-level-resources
# Ref: https://github.com/Su-informatics-lab/gen3-gitops/blob/main/ardac1prd/cluster-level-resources/cluster-values.yaml
# ----------------------------------------------------------------------------
apiVersion: v1
kind: ConfigMap
metadata:
  name: spoke1-cluster-resources-values
  namespace: spoke1
  labels:
    app.kubernetes.io/managed-by: gen3-kro
    gen3.io/tier: cluster-resources
    gen3.io/config-type: values
  annotations:
    argocd.argoproj.io/sync-wave: "25"
data:
  values.yaml: |
    alb-controller:
      enabled: false
      configuration:
        enabled: false
    aws-s3-mountpoint:
      enabled: false
      configuration:
        enabled: false
    calico:
      enabled: false
      configuration:
        enabled: false
    cert-manager:
      enabled: false
    coreDNS:
      enabled: false
      configuration:
        enabled: false
    ebs-csi-driver:
      enabled: false
      configuration:
        enabled: false
    external-secrets:
      enabled: true
    fluentd:
      enabled: false
      configuration:
        enabled: false
    grafana-alloy:
      enabled: false
      configuration:
        enabled: false
    karpenter:
      enabled: false
    karpenter-crds:
      enabled: false
    kube-state-metrics:
      enabled: false
      configuration:
        enabled: false
    metrics-server:
      enabled: false
    vpc-cni:
      enabled: false
      configuration:
        enabled: false
