# # ── AwsGen3Helm1 — Tier 5: Gen3 Application Deployment (~$0 pods) ────────────
# # Deploys the gen3 Helm chart via an ArgoCD Application on the spoke cluster.
# # Reads ALL 10 upstream bridges to construct the Helm values.
# #
# # RGD: 08-helm1-rg.yaml  |  Kind: AwsGen3Helm1
# #
# # PREREQUISITES:
# #   - ALL upstream tiers must be Ready and their bridges must exist:
# #     Foundation (foundation-bridge), Storage (storage-bridge),
# #     Database (database-bridge), Search (search-bridge),
# #     Compute (compute-bridge), IAM (iam-bridge),
# #     Messaging (messaging-bridge), ACM (dns-bridge),
# #     ClusterResources (cluster-resources-bridge),
# #     Advanced (advanced-bridge)
# #   - ArgoCD must be running in the CSOC cluster
# #   - The spoke cluster must be registered in ArgoCD (via ClusterResources1)
# #
# # SERVICE CONFIGURATION (stanfordaimi-matched):
# #   Enabled:  fence, audit, indexd, metadata, peregrine, sheepdog
# #   Disabled: portal, wts, awsEsProxy, hatchery, manifestservice, ssjdispatcher, guppy, requestor, dashboard
# #   DB: dbCreateEnabled=true (gen3-helm init containers create per-service DBs)
# # ----------------------------------------------------------------------------
# apiVersion: kro.run/v1alpha1
# kind: AwsGen3Helm1
# metadata:
#   name: gen3helm
#   namespace: spoke1
#   annotations:
#     argocd.argoproj.io/sync-wave: "30"
#     argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true,ServerSideApply=true
# spec:
#   name: spoke1
#   namespace: spoke1
#   region: us-east-1
#   environment: local

#   # ── ArgoCD configuration ──────────────────────────────────────────────────
#   argoCDNamespace: argocd
#   argoCDProject: default

#   # ── Gen3 Helm chart source ────────────────────────────────────────────────
#   # Uses upstream uc-cdis/gen3-helm Git repo directly.
#   # Defaults are correct (uc-cdis/gen3-helm.git / helm/gen3 / master)
#   gen3HelmRepoURL: https://github.com/uc-cdis/gen3-helm.git
#   gen3HelmPath: helm/gen3
#   gen3HelmTargetRevision: master

