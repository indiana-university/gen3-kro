apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: csoc-controllers
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-20"
spec:
  syncPolicy:
    preserveResourcesOnDeletion: false
  goTemplate: true
  goTemplateOptions:
    - missingkey=error
  generators:
  - clusters:
      selector:
        matchLabels:
          fleet_member: control-plane
  template:
    metadata:
      name: csoc-controllers
    spec:
      project: default
      sources:
      - ref: values
        repoURL: '{{.metadata.annotations.addons_repo_url}}'
        targetRevision: '{{.metadata.annotations.addons_repo_revision}}'
      - repoURL: '{{.metadata.annotations.addons_repo_url}}'
        path: '{{.metadata.annotations.addons_repo_basepath}}csoc/helm/csoc-controllers'
        targetRevision: '{{.metadata.annotations.addons_repo_revision}}'
        helm:
          ignoreMissingValueFiles: true
          valueFiles:
            - $values/{{.metadata.annotations.addons_repo_basepath}}csoc/controllers/values.yaml
            - $values/{{.metadata.annotations.addons_repo_basepath}}csoc/controllers/{{index .metadata.labels "cluster_type" | default "eks"}}-overrides/addons.yaml
      destination:
        namespace: argocd
        name: '{{.name}}'
      syncPolicy:
        automated:
          selfHeal: true
          allowEmpty: true
          prune: true
        retry:
          limit: 5
        syncOptions:
          - CreateNamespace=true
