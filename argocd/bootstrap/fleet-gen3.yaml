# ======================================================================
# fleet-gen3 — Gen3 application workloads on spoke clusters
# ======================================================================
# ONE per namespace/environment — deploys the gen3-helm umbrella chart
# directly to the spoke cluster.
#
# Matches gen3-gitops's per-environment pattern: one Application per
# hostname/namespace, with values from:
#   cluster-fleet/<spoke-alias>/<hostname>/values.yaml
#
# Per-spoke repo support: the repo URL, revision, and basepath are read from
# cluster Secret annotations (fleet_repo_url, fleet_repo_revision,
# fleet_repo_basepath). The hostname folder is read from the gen3.io/hostname
# annotation. Each spoke can point to a different git repository.
#
# REQUIRED cluster Secret annotations (fleet_member: spoke):
#   fleet_repo_url       — git repo containing the cluster-fleet folder
#   fleet_repo_revision  — branch/tag/commit to use
#   fleet_repo_basepath  — path prefix within repo (e.g. "argocd/")
#   gen3.io/hostname     — hostname folder (e.g. "spoke1-dev.example.com")
#   gen3.io/spoke-alias  — spoke folder name within cluster-fleet/
#
# Infrastructure outputs (Aurora endpoint, VPC ID, etc.) are read from
# the spoke secret's gen3.io/* annotations and injected as Helm parameters.
# Actual secrets (DB passwords) are consumed on the spoke via ExternalSecrets
# reading from AWS Secrets Manager.
#
# Gated on infrastructure readiness: the spoke cluster secret only exists
# after the RGD's argoCDClusterSecret node is ready (EKS + Aurora provisioned).
#
# Naming convention:
#   ApplicationSet: fleet-gen3
#   Application:    {spoke-alias}-gen3    (e.g. spoke1-gen3)
#   Helm release:   gen3
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: fleet-gen3
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "50"
spec:
  syncPolicy:
    preserveResourcesOnDeletion: true
  goTemplate: true
  goTemplateOptions:
    - missingkey=error
  generators:
  - clusters:
      selector:
        matchLabels:
          fleet_member: spoke
  template:
    metadata:
      name: '{{index .metadata.annotations "gen3.io/spoke-alias"}}-gen3'
      labels:
        environment: '{{index .metadata.labels "environment"}}'
        fleet_spoke: '{{index .metadata.annotations "gen3.io/spoke-alias"}}'
    spec:
      project: default
      # ── Ignore auto-generated secrets (gen3-helm generates random passwords) ──
      # These Secrets regenerate random values on each Helm render, causing
      # permanent OutOfSync. Ignore the data field so ArgoCD doesn't fight
      # the initial random values already applied to the spoke cluster.
      ignoreDifferences:
        - group: ""
          kind: Secret
          jsonPointers:
            - /data
            - /stringData
      sources:
      # Values ref — per-spoke repo from cluster Secret annotations
      - repoURL: '{{.metadata.annotations.fleet_repo_url}}'
        targetRevision: '{{.metadata.annotations.fleet_repo_revision}}'
        ref: values
      # gen3-helm umbrella chart — deployed directly (no intermediate chart)
      - repoURL: 'https://github.com/uc-cdis/gen3-helm'
        path: 'helm/gen3'
        targetRevision: master
        helm:
          releaseName: 'gen3'
          ignoreMissingValueFiles: true
          parameters:
            # ── Infrastructure outputs (from argoCDClusterSecret annotations) ──
            - name: global.postgres.master.host
              value: '{{index .metadata.annotations "gen3.io/aurora-endpoint"}}'
            - name: global.postgres.master.username
              value: '{{index .metadata.annotations "gen3.io/aurora-master-username"}}'
            - name: global.postgres.master.dbName
              value: '{{index .metadata.annotations "gen3.io/aurora-database-name"}}'
          valueFiles:
            # Hostname-based folder: cluster-fleet/<spoke-alias>/<hostname>/values.yaml
            - '$values/{{.metadata.annotations.fleet_repo_basepath}}cluster-fleet/{{index .metadata.annotations "gen3.io/spoke-alias"}}/{{index .metadata.annotations "gen3.io/hostname"}}/values.yaml'
      destination:
        # Deploy directly to the spoke cluster
        name: '{{.name}}'
        namespace: default
      syncPolicy:
        preserveResourcesOnDeletion: true
        automated:
          selfHeal: true
          allowEmpty: true
          prune: true
        retry:
          limit: 5
          backoff:
            duration: "30s"
            factor: 2
            maxDuration: "5m"
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
