# ======================================================================
# fleet-infra-instances — KRO infrastructure instances
# ======================================================================
# Applies raw KRO Custom Resource YAMLs from
# cluster-fleet/<cluster>/infrastructure/ using a directory source.
#
# Matched by any cluster secret with fleet_member: control-plane:
#   - EKS CSOC:    Terraform-created CSOC cluster secret (argocd-bootstrap module)
#   - Kind (local): cluster secret created by kind-local-test.sh
#
# Each instance is a standalone YAML file (one per RGD tier).
# Uncomment a file's YAML to deploy that tier.
#
# Repo coordinates (fleet_repo_url, fleet_repo_revision, fleet_repo_basepath)
# are read from cluster Secret annotations. Each spoke can point to a
# different git repository.
#
# NAMESPACE PREREQUISITE: The spoke namespace (e.g. 'spoke1') must exist on
# the cluster with the services.k8s.aws/owner-account-id annotation set.
# EKS: Terraform argocd-bootstrap module.  Kind: kind-local-test.sh inject-creds.
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: fleet-infra-instances
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "30"
spec:
  syncPolicy:
    preserveResourcesOnDeletion: true
  goTemplate: true
  goTemplateOptions:
    - missingkey=error
  generators:
  # Matches both EKS CSOC cluster secret and Kind cluster secret.
  # {{.name}} resolves to the cluster alias (e.g. 'local-aws-dev').
  - clusters:
      selector:
        matchLabels:
          fleet_member: control-plane
  template:
    metadata:
      name: '{{.name}}-infra-instance'
      labels:
        fleet_spoke: '{{.name}}'
    spec:
      project: default
      sources:
      # Directory source: applies all *.yaml files in infrastructure/ as raw K8s objects.
      # KRO CRs have argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
      # embedded in their metadata so ArgoCD tolerates missing CRDs at sync time.
      - repoURL: '{{.metadata.annotations.fleet_repo_url}}'
        targetRevision: '{{.metadata.annotations.fleet_repo_revision}}'
        path: '{{.metadata.annotations.fleet_repo_basepath}}cluster-fleet/{{.name}}/infrastructure/'
        directory:
          recurse: false
          include: '*.yaml'
      destination:
        namespace: argocd
        name: '{{.name}}'
      syncPolicy:
        automated:
          selfHeal: false
          allowEmpty: true
          prune: true
        retry:
          limit: 100
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
          - SkipDryRunOnMissingResource=true
      ignoreDifferences:
        - kind: Namespace
          jsonPointers:
            - /metadata/labels
            - /metadata/annotations
            - /metadata/finalizers
