apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: csoc-addons
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-20"
spec:
  syncPolicy:
    preserveResourcesOnDeletion: false
  goTemplate: true
  goTemplateOptions:
    - missingkey=error
  generators:
  - clusters:
      selector:
        matchLabels:
          fleet_member: control-plane
      values:
        addonChart: application-sets
  template:
    metadata:
      name: csoc-addons
    spec:
      project: default
      sources:
      - ref: values
        repoURL: '{{.metadata.annotations.addons_repo_url}}'
        targetRevision: '{{.metadata.annotations.addons_repo_revision}}'
      - repoURL: '{{.metadata.annotations.addons_repo_url}}'
        path: '{{.metadata.annotations.addons_repo_basepath}}charts/{{.values.addonChart}}'
        targetRevision: '{{.metadata.annotations.addons_repo_revision}}'
        helm:
          ignoreMissingValueFiles: true
          valueFiles:
            - $values/{{.metadata.annotations.addons_repo_basepath}}addons/csoc/addons.yaml
            - $values/{{.metadata.annotations.addons_repo_basepath}}cluster-fleet/{{ .name }}/addons.yaml
      destination:
        namespace: argocd
        name: '{{.name}}'
      syncPolicy:
        automated:
          selfHeal: false
          allowEmpty: true
          prune: false
        retry:
          limit: 100
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
---
# Standalone ApplicationSet for ACK CARM namespaces and IAMRoleSelectors.
# Deployed directly (not via the addon framework) so that annotation values
# are injected via explicit Helm parameters — the unambiguous ArgoCD pattern.
# Wave 5: after KRO (wave -30) and ACK controllers (wave 1), before RGDs (wave 10).
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: ack-multi-acct
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  syncPolicy:
    preserveResourcesOnDeletion: false
  goTemplate: true
  goTemplateOptions:
    - missingkey=error
  generators:
  - clusters:
      selector:
        matchLabels:
          fleet_member: control-plane
          enable_multi_acct: "true"
  template:
    metadata:
      name: ack-multi-acct
    spec:
      project: default
      sources:
      - repoURL: '{{.metadata.annotations.addons_repo_url}}'
        path: '{{.metadata.annotations.addons_repo_basepath}}charts/multi-acct'
        targetRevision: '{{.metadata.annotations.addons_repo_revision}}'
        helm:
          releaseName: ack-multi-acct
          # Pass clustersJson as an inline YAML value so it stays as a string
          # (helm --set / --set-string both mis-parse JSON curly braces).
          values: |
            clustersJson: '{{.metadata.annotations.fleet_spokes_json}}'
            clusterName: '{{.metadata.annotations.aws_cluster_name}}'
            ackRoleName: ack-workload-ack-controller
      destination:
        namespace: argocd
        name: '{{.name}}'
      syncPolicy:
        automated:
          selfHeal: true
          allowEmpty: true
          prune: true
        retry:
          limit: 100
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
---
apiVersion: argoproj.io/v1alpha1
