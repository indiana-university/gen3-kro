
# ======================================================================
# fleet-cluster-resources — Cluster-level infrastructure on spoke clusters
# ======================================================================
# ONE per EKS cluster — deploys cluster-wide prerequisites (external-secrets,
# cert-manager, etc.) before Gen3 services arrive.
#
# Matches gen3-gitops's "cluster-level-resources" pattern: one Application
# per cluster, shared across all namespaces/environments on that cluster.
#
# Values are read from:
#   cluster-fleet/<spoke-alias>/cluster-resources/cluster-values.yaml
#
# Per-spoke repo support: the repo URL, revision, and basepath are read from
# cluster Secret annotations (fleet_repo_url, fleet_repo_revision,
# fleet_repo_basepath). Each spoke can point to a different git repository.
#
# REQUIRED cluster Secret annotations (fleet_member: spoke):
#   fleet_repo_url       — git repo containing the cluster-fleet folder
#   fleet_repo_revision  — branch/tag/commit to use
#   fleet_repo_basepath  — path prefix within repo (e.g. "argocd/")
#   gen3.io/spoke-alias  — spoke folder name within cluster-fleet/
#
# Uses our cluster-resources umbrella chart (Helm dependencies) instead of
# gen3-helm's cluster-level-resources (which is an app-of-apps that renders
# ArgoCD Application CRDs — the spoke has no ArgoCD CRDs).
#
# Gated on infrastructure readiness: the spoke cluster secret only exists
# after the RGD's argoCDClusterSecret node is ready (EKS is provisioned).
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: fleet-cluster-resources
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "40"
spec:
  syncPolicy:
    preserveResourcesOnDeletion: true
  goTemplate: true
  goTemplateOptions:
    - missingkey=error
  generators:
  - clusters:
      selector:
        matchLabels:
          fleet_member: spoke
  template:
    metadata:
      name: '{{index .metadata.annotations "gen3.io/spoke-alias"}}-cluster-resources'
      labels:
        environment: '{{index .metadata.labels "environment"}}'
        fleet_spoke: '{{index .metadata.annotations "gen3.io/spoke-alias"}}'
    spec:
      project: default
      sources:
      # Values ref — per-spoke repo from cluster Secret annotations
      - repoURL: '{{.metadata.annotations.fleet_repo_url}}'
        targetRevision: '{{.metadata.annotations.fleet_repo_revision}}'
        ref: values
      # Cluster-resources umbrella chart (external-secrets, etc.)
      - repoURL: '{{.metadata.annotations.fleet_repo_url}}'
        path: '{{.metadata.annotations.fleet_repo_basepath}}charts/cluster-resources/'
        targetRevision: '{{.metadata.annotations.fleet_repo_revision}}'
        helm:
          releaseName: 'cluster-resources'
          ignoreMissingValueFiles: true
          valueFiles:
            # Cluster-resources folder: cluster-fleet/<spoke-alias>/cluster-resources/cluster-values.yaml
            - '$values/{{.metadata.annotations.fleet_repo_basepath}}cluster-fleet/{{index .metadata.annotations "gen3.io/spoke-alias"}}/cluster-resources/cluster-values.yaml'
      destination:
        # Deploy directly to the spoke cluster
        name: '{{.name}}'
        namespace: cluster-resources
      syncPolicy:
        preserveResourcesOnDeletion: true
        automated:
          selfHeal: true
          allowEmpty: true
          prune: false
        retry:
          limit: 100
          backoff:
            duration: "30s"
            factor: 2
            maxDuration: "5m"
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
