# ======================================================================
# fleet-instances — All KRO instance CRs for spoke clusters
# ======================================================================
# Recursively applies all *.yaml files under the cluster's instance root
# (excluding values.yaml and cluster-values.yaml) as a single ArgoCD
# Application per spoke.
#
# Instance root path (from cluster Secret annotation `fleet_instances_path`):
#   EKS CSOC  — not set → defaults to fleet/{{.name}}  (e.g. fleet/spoke1)
#   Kind CSOC — fleet_instances_path: "local-kind/test"
#
# Matched by cluster secrets with enable_infra_instances: "true".
# Deployment ordering: argocd sync-wave + RGD readyWhen bridge externalRefs.
#
# Repo coordinates (fleet_repo_url, fleet_repo_revision, fleet_repo_basepath)
# and fleet_instances_path are read from the cluster Secret annotations.
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: fleet-instances
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "30"
spec:
  syncPolicy:
    preserveResourcesOnDeletion: true
  goTemplate: true
  goTemplateOptions:
    - missingkey=error
  generators:
  - clusters:
      selector:
        matchLabels:
          enable_infra_instances: "true"
  template:
    metadata:
      name: '{{.name}}-fleet-instances'
      labels:
        fleet_spoke: '{{.name}}'
    spec:
      project: default
      sources:
      - repoURL: '{{.metadata.annotations.fleet_repo_url}}'
        targetRevision: '{{.metadata.annotations.fleet_repo_revision}}'
        path: '{{.metadata.annotations.fleet_repo_basepath}}{{if .metadata.annotations.fleet_instances_path}}{{.metadata.annotations.fleet_instances_path}}{{else}}fleet/{{.name}}{{end}}'
        directory:
          recurse: true
          include: '*.yaml'
          exclude: '{values.yaml,cluster-values.yaml}'
      destination:
        namespace: argocd
        name: '{{.name}}'
      syncPolicy:
        automated:
          selfHeal: true
          allowEmpty: true
          prune: true
        retry:
          limit: 100
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
          - SkipDryRunOnMissingResource=true
      ignoreDifferences:
        - kind: Namespace
          jsonPointers:
            - /metadata/labels
            - /metadata/annotations
            - /metadata/finalizers
