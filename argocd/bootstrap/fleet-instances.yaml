# ======================================================================
# fleet-instances — All KRO instance CRs for spoke clusters
# ======================================================================
# Renders the shared kro-aws-instances chart once per spoke as a single ArgoCD
# Application.
#
# Values root path:
#   spokes/{{.name}}/infrastucture-values.yaml
#
# Matched by cluster secrets with enable_infra_instances: "true".
# Deployment ordering: argocd sync-wave + RGD readyWhen bridge externalRefs.
#
# Repo coordinates (fleet_repo_url, fleet_repo_revision, fleet_repo_basepath)
# are read from the cluster Secret annotations.
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: fleet-instances
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "30"
spec:
  syncPolicy:
    preserveResourcesOnDeletion: true
  goTemplate: true
  goTemplateOptions:
    - missingkey=error
  generators:
  - clusters:
      selector:
        matchLabels:
          enable_infra_instances: "true"
  template:
    metadata:
      name: '{{.name}}-fleet-instances'
      labels:
        fleet_spoke: '{{.name}}'
    spec:
      project: default
      sources:
      - ref: values
        repoURL: '{{.metadata.annotations.fleet_repo_url}}'
        targetRevision: '{{.metadata.annotations.fleet_repo_revision}}'

      - repoURL: '{{.metadata.annotations.fleet_repo_url}}'
        targetRevision: '{{.metadata.annotations.fleet_repo_revision}}'
        path: '{{.metadata.annotations.fleet_repo_basepath}}csoc/helm/kro-aws-instances'
        helm:
          releaseName: kro-aws-instances
          valueFiles:
            - $values/{{.metadata.annotations.fleet_repo_basepath}}spokes/{{.name}}/infrastucture-values.yaml
      destination:
        namespace: argocd
        name: '{{.name}}'
      syncPolicy:
        automated:
          selfHeal: true
          allowEmpty: true
          prune: true
        retry:
          limit: 5
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
      ignoreDifferences:
        - kind: Namespace
          jsonPointers:
            - /metadata/labels
            - /metadata/annotations
            - /metadata/finalizers
