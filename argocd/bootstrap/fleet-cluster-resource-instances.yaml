# ======================================================================
# fleet-cluster-resource-instances — KRO cluster-resources instances
# ======================================================================
# Applies AwsGen3ClusterResources1 CRs from
# cluster-fleet/<cluster>/cluster-resources/ to register spoke EKS clusters
# with CSOC ArgoCD and deploy cluster-wide prerequisites (external-secrets,
# cert-manager, etc.).
#
# Runs at wave 35 — AFTER fleet-infra-instances (wave 30) so infrastructure
# bridges (especially computeBridge) are reconciled before KRO renders the
# cluster Secret and cluster-resources Application.
#
# Each CR instance creates:
#   - ArgoCD cluster Secret (spoke EKS registration)
#   - ArgoCD Application deploying cluster-resources chart to the spoke
#   - clusterResourcesBridge ConfigMap (gates fleet-applications-instances)
#
# Repo coordinates are read from cluster Secret annotations.
# Selector: fleet_member: control-plane (same as fleet-infra-instances).
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: fleet-cluster-resource-instances
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "35"
spec:
  syncPolicy:
    preserveResourcesOnDeletion: true
  goTemplate: true
  goTemplateOptions:
    - missingkey=error
  generators:
  - clusters:
      selector:
        matchLabels:
          fleet_member: control-plane
  template:
    metadata:
      name: '{{.name}}-cluster-resource-instances'
      labels:
        fleet_spoke: '{{.name}}'
    spec:
      project: default
      sources:
      # Directory source: applies all *.yaml files in cluster-resources/ as raw K8s objects.
      # KRO CRs have argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
      # embedded in their metadata so ArgoCD tolerates missing CRDs at sync time.
      - repoURL: '{{.metadata.annotations.fleet_repo_url}}'
        targetRevision: '{{.metadata.annotations.fleet_repo_revision}}'
        path: '{{.metadata.annotations.fleet_repo_basepath}}cluster-fleet/{{.name}}/cluster-resources/'
        directory:
          recurse: false
          include: '*.yaml'
      destination:
        namespace: argocd
        name: '{{.name}}'
      syncPolicy:
        automated:
          selfHeal: false
          allowEmpty: true
          prune: true
        retry:
          limit: 100
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
          - SkipDryRunOnMissingResource=true
      ignoreDifferences:
        - kind: Namespace
          jsonPointers:
            - /metadata/labels
            - /metadata/annotations
            - /metadata/finalizers
