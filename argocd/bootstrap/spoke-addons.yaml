# ======================================================================
# spoke-addons — Deploy addons to KRO-provisioned spoke clusters
# ======================================================================
# Uses a simple cluster generator targeting KRO-created spoke secrets
# (fleet_member: spoke).  Repo coordinates are supplied as static values
# because the spoke secret (created by the RGD) does not carry repo
# annotations — those live only on the Terraform-created control-plane
# and fleet-spoke-infra secrets.
#
# A matrix generator cannot be used here: with goTemplate, Child 2's
# values-templates are pre-rendered against Child 1's params, so the
# control-plane's annotations are unreachable when spoke is Child 1.
#
# This naturally gates addon deployment on infrastructure readiness:
# the spoke cluster secret only exists after the RGD's argoCDClusterSecret
# node is ready (i.e. EKS is provisioned and registered with ArgoCD).
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: spoke-addons
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "20"
spec:
  syncPolicy:
    preserveResourcesOnDeletion: false
  goTemplate: true
  goTemplateOptions:
    - missingkey=error
  generators:
  - clusters:
      selector:
        matchLabels:
          fleet_member: spoke
      values:
        # Static repo coordinates — must match the bootstrap ApplicationSet
        # source.  Update here if the repo URL or branch changes.
        addonsRepoUrl: 'https://github.com/indiana-university/gen3-kro.git'
        addonsRepoRevision: 'Version2'
        addonsRepoBasepath: 'argocd/'
        addonChart: application-sets
  template:
    metadata:
      name: spoke-addons-{{.name}}
    spec:
      project: default
      sources:
      - ref: values
        repoURL: '{{.values.addonsRepoUrl}}'
        targetRevision: '{{.values.addonsRepoRevision}}'
      - repoURL: '{{.values.addonsRepoUrl}}'
        path: '{{.values.addonsRepoBasepath}}charts/{{.values.addonChart}}'
        targetRevision: '{{.values.addonsRepoRevision}}'
        helm:
          ignoreMissingValueFiles: true
          valueFiles:
            - $values/{{.values.addonsRepoBasepath}}addons/environments/{{index .metadata.labels "environment"}}/addons.yaml
            - $values/{{.values.addonsRepoBasepath}}cluster-fleet/{{index .metadata.annotations "gen3.io/spoke-alias"}}/addons.yaml
      destination:
        namespace: argocd
        name: '{{.name}}'
      syncPolicy:
        automated:
          selfHeal: false
          allowEmpty: true
          prune: false
        retry:
          limit: 100
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
