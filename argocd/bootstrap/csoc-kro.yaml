# Deploys KRO ResourceGraphDefinitions separately from the controller AppSets.
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: csoc-kro
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "10"
spec:
  syncPolicy:
    preserveResourcesOnDeletion: false
  goTemplate: true
  goTemplateOptions:
    - missingkey=error
  generators:
  - clusters:
      selector:
        matchLabels:
          fleet_member: control-plane
          enable_kro_csoc_rgs: "true"
  template:
    metadata:
      name: csoc-kro
      annotations:
        argocd.argoproj.io/sync-wave: "10"
    spec:
      project: default
      source:
        repoURL: '{{.metadata.annotations.addons_repo_url}}'
        targetRevision: '{{.metadata.annotations.addons_repo_revision}}'
        path: '{{.metadata.annotations.addons_repo_basepath}}csoc/kro'
        directory:
          recurse: true
      destination:
        namespace: kro
        name: '{{.name}}'
      syncPolicy:
        automated:
          selfHeal: true
          allowEmpty: true
          prune: true
        retry:
          limit: 5
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
