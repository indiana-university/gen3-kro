# Gen3 Wrapper Chart Values
# This chart wraps the external Gen3 Helm chart from uc-cdis/gen3-helm
# Configure Gen3-specific values here

gen3:
  enabled: true
  
  # Global Gen3 configuration
  global:
    # Environment (dev, staging, prod)
    environment: dev
    
    # Domain configuration
    hostname: "gen3.example.com"
    
    # AWS region (overridden by ArgoCD)
    aws:
      region: "us-east-1"
    
    # PostgreSQL configuration
    postgres:
      master:
        username: "postgres"
        # Password should be managed via Kubernetes/AWS Secrets
        # existingSecret: "gen3-postgres-secret"
    
    # OIDC/Authentication configuration
    oidc:
      enabled: false
      # Configure OIDC provider when ready
  
  # Gen3 services configuration
  # Override specific services as needed
  fence:
    enabled: true
    # Add fence-specific configuration
  
  sheepdog:
    enabled: true
    # Add sheepdog-specific configuration
  
  peregrine:
    enabled: true
    # Add peregrine-specific configuration
  
  pidgin:
    enabled: true
  
  indexd:
    enabled: true
  
  arborist:
    enabled: true
  
  # Portal/frontend
  portal:
    enabled: true
    gitops:
      # Git repository for portal configuration
      repository: "https://github.com/uc-cdis/data-portal-config"
      path: "/"
  
  # ETL and data processing
  manifestservice:
    enabled: false
  
  # AWS-specific services
  aws:
    enabled: true
    
# Additional Kubernetes resources
# Add custom ConfigMaps, Secrets, etc. in templates/ directory

# Resource quotas and limits
resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "1000m"
    memory: "1Gi"

# Node selectors and tolerations
nodeSelector: {}
tolerations: []
affinit