{{/*
workloads.yaml — renders ArgoCD Applications for spoke clusters.

Two types of Applications are rendered:
  1. Cluster-level resources (external-secrets, cert-manager, Karpenter, etc.)
     from gen3-helm's cluster-level-resources chart — deployed to the spoke
     cluster directly.
  2. Application workloads (Gen3 services) — each enabled workload becomes
     an ArgoCD Application pointing at the spoke cluster.

Infrastructure outputs (Aurora endpoint, VPC ID, etc.) are passed from the
fleet-workloads ApplicationSet as .Values.infraOutputs and injected as
helm.parameters on the generated Application.

Cluster selection:
  - Default: Uses top-level .Values.clusterName (set by the ApplicationSet).
  - Override: Each entry can set its own clusterName.
*/}}

{{/* ── Cluster-Level Resources ───────────────────────────────────── */}}
{{- range $name, $cr := .Values.clusterResources }}
{{- if $cr.enabled }}
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: {{ $.Values.spokeNamespace | default $.Release.Namespace }}-{{ $name }}
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: {{ $cr.syncWave | default "20" | quote }}
  labels:
    app.kubernetes.io/managed-by: workloads-chart
    gen3.io/cluster-resource: {{ $name | quote }}
    gen3.io/spoke: {{ $.Values.spokeNamespace | default $.Release.Namespace | quote }}
spec:
  project: default
  sources:
  - repoURL: {{ $cr.spec.helmRepo }}
    targetRevision: {{ $cr.spec.helmRevision | default "master" }}
    {{- if $cr.spec.helmChart }}
    chart: {{ $cr.spec.helmChart }}
    {{- else }}
    path: {{ $cr.spec.helmPath }}
    {{- end }}
    helm:
      releaseName: {{ $name }}
      {{- if $cr.spec.values }}
      values: |
        {{- $cr.spec.values | nindent 8 }}
      {{- end }}
      {{- if $cr.spec.valueFiles }}
      valueFiles:
        {{- range $cr.spec.valueFiles }}
        - {{ . | quote }}
        {{- end }}
      {{- end }}
  {{- if $cr.spec.valuesRef }}
  - repoURL: {{ $cr.spec.valuesRef.repoURL }}
    targetRevision: {{ $cr.spec.valuesRef.targetRevision | default "master" }}
    ref: values
  {{- end }}
  destination:
    name: {{ $cr.clusterName | default $.Values.clusterName }}
    namespace: {{ $cr.namespace | default "argocd" }}
  syncPolicy:
    automated:
      selfHeal: true
      prune: false
    retry:
      limit: 10
      backoff:
        duration: "30s"
        factor: 2
        maxDuration: "5m"
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
{{- end }}
{{- end }}

{{/* ── Application Workloads ─────────────────────────────────────── */}}
{{- range $name, $wl := .Values.workloads }}
{{- if $wl.enabled }}
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: {{ $.Values.spokeNamespace | default $.Release.Namespace }}-{{ $name }}
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: {{ $wl.syncWave | default "50" | quote }}
  labels:
    app.kubernetes.io/managed-by: workloads-chart
    gen3.io/workload: {{ $name | quote }}
    gen3.io/spoke: {{ $.Values.spokeNamespace | default $.Release.Namespace | quote }}
spec:
  project: default
  source:
    repoURL: {{ $wl.spec.helmRepo }}
    targetRevision: {{ $wl.spec.helmRevision | default "master" }}
    path: {{ $wl.spec.helmPath }}
    helm:
      releaseName: {{ $name }}
      {{- if $wl.spec.values }}
      values: |
        {{- $wl.spec.values | nindent 8 }}
      {{- end }}
      {{- /*
        Inject infrastructure outputs as Helm parameters.
        Parameters override values (last-writer-wins), so the Aurora endpoint
        from the RGD replaces any placeholder in the static values block.
        Only non-sensitive metadata is passed here; DB passwords are handled
        by ExternalSecrets on the spoke cluster.
      */}}
      {{- if and $.Values.infraOutputs $.Values.infraOutputs.auroraEndpoint }}
      parameters:
        - name: global.postgres.master.host
          value: {{ $.Values.infraOutputs.auroraEndpoint | quote }}
        - name: global.postgres.master.username
          value: {{ $.Values.infraOutputs.auroraMasterUsername | default "postgres" | quote }}
        {{- if $.Values.infraOutputs.auroraDatabaseName }}
        - name: global.postgres.master.dbName
          value: {{ $.Values.infraOutputs.auroraDatabaseName | quote }}
        {{- end }}
      {{- end }}
  destination:
    name: {{ $wl.clusterName | default $.Values.clusterName | default (printf "%s-%s" ($.Values.spokeNamespace | default $.Release.Namespace) ($.Values.spokeNamespace | default $.Release.Namespace)) }}
    namespace: {{ $wl.namespace | default "default" }}
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
    retry:
      limit: 5
      backoff:
        duration: "30s"
        factor: 2
        maxDuration: "5m"
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
{{- end }}
{{- end }}
