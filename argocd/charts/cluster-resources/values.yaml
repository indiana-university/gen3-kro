# Default values for cluster-resources chart.
# Per-spoke overrides are in cluster-fleet/<spoke>/cluster-resources.yaml.
#
# ONE instance per EKS cluster — shared across all namespaces/environments
# on that cluster (matches gen3-gitops's cluster-level-resources pattern).
#
# NOTE: Standard EKS with managed node groups requires explicit add-on
# management. Add cluster-wide components that must be deployed before
# Gen3 services (vpc-cni, CoreDNS, kube-proxy are EKS-managed add-ons;
# external-secrets and cert-manager are user-managed).

# ── External Secrets Operator ────────────────────────────────────────
external-secrets:
  enabled: false
  # serviceAccount:
  #   name: "external-secrets-sa"

# ── cert-manager (TLS certificate management) ────────────────────────
cert-manager:
  enabled: false
  crds:
    enabled: true
    keep: true
