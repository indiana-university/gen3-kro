# AwsGen3Database1 — Tier 1: Database (Modular RGD v1)
apiVersion: kro.run/v1alpha1
kind: ResourceGraphDefinition
metadata:
  name: awsgen3database1
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  schema:
    apiVersion: v1alpha1
    kind: AwsGen3Database1
    spec:
      name: string | required=true
      namespace: string | required=true
      adoptionPolicy: string | default="adopt-or-create"
      deletionPolicy: string | default="delete"
      infrastructureConfigMapName: string | default="infrastructure-values"
      foundationBridgeName: string | default="foundation-bridge"
      esoAwsCredsSecretName: string | default="eso-aws-credentials"
      databaseBridgeName: string | default="database-bridge"

    status:
      # Aurora
      auroraClusterEndpoint: ${auroraCluster.status.?endpoint.orValue("loading")}
      auroraReaderEndpoint: ${auroraCluster.status.?readerEndpoint.orValue("loading")}
      auroraClusterARN: ${auroraCluster.status.?ackResourceMetadata.?arn.orValue("loading")}
      auroraInstanceARN: ${auroraInstance1.status.?ackResourceMetadata.?arn.orValue("loading")}

  resources:

    - id: spokeNamespace
      externalRef:
        apiVersion: v1
        kind: Namespace
        metadata:
          name: ${schema.spec.namespace}

    - id: infrastructureConfig
      readyWhen:
        - ${infrastructureConfig.metadata.?name.orValue('null') != 'null'}
      externalRef:
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: ${schema.spec.infrastructureConfigMapName}
          namespace: ${schema.spec.namespace}

    - id: foundationBridge
      readyWhen:
        - ${foundationBridge.metadata.?name.orValue('null') != 'null'}
      externalRef:
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: ${schema.spec.foundationBridgeName}
          namespace: ${schema.spec.namespace}

  # Test 8: two opposite-includeWhen SecretStores — selected by database-eso-use-irsa

    - id: secretStoreLocal
      includeWhen:
        - ${infrastructureConfig.data['database-eso-use-irsa'] != 'true'}
      readyWhen:
        - ${secretStoreLocal.metadata.?name.orValue('null') != 'null'}
      template:
        apiVersion: external-secrets.io/v1
        kind: SecretStore
        metadata:
          name: gen3-secret-store
          namespace: ${schema.spec.namespace}
          labels:
            app.kubernetes.io/managed-by: kro
            gen3.io/tier: database
        spec:
          provider:
            aws:
              service: SecretsManager
              region: ${infrastructureConfig.data['aws-region']}
              auth:
                secretRef:
                  accessKeyIDSecretRef:
                    name: ${schema.spec.esoAwsCredsSecretName}
                    key: access-key
                  secretAccessKeySecretRef:
                    name: ${schema.spec.esoAwsCredsSecretName}
                    key: secret-access-key

    # EKS Pod Identity — no explicit credentials needed
    - id: secretStoreIRSA
      includeWhen:
        - ${infrastructureConfig.data['database-eso-use-irsa'] == 'true'}
      readyWhen:
        - ${secretStoreIRSA.metadata.?name.orValue('null') != 'null'}
      template:
        apiVersion: external-secrets.io/v1
        kind: SecretStore
        metadata:
          name: gen3-secret-store
          namespace: ${schema.spec.namespace}
          labels:
            app.kubernetes.io/managed-by: kro
            gen3.io/tier: database
        spec:
          provider:
            aws:
              service: SecretsManager
              region: ${infrastructureConfig.data['aws-region']}
              # No auth — ESO uses EKS Pod Identity ambient credentials

    # AWS SM → K8s Secret "aurora-master-password"; referenced by ACK DBCluster masterUserPassword
    - id: auroraMasterPasswordES
      readyWhen:
        - ${auroraMasterPasswordES.status.?conditions.orValue([]).exists(c, c.type == "Ready" && c.status == "True")}
      template:
        apiVersion: external-secrets.io/v1
        kind: ExternalSecret
        metadata:
          name: aurora-master-password
          namespace: ${schema.spec.namespace}
          labels:
            app.kubernetes.io/managed-by: kro
            gen3.io/tier: database
        spec:
          refreshInterval: 5m
          secretStoreRef:
            name: gen3-secret-store
            kind: SecretStore
          target:
            name: aurora-master-password
            creationPolicy: Owner
          data:
            - secretKey: password
              remoteRef:
                key: ${infrastructureConfig.data['database-aurora-master-password-sm-name']}
                property: password

    - id: auroraCluster
      readyWhen:
        - ${auroraCluster.status.?ackResourceMetadata.?arn.orValue('null') != 'null'}
        - ${auroraCluster.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
        - ${auroraCluster.status.?status.orValue('null') == 'available'}
      template:
        apiVersion: rds.services.k8s.aws/v1alpha1
        kind: DBCluster
        metadata:
          name: ${schema.spec.name}-aurora
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${infrastructureConfig.data['aws-region']}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          dbClusterIdentifier: ${schema.spec.name}-aurora
          engine: aurora-postgresql
          engineVersion: ${infrastructureConfig.data['database-aurora-engine-version']}
          databaseName: ${infrastructureConfig.data['database-aurora-db-name']}
          port: 5432
          masterUsername: ${infrastructureConfig.data['database-aurora-master-username']}
          # CEL ref ensures auroraMasterPasswordES is Ready before Aurora cluster is created
          masterUserPassword:
            name: ${auroraMasterPasswordES.metadata.name}
            namespace: ${schema.spec.namespace}
            key: password
          dbSubnetGroupName: ${foundationBridge.data['db-subnet-group-name']}
          vpcSecurityGroupIDs:
            - ${foundationBridge.data['aurora-sg-id']}
          storageEncrypted: true
          kmsKeyID: ${foundationBridge.data['database-key-arn']}
          serverlessV2ScalingConfiguration:
            minCapacity: ${double(infrastructureConfig.data['database-aurora-min-capacity'])}
            maxCapacity: ${double(infrastructureConfig.data['database-aurora-max-capacity'])}
          backupRetentionPeriod: 7
          enableCloudwatchLogsExports:
            - postgresql
          tags:
            - key: Name
              value: ${schema.spec.name}-aurora
            - key: Environment
              value: ${infrastructureConfig.data['aws-environment']}
            - key: ManagedBy
              value: Kro
            - key: Project
              value: ${infrastructureConfig.data['aws-project']}

    - id: auroraInstance1
      readyWhen:
        - ${auroraInstance1.status.?ackResourceMetadata.?arn.orValue('null') != 'null'}
        - ${auroraInstance1.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
        - ${auroraInstance1.status.?dbInstanceStatus.orValue('null') == 'available'}
      template:
        apiVersion: rds.services.k8s.aws/v1alpha1
        kind: DBInstance
        metadata:
          name: ${schema.spec.name}-aurora-instance-1
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${infrastructureConfig.data['aws-region']}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          dbInstanceIdentifier: ${schema.spec.name}-aurora-instance-1
          dbClusterIdentifier: ${auroraCluster.spec.dbClusterIdentifier}
          dbInstanceClass: db.serverless
          engine: aurora-postgresql
          tags:
            - key: Name
              value: ${schema.spec.name}-aurora-instance-1
            - key: Environment
              value: ${infrastructureConfig.data['aws-environment']}
            - key: ManagedBy
              value: Kro
            - key: Project
              value: ${infrastructureConfig.data['aws-project']}

    - id: auroraInstance2
      includeWhen:
        - ${infrastructureConfig.data['database-enable-read-replica'] == 'true'}
      readyWhen:
        - ${auroraInstance2.status.?ackResourceMetadata.?arn.orValue('null') != 'null'}
        - ${auroraInstance2.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
        - ${auroraInstance2.status.?dbInstanceStatus.orValue('null') == 'available'}
      template:
        apiVersion: rds.services.k8s.aws/v1alpha1
        kind: DBInstance
        metadata:
          name: ${schema.spec.name}-aurora-instance-2
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${infrastructureConfig.data['aws-region']}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          dbInstanceIdentifier: ${schema.spec.name}-aurora-instance-2
          dbClusterIdentifier: ${auroraCluster.spec.dbClusterIdentifier}
          dbInstanceClass: db.serverless
          engine: aurora-postgresql
          tags:
            - key: Name
              value: ${schema.spec.name}-aurora-instance-2
            - key: Environment
              value: ${infrastructureConfig.data['aws-environment']}
            - key: ManagedBy
              value: Kro
            - key: Project
              value: ${infrastructureConfig.data['aws-project']}

    - id: databaseBridge
      readyWhen:
        - ${databaseBridge.metadata.?name.orValue('null') != 'null'}
      template:
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: ${schema.spec.databaseBridgeName}
          namespace: ${schema.spec.namespace}
          labels:
            app.kubernetes.io/managed-by: kro
            gen3.io/tier: database
            gen3.io/bridge: "true"
        data:
          aurora-cluster-endpoint: ${auroraCluster.status.?endpoint}
          aurora-reader-endpoint: ${auroraCluster.status.?readerEndpoint}
          aurora-cluster-arn: ${auroraCluster.status.?ackResourceMetadata.?arn}
          aurora-port: "5432"
          aurora-master-username: ${infrastructureConfig.data['database-aurora-master-username']}
          aurora-database-name: ${infrastructureConfig.data['database-aurora-db-name']}
          # SM key name for downstream ESO (gen3-helm global.postgres.externalSecret)
          aurora-master-password-sm-name: ${infrastructureConfig.data['database-aurora-master-password-sm-name']}
