              targetRevision: ${schema.spec.helmChartTargetRevision}
              helm:
                releaseName: cluster-level-resources
                valueFiles:
                  - "$values/${schema.spec.valuesBasePath != '' ? schema.spec.valuesBasePath : 'argocd/fleet/' + schema.spec.namespace}/cluster-level-resources/cluster-values.yaml"
                parameters:
                  - name: cluster
                    value: ${schema.spec.name}
                  - name: project
                    value: ${infrastructureConfig.data['cluster-project']}
                  - name: eksClusterEndpoint
                    value: ${computeBridge.data['eks-cluster-endpoint']}
                  - name: eksClusterName
                    value: ${computeBridge.data['eks-cluster-name']}
                  - name: accountNumber
                    value: ${spokeNamespace.metadata.annotations['services.k8s.aws/owner-account-id']}
                  # Pass-through from ConfigMap for configurable add-ons
                  - name: alb-controller.enabled
                    value: ${infrastructureConfig.data['cluster-resources-alb-controller-enabled']}
                  - name: alb-controller.serviceAccount.annotations.eks\.amazonaws\.com/role-arn
                    value: ${iamBridge.data['alb-controller-role-arn']}
                  - name: external-secrets.enabled
                    value: ${infrastructureConfig.data['cluster-resources-external-secrets-enabled']}
                  - name: cert-manager.enabled
                    value: ${infrastructureConfig.data['cluster-resources-cert-manager-enabled']}
                  - name: aws-s3-mountpoint.enabled
