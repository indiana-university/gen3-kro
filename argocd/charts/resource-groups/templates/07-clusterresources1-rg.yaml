# AwsGen3ClusterResources1 — Tier 4.5: Spoke Cluster Registration + Prerequisites
#
# Registers the spoke EKS cluster in CSOC ArgoCD and deploys the upstream
# uc-cdis/gen3-helm "cluster-level-resources" app-of-apps chart to the spoke.
# This is the Gen3 canonical chart for cluster-wide infrastructure: ALB
# controller, Karpenter, external-secrets, cert-manager, metrics-server, etc.
#
# Ref: https://github.com/uc-cdis/gen3-helm/tree/master/helm/cluster-level-resources
#
# Values architecture (3-layer):
#   1. ConfigMap values.yaml key  → helm.values  (operator preferences)
#   2. Bridge data                → helm.parameters (infrastructure outputs)
#   3. Schema spec                → helm.parameters (identity: cluster, project)
#
# Creates three resources:
#   1. argoCDClusterSecret — registers the spoke EKS cluster in CSOC ArgoCD
#   2. clusterResourcesApp — ArgoCD Application deploying cluster-level-resources
#   3. clusterResourcesBridge — bridge ConfigMap for downstream RGDs
#
# Deletion safety:
#   clusterResourcesApp does NOT use resources-finalizer.argocd.argoproj.io.
#   Spoke resources are orphaned on Application delete to prevent rollback
#   hang when the spoke cluster is unreachable.
#
# Prerequisites:
#   - Compute1 deployed with computeBridge
#   - Values ConfigMap applied (00-values.yaml)
#
# Sync-wave ordering:
#   Wave 30 instance — after fleet-infra-instances (wave 15-25)

apiVersion: kro.run/v1alpha1
kind: ResourceGraphDefinition
metadata:
  name: awsgen3clusterresources1
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  schema:
    apiVersion: v1alpha1
    kind: AwsGen3ClusterResources1
    spec:
      # ── Identity ──────────────────────────────────────────────────
      name: string | required=true
      namespace: string | required=true
      environment: string | default="dev"
      project: string | default="gen3"

      # ── ArgoCD ───────────────────────────────────────────────────
      argoCDNamespace: string | default="argocd"
      argoCDProject: string | default="default"

      # ── Compute Bridge Reference ──────────────────────────────────
      computeBridgeName: string | default="compute-bridge"

      # ── Upstream gen3-helm chart (cluster-level-resources) ──────────────
      # Uses the canonical uc-cdis/gen3-helm cluster-level-resources chart.
      # The upstream chart already supports destinationServer for hub-spoke
      # (CSOC→spoke) deployment — no chart fork needed.
      helmChartRepoURL: string | default="https://github.com/uc-cdis/gen3-helm.git"
      helmChartPath: string | default="helm/cluster-level-resources"
      helmChartTargetRevision: string | default="master"

      # ── GitOps Values Source ────────────────────────────────────────
      # The gitops repo (default: gen3-kro itself) provides cluster-values.yaml
      # via a $values ref. Resolved path:
      #   {valuesBasePath}/cluster-level-resources/cluster-values.yaml
      # valuesBasePath defaults to argocd/fleet/{namespace} (EKS layout).
      # Set valuesBasePath to override for alternative layouts (e.g.
      # argocd/local-kind/test for Kind, which has no namespace subdir).
      valuesRepoURL: string | default="https://github.com/indiana-university/gen3-kro.git"
      valuesRevision: string | default="main"
      valuesBasePath: string | default=""

      # ── Bridge References ─────────────────────────────────────────
      iamBridgeName: string | default="iam-bridge"

      # ── Bridge Name Override ──────────────────────────────────────
      clusterResourcesBridgeName: string | default="cluster-resources-bridge"
    status:
      ready: ${clusterResourcesBridge.metadata.?name.orValue("loading")}
      argoCDClusterName: ${clusterResourcesBridge.data['argocd-cluster-name']}
      clusterRegistered: ${argoCDClusterSecret.metadata.?name.orValue("loading")}
      appHealthStatus: ${clusterResourcesApp.status.?health.?status.orValue("loading")}
      appSyncStatus: ${clusterResourcesApp.status.?sync.?status.orValue("loading")}

  resources:
  # ====================================================================
  # Layer 0: External References
  # ====================================================================

    - id: spokeNamespace
      externalRef:
        apiVersion: v1
        kind: Namespace
        metadata:
          name: ${schema.spec.namespace}

    - id: computeBridge
      readyWhen:
        - ${computeBridge.metadata.?name.orValue('null') != 'null'}
      externalRef:
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: ${schema.spec.computeBridgeName}
          namespace: ${schema.spec.namespace}

    - id: iamBridge
      readyWhen:
        - ${iamBridge.metadata.?name.orValue('null') != 'null'}
      externalRef:
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: ${schema.spec.iamBridgeName}
          namespace: ${schema.spec.namespace}

  # ====================================================================
  # ArgoCD Cluster Secret (spoke EKS registration via IAM auth)
  # ====================================================================
  # Registers the spoke EKS cluster in CSOC ArgoCD. Uses awsAuthConfig
  # with the ArgoCD spoke access IAM role created by Compute1.
  # ArgoCD server STS-assumes this role to authenticate to the spoke EKS.

    - id: argoCDClusterSecret
      readyWhen:
        - ${argoCDClusterSecret.metadata.?name.orValue('null') != 'null'}
      template:
        apiVersion: v1
        kind: Secret
        metadata:
          name: ${schema.spec.name}-spoke-cluster
          namespace: ${schema.spec.argoCDNamespace}
          labels:
            argocd.argoproj.io/secret-type: cluster
            app.kubernetes.io/managed-by: kro
            gen3.io/tier: cluster-resources
            gen3.io/spoke: ${schema.spec.name}
            fleet_member: spoke
            environment: ${schema.spec.environment}
        type: Opaque
        stringData:
          name: ${schema.spec.name}-spoke
          server: ${computeBridge.data['eks-cluster-endpoint']}
          config: |
            {
              "awsAuthConfig": {
                "clusterName": "${computeBridge.data['eks-cluster-name']}",
                "roleARN": "${computeBridge.data['argocd-spoke-access-arn']}"
              },
              "tlsClientConfig": {
                "caData": "${computeBridge.data['eks-cluster-ca']}"
              }
            }

  # ====================================================================
  # ArgoCD Application: cluster-level-resources (app-of-apps) → spoke
  # ====================================================================
  # Deploys the cluster-level-resources app-of-apps chart. The parent
  # Application targets the CSOC (in-cluster) so the rendered child
  # ArgoCD Application CRs land where ArgoCD can process them.
  # The child apps deploy their workloads to the spoke via the
  # destinationServer helm.parameter override.
  #
  # Ref: https://github.com/uc-cdis/gen3-helm/tree/master/helm/cluster-level-resources

    - id: clusterResourcesApp
      readyWhen:
        - ${clusterResourcesApp.metadata.?name.orValue('null') != 'null'}
        - ${clusterResourcesApp.status.?health.?status.orValue('Unknown') == 'Healthy'}
      template:
        apiVersion: argoproj.io/v1alpha1
        kind: Application
        metadata:
          name: ${schema.spec.name}-cluster-resources
          namespace: ${schema.spec.argoCDNamespace}
          labels:
            app.kubernetes.io/managed-by: kro
            gen3.io/tier: cluster-resources
            gen3.io/spoke: ${schema.spec.name}
          annotations:
            argocd.argoproj.io/cascade: "orphan"
        spec:
          project: ${schema.spec.argoCDProject}
          sources:
            # ── Source 1: cluster-level-resources chart ───────────
            - repoURL: ${schema.spec.helmChartRepoURL}
              path: ${schema.spec.helmChartPath}
              targetRevision: ${schema.spec.helmChartTargetRevision}
              helm:
                releaseName: cluster-level-resources
                valueFiles:
                  - "$values/${schema.spec.valuesBasePath != '' ? schema.spec.valuesBasePath : 'argocd/fleet/' + schema.spec.namespace}/cluster-level-resources/cluster-values.yaml"
                parameters:
                  - name: cluster
                    value: ${schema.spec.name}
                  - name: project
                    value: ${schema.spec.project}
                  - name: eksClusterEndpoint
                    value: ${computeBridge.data['eks-cluster-endpoint']}
                  # AWS account ID — used by the chart to construct addon IAM role ARNs
                  - name: accountNumber
                    value: ${spokeNamespace.metadata.annotations['services.k8s.aws/owner-account-id']}
                  # ── IRSA: cluster-level roles ────────────────────
                  - name: alb-controller.serviceAccount.annotations.eks\.amazonaws\.com/role-arn
                    value: ${iamBridge.data['alb-controller-role-arn']}
                  - name: karpenter.serviceAccount.annotations.eks\.amazonaws\.com/role-arn
                    value: ${iamBridge.data['karpenter-role-arn']}
                  - name: aws-s3-mountpoint.serviceAccount.annotations.eks\.amazonaws\.com/role-arn
                    value: ${iamBridge.data['s3-csi-driver-role-arn']}
            # ── Source 2: gitops values ($values ref) ─────────────
            - repoURL: ${schema.spec.valuesRepoURL}
              targetRevision: ${schema.spec.valuesRevision}
              ref: values
          destination:
            # Deploy chart (Application CRs) to the spoke cluster's ArgoCD namespace.
            # The chart's child Applications use https://kubernetes.default.svc which
            # resolves to the spoke itself when ArgoCD runs on the spoke.
            name: ${schema.spec.name}-spoke
            namespace: ${schema.spec.argoCDNamespace}
          syncPolicy:
            automated:
              selfHeal: true
              allowEmpty: true
              prune: false
            retry:
              limit: 100
              backoff:
                duration: "30s"
                factor: 2
                maxDuration: "5m"
            syncOptions:
              - CreateNamespace=true
              - ServerSideApply=true

  # ====================================================================
  # BRIDGE: Cluster Resources Outputs ConfigMap
  # ====================================================================

    - id: clusterResourcesBridge
      readyWhen:
        - ${clusterResourcesBridge.metadata.?name.orValue('null') != 'null'}
      template:
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: ${schema.spec.clusterResourcesBridgeName}
          namespace: ${schema.spec.namespace}
          labels:
            app.kubernetes.io/managed-by: kro
            gen3.io/tier: cluster-resources
            gen3.io/bridge: "true"
        data:
          # ── ArgoCD spoke registration (used by Helm1 destination.name) ──────
          argocd-cluster-name: ${schema.spec.name}-spoke
          argocd-cluster-secret: ${schema.spec.name}-spoke-cluster
          # ── Synchronization signals ─────────────────────────────────────────
          # These fields are populated from the ArgoCD Application status.
          # The bridge is only written after clusterResourcesApp passes
          # readyWhen (health=Healthy), so their presence confirms ESO is
          # deployed and running on the spoke.
          app-health-status: ${clusterResourcesApp.status.?health.?status.orValue('Unknown')}
          app-sync-status: ${clusterResourcesApp.status.?sync.?status.orValue('Unknown')}
          argocd-app-name: ${schema.spec.name}-cluster-resources
          eks-cluster-endpoint: ${computeBridge.data['eks-cluster-endpoint']}
