                  - name: ebs-csi-driver.enabled
                    value: "false"
                  - name: coreDNS.enabled
                    value: "false"
                  - name: kube-proxy.enabled
                    value: "false"
                  - name: vpc-cni.enabled
                    value: "false"
            - repoURL: ${schema.spec.valuesRepoURL}
              targetRevision: ${schema.spec.valuesRevision}
              ref: values
          destination:
            name: "${schema.spec.argocdTargetClusterName != '' ? schema.spec.argocdTargetClusterName : schema.spec.name + '-spoke'}"
            namespace: ${schema.spec.argoCDNamespace}
          syncPolicy:
            automated:
              selfHeal: true
              allowEmpty: true
              prune: false
            retry:
              limit: 5
              backoff:
