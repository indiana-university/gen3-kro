            gen3.io/spoke: ${schema.spec.name}
            gen3.io/topology: csoc-managed-argocd
          annotations:
            argocd.argoproj.io/cascade: "orphan"
        spec:
          project: ${schema.spec.argoCDProject}
          sources:
            - repoURL: ${schema.spec.helmChartRepoURL}
              path: ${schema.spec.helmChartPath}
              targetRevision: ${schema.spec.helmChartTargetRevision}
              helm:
                releaseName: cluster-level-resources
                valueFiles:
                  - "$values/${schema.spec.valuesBasePath != '' ? schema.spec.valuesBasePath : 'argocd/fleet/' + schema.spec.namespace}/cluster-level-resources/cluster-values.yaml"
                parameters:
                  - name: cluster
                    value: ${schema.spec.name}
                  - name: project
                    value: ${infrastructureConfig.data['cluster-project']}
                  - name: eksClusterEndpoint
                    value: ${computeBridge.data['eks-cluster-endpoint']}
                  - name: destinationServer # routes child Apps from CSOC ArgoCD to spoke EKS endpoint
                    value: ${computeBridge.data['eks-cluster-endpoint']}
                  - name: eksClusterName
                    value: ${computeBridge.data['eks-cluster-name']}
                  - name: accountNumber
                    value: ${spokeNamespace.metadata.annotations['services.k8s.aws/owner-account-id']}
                  # Standard mode: pass-through ConfigMap toggles; defaults match chart (all false)
                  - name: alb-controller.enabled
                    value: ${infrastructureConfig.data['cluster-resources-alb-controller-enabled']}
                  - name: alb-controller.serviceAccount.annotations.eks\.amazonaws\.com/role-arn
                    value: ${iamBridge.data['alb-controller-role-arn']}
                  - name: ebs-csi-driver.enabled
                    value: ${infrastructureConfig.data['cluster-resources-ebs-csi-driver-enabled']}
                  - name: coreDNS.enabled
                    value: ${infrastructureConfig.data['cluster-resources-core-dns-enabled']}
                  - name: kube-proxy.enabled
                    value: ${infrastructureConfig.data['cluster-resources-kube-proxy-enabled']}
                  - name: vpc-cni.enabled
                    value: ${infrastructureConfig.data['cluster-resources-vpc-cni-enabled']}
                  - name: karpenter.enabled
                    value: ${infrastructureConfig.data['cluster-resources-karpenter-enabled']}
                  - name: karpenter-crds.enabled
                    value: ${infrastructureConfig.data['cluster-resources-karpenter-crds-enabled']}
                  - name: karpenter.serviceAccount.annotations.eks\.amazonaws\.com/role-arn
                    value: ${iamBridge.data['karpenter-role-arn']}
                  - name: external-secrets.enabled
                    value: ${infrastructureConfig.data['cluster-resources-external-secrets-enabled']}
                  - name: cert-manager.enabled
                    value: ${infrastructureConfig.data['cluster-resources-cert-manager-enabled']}
                  - name: aws-s3-mountpoint.enabled
                    value: ${infrastructureConfig.data['cluster-resources-aws-s3-mountpoint-enabled']}
                  - name: aws-s3-mountpoint.serviceAccount.annotations.eks\.amazonaws\.com/role-arn
                    value: ${iamBridge.data['s3-csi-driver-role-arn']}
                  - name: calico.enabled
                    value: ${infrastructureConfig.data['cluster-resources-calico-enabled']}
                  - name: kube-state-metrics.enabled
                    value: ${infrastructureConfig.data['cluster-resources-kube-state-metrics-enabled']}
                  - name: external-dns.enabled
                    value: ${infrastructureConfig.data['cluster-resources-external-dns-enabled']}
                  - name: external-dns.serviceAccount.annotations.eks\.amazonaws\.com/role-arn
                    value: ${iamBridge.data['external-dns-role-arn']}
            - repoURL: ${schema.spec.valuesRepoURL}
              targetRevision: ${schema.spec.valuesRevision}
              ref: values
          destination:
            server: https://kubernetes.default.svc
            namespace: ${schema.spec.argoCDNamespace}
          syncPolicy:
            automated:
              selfHeal: true
              allowEmpty: true
              prune: false
            retry:
              limit: 5
              backoff:
                duration: "30s"
                factor: 2
                maxDuration: "5m"
            syncOptions:
              - CreateNamespace=true
              - ServerSideApply=true
              - SkipDryRunOnMissingResource=true

    - id: clusterResourcesAppOptionB # AUTO MODE (spoke-managed-argocd topology)
      includeWhen:
        - ${infrastructureConfig.data['cluster-management-topology'] == 'spoke-managed-argocd'}
        - ${infrastructureConfig.data['compute-auto-mode-enabled'] == 'true'}
      readyWhen:
        - ${clusterResourcesAppOptionB.metadata.?name.orValue('null') != 'null'}
        - ${clusterResourcesAppOptionB.status.?health.?status.orValue('Unknown') == 'Healthy'}
      template:
