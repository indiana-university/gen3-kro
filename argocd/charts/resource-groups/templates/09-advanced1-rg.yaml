# AwsGen3Advanced1 — Tier 7: Advanced Services (Modular RGD v1)
#
# WAFv2 WebACL for ALB protection. CloudFront is out of scope
# (no ACK controller available).
#
# Creates a regional WAFv2 WebACL with AWS managed rule groups:
#   - AWSManagedRulesCommonRuleSet (OWASP Top 10)
#   - AWSManagedRulesKnownBadInputsRuleSet (known bad patterns)
#   - AWSManagedRulesSQLiRuleSet (SQL injection)
#
# The WebACL ARN is exported via a single advancedBridge ConfigMap for
# downstream consumption by Helm1 (global.aws.wafv2.wafAclArn).
#
# PREREQUISITES:
#   1. ACK wafv2 controller must be running
#
# OUTPUT: advancedBridge ConfigMap with WAF state. The graph exposes one bridge
# and gates the optional WAF values inline with the same infrastructure flag.
#
# COST: ~$5-10/month (WAFv2 base + per-rule charges).

apiVersion: kro.run/v1alpha1
kind: ResourceGraphDefinition
metadata:
  name: awsgen3advanced1
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
    argocd.argoproj.io/sync-wave: "0"
spec:
  schema:
    apiVersion: v1alpha1
    kind: AwsGen3Advanced1
    spec:
      # ── Identity ──────────────────────────────────────────────────
      name: string | required=true
      namespace: string | default="default"
      adoptionPolicy: string | default="adopt-or-create"
      deletionPolicy: string | default="delete"

      infrastructureConfigMapName: string | default="infrastructure-values"

      # ── Bridge ───────────────────────────────────────────────────
      advancedBridgeName: string | default="advanced-bridge"

    status:
      wafAclARN: "${infrastructureConfig.data['advanced-waf-enabled'] == 'true' ? wafWebAcl.status.?ackResourceMetadata.?arn.orValue('loading') : ''}"

  resources:
  # ====================================================================
  # Layer 0: External References
  # ====================================================================

    # ── Namespace ────────────────────────────────────────────────────
    - id: spokeNamespace
      externalRef:
        apiVersion: v1
        kind: Namespace
        metadata:
          name: ${schema.spec.namespace}

    - id: infrastructureConfig
      readyWhen:
        - ${infrastructureConfig.metadata.?name.orValue('null') != 'null'}
      externalRef:
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: ${schema.spec.infrastructureConfigMapName}
          namespace: ${schema.spec.namespace}

  # ====================================================================
  # WAFv2: Regional Web ACL with AWS Managed Rules
  # ====================================================================

    - id: wafWebAcl
      includeWhen:
        - ${infrastructureConfig.data['advanced-waf-enabled'] == 'true'}
      readyWhen:
        - ${wafWebAcl.status.?ackResourceMetadata.?arn.orValue('null') != 'null'}
        - ${wafWebAcl.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
      template:
        apiVersion: wafv2.services.k8s.aws/v1alpha1
        kind: WebACL
        metadata:
          name: ${schema.spec.name}-waf-acl
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${infrastructureConfig.data['aws-region']}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          name: ${schema.spec.name}-waf-acl
          scope: ${infrastructureConfig.data['advanced-waf-scope']}
          defaultAction:
            allow: {}
          visibilityConfig:
            cloudWatchMetricsEnabled: true
            metricName: ${schema.spec.name}-waf-metrics
            sampledRequestsEnabled: true
          rules:
            - name: aws-common-rules
              priority: 1
              overrideAction:
                none: {}
              statement:
                managedRuleGroupStatement:
                  vendorName: AWS
                  name: AWSManagedRulesCommonRuleSet
              visibilityConfig:
                cloudWatchMetricsEnabled: true
                metricName: ${schema.spec.name}-common-rules
                sampledRequestsEnabled: true
            - name: aws-bad-inputs
              priority: 2
              overrideAction:
                none: {}
              statement:
                managedRuleGroupStatement:
                  vendorName: AWS
                  name: AWSManagedRulesKnownBadInputsRuleSet
              visibilityConfig:
                cloudWatchMetricsEnabled: true
                metricName: ${schema.spec.name}-bad-inputs
                sampledRequestsEnabled: true
            - name: aws-sqli-rules
              priority: 3
              overrideAction:
                none: {}
              statement:
                managedRuleGroupStatement:
                  vendorName: AWS
                  name: AWSManagedRulesSQLiRuleSet
              visibilityConfig:
                cloudWatchMetricsEnabled: true
                metricName: ${schema.spec.name}-sqli-rules
                sampledRequestsEnabled: true
          tags:
            - key: Name
              value: ${schema.spec.name}-waf-acl
            - key: Environment
              value: ${infrastructureConfig.data['aws-environment']}
            - key: ManagedBy
              value: Kro
            - key: Project
              value: ${infrastructureConfig.data['aws-project']}

  # ====================================================================
  # BRIDGE: Advanced Outputs ConfigMap (for downstream tiers)
  # ====================================================================
  # WAF values are gated inline so this RGD still produces exactly one bridge.

    - id: advancedBridge
      template:
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: ${schema.spec.advancedBridgeName}
          namespace: ${schema.spec.namespace}
          labels:
            app.kubernetes.io/managed-by: kro
            gen3.io/tier: advanced
            gen3.io/bridge: "true"
        data:
          waf-acl-arn: "${infrastructureConfig.data['advanced-waf-enabled'] == 'true' ? wafWebAcl.status.?ackResourceMetadata.?arn.orValue('loading') : ''}"
          waf-enabled: "${infrastructureConfig.data['advanced-waf-enabled'] == 'true' ? 'true' : 'false'}"
