# AwsGen3Dns1 — Tier 0.5: DNS + TLS Certificate (Modular RGD v2)
#
# Extracted from Foundation1 to isolate the Route53 HostedZone adoption
# and ACM certificate chain into a standalone graph. This avoids the
# ACK route53 controller bug blocking Foundation1 from reaching ACTIVE.
#
# ALWAYS (up to 4 resources):
#   DNS:     1 Route53 HostedZone (adopted by name — zone ID never in git)
#   TLS:     1 ACM Certificate (DNS validation)
#   DNS:     1 Route53 RecordSet (CNAME for ACM validation)
#   Bridge:  1 acmBridge ConfigMap (real cert ARN)
#
# PLACEHOLDER (when hostname or route53HostedZoneName is empty):
#   Bridge:  1 acmBridge ConfigMap (empty values)
#
# Downstream consumer: Helm2 reads acmBridge for revproxyArn.

apiVersion: kro.run/v1alpha1
kind: ResourceGraphDefinition
metadata:
  name: awsgen3dns1
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
    argocd.argoproj.io/sync-wave: "0"
spec:
  schema:
    apiVersion: v1alpha1
    kind: AwsGen3Dns1
    spec:
      # ── Identity ──────────────────────────────────────────────────
      name: string | required=true
      namespace: string | default="default"
      region: string | default="us-east-1"
      environment: string | default="dev"
      project: string | default="gen3"
      adoptionPolicy: string | default="adopt-or-create"
      deletionPolicy: string | default="delete"

      # ── DNS / TLS ────────────────────────────────────────────────
      hostnamePrefix: string | default=""
      route53HostedZoneName: string | default=""

      # ── Bridge ───────────────────────────────────────────────────
      acmBridgeName: string | default="acm-bridge"

    status:
      hostname: ${hostedZone.status.?id.orValue("loading")}
      acmCertificateARN: ${acmCertificate.status.?ackResourceMetadata.?arn.orValue("loading")}

  resources:
  # ====================================================================
  # Layer 0: Namespace Reference (reads owner-account-id annotation)
  # ====================================================================

    - id: spokeNamespace
      externalRef:
        apiVersion: v1
        kind: Namespace
        metadata:
          name: ${schema.spec.namespace}

  # ====================================================================
  # Route53 Hosted Zone Lookup (adopt existing zone by name)
  # ====================================================================

    - id: hostedZone
      includeWhen:
        - ${schema.spec.hostnamePrefix != ''}
        - ${schema.spec.route53HostedZoneName != ''}
      readyWhen:
        - ${hostedZone.status.?id.orValue('null') != 'null'}
        - ${hostedZone.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
      template:
        apiVersion: route53.services.k8s.aws/v1alpha1
        kind: HostedZone
        metadata:
          name: ${schema.spec.name}-hosted-zone
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${schema.spec.region}
            services.k8s.aws/adoption-policy: adopt
            services.k8s.aws/deletion-policy: retain
        spec:
          name: ${schema.spec.route53HostedZoneName}
