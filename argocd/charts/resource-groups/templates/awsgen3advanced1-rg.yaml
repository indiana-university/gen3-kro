# AwsGen3Advanced1 — Tier 7: Advanced Services (Modular RGD v1)
#
# WAFv2 WebACL for ALB protection. CloudFront is out of scope
# (no ACK controller available).
#
# Creates a regional WAFv2 WebACL with AWS managed rule groups:
#   - AWSManagedRulesCommonRuleSet (OWASP Top 10)
#   - AWSManagedRulesKnownBadInputsRuleSet (known bad patterns)
#   - AWSManagedRulesSQLiRuleSet (SQL injection)
#
# The WebACL ARN is exported via advancedBridge ConfigMap for
# downstream consumption by Helm2 (global.aws.wafv2.wafAclArn).
#
# PREREQUISITES:
#   1. ACK wafv2 controller must be running
#   2. Foundation1 deployed with foundationBridge (for cross-tier context)
#
# CROSS-TIER: Reads foundationBridge via externalRef (for tags/naming context).
# OUTPUT: advancedBridge ConfigMap with WAF Web ACL ARN.
#
# COST: ~$5-10/month (WAFv2 base + per-rule charges).

apiVersion: kro.run/v1alpha1
kind: ResourceGraphDefinition
metadata:
  name: awsgen3advanced1
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
    argocd.argoproj.io/sync-wave: "0"
spec:
  schema:
    apiVersion: v1alpha1
    kind: AwsGen3Advanced1
    spec:
      # ── Identity ──────────────────────────────────────────────────
      name: string | required=true
      namespace: string | default="default"
      region: string | default="us-east-1"
      environment: string | default="dev"
      project: string | default="gen3"
      adoptionPolicy: string | default="adopt-or-create"
      deletionPolicy: string | default="delete"

      # ── WAF Configuration ────────────────────────────────────────
      wafEnabled: boolean | default=true
      wafScope: string | default="REGIONAL"
      wafDefaultAction: string | default="allow"

      # ── Bridge ───────────────────────────────────────────────────
      advancedBridgeName: string | default="advanced-bridge"
      createBridgeSecret: boolean | default=true

    status:
      wafAclARN: ${wafWebAcl.status.?ackResourceMetadata.?arn.orValue("loading")}

  resources:
  # ====================================================================
  # Layer 0: External References
  # ====================================================================

    # ── Namespace ────────────────────────────────────────────────────
    - id: spokeNamespace
      externalRef:
        apiVersion: v1
        kind: Namespace
        metadata:
          name: ${schema.spec.namespace}

  # ====================================================================
  # WAFv2: Regional Web ACL with AWS Managed Rules
  # ====================================================================

    - id: wafWebAcl
      includeWhen:
        - ${schema.spec.wafEnabled == true}
      readyWhen:
        - ${wafWebAcl.status.?ackResourceMetadata.?arn.orValue('null') != 'null'}
        - ${wafWebAcl.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
      template:
        apiVersion: wafv2.services.k8s.aws/v1alpha1
        kind: WebACL
        metadata:
          name: ${schema.spec.name}-waf-acl
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${schema.spec.region}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          name: ${schema.spec.name}-waf-acl
          scope: ${schema.spec.wafScope}
          defaultAction:
            allow: {}
          visibilityConfig:
            cloudWatchMetricsEnabled: true
            metricName: ${schema.spec.name}-waf-metrics
            sampledRequestsEnabled: true
          rules:
            - name: aws-common-rules
              priority: 1
              overrideAction:
                none: {}
              statement:
                managedRuleGroupStatement:
                  vendorName: AWS
                  name: AWSManagedRulesCommonRuleSet
              visibilityConfig:
                cloudWatchMetricsEnabled: true
                metricName: ${schema.spec.name}-common-rules
                sampledRequestsEnabled: true
            - name: aws-bad-inputs
              priority: 2
              overrideAction:
                none: {}
              statement:
                managedRuleGroupStatement:
                  vendorName: AWS
                  name: AWSManagedRulesKnownBadInputsRuleSet
              visibilityConfig:
                cloudWatchMetricsEnabled: true
                metricName: ${schema.spec.name}-bad-inputs
                sampledRequestsEnabled: true
            - name: aws-sqli-rules
              priority: 3
              overrideAction:
                none: {}
              statement:
                managedRuleGroupStatement:
                  vendorName: AWS
                  name: AWSManagedRulesSQLiRuleSet
              visibilityConfig:
                cloudWatchMetricsEnabled: true
                metricName: ${schema.spec.name}-sqli-rules
                sampledRequestsEnabled: true
          tags:
            - key: Name
              value: ${schema.spec.name}-waf-acl
            - key: Environment
              value: ${schema.spec.environment}
            - key: ManagedBy
              value: Kro
            - key: Project
              value: ${schema.spec.project}

  # ====================================================================
  # BRIDGE: Advanced Outputs ConfigMap (for downstream tiers)
  # ====================================================================
  # NOTE: WAF ACL ARN references a conditional resource. Per KRO Test 8,
  # if wafEnabled=false, the field is silently dropped. Two bridge
  # variants handle this.

    # ── advancedBridge (with WAF) ────────────────────────────────────
    - id: advancedBridge
      includeWhen:
        - ${schema.spec.createBridgeSecret == true}
        - ${schema.spec.wafEnabled == true}
      template:
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: ${schema.spec.advancedBridgeName}
          namespace: ${schema.spec.namespace}
          labels:
            app.kubernetes.io/managed-by: kro
            gen3.io/tier: advanced
            gen3.io/bridge: "true"
        data:
          waf-acl-arn: ${wafWebAcl.status.?ackResourceMetadata.?arn.orValue("loading")}
          waf-enabled: "true"

    # ── advancedBridgeNoWaf (without WAF — placeholder) ──────────────
    - id: advancedBridgeNoWaf
      includeWhen:
        - ${schema.spec.createBridgeSecret == true}
        - ${schema.spec.wafEnabled == false}
      template:
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: ${schema.spec.advancedBridgeName}
          namespace: ${schema.spec.namespace}
          labels:
            app.kubernetes.io/managed-by: kro
            gen3.io/tier: advanced
            gen3.io/bridge: "true"
        data:
          waf-acl-arn: ""
          waf-enabled: "false"
