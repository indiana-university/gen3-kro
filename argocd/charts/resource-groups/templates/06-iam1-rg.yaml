              "Statement": [
                {
                  "Effect": "Allow",
                  "Principal": {"Federated": "${oidcProvider.status.?ackResourceMetadata.?arn.orValue('loading')}"},
                  "Action": "sts:AssumeRoleWithWebIdentity",
                  "Condition": {
                    "StringEquals": {
                      "${oidcBridge.data['eks-oidc-issuer']}:sub": "system:serviceaccount:kube-system:s3-csi-driver-sa"
                    }
                  }
                }
              ]
            }
          inlinePolicies:
            s3-csi-access: |
              {
                "Version": "2012-10-17",
                "Statement": [
                  {
                    "Effect": "Allow",
                    "Action": ["s3:ListBucket"],
                    "Resource": [
                      "${storageBridge.data['data-bucket-arn']}",
                      "${storageBridge.data['upload-bucket-arn']}"
                    ]
                  },
                  {
                    "Effect": "Allow",
                    "Action": ["s3:GetObject", "s3:PutObject", "s3:AbortMultipartUpload", "s3:DeleteObject"],
                    "Resource": [
                      "${storageBridge.data['data-bucket-arn']}/*",
                      "${storageBridge.data['upload-bucket-arn']}/*"
                    ]
                  }
                ]
              }
          tags:
            - key: Name
              value: ${schema.spec.name}-s3-csi-driver-role
            - key: Environment
              value: ${infrastructureConfig.data['aws-environment']}
            - key: ManagedBy
              value: Kro
            - key: Project
              value: ${infrastructureConfig.data['aws-project']}

    - id: karpenterRole
      readyWhen:
        - ${karpenterRole.status.?ackResourceMetadata.?arn.orValue('null') != 'null'}
        - ${karpenterRole.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
      template:
        apiVersion: iam.services.k8s.aws/v1alpha1
        kind: Role
        metadata:
          name: ${schema.spec.name}-karpenter-controller-role
          namespace: ${schema.spec.namespace}
          annotations:
