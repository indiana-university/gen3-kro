            {
              "Version": "2012-10-17",
              "Statement": [
                {
                  "Effect": "Allow",
                  "Principal": {"Federated": "${oidcProvider.status.?ackResourceMetadata.?arn.orValue('loading')}"},
                  "Action": "sts:AssumeRoleWithWebIdentity",
                  "Condition": {
                    "StringEquals": {
                      "${oidcBridge.data['eks-oidc-issuer']}:sub": "system:serviceaccount:${schema.spec.name}:dashboard-sa"
                    }
                  }
                }
              ]
            }
          inlinePolicies:
            dashboard-s3-read: |
              {
                "Version": "2012-10-17",
                "Statement": [
                  {
                    "Effect": "Allow",
                    "Action": ["s3:GetObject", "s3:ListBucket"],
                    "Resource": [
                      "arn:aws:s3:::${storageBridge.data['dashboard-bucket-name']}",
                      "arn:aws:s3:::${storageBridge.data['dashboard-bucket-name']}/*"
                    ]
                  }
                ]
              }
          tags:
            - key: Name
              value: ${schema.spec.name}-dashboard-role
            - key: Environment
              value: ${infrastructureConfig.data['aws-environment']}
            - key: ManagedBy
              value: Kro
            - key: Project
              value: ${infrastructureConfig.data['aws-project']}

    - id: externalDnsRole
      readyWhen:
        - ${externalDnsRole.status.?ackResourceMetadata.?arn.orValue('null') != 'null'}
        - ${externalDnsRole.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
      template:
        apiVersion: iam.services.k8s.aws/v1alpha1
        kind: Role
        metadata:
          name: ${schema.spec.name}-external-dns-role
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${infrastructureConfig.data['aws-region']}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          name: ${schema.spec.name}-external-dns-role
          assumeRolePolicyDocument: |
            {
              "Version": "2012-10-17",
              "Statement": [
                {
                  "Effect": "Allow",
                  "Principal": {"Federated": "${oidcProvider.status.?ackResourceMetadata.?arn.orValue('loading')}"},
                  "Action": "sts:AssumeRoleWithWebIdentity",
                  "Condition": {
                    "StringEquals": {
                      "${oidcBridge.data['eks-oidc-issuer']}:sub": "system:serviceaccount:kube-system:external-dns"
                    }
                  }
                }
              ]
            }
          inlinePolicies:
            external-dns-route53: |
              {
                "Version": "2012-10-17",
                "Statement": [
                  {
                    "Effect": "Allow",
                    "Action": ["route53:ChangeResourceRecordSets"],
                    "Resource": ["arn:aws:route53:::hostedzone/*"]
                  },
                  {
                    "Effect": "Allow",
                    "Action": [
                      "route53:ListHostedZones",
                      "route53:ListResourceRecordSets",
                      "route53:ListTagsForResource"
                    ],
                    "Resource": ["*"]
                  }
                ]
              }
          tags:
            - key: Name
              value: ${schema.spec.name}-external-dns-role
            - key: Environment
              value: ${infrastructureConfig.data['aws-environment']}
            - key: ManagedBy
              value: Kro
            - key: Project
              value: ${infrastructureConfig.data['aws-project']}

  # All roles unconditional — avoids Test 8 silent-drop

    - id: iamBridge
      readyWhen:
        - ${iamBridge.metadata.?name.orValue('null') != 'null'}
      template:
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: ${schema.spec.iamBridgeName}
          namespace: ${schema.spec.namespace}
          labels:
            app.kubernetes.io/managed-by: kro
            gen3.io/tier: iam
            gen3.io/bridge: "true"
        data:
          oidc-provider-arn: ${oidcBridge.data['oidc-provider-arn']}
          eks-oidc-issuer: ${oidcBridge.data['eks-oidc-issuer']}
          fence-role-arn: ${fenceRole.status.?ackResourceMetadata.?arn.orValue("loading")}
          audit-role-arn: ${auditRole.status.?ackResourceMetadata.?arn.orValue("loading")}
          hatchery-role-arn: ${hatcheryRole.status.?ackResourceMetadata.?arn.orValue("loading")}
          manifestservice-role-arn: ${manifestserviceRole.status.?ackResourceMetadata.?arn.orValue("loading")}
          external-secrets-role-arn: ${externalSecretsRole.status.?ackResourceMetadata.?arn.orValue("loading")}
          aws-es-proxy-role-arn: ${awsEsProxyRole.status.?ackResourceMetadata.?arn.orValue("loading")}
          ssjdispatcher-role-arn: ${ssjdispatcherRole.status.?ackResourceMetadata.?arn.orValue("loading")}
          alb-controller-role-arn: ${albControllerRole.status.?ackResourceMetadata.?arn.orValue("loading")}
          s3-csi-driver-role-arn: ${s3CsiDriverRole.status.?ackResourceMetadata.?arn.orValue("loading")}
          karpenter-role-arn: ${karpenterRole.status.?ackResourceMetadata.?arn.orValue("loading")}
          dashboard-role-arn: ${dashboardRole.status.?ackResourceMetadata.?arn.orValue("loading")}
          external-dns-role-arn: ${externalDnsRole.status.?ackResourceMetadata.?arn.orValue("loading")}
