# AwsGen3AppIAM1 — Tier 5: Application + Cluster IAM (Modular RGD v1)
apiVersion: kro.run/v1alpha1
kind: ResourceGraphDefinition
metadata:
  name: awsgen3appiam1
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  schema:
    apiVersion: v1alpha1
    kind: AwsGen3AppIAM1
    spec:
      name: string | required=true
      namespace: string | required=true
      adoptionPolicy: string | default="adopt-or-create"
      deletionPolicy: string | default="delete"
      infrastructureConfigMapName: string | default="infrastructure-values"
      oidcBridgeName: string | default="oidc-bridge"
      storageBridgeName: string | default="storage-bridge"
      iamBridgeName: string | default="iam-bridge"

    status:
      ready: ${spokeNamespace.metadata.?name.orValue("loading")}

  resources:

    - id: spokeNamespace
      externalRef:
        apiVersion: v1
        kind: Namespace
        metadata:
          name: ${schema.spec.namespace}

    - id: infrastructureConfig
      readyWhen:
        - ${infrastructureConfig.metadata.?name.orValue('null') != 'null'}
      externalRef:
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: ${schema.spec.infrastructureConfigMapName}
          namespace: ${schema.spec.namespace}

    - id: oidcBridge
      readyWhen:
        - ${oidcBridge.metadata.?name.orValue('null') != 'null'}
      externalRef:
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: ${schema.spec.oidcBridgeName}
          namespace: ${schema.spec.namespace}

    - id: storageBridge
      readyWhen:
        - ${storageBridge.metadata.?name.orValue('null') != 'null'}
      externalRef:
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: ${schema.spec.storageBridgeName}
          namespace: ${schema.spec.namespace}

    - id: oidcProvider
      readyWhen:
        - ${oidcProvider.status.?ackResourceMetadata.?arn.orValue('null') != 'null'}
        - ${oidcProvider.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
      externalRef:
        apiVersion: iam.services.k8s.aws/v1alpha1
        kind: OpenIDConnectProvider
        metadata:
          name: ${oidcBridge.data['oidc-provider-name']}
          namespace: ${schema.spec.namespace}

  # IRSA ROLES: Per-service IAM roles with OIDC trust policies

    - id: fenceRole
      readyWhen:
        - ${fenceRole.status.?ackResourceMetadata.?arn.orValue('null') != 'null'}
        - ${fenceRole.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
      template:
        apiVersion: iam.services.k8s.aws/v1alpha1
        kind: Role
        metadata:
          name: ${schema.spec.name}-fence-role
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${infrastructureConfig.data['aws-region']}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          name: ${schema.spec.name}-fence-role
          assumeRolePolicyDocument: |
            {
              "Version": "2012-10-17",
              "Statement": [
                {
                  "Effect": "Allow",
                  "Principal": {"Federated": "${oidcProvider.status.?ackResourceMetadata.?arn.orValue('loading')}"},
                  "Action": "sts:AssumeRoleWithWebIdentity",
                  "Condition": {
                    "StringEquals": {
                      "${oidcBridge.data['eks-oidc-issuer']}:sub": "system:serviceaccount:${schema.spec.name}:fence-sa"
                    }
                  }
                }
              ]
            }
          inlinePolicies:
            fence-s3-access: |
              {
                "Version": "2012-10-17",
                "Statement": [
                  {
                    "Effect": "Allow",
                    "Action": ["s3:GetObject", "s3:PutObject", "s3:ListBucket"],
                    "Resource": [
                      "${storageBridge.data['data-bucket-arn']}",
                      "${storageBridge.data['data-bucket-arn']}/*",
                      "${storageBridge.data['upload-bucket-arn']}",
                      "${storageBridge.data['upload-bucket-arn']}/*"
                    ]
                  },
                  {
                    "Effect": "Allow",
                    "Action": ["s3:GetObject", "s3:ListBucket"],
                    "Resource": [
                      "${storageBridge.data['users-bucket-arn']}",
                      "${storageBridge.data['users-bucket-arn']}/*"
                    ]
                  }
                ]
              }
          tags:
            - key: Name
              value: ${schema.spec.name}-fence-role
            - key: Environment
              value: ${infrastructureConfig.data['aws-environment']}
            - key: ManagedBy
              value: Kro
            - key: Project
              value: ${infrastructureConfig.data['aws-project']}

    - id: auditRole
      readyWhen:
        - ${auditRole.status.?ackResourceMetadata.?arn.orValue('null') != 'null'}
        - ${auditRole.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
      template:
        apiVersion: iam.services.k8s.aws/v1alpha1
        kind: Role
        metadata:
          name: ${schema.spec.name}-audit-role
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${infrastructureConfig.data['aws-region']}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          name: ${schema.spec.name}-audit-role
          assumeRolePolicyDocument: |
            {
              "Version": "2012-10-17",
              "Statement": [
                {
                  "Effect": "Allow",
                  "Principal": {"Federated": "${oidcProvider.status.?ackResourceMetadata.?arn.orValue('loading')}"},
                  "Action": "sts:AssumeRoleWithWebIdentity",
                  "Condition": {
                    "StringEquals": {
                      "${oidcBridge.data['eks-oidc-issuer']}:sub": "system:serviceaccount:${schema.spec.name}:audit-sa"
                    }
                  }
                }
              ]
            }
          tags:
            - key: Name
              value: ${schema.spec.name}-audit-role
            - key: Environment
              value: ${infrastructureConfig.data['aws-environment']}
            - key: ManagedBy
              value: Kro
            - key: Project
              value: ${infrastructureConfig.data['aws-project']}

    - id: hatcheryRole
      readyWhen:
        - ${hatcheryRole.status.?ackResourceMetadata.?arn.orValue('null') != 'null'}
        - ${hatcheryRole.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
      template:
        apiVersion: iam.services.k8s.aws/v1alpha1
        kind: Role
        metadata:
          name: ${schema.spec.name}-hatchery-role
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${infrastructureConfig.data['aws-region']}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          name: ${schema.spec.name}-hatchery-role
          assumeRolePolicyDocument: |
            {
              "Version": "2012-10-17",
              "Statement": [
                {
                  "Effect": "Allow",
                  "Principal": {"Federated": "${oidcProvider.status.?ackResourceMetadata.?arn.orValue('loading')}"},
                  "Action": "sts:AssumeRoleWithWebIdentity",
                  "Condition": {
                    "StringEquals": {
                      "${oidcBridge.data['eks-oidc-issuer']}:sub": "system:serviceaccount:${schema.spec.name}:hatchery-sa"
                    }
                  }
                }
              ]
            }
          inlinePolicies:
            hatchery-ec2: |
              {
                "Version": "2012-10-17",
                "Statement": [
                  {
                    "Effect": "Allow",
                    "Action": ["ec2:RunInstances", "ec2:TerminateInstances", "ec2:CreateTags", "ec2:DescribeInstances"],
                    "Resource": "*"
                  }
                ]
              }
          tags:
            - key: Name
              value: ${schema.spec.name}-hatchery-role
            - key: Environment
              value: ${infrastructureConfig.data['aws-environment']}
            - key: ManagedBy
              value: Kro
            - key: Project
              value: ${infrastructureConfig.data['aws-project']}

    - id: manifestserviceRole
      readyWhen:
        - ${manifestserviceRole.status.?ackResourceMetadata.?arn.orValue('null') != 'null'}
        - ${manifestserviceRole.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
      template:
        apiVersion: iam.services.k8s.aws/v1alpha1
        kind: Role
        metadata:
          name: ${schema.spec.name}-manifestservice-role
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${infrastructureConfig.data['aws-region']}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          name: ${schema.spec.name}-manifestservice-role
          assumeRolePolicyDocument: |
            {
              "Version": "2012-10-17",
              "Statement": [
                {
                  "Effect": "Allow",
                  "Principal": {"Federated": "${oidcProvider.status.?ackResourceMetadata.?arn.orValue('loading')}"},
                  "Action": "sts:AssumeRoleWithWebIdentity",
                  "Condition": {
                    "StringEquals": {
                      "${oidcBridge.data['eks-oidc-issuer']}:sub": "system:serviceaccount:${schema.spec.name}:manifestservice-sa"
                    }
                  }
                }
              ]
            }
          tags:
            - key: Name
              value: ${schema.spec.name}-manifestservice-role
            - key: Environment
              value: ${infrastructureConfig.data['aws-environment']}
            - key: ManagedBy
              value: Kro
            - key: Project
              value: ${infrastructureConfig.data['aws-project']}

    - id: externalSecretsRole
      readyWhen:
        - ${externalSecretsRole.status.?ackResourceMetadata.?arn.orValue('null') != 'null'}
        - ${externalSecretsRole.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
      template:
        apiVersion: iam.services.k8s.aws/v1alpha1
        kind: Role
        metadata:
          name: ${schema.spec.name}-external-secrets-role
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${infrastructureConfig.data['aws-region']}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          name: ${schema.spec.name}-external-secrets-role
          assumeRolePolicyDocument: |
            {
              "Version": "2012-10-17",
              "Statement": [
                {
                  "Effect": "Allow",
                  "Principal": {"Federated": "${oidcProvider.status.?ackResourceMetadata.?arn.orValue('loading')}"},
                  "Action": "sts:AssumeRoleWithWebIdentity",
                  "Condition": {
                    "StringEquals": {
                      "${oidcBridge.data['eks-oidc-issuer']}:sub": "system:serviceaccount:${schema.spec.name}:external-secrets-sa"
                    }
                  }
                }
              ]
            }
          inlinePolicies:
            secrets-read: |
              {
                "Version": "2012-10-17",
                "Statement": [
                  {
                    "Effect": "Allow",
                    "Action": ["secretsmanager:GetSecretValue", "secretsmanager:DescribeSecret"],
                    "Resource": "arn:aws:secretsmanager:${infrastructureConfig.data['aws-region']}:*:secret:${schema.spec.name}-*"
                  }
                ]
              }
          tags:
            - key: Name
              value: ${schema.spec.name}-external-secrets-role
            - key: Environment
              value: ${infrastructureConfig.data['aws-environment']}
            - key: ManagedBy
              value: Kro
            - key: Project
              value: ${infrastructureConfig.data['aws-project']}

    - id: awsEsProxyRole
      readyWhen:
        - ${awsEsProxyRole.status.?ackResourceMetadata.?arn.orValue('null') != 'null'}
        - ${awsEsProxyRole.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
      template:
        apiVersion: iam.services.k8s.aws/v1alpha1
        kind: Role
        metadata:
          name: ${schema.spec.name}-aws-es-proxy-role
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${infrastructureConfig.data['aws-region']}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          name: ${schema.spec.name}-aws-es-proxy-role
          assumeRolePolicyDocument: |
            {
              "Version": "2012-10-17",
              "Statement": [
                {
                  "Effect": "Allow",
                  "Principal": {"Federated": "${oidcProvider.status.?ackResourceMetadata.?arn.orValue('loading')}"},
                  "Action": "sts:AssumeRoleWithWebIdentity",
                  "Condition": {
                    "StringEquals": {
                      "${oidcBridge.data['eks-oidc-issuer']}:sub": "system:serviceaccount:${schema.spec.name}:aws-es-proxy-sa"
                    }
                  }
                }
              ]
            }
          inlinePolicies:
            opensearch-access: |
              {
                "Version": "2012-10-17",
                "Statement": [
                  {
                    "Effect": "Allow",
                    "Action": ["es:ESHttpGet", "es:ESHttpHead", "es:ESHttpPost", "es:ESHttpPut", "es:ESHttpDelete", "es:ESHttpPatch"],
                    "Resource": "arn:aws:es:${infrastructureConfig.data['aws-region']}:*:domain/${schema.spec.name}-*"
                  }
                ]
              }
          tags:
            - key: Name
              value: ${schema.spec.name}-aws-es-proxy-role
            - key: Environment
              value: ${infrastructureConfig.data['aws-environment']}
            - key: ManagedBy
              value: Kro
            - key: Project
              value: ${infrastructureConfig.data['aws-project']}

    - id: ssjdispatcherRole
      readyWhen:
        - ${ssjdispatcherRole.status.?ackResourceMetadata.?arn.orValue('null') != 'null'}
        - ${ssjdispatcherRole.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
      template:
        apiVersion: iam.services.k8s.aws/v1alpha1
        kind: Role
        metadata:
          name: ${schema.spec.name}-ssjdispatcher-role
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${infrastructureConfig.data['aws-region']}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          name: ${schema.spec.name}-ssjdispatcher-role
          assumeRolePolicyDocument: |
            {
              "Version": "2012-10-17",
              "Statement": [
                {
                  "Effect": "Allow",
                  "Principal": {"Federated": "${oidcProvider.status.?ackResourceMetadata.?arn.orValue('loading')}"},
                  "Action": "sts:AssumeRoleWithWebIdentity",
                  "Condition": {
                    "StringEquals": {
                      "${oidcBridge.data['eks-oidc-issuer']}:sub": "system:serviceaccount:${schema.spec.name}:ssjdispatcher-sa"
                    }
                  }
                }
              ]
            }
          inlinePolicies:
            ssjdispatcher-access: |
              {
                "Version": "2012-10-17",
                "Statement": [
                  {
                    "Effect": "Allow",
                    "Action": ["sqs:ReceiveMessage", "sqs:DeleteMessage", "sqs:GetQueueAttributes", "sqs:GetQueueUrl"],
                    "Resource": "arn:aws:sqs:${infrastructureConfig.data['aws-region']}:*:${schema.spec.name}-*"
                  },
                  {
                    "Effect": "Allow",
                    "Action": ["s3:GetObject", "s3:PutObject"],
                    "Resource": [
                      "${storageBridge.data['data-bucket-arn']}",
                      "${storageBridge.data['data-bucket-arn']}/*"
                    ]
                  }
                ]
              }
          tags:
            - key: Name
              value: ${schema.spec.name}-ssjdispatcher-role
            - key: Environment
              value: ${infrastructureConfig.data['aws-environment']}
            - key: ManagedBy
              value: Kro
            - key: Project
              value: ${infrastructureConfig.data['aws-project']}

  # Cluster-level IRSA roles (kube-system service accounts)

    - id: albControllerRole
      readyWhen:
        - ${albControllerRole.status.?ackResourceMetadata.?arn.orValue('null') != 'null'}
        - ${albControllerRole.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
      template:
        apiVersion: iam.services.k8s.aws/v1alpha1
        kind: Role
        metadata:
          name: ${schema.spec.name}-alb-controller-role
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${infrastructureConfig.data['aws-region']}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          name: ${schema.spec.name}-alb-controller-role
          assumeRolePolicyDocument: |
            {
              "Version": "2012-10-17",
              "Statement": [
                {
                  "Effect": "Allow",
                  "Principal": {"Federated": "${oidcProvider.status.?ackResourceMetadata.?arn.orValue('loading')}"},
                  "Action": "sts:AssumeRoleWithWebIdentity",
                  "Condition": {
                    "StringEquals": {
                      "${oidcBridge.data['eks-oidc-issuer']}:sub": "system:serviceaccount:kube-system:aws-load-balancer-controller"
                    }
                  }
                }
              ]
            }
          inlinePolicies:
            alb-controller-policy: |
              {
                "Version": "2012-10-17",
                "Statement": [
                  {
                    "Effect": "Allow",
                    "Action": ["elasticloadbalancing:*"],
                    "Resource": "*"
                  },
                  {
                    "Effect": "Allow",
                    "Action": [
                      "ec2:Describe*",
                      "ec2:CreateSecurityGroup",
                      "ec2:AuthorizeSecurityGroupIngress",
                      "ec2:RevokeSecurityGroupIngress",
                      "ec2:DeleteSecurityGroup",
                      "ec2:CreateTags",
                      "ec2:DeleteTags"
                    ],
                    "Resource": "*"
                  },
                  {
                    "Effect": "Allow",
                    "Action": [
                      "acm:ListCertificates",
                      "acm:DescribeCertificate",
                      "acm:GetCertificate",
                      "iam:CreateServiceLinkedRole",
                      "wafv2:GetWebACL",
                      "wafv2:GetWebACLForResource",
                      "wafv2:AssociateWebACL",
                      "wafv2:DisassociateWebACL",
                      "shield:GetSubscriptionState",
                      "shield:DescribeProtection",
                      "shield:CreateProtection",
                      "shield:DeleteProtection"
                    ],
                    "Resource": "*"
                  }
                ]
              }
          tags:
            - key: Name
              value: ${schema.spec.name}-alb-controller-role
            - key: Environment
              value: ${infrastructureConfig.data['aws-environment']}
            - key: ManagedBy
              value: Kro
            - key: Project
              value: ${infrastructureConfig.data['aws-project']}

    - id: s3CsiDriverRole
      readyWhen:
        - ${s3CsiDriverRole.status.?ackResourceMetadata.?arn.orValue('null') != 'null'}
        - ${s3CsiDriverRole.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
      template:
        apiVersion: iam.services.k8s.aws/v1alpha1
        kind: Role
        metadata:
          name: ${schema.spec.name}-s3-csi-driver-role
          namespace: ${schema.spec.namespace}
          annotations:
