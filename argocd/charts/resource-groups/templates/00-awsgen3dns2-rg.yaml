# AwsGen3Dns2 — Tier 0.5: DNS + TLS Certificate (Modular RGD v2)
#
# Manages ACM certificate + DNS validation for a spoke's hostname.
# Produces a single dnsBridge ConfigMap consumed by Helm2 (acmBridgeName).
#
# The Route53 hosted zone ID is obtained from the spoke namespace annotation
# (gen3.io/route53-hosted-zone-id), injected by Terraform/multi-acct chart.
# If createHostedZone=true, a new HostedZone is created via ACK Route53.
#
# Two mutually exclusive paths (Test 8 dual-resource pattern):
#
# PATH A — createHostedZone=false (default, zone from namespace annotation):
#   acmCert (ACM) → dnsValidation (Route53 RecordSet)
#   └── dnsBridge ConfigMap: {hosted-zone-id, hosted-zone-name, acm-cert-arn, hostname}
#
# PATH B — createHostedZone=true:
#   hostedZone (ACK Route53) → acmCertCreate (ACM) → dnsValidationCreate (Route53)
#   └── dnsBridgeCreate ConfigMap: {hosted-zone-id, hosted-zone-name, acm-cert-arn, hostname}
#
# PLACEHOLDER (hostnamePrefix is empty):
#   dnsBridgePlaceholder ConfigMap: all keys empty
#
# Downstream consumer: Helm2 reads dnsBridge via acmBridgeName instance spec field.
# Bridge keys: hosted-zone-id, hosted-zone-name, acm-cert-arn, hostname

apiVersion: kro.run/v1alpha1
kind: ResourceGraphDefinition
metadata:
  name: awsgen3dns2
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
    argocd.argoproj.io/sync-wave: "0"
spec:
  schema:
    apiVersion: v1alpha1
    kind: AwsGen3Dns2
    spec:
      # ── Identity ──────────────────────────────────────────────────
      name: string | required=true
      namespace: string | default="default"
      region: string | default="us-east-1"
      environment: string | default="dev"
      project: string | default="gen3"
      adoptionPolicy: string | default="adopt-or-create"
      deletionPolicy: string | default="delete"

      # ── DNS / TLS ────────────────────────────────────────────────
      hostnamePrefix: string | default=""
      route53HostedZoneName: string | default=""
      createHostedZone: boolean | default=false

      # ── Bridge ───────────────────────────────────────────────────
      dnsBridgeName: string | default="dns-bridge"

    status:
      hostedZoneID: ${dnsBridge.data['hosted-zone-id']}
      acmCertificateARN: ${acmCert.status.?ackResourceMetadata.?arn.orValue("loading")}

  resources:
  # ====================================================================
  # Layer 0: Namespace Reference (reads annotations for zone ID + account ID)
  # ====================================================================

    - id: spokeNamespace
      externalRef:
        apiVersion: v1
        kind: Namespace
        metadata:
          name: ${schema.spec.namespace}

  # ######################################################################
  # PATH A — Pre-existing zone (createHostedZone=false, default)
  #
  # Zone ID + name are read directly from namespace annotations injected by
  # Terraform argocd-bootstrap → multi-acct chart.
  # All resources share the same includeWhen (Test 8 co-inclusion pattern).
  # ######################################################################

  # ── ACM Certificate (Path A) ──────────────────────────────────────
    - id: acmCert
      includeWhen:
        - ${schema.spec.createHostedZone == false}
        - ${schema.spec.hostnamePrefix != ''}
      readyWhen:
        - ${acmCert.status.?ackResourceMetadata.?arn.orValue('null') != 'null'}
        - ${acmCert.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
        - ${acmCert.status.?domainValidations.orValue([]).size() > 0}
      template:
        apiVersion: acm.services.k8s.aws/v1alpha1
        kind: Certificate
        metadata:
          name: ${schema.spec.name}-acm-cert
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${schema.spec.region}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          domainName: ${schema.spec.hostnamePrefix + '.' + spokeNamespace.metadata.annotations['gen3.io/route53-hosted-zone-name']}
          tags:
            - key: Name
              value: ${schema.spec.name}-acm-cert
            - key: Environment
              value: ${schema.spec.environment}
            - key: ManagedBy
              value: Kro
            - key: Project
              value: ${schema.spec.project}
            - key: HostedZoneId
              value: ${spokeNamespace.metadata.annotations['gen3.io/route53-hosted-zone-id']}

  # ── DNS Validation RecordSet (Path A) ──────────────────────────────
    - id: dnsValidation
      includeWhen:
        - ${schema.spec.createHostedZone == false}
        - ${schema.spec.hostnamePrefix != ''}
      readyWhen:
        - ${dnsValidation.status.?status.orValue('null') != 'null'}
        - ${dnsValidation.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
      template:
        apiVersion: route53.services.k8s.aws/v1alpha1
        kind: RecordSet
        metadata:
          name: ${schema.spec.name}-acm-validation
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${schema.spec.region}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          hostedZoneID: ${spokeNamespace.metadata.annotations['gen3.io/route53-hosted-zone-id']}
          name: ${acmCert.status.domainValidations[0].resourceRecord.name}
          recordType: CNAME
          ttl: 300
          resourceRecords:
            - value: ${acmCert.status.domainValidations[0].resourceRecord.value}

  # ── DNS Bridge (Path A — all keys) ────────────────────────────────
    - id: dnsBridge
      includeWhen:
        - ${schema.spec.createHostedZone == false}
        - ${schema.spec.hostnamePrefix != ''}
      readyWhen:
        - ${dnsBridge.metadata.?name.orValue('null') != 'null'}
      template:
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: ${schema.spec.dnsBridgeName}
          namespace: ${schema.spec.namespace}
          labels:
            app.kubernetes.io/managed-by: kro
            gen3.io/tier: dns
            gen3.io/bridge: "true"
            gen3.io/purpose: dns
        data:
          hosted-zone-id: ${spokeNamespace.metadata.annotations['gen3.io/route53-hosted-zone-id']}
          hosted-zone-name: ${spokeNamespace.metadata.annotations['gen3.io/route53-hosted-zone-name']}
          acm-cert-arn: ${acmCert.status.?ackResourceMetadata.?arn}
          hostname: ${schema.spec.hostnamePrefix + '.' + spokeNamespace.metadata.annotations['gen3.io/route53-hosted-zone-name']}

  # ######################################################################
  # PATH B — Create zone (createHostedZone=true)
  #
  # ACK Route53 controller creates the HostedZone. Zone ID flows from
  # hostedZone.status.id into acmCertCreate and dnsBridgeCreate.
  # ######################################################################

  # ── Route53 Hosted Zone (Path B — created by ACK) ─────────────────
    - id: hostedZone
      includeWhen:
        - ${schema.spec.createHostedZone == true}
        - ${schema.spec.route53HostedZoneName != ''}
      readyWhen:
        - ${hostedZone.status.?id.orValue('null') != 'null'}
        - ${hostedZone.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
      template:
        apiVersion: route53.services.k8s.aws/v1alpha1
        kind: HostedZone
        metadata:
          name: ${schema.spec.name}-hosted-zone
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${schema.spec.region}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          name: ${schema.spec.route53HostedZoneName}

  # ── ACM Certificate (Path B) ──────────────────────────────────────
    - id: acmCertCreate
      includeWhen:
        - ${schema.spec.createHostedZone == true}
        - ${schema.spec.route53HostedZoneName != ''}
        - ${schema.spec.hostnamePrefix != ''}
      readyWhen:
        - ${acmCertCreate.status.?ackResourceMetadata.?arn.orValue('null') != 'null'}
        - ${acmCertCreate.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
        - ${acmCertCreate.status.?domainValidations.orValue([]).size() > 0}
      template:
        apiVersion: acm.services.k8s.aws/v1alpha1
        kind: Certificate
        metadata:
          name: ${schema.spec.name}-acm-cert
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${schema.spec.region}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          domainName: ${schema.spec.hostnamePrefix + '.' + schema.spec.route53HostedZoneName}
          tags:
            - key: Name
              value: ${schema.spec.name}-acm-cert
            - key: Environment
              value: ${schema.spec.environment}
            - key: ManagedBy
              value: Kro
            - key: Project
              value: ${schema.spec.project}
            - key: HostedZoneId
              value: ${hostedZone.status.?id.orValue('')}

  # ── DNS Validation RecordSet (Path B) ──────────────────────────────
    - id: dnsValidationCreate
      includeWhen:
        - ${schema.spec.createHostedZone == true}
        - ${schema.spec.route53HostedZoneName != ''}
        - ${schema.spec.hostnamePrefix != ''}
      readyWhen:
        - ${dnsValidationCreate.status.?status.orValue('null') != 'null'}
        - ${dnsValidationCreate.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
      template:
        apiVersion: route53.services.k8s.aws/v1alpha1
        kind: RecordSet
        metadata:
          name: ${schema.spec.name}-acm-validation
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${schema.spec.region}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          hostedZoneID: ${hostedZone.status.?id.orValue('')}
          name: ${acmCertCreate.status.domainValidations[0].resourceRecord.name}
          recordType: CNAME
          ttl: 300
          resourceRecords:
            - value: ${acmCertCreate.status.domainValidations[0].resourceRecord.value}

  # ── DNS Bridge (Path B — all keys) ────────────────────────────────
    - id: dnsBridgeCreate
      includeWhen:
        - ${schema.spec.createHostedZone == true}
        - ${schema.spec.route53HostedZoneName != ''}
        - ${schema.spec.hostnamePrefix != ''}
      readyWhen:
        - ${dnsBridgeCreate.metadata.?name.orValue('null') != 'null'}
      template:
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: ${schema.spec.dnsBridgeName}
          namespace: ${schema.spec.namespace}
          labels:
            app.kubernetes.io/managed-by: kro
            gen3.io/tier: dns
            gen3.io/bridge: "true"
            gen3.io/purpose: dns
        data:
          hosted-zone-id: ${hostedZone.status.?id.orValue('')}
          hosted-zone-name: ${schema.spec.route53HostedZoneName}
          acm-cert-arn: ${acmCertCreate.status.?ackResourceMetadata.?arn}
          hostname: ${schema.spec.hostnamePrefix + '.' + schema.spec.route53HostedZoneName}

  # ######################################################################
  # PLACEHOLDER — DNS Bridge (when hostnamePrefix is empty)
  # ######################################################################

    - id: dnsBridgePlaceholder
      includeWhen:
        - ${schema.spec.hostnamePrefix == ''}
      readyWhen:
        - ${dnsBridgePlaceholder.metadata.?name.orValue('null') != 'null'}
      template:
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: ${schema.spec.dnsBridgeName}
          namespace: ${schema.spec.namespace}
          labels:
            app.kubernetes.io/managed-by: kro
            gen3.io/tier: dns
            gen3.io/bridge: "true"
            gen3.io/purpose: dns
        data:
          hosted-zone-id: ""
          hosted-zone-name: ""
          acm-cert-arn: ""
          hostname: ""