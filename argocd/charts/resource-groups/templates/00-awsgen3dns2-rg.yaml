# # AwsGen3Dns2 — Tier 0.5: DNS + TLS Certificate (Modular RGD v2)
# #
# # Extracted from Foundation1 to isolate the Route53 HostedZone adoption
# # and ACM certificate chain into a standalone graph. This avoids the
# # ACK route53 controller bug blocking Foundation1 from reaching ACTIVE.
# #
# # ALWAYS (up to 4 resources):
# #   DNS:     1 Route53 HostedZone (adopted by name — zone ID never in git)
# #   TLS:     1 ACM Certificate (DNS validation)
# #   DNS:     1 Route53 RecordSet (CNAME for ACM validation)
# #   Bridge:  1 acmBridge ConfigMap (real cert ARN)
# #
# # PLACEHOLDER (when hostname or route53HostedZoneName is empty):
# #   Bridge:  1 acmBridge ConfigMap (empty values)
# #
# # Downstream consumer: Helm2 reads acmBridge for revproxyArn.

