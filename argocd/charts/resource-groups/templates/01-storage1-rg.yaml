# AwsGen3Storage1 — Tier 0.5: Storage (Modular RGD v1)
#
# Dedicated S3 bucket tier. Creates all Gen3 S3 buckets with KMS encryption
# using keys from the consolidated Network bridge.
#
# Buckets (from gen3-gitops/gen3-terraform production patterns):
#   ALWAYS:
#     - loggingBucket:   ALB access logs, CloudTrail, VPC Flow Logs
#     - dataBucket:      Core data files for Fence (DATA_UPLOAD_BUCKET)
#     - uploadBucket:    User data uploads (CORS-enabled pattern)
#   CONDITIONAL:
#     - manifestBucket:  Manifest service file lists (manifestserviceEnabled)
#     - dashboardBucket: Portal static assets and dashboard config (dashboardEnabled)
#
# All buckets use:
#   - KMS encryption (logging key for logs, platform key for app buckets)
#   - Public access blocked (all 4 flags)
#   - Versioning enabled
#
# PREREQUISITES:
#   1. Network1 deployed with networkBridge (provides KMS key ARNs)
#   2. ACK s3 controller must be running
#
# CROSS-TIER: Reads networkBridge (KMS key ARNs) via externalRef.
# OUTPUT: storageBridge ConfigMap with all bucket ARNs for downstream tiers.
#
# COST: ~$1-5/month (S3 storage costs depend on volume).

apiVersion: kro.run/v1alpha1
kind: ResourceGraphDefinition
metadata:
  name: awsgen3storage1
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
    argocd.argoproj.io/sync-wave: "0"
spec:
  schema:
    apiVersion: v1alpha1
    kind: AwsGen3Storage1
    spec:
      # ── Identity ──────────────────────────────────────────────────
      name: string | default="gen3"
      namespace: string | required=true
      adoptionPolicy: string | default="adopt-or-create"
      deletionPolicy: string | default="delete"

      # ── Shared Infrastructure Config ─────────────────────────────
      infrastructureConfigMapName: string | default="infrastructure-values"


      # ── Bridge References (from Network1) ────────────────────────
      foundationBridgeName: string | default="foundation-bridge"

      # ── Bridge ───────────────────────────────────────────────────
      storageBridgeName: string | default="storage-bridge"

    status:
      loggingBucketARN: ${loggingBucket.status.?ackResourceMetadata.?arn.orValue("loading")}
      dataBucketARN: ${dataBucket.status.?ackResourceMetadata.?arn.orValue("loading")}
      uploadBucketARN: ${uploadBucket.status.?ackResourceMetadata.?arn.orValue("loading")}

  resources:
  # ====================================================================
  # Layer 0: External References
  # ====================================================================

    # ── Namespace ────────────────────────────────────────────────────
    - id: spokeNamespace
      externalRef:
        apiVersion: v1
        kind: Namespace
        metadata:
          name: ${schema.spec.namespace}

    - id: infrastructureConfig
      readyWhen:
        - ${infrastructureConfig.metadata.?name.orValue('null') != 'null'}
      externalRef:
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: ${schema.spec.infrastructureConfigMapName}
          namespace: ${schema.spec.namespace}


    # ── Network Bridge (KMS key ARNs for bucket encryption) ─────────
    - id: foundationBridge
      readyWhen:
        - ${foundationBridge.metadata.?name.orValue('null') != 'null'}
      externalRef:
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: ${schema.spec.foundationBridgeName}
          namespace: ${schema.spec.namespace}

  # ====================================================================
  # STORAGE: S3 Buckets (KMS-encrypted)
  # ====================================================================

    # ── Logging Bucket (ALB logs, CloudTrail, VPC Flow Logs) ─────────
    - id: loggingBucket
      readyWhen:
        - ${loggingBucket.status.?ackResourceMetadata.?arn.orValue('null') != 'null'}
        - ${loggingBucket.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
      template:
        apiVersion: s3.services.k8s.aws/v1alpha1
        kind: Bucket
        metadata:
          name: ${schema.spec.name}-logging-bucket
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${infrastructureConfig.data['aws-region']}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          name: ${infrastructureConfig.data['storage-logging-bucket-name']}
          versioning:
            status: "Enabled"
          encryption:
            rules:
              - applyServerSideEncryptionByDefault:
                  sseAlgorithm: "aws:kms"
                  kmsMasterKeyID: ${foundationBridge.data['logging-key-arn']}
          publicAccessBlock:
            blockPublicACLs: true
            blockPublicPolicy: true
            ignorePublicACLs: true
            restrictPublicBuckets: true
          tagging:
            tagSet:
              - key: Name
                value: ${infrastructureConfig.data['storage-logging-bucket-name']}
              - key: Environment
                value: ${infrastructureConfig.data['aws-environment']}
              - key: ManagedBy
                value: Kro
              - key: Project
                value: ${infrastructureConfig.data['aws-project']}
              - key: BucketType
                value: logging

    # ── Data Bucket (core data files for Fence) ──────────────────────
    - id: dataBucket
      readyWhen:
        - ${dataBucket.status.?ackResourceMetadata.?arn.orValue('null') != 'null'}
        - ${dataBucket.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
      template:
        apiVersion: s3.services.k8s.aws/v1alpha1
        kind: Bucket
        metadata:
          name: ${schema.spec.name}-data-bucket
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${infrastructureConfig.data['aws-region']}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          name: ${infrastructureConfig.data['storage-data-bucket-name']}
          versioning:
            status: "Enabled"
          encryption:
            rules:
              - applyServerSideEncryptionByDefault:
                  sseAlgorithm: "aws:kms"
                  kmsMasterKeyID: ${foundationBridge.data['platform-key-arn']}
          publicAccessBlock:
            blockPublicACLs: true
            blockPublicPolicy: true
            ignorePublicACLs: true
            restrictPublicBuckets: true
          tagging:
            tagSet:
              - key: Name
                value: ${infrastructureConfig.data['storage-data-bucket-name']}
              - key: Environment
                value: ${infrastructureConfig.data['aws-environment']}
              - key: ManagedBy
                value: Kro
              - key: Project
                value: ${infrastructureConfig.data['aws-project']}
              - key: BucketType
                value: data

    # ── Upload Bucket (user data uploads) ────────────────────────────
    - id: uploadBucket
      readyWhen:
        - ${uploadBucket.status.?ackResourceMetadata.?arn.orValue('null') != 'null'}
        - ${uploadBucket.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
      template:
        apiVersion: s3.services.k8s.aws/v1alpha1
        kind: Bucket
        metadata:
          name: ${schema.spec.name}-upload-bucket
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${infrastructureConfig.data['aws-region']}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          name: ${infrastructureConfig.data['storage-upload-bucket-name']}
          versioning:
            status: "Enabled"
          encryption:
            rules:
              - applyServerSideEncryptionByDefault:
                  sseAlgorithm: "aws:kms"
                  kmsMasterKeyID: ${foundationBridge.data['platform-key-arn']}
          publicAccessBlock:
            blockPublicACLs: true
            blockPublicPolicy: true
            ignorePublicACLs: true
            restrictPublicBuckets: true
          tagging:
            tagSet:
              - key: Name
                value: ${infrastructureConfig.data['storage-upload-bucket-name']}
              - key: Environment
                value: ${infrastructureConfig.data['aws-environment']}
              - key: ManagedBy
                value: Kro
              - key: Project
                value: ${infrastructureConfig.data['aws-project']}
              - key: BucketType
                value: upload

    # ── Manifest Bucket (conditional — ManifestService file lists) ───
    - id: manifestBucket
      includeWhen:
        - ${infrastructureConfig.data['storage-manifest-bucket-name'] != ''}
      readyWhen:
        - ${manifestBucket.status.?ackResourceMetadata.?arn.orValue('null') != 'null'}
        - ${manifestBucket.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
      template:
        apiVersion: s3.services.k8s.aws/v1alpha1
        kind: Bucket
        metadata:
          name: ${schema.spec.name}-manifest-bucket
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${infrastructureConfig.data['aws-region']}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          name: ${infrastructureConfig.data['storage-manifest-bucket-name']}
          versioning:
            status: "Enabled"
          encryption:
            rules:
              - applyServerSideEncryptionByDefault:
                  sseAlgorithm: "aws:kms"
                  kmsMasterKeyID: ${foundationBridge.data['platform-key-arn']}
          publicAccessBlock:
            blockPublicACLs: true
            blockPublicPolicy: true
            ignorePublicACLs: true
            restrictPublicBuckets: true
          tagging:
            tagSet:
              - key: Name
                value: ${infrastructureConfig.data['storage-manifest-bucket-name']}
              - key: Environment
                value: ${infrastructureConfig.data['aws-environment']}
              - key: ManagedBy
                value: Kro
              - key: Project
                value: ${infrastructureConfig.data['aws-project']}
              - key: BucketType
                value: manifest

    # ── Dashboard Bucket (conditional — portal static assets) ────────────
    - id: dashboardBucket
      includeWhen:
        - ${infrastructureConfig.data['storage-dashboard-bucket-name'] != ''}
      readyWhen:
        - ${dashboardBucket.status.?ackResourceMetadata.?arn.orValue('null') != 'null'}
        - ${dashboardBucket.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
      template:
        apiVersion: s3.services.k8s.aws/v1alpha1
        kind: Bucket
        metadata:
          name: ${schema.spec.name}-dashboard-bucket
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${infrastructureConfig.data['aws-region']}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          name: ${infrastructureConfig.data['storage-dashboard-bucket-name']}
          versioning:
            status: "Enabled"
          encryption:
            rules:
              - applyServerSideEncryptionByDefault:
                  sseAlgorithm: "aws:kms"
                  kmsMasterKeyID: ${foundationBridge.data['platform-key-arn']}
          publicAccessBlock:
            blockPublicACLs: true
            blockPublicPolicy: true
            ignorePublicACLs: true
            restrictPublicBuckets: true
          tagging:
            tagSet:
              - key: Name
                value: ${infrastructureConfig.data['storage-dashboard-bucket-name']}
              - key: Environment
                value: ${infrastructureConfig.data['aws-environment']}
              - key: ManagedBy
                value: Kro
              - key: Project
                value: ${infrastructureConfig.data['aws-project']}
              - key: BucketType
                value: dashboard

    # ── Users Bucket (fence usersync user.yaml — always created) ───────────
    - id: usersBucket
      includeWhen:
        - ${infrastructureConfig.data['storage-usersync-bucket-name'] != ''}
      readyWhen:
        - ${usersBucket.status.?ackResourceMetadata.?arn.orValue('null') != 'null'}
        - ${usersBucket.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
      template:
        apiVersion: s3.services.k8s.aws/v1alpha1
        kind: Bucket
        metadata:
          name: ${schema.spec.name}-users-bucket
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${infrastructureConfig.data['aws-region']}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          name: ${infrastructureConfig.data['storage-usersync-bucket-name']}
          versioning:
            status: "Enabled"
          encryption:
            rules:
              - applyServerSideEncryptionByDefault:
                  sseAlgorithm: "aws:kms"
                  kmsMasterKeyID: ${foundationBridge.data['platform-key-arn']}
          publicAccessBlock:
            blockPublicACLs: true
            blockPublicPolicy: true
            ignorePublicACLs: true
            restrictPublicBuckets: true
          tagging:
            tagSet:
              - key: Name
                value: ${infrastructureConfig.data['storage-usersync-bucket-name']}
              - key: Environment
                value: ${infrastructureConfig.data['aws-environment']}
              - key: ManagedBy
                value: Kro
              - key: Project
                value: ${infrastructureConfig.data['aws-project']}
              - key: BucketType
                value: usersync

  # ====================================================================
  # BRIDGE: Storage Outputs ConfigMap (for downstream tiers)
  # ====================================================================
  # NOTE: Conditional bucket ARNs (manifest, dashboard) use Test 8
  # dual-bridge pattern — separate bridges for each combination to avoid
  # KRO silently dropping excluded resource references.

    # ── Storage Bridge (always — core bucket ARNs) ───────────────────
    - id: storageBridge
      readyWhen:
        - ${storageBridge.metadata.?name.orValue('null') != 'null'}
      template:
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: ${schema.spec.storageBridgeName}
          namespace: ${schema.spec.namespace}
          labels:
            app.kubernetes.io/managed-by: kro
            gen3.io/tier: storage
            gen3.io/bridge: "true"
        data:
          logging-bucket-arn: ${loggingBucket.status.?ackResourceMetadata.?arn.orValue("loading")}
          logging-bucket-name: ${infrastructureConfig.data['storage-logging-bucket-name']}
          data-bucket-arn: ${dataBucket.status.?ackResourceMetadata.?arn.orValue("loading")}
          data-bucket-name: ${infrastructureConfig.data['storage-data-bucket-name']}
          upload-bucket-arn: ${uploadBucket.status.?ackResourceMetadata.?arn.orValue("loading")}
          upload-bucket-name: ${infrastructureConfig.data['storage-upload-bucket-name']}
          manifest-bucket-name: ${infrastructureConfig.data['storage-manifest-bucket-name']}
          dashboard-bucket-name: ${infrastructureConfig.data['storage-dashboard-bucket-name']}
          users-bucket-arn: ${usersBucket.status.?ackResourceMetadata.?arn.orValue("loading")}
          users-bucket-name: ${infrastructureConfig.data['storage-usersync-bucket-name']}
