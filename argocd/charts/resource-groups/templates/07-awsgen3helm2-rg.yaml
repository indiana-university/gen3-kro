# AwsGen3Helm2 — Tier 5: Gen3 Application Deployment (Modular RGD v2)
#
# Changes from AwsGen3Helm1:
#   - RENAMED: appIAMBridgeName → iamBridgeName, appIAMNamespace → iamNamespace
#   - ADDED: messagingBridgeName, messagingNamespace for SQS bridge
#   - ADDED: awsEsProxyEnabled flag, aws-es-proxy IRSA role from iamBridge
#   - ADDED: ssjdispatcher IRSA role from iamBridge
#   - Bridge IDs: appIAMBridge → iamBridge, new messagingBridge
#   - SQS URLs now come from messagingBridge (was appIAMBridge)
#   - gen3HelmBridgeName schema field for bridge name parameterization
#
# Creates an ArgoCD Application CR that deploys the gen3-helm umbrella chart
# onto the spoke EKS cluster (registered by AwsGen3ClusterResources1, Tier 4.5).
# Reads bridge ConfigMaps from ALL upstream tiers to populate complete
# gen3-helm values (database endpoint, search endpoint, IRSA role ARNs, etc.).
#
# This RGD does NOT deploy AWS resources — it creates pure Kubernetes
# resources (ArgoCD Application CR + ConfigMap). No ACK controllers needed.
#
# PREREQUISITES:
#   1. Foundation1 deployed with foundationBridge + acmBridge
#   2. Compute2 deployed with computeBridge
#   3. Database2 deployed with databaseBridge
#   4. Search1 deployed with searchBridge
#   5. IAM1 deployed with iamBridge (IRSA role ARNs)
#   6. Messaging1 deployed with messagingBridge (SQS URLs)
#   7. ClusterResources1 deployed with clusterResourcesBridge
#   8. Storage1 deployed with storageBridge (S3 bucket names/ARNs)
#   9. Advanced1 deployed with advancedBridge (WAF ACL ARN)
#   10. AWS SM secrets created for all enabled services
#
# OUTPUT: ArgoCD Application CR + gen3HelmBridge ConfigMap.

apiVersion: kro.run/v1alpha1
kind: ResourceGraphDefinition
metadata:
  name: awsgen3helm2
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
    argocd.argoproj.io/sync-wave: "0"
spec:
  schema:
    apiVersion: v1alpha1
    kind: AwsGen3Helm2
    spec:
      # ── Identity ──────────────────────────────────────────────────
      name: string | required=true
      namespace: string | default="default"
      region: string | default="us-east-1"
      environment: string | default="dev"
      project: string | default="gen3"

      # ── ArgoCD ───────────────────────────────────────────────────
      argoCDNamespace: string | default="argocd"
      argoCDProject: string | default="default"

      # ── Gen3-Helm Source ─────────────────────────────────────────
      gen3HelmRepoURL: string | default="https://helm.gen3.org"
      gen3HelmChart: string | default="gen3"
      gen3HelmPath: string | default="helm/gen3"
      gen3HelmTargetRevision: string | default="0.3.25"

      # ── Gen3 Configuration ─────────────────────────────────────
      hostname: string | required=true
      dictionaryUrl: string | default="https://s3.amazonaws.com/dictionary-artifacts/datadictionary/develop/schema.json"

      # ── Database Configuration (passed to gen3-helm) ────────────
      auroraMasterUsername: string | default="postgres"
      auroraDBName: string | default="gen3"

      # ── Bridge References (ALL required for full deployment) ────
      foundationBridgeName: string | required=true
      computeBridgeName: string | required=true
      databaseBridgeName: string | required=true
      searchBridgeName: string | required=true
      iamBridgeName: string | required=true
      messagingBridgeName: string | required=true
      acmBridgeName: string | required=true
      clusterResourcesBridgeName: string | required=true
      foundationNamespace: string | required=true
      computeNamespace: string | required=true
      databaseNamespace: string | required=true
      searchNamespace: string | required=true
      iamNamespace: string | required=true
      messagingNamespace: string | required=true
      acmNamespace: string | required=true
      clusterResourcesNamespace: string | required=true
      storageBridgeName: string | required=true
      storageNamespace: string | required=true
      advancedBridgeName: string | required=true
      advancedNamespace: string | required=true

      # ── Gen3 Platform Settings ─────────────────────────────────
      tierAccessLevel: string | default="private"
      tierAccessLimit: integer | default=100
      dbCreateEnabled: boolean | default=true
      dashboardEnabled: boolean | default=false

      # ── Feature Flags (control which gen3 services are enabled) ─
      fenceEnabled: boolean | default=true
      auditEnabled: boolean | default=true
      hatcheryEnabled: boolean | default=false
      manifestserviceEnabled: boolean | default=false
      indexdEnabled: boolean | default=true
      metadataEnabled: boolean | default=true
      peregrinEnabled: boolean | default=true
      sheepdogEnabled: boolean | default=true
      guppyEnabled: boolean | default=false
      portalEnabled: boolean | default=true
      ssjdispatcherEnabled: boolean | default=false
      wtsEnabled: boolean | default=true
      requestorEnabled: boolean | default=false
      awsEsProxyEnabled: boolean | default=true

      # ── Auto Sync ───────────────────────────────────────────────
      autoSync: boolean | default=false

      # ── External Secrets (ESO on spoke — stanfordaimi pattern) ──
      externalSecretsEnabled: boolean | default=true
      # Aurora master password SM secret name (spoke ESO pulls it)
      postgresExternalSecret: string | default=""
      # Per-service DB credential SM secret names
      fenceDbcredsSM: string | default=""
      arboristDbcredsSM: string | default=""
      auditDbcredsSM: string | default=""
      indexdDbcredsSM: string | default=""
      metadataDbcredsSM: string | default=""
      peregrinDbcredsSM: string | default=""
      sheepdogDbcredsSM: string | default=""
      requestorDbcredsSM: string | default=""
      wtsDbcredsSM: string | default=""
      # Fence config from SM (JWT keys auto-generated by gen3-helm)
      fenceConfigSM: string | default=""
      # Indexd default prefix
      indexdDefaultPrefix: string | default="dg.XXXX/"

      # ── Bridge (output) ─────────────────────────────────────────
      gen3HelmBridgeName: string | default="gen3helm-bridge"

    status:
      ready: ${spokeNamespace.metadata.?name.orValue("loading")}
      hostname: ${gen3HelmBridge.data.hostname}
      argoCDClusterName: ${gen3HelmBridge.data['argocd-cluster-name']}
      appHealthStatus: ${gen3App.status.?health.?status.orValue("loading")}
      appSyncStatus: ${gen3App.status.?sync.?status.orValue("loading")}

  resources:
  # ====================================================================
  # Layer 0: External References (ALL upstream bridges)
  # ====================================================================

    - id: spokeNamespace
      externalRef:
        apiVersion: v1
        kind: Namespace
        metadata:
          name: ${schema.spec.namespace}

    - id: foundationBridge
      readyWhen:
        - ${foundationBridge.metadata.?name.orValue('null') != 'null'}
      externalRef:
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: ${schema.spec.foundationBridgeName}
          namespace: ${schema.spec.foundationNamespace}

    - id: computeBridge
      readyWhen:
        - ${computeBridge.metadata.?name.orValue('null') != 'null'}
      externalRef:
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: ${schema.spec.computeBridgeName}
          namespace: ${schema.spec.computeNamespace}

    - id: databaseBridge
      readyWhen:
        - ${databaseBridge.metadata.?name.orValue('null') != 'null'}
      externalRef:
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: ${schema.spec.databaseBridgeName}
          namespace: ${schema.spec.databaseNamespace}

    - id: searchBridge
      readyWhen:
        - ${searchBridge.metadata.?name.orValue('null') != 'null'}
      externalRef:
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: ${schema.spec.searchBridgeName}
          namespace: ${schema.spec.searchNamespace}

    - id: iamBridge
      readyWhen:
        - ${iamBridge.metadata.?name.orValue('null') != 'null'}
      externalRef:
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: ${schema.spec.iamBridgeName}
          namespace: ${schema.spec.iamNamespace}

    - id: messagingBridge
      readyWhen:
        - ${messagingBridge.metadata.?name.orValue('null') != 'null'}
      externalRef:
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: ${schema.spec.messagingBridgeName}
          namespace: ${schema.spec.messagingNamespace}

    - id: acmBridge
      readyWhen:
        - ${acmBridge.metadata.?name.orValue('null') != 'null'}
      externalRef:
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: ${schema.spec.acmBridgeName}
          namespace: ${schema.spec.acmNamespace}

    - id: clusterResourcesBridge
      readyWhen:
        - ${clusterResourcesBridge.metadata.?name.orValue('null') != 'null'}
      externalRef:
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: ${schema.spec.clusterResourcesBridgeName}
          namespace: ${schema.spec.clusterResourcesNamespace}

    - id: storageBridge
      readyWhen:
        - ${storageBridge.metadata.?name.orValue('null') != 'null'}
      externalRef:
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: ${schema.spec.storageBridgeName}
          namespace: ${schema.spec.storageNamespace}

    - id: advancedBridge
      readyWhen:
        - ${advancedBridge.metadata.?name.orValue('null') != 'null'}
      externalRef:
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: ${schema.spec.advancedBridgeName}
          namespace: ${schema.spec.advancedNamespace}

  # ====================================================================
  # ARGOCD: Application CR for gen3-helm
  # ====================================================================

    - id: gen3App
      readyWhen:
        - ${gen3App.metadata.?name.orValue('null') != 'null'}
        - ${gen3App.status.?health.?status.orValue('Unknown') == 'Healthy'}
        - ${gen3App.status.?sync.?status.orValue('Unknown') == 'Synced'}
      template:
        apiVersion: argoproj.io/v1alpha1
        kind: Application
        metadata:
          name: ${schema.spec.name}-gen3-helm
          namespace: ${schema.spec.argoCDNamespace}
          labels:
            app.kubernetes.io/managed-by: kro
            gen3.io/tier: application
            gen3.io/spoke: ${schema.spec.name}
          annotations:
            argocd.argoproj.io/cascade: "orphan"
        spec:
          project: ${schema.spec.argoCDProject}
          ignoreDifferences:
            - group: ""
              kind: Secret
              jsonPointers:
                - /data
                - /stringData
          source:
            repoURL: ${schema.spec.gen3HelmRepoURL}
            chart: ${schema.spec.gen3HelmChart}
            targetRevision: ${schema.spec.gen3HelmTargetRevision}
            helm:
              releaseName: gen3
              values: |
                # ── Global ─────────────────────────────────────────────────
                global:
                  hostname: ${schema.spec.hostname}
                  environment: ${schema.spec.environment}
                  revproxyArn: ${acmBridge.data['acm-cert-arn']}
                  dev: false
                  tierAccessLevel: ${schema.spec.tierAccessLevel}
                  tierAccessLimit: ${string(schema.spec.tierAccessLimit)}
                  publicDataSets: true
                  frontendRoot: portal
                  portalApp: gitops
                  dataUploadBucket: ${storageBridge.data['upload-bucket-name']}
                  dictionaryUrl: ${schema.spec.dictionaryUrl}
                  aws:
                    enabled: true
                    region: ${schema.spec.region}
                    wafv2:
                      enabled: ${advancedBridge.data['waf-enabled']}
                      wafAclArn: ${advancedBridge.data['waf-acl-arn']}
                    secretStoreServiceAccount:
                      enabled: ${string(schema.spec.externalSecretsEnabled)}
                      name: external-secrets-sa
                      roleArn: ${iamBridge.data['external-secrets-role-arn']}
                  postgres:
                    dbCreate: ${string(schema.spec.dbCreateEnabled)}
                    externalSecret: ${schema.spec.postgresExternalSecret}
                  externalSecrets:
                    deploy: ${string(schema.spec.externalSecretsEnabled)}

                # ── OpenSearch ─────────────────────────────────────────────
                aws-es-proxy:
                  enabled: ${string(schema.spec.awsEsProxyEnabled)}
                  esEndpoint: ${searchBridge.data['opensearch-endpoint']}

                # ── Core Infrastructure ────────────────────────────────────
                ambassador:
                  enabled: true
                arborist:
                  enabled: true
                  externalSecrets:
                    dbcreds: ${schema.spec.arboristDbcredsSM}
                revproxy:
                  enabled: true
                  ingress:
                    aws:
                      group: ${schema.spec.name}

                # ── Database-Dependent Services ────────────────────────────
                fence:
                  enabled: ${string(schema.spec.fenceEnabled)}
                  serviceAccount:
                    annotations:
                      eks.amazonaws.com/role-arn: ${iamBridge.data['fence-role-arn']}
                  externalSecrets:
                    fenceJwtKeys: ""
                    fenceConfig: ${schema.spec.fenceConfigSM}
                    fenceGoogleAppCredsSecret: ""
                    fenceGoogleStorageCredsSecret: ""
                    createK8sJwtKeysSecret: true
                    createK8sGoogleAppSecrets: true
                    createK8sFenceConfigSecret: true
                    dbcreds: ${schema.spec.fenceDbcredsSM}
                indexd:
                  enabled: ${string(schema.spec.indexdEnabled)}
                  defaultPrefix: ${schema.spec.indexdDefaultPrefix}
                  externalSecrets:
                    dbcreds: ${schema.spec.indexdDbcredsSM}
                    createK8sServiceCredsSecret: true
                peregrine:
                  enabled: ${string(schema.spec.peregrinEnabled)}
                  externalSecrets:
                    dbcreds: ${schema.spec.peregrinDbcredsSM}
                sheepdog:
                  enabled: ${string(schema.spec.sheepdogEnabled)}
                  externalSecrets:
                    dbcreds: ${schema.spec.sheepdogDbcredsSM}
                metadata:
                  enabled: ${string(schema.spec.metadataEnabled)}
                  externalSecrets:
                    createK8sMetadataSecret: true
                    dbcreds: ${schema.spec.metadataDbcredsSM}

                # ── Application Services ───────────────────────────────────
                audit:
                  enabled: ${string(schema.spec.auditEnabled)}
                  serviceAccount:
                    annotations:
                      eks.amazonaws.com/role-arn: ${iamBridge.data['audit-role-arn']}
                  externalSecrets:
                    dbcreds: ${schema.spec.auditDbcredsSM}
                    createK8sAuditSecret: true
                  server:
                    pull_from_queue: ${string(schema.spec.auditEnabled)}
                    type: aws_sqs
                    sqs:
                      region: ${schema.spec.region}
                      url: ${messagingBridge.data['audit-sqs-url']}
                hatchery:
                  enabled: ${string(schema.spec.hatcheryEnabled)}
                  serviceAccount:
                    annotations:
                      eks.amazonaws.com/role-arn: ${iamBridge.data['hatchery-role-arn']}
                manifestservice:
                  enabled: ${string(schema.spec.manifestserviceEnabled)}
                  serviceAccount:
                    annotations:
                      eks.amazonaws.com/role-arn: ${iamBridge.data['manifestservice-role-arn']}
                portal:
                  enabled: ${string(schema.spec.portalEnabled)}
                requestor:
                  enabled: ${string(schema.spec.requestorEnabled)}
                  externalSecrets:
                    dbcreds: ${schema.spec.requestorDbcredsSM}
                wts:
                  enabled: ${string(schema.spec.wtsEnabled)}
                  externalSecrets:
                    dbcreds: ${schema.spec.wtsDbcredsSM}
                guppy:
                  enabled: ${string(schema.spec.guppyEnabled)}

                # ── Data Pipeline ──────────────────────────────────────────
                ssjdispatcher:
                  enabled: ${string(schema.spec.ssjdispatcherEnabled)}
                  ssjcreds:
                    sqsUrl: ${messagingBridge.data['ssjdispatcher-sqs-url']}
                etl:
                  esEndpoint: gen3-elasticsearch-master
          destination:
            name: ${clusterResourcesBridge.data['argocd-cluster-name']}
            namespace: ${schema.spec.name}
          syncPolicy:
            syncOptions:
              - CreateNamespace=true
              - ServerSideApply=true

  # ====================================================================
  # BRIDGE: Gen3 Helm Outputs ConfigMap
  # ====================================================================

    - id: gen3HelmBridge
      readyWhen:
        - ${gen3HelmBridge.metadata.?name.orValue('null') != 'null'}
      template:
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: ${schema.spec.gen3HelmBridgeName}
          namespace: ${schema.spec.namespace}
          labels:
            app.kubernetes.io/managed-by: kro
            gen3.io/tier: application
            gen3.io/bridge: "true"
        data:
          argocd-app-name: ${schema.spec.name}-gen3-helm
          argocd-cluster-name: ${schema.spec.name}-spoke
          hostname: ${schema.spec.hostname}
          target-cluster: ${computeBridge.data['eks-cluster-endpoint']}
          app-health-status: ${gen3App.status.?health.?status.orValue('Unknown')}
          app-sync-status: ${gen3App.status.?sync.?status.orValue('Unknown')}
