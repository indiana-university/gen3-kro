# AwsGen3Helm2 — Tier 5: Gen3 Application Deployment (Modular RGD v2)
#
# Creates an ArgoCD Application CR that deploys the gen3-helm umbrella chart
# onto the spoke EKS cluster (registered by AwsGen3ClusterResources1, Tier 4.5).
#
# Values architecture (3-layer):
#   1. ConfigMap values.yaml key  → helm.values  (operator preferences)
#   2. Bridge data                → helm.parameters (infrastructure outputs)
#   3. Schema spec                → helm.parameters (identity: name, region)
#
# The operator configures gen3 services (enables, ESO secrets, hostnames)
# in the 00-values.yaml ConfigMap. Infrastructure outputs (IRSA role ARNs,
# DB endpoints, SQS URLs, S3 buckets, WAF ARN) come from bridge ConfigMaps
# and are injected via helm.parameters which override the base values.
#
# This RGD does NOT deploy AWS resources — it creates pure Kubernetes
# resources (ArgoCD Application CR + ConfigMap). No ACK controllers needed.
#
# Ref: https://github.com/uc-cdis/gen3-helm/tree/master/helm/gen3
#
# PREREQUISITES:
#   All upstream tiers deployed with their bridge ConfigMaps.
#   Values ConfigMap applied (00-values.yaml).
#
# OUTPUT: ArgoCD Application CR + gen3HelmBridge ConfigMap.

apiVersion: kro.run/v1alpha1
kind: ResourceGraphDefinition
metadata:
  name: awsgen3helm2
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
    argocd.argoproj.io/sync-wave: "0"
spec:
  schema:
    apiVersion: v1alpha1
    kind: AwsGen3Helm2
    spec:
      # ── Identity ──────────────────────────────────────────────────
      name: string | required=true
      namespace: string | default="default"
      region: string | default="us-east-1"
      environment: string | default="dev"
      project: string | default="gen3"

      # ── ArgoCD ───────────────────────────────────────────────────
      argoCDNamespace: string | default="argocd"
      argoCDProject: string | default="default"

      # ── Gen3-Helm Source ─────────────────────────────────────────
      gen3HelmRepoURL: string | default="https://helm.gen3.org"
      gen3HelmChart: string | default="gen3"
      gen3HelmPath: string | default="helm/gen3"
      gen3HelmTargetRevision: string | default="0.3.25"

      # ── Hostname (needed in bridge + status, also used as parameter) ──

      # ── Bridge References (ALL required for full deployment) ────
      foundationBridgeName: string | required=true
      computeBridgeName: string | required=true
      databaseBridgeName: string | required=true
      searchBridgeName: string | required=true
      iamBridgeName: string | required=true
      messagingBridgeName: string | required=true
      acmBridgeName: string | required=true
      clusterResourcesBridgeName: string | required=true
      foundationNamespace: string | required=true
      computeNamespace: string | required=true
      databaseNamespace: string | required=true
      searchNamespace: string | required=true
      iamNamespace: string | required=true
      messagingNamespace: string | required=true
      acmNamespace: string | required=true
      clusterResourcesNamespace: string | required=true
      storageBridgeName: string | required=true
      storageNamespace: string | required=true
      advancedBridgeName: string | required=true
      advancedNamespace: string | required=true

      # ── Values ConfigMap ─────────────────────────────────────────
      # ConfigMap with a "values.yaml" key containing the full nested
      # gen3 Helm chart values (operator preferences: service enables,
      # ESO secret names, dictionary URL, tier access, etc.).
      # Bridge-derived infrastructure values override via helm.parameters.
      valuesConfigMapName: string | required=true

      # ── Auto Sync ───────────────────────────────────────────────
      autoSync: boolean | default=false

      # ── Bridge (output) ─────────────────────────────────────────
      gen3HelmBridgeName: string | default="gen3helm-bridge"

    status:
      ready: ${spokeNamespace.metadata.?name.orValue("loading")}
      argoCDClusterName: ${gen3HelmBridge.data['argocd-cluster-name']}
      appHealthStatus: ${gen3App.status.?health.?status.orValue("loading")}
      appSyncStatus: ${gen3App.status.?sync.?status.orValue("loading")}

  resources:
  # ====================================================================
  # Layer 0: External References (ALL upstream bridges)
  # ====================================================================

    - id: spokeNamespace
      externalRef:
        apiVersion: v1
        kind: Namespace
        metadata:
          name: ${schema.spec.namespace}

    - id: foundationBridge
      readyWhen:
        - ${foundationBridge.metadata.?name.orValue('null') != 'null'}
      externalRef:
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: ${schema.spec.foundationBridgeName}
          namespace: ${schema.spec.foundationNamespace}

    - id: computeBridge
      readyWhen:
        - ${computeBridge.metadata.?name.orValue('null') != 'null'}
      externalRef:
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: ${schema.spec.computeBridgeName}
          namespace: ${schema.spec.computeNamespace}

    - id: databaseBridge
      readyWhen:
        - ${databaseBridge.metadata.?name.orValue('null') != 'null'}
      externalRef:
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: ${schema.spec.databaseBridgeName}
          namespace: ${schema.spec.databaseNamespace}

    - id: searchBridge
      readyWhen:
        - ${searchBridge.metadata.?name.orValue('null') != 'null'}
      externalRef:
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: ${schema.spec.searchBridgeName}
          namespace: ${schema.spec.searchNamespace}

    - id: iamBridge
      readyWhen:
        - ${iamBridge.metadata.?name.orValue('null') != 'null'}
      externalRef:
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: ${schema.spec.iamBridgeName}
          namespace: ${schema.spec.iamNamespace}

    - id: messagingBridge
      readyWhen:
        - ${messagingBridge.metadata.?name.orValue('null') != 'null'}
      externalRef:
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: ${schema.spec.messagingBridgeName}
          namespace: ${schema.spec.messagingNamespace}

    - id: acmBridge
      readyWhen:
        - ${acmBridge.metadata.?name.orValue('null') != 'null'}
      externalRef:
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: ${schema.spec.acmBridgeName}
          namespace: ${schema.spec.acmNamespace}

    - id: clusterResourcesBridge
      readyWhen:
        - ${clusterResourcesBridge.metadata.?name.orValue('null') != 'null'}
      externalRef:
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: ${schema.spec.clusterResourcesBridgeName}
          namespace: ${schema.spec.clusterResourcesNamespace}

    - id: storageBridge
      readyWhen:
        - ${storageBridge.metadata.?name.orValue('null') != 'null'}
      externalRef:
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: ${schema.spec.storageBridgeName}
          namespace: ${schema.spec.storageNamespace}

    - id: advancedBridge
      readyWhen:
        - ${advancedBridge.metadata.?name.orValue('null') != 'null'}
      externalRef:
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: ${schema.spec.advancedBridgeName}
          namespace: ${schema.spec.advancedNamespace}

    - id: gen3Values
      readyWhen:
        - ${gen3Values.metadata.?name.orValue('null') != 'null'}
      externalRef:
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: ${schema.spec.valuesConfigMapName}
          namespace: ${schema.spec.namespace}

  # ====================================================================
  # ARGOCD: Application CR for gen3-helm
  # ====================================================================

    - id: gen3App
      readyWhen:
        - ${gen3App.metadata.?name.orValue('null') != 'null'}
        - ${gen3App.status.?health.?status.orValue('Unknown') == 'Healthy'}
        - ${gen3App.status.?sync.?status.orValue('Unknown') == 'Synced'}
      template:
        apiVersion: argoproj.io/v1alpha1
        kind: Application
        metadata:
          name: ${schema.spec.name}-gen3-helm
          namespace: ${schema.spec.argoCDNamespace}
          labels:
            app.kubernetes.io/managed-by: kro
            gen3.io/tier: application
            gen3.io/spoke: ${schema.spec.name}
          annotations:
            argocd.argoproj.io/cascade: "orphan"
        spec:
          project: ${schema.spec.argoCDProject}
          ignoreDifferences:
            - group: ""
              kind: Secret
              jsonPointers:
                - /data
                - /stringData
          source:
            repoURL: ${schema.spec.gen3HelmRepoURL}
            chart: ${schema.spec.gen3HelmChart}
            targetRevision: ${schema.spec.gen3HelmTargetRevision}
            helm:
              releaseName: gen3
              # Base values from operator ConfigMap (nested YAML string)
              values: ${gen3Values.data['values.yaml']}
              # Bridge + schema overrides (take precedence over values)
              parameters:
                # ── Global identity & environment ────────────────────
                - name: global.environment
                  value: ${schema.spec.environment}
                - name: global.aws.region
                  value: ${schema.spec.region}
                # ── ACM Certificate ──────────────────────────────────
                - name: global.revproxyArn
                  value: ${acmBridge.data['acm-cert-arn']}
                # ── Storage (S3 upload bucket) ───────────────────────
                - name: global.dataUploadBucket
                  value: ${storageBridge.data['upload-bucket-name']}
                # ── WAF ──────────────────────────────────────────────
                - name: global.aws.wafv2.enabled
                  value: ${advancedBridge.data['waf-enabled']}
                - name: global.aws.wafv2.wafAclArn
                  value: ${advancedBridge.data['waf-acl-arn']}
                # ── IAM: External Secrets IRSA ───────────────────────
                - name: global.aws.secretStoreServiceAccount.roleArn
                  value: ${iamBridge.data['external-secrets-role-arn']}
                # ── Database (master endpoint + port) ────────────────
                - name: global.postgres.master.host
                  value: ${databaseBridge.data['aurora-endpoint']}
                - name: global.postgres.master.port
                  value: "5432"
                # ── OpenSearch ───────────────────────────────────────
                - name: aws-es-proxy.esEndpoint
                  value: ${searchBridge.data['opensearch-endpoint']}
                # ── Revproxy ALB group ───────────────────────────────
                - name: revproxy.ingress.aws.group
                  value: ${schema.spec.name}
                # ── IAM: Per-service IRSA role ARNs ──────────────────
                - name: fence.serviceAccount.annotations.eks\.amazonaws\.com/role-arn
                  value: ${iamBridge.data['fence-role-arn']}
                - name: audit.serviceAccount.annotations.eks\.amazonaws\.com/role-arn
                  value: ${iamBridge.data['audit-role-arn']}
                - name: hatchery.serviceAccount.annotations.eks\.amazonaws\.com/role-arn
                  value: ${iamBridge.data['hatchery-role-arn']}
                - name: manifestservice.serviceAccount.annotations.eks\.amazonaws\.com/role-arn
                  value: ${iamBridge.data['manifestservice-role-arn']}
                # ── Messaging: SQS URLs ──────────────────────────────
                - name: audit.server.sqs.region
                  value: ${schema.spec.region}
                - name: audit.server.sqs.url
                  value: ${messagingBridge.data['audit-sqs-url']}
                - name: ssjdispatcher.ssjcreds.sqsUrl
                  value: ${messagingBridge.data['ssjdispatcher-sqs-url']}
          destination:
            name: ${clusterResourcesBridge.data['argocd-cluster-name']}
            namespace: ${schema.spec.name}
          syncPolicy:
            syncOptions:
              - CreateNamespace=true
              - ServerSideApply=true

  # ====================================================================
  # BRIDGE: Gen3 Helm Outputs ConfigMap
  # ====================================================================

    - id: gen3HelmBridge
      readyWhen:
        - ${gen3HelmBridge.metadata.?name.orValue('null') != 'null'}
      template:
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: ${schema.spec.gen3HelmBridgeName}
          namespace: ${schema.spec.namespace}
          labels:
            app.kubernetes.io/managed-by: kro
            gen3.io/tier: application
            gen3.io/bridge: "true"
        data:
          argocd-app-name: ${schema.spec.name}-gen3-helm
          argocd-cluster-name: ${schema.spec.name}-spoke
          target-cluster: ${computeBridge.data['eks-cluster-endpoint']}
          app-health-status: ${gen3App.status.?health.?status.orValue('Unknown')}
          app-sync-status: ${gen3App.status.?sync.?status.orValue('Unknown')}
