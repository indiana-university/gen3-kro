# AwsGen3Compute2 — Tier 3: Compute (Modular RGD v2)
#
# Standard Mode EKS with Managed Node Groups. Gen3 services require
# pre-installed ALB controller, managed node groups, and explicit
# add-on management (vpc-cni, CoreDNS, kube-proxy).
#
# All IAM roles and security groups are pre-provisioned by Foundation1
# (Tier 0) with computeEnabled=true.
#
# Resources:
#   - eksCluster: EKS cluster with 4 subnets (public + private)
#   - eksNodeGroup: Managed node group on private subnets
#   - vpcCniAddon, coreDnsAddon, kubeProxyAddon: Essential EKS add-ons
#   - argoCDSpokeRole: IAM role for CSOC ArgoCD to authenticate to spoke EKS
#   - argoCDAccessEntry: EKS access entry granting ArgoCD role cluster admin
#   - computeBridge: ConfigMap with EKS outputs for downstream tiers
#
# PREREQUISITES:
#   1. Foundation1 deployed with computeEnabled=true (creates computePrepBridge)
#   2. ACK controllers: eks, iam
#
# CROSS-TIER: Reads computePrepBridge (IAM roles, EKS SG) and
# foundationBridge (VPC, subnets, platform key) via externalRef.

apiVersion: kro.run/v1alpha1
kind: ResourceGraphDefinition
metadata:
  name: awsgen3compute2
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
    argocd.argoproj.io/sync-wave: "0"
spec:
  schema:
    apiVersion: v1alpha1
    kind: AwsGen3Compute2
    spec:
      # ── Identity ──────────────────────────────────────────────────
      name: string | required=true
      namespace: string | default="default"
      region: string | default="us-east-1"
      environment: string | default="dev"
      project: string | default="gen3"
      adoptionPolicy: string | default="adopt-or-create"
      deletionPolicy: string | default="delete"

      # ── Bridge References (from Foundation1) ─────────────────────
      foundationBridgeName: string | required=true
      computePrepBridgeName: string | required=true
      foundationNamespace: string | required=true

      # ── EKS Configuration ───────────────────────────────────────
      kubernetesVersion: string | default="1.31"

      # ── Managed Node Group ───────────────────────────────────────
      nodeInstanceTypes: "[]string | required=true"
      nodeDesiredSize: integer | default=2
      nodeMinSize: integer | default=1
      nodeMaxSize: integer | default=4
      nodeDiskSize: integer | default=20
      nodeAMIType: string | default="AL2023_x86_64_STANDARD"

      # ── Bridge ───────────────────────────────────────────────────
      createBridgeSecret: boolean | default=true

      # ── Bridge Name Override ──────────────────────────────────────
      computeBridgeName: string | default="compute-bridge"

    status:
      ready: ${spokeNamespace.metadata.?name.orValue("loading")}

  resources:
  # ====================================================================
  # Layer 0: External References
  # ====================================================================

    # ── Namespace ────────────────────────────────────────────────────
    - id: spokeNamespace
      externalRef:
        apiVersion: v1
        kind: Namespace
        metadata:
          name: ${schema.spec.namespace}

    # ── ArgoCD Namespace (CSOC account ID for trust policy) ──────────
    - id: argocdNamespace
      externalRef:
        apiVersion: v1
        kind: Namespace
        metadata:
          name: argocd

    # ── Foundation Bridge (VPC, subnets, platform key) ───────────────
    - id: foundationBridge
      readyWhen:
        - ${foundationBridge.metadata.?name.orValue('null') != 'null'}
      externalRef:
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: ${schema.spec.foundationBridgeName}
          namespace: ${schema.spec.foundationNamespace}

    # ── Compute Prep Bridge (IAM roles, EKS SG) ─────────────────────
    - id: computePrepBridge
      readyWhen:
        - ${computePrepBridge.metadata.?name.orValue('null') != 'null'}
      externalRef:
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: ${schema.spec.computePrepBridgeName}
          namespace: ${schema.spec.foundationNamespace}

  # ====================================================================
  # COMPUTE: EKS Cluster + Managed Node Group
  # ====================================================================

    # ── EKS Cluster ──────────────────────────────────────────────────
    - id: eksCluster
      readyWhen:
        - ${eksCluster.status.?ackResourceMetadata.?arn.orValue('null') != 'null'}
        - ${eksCluster.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
        - ${eksCluster.status.?status.orValue('null') == 'ACTIVE'}
      template:
        apiVersion: eks.services.k8s.aws/v1alpha1
        kind: Cluster
        metadata:
          name: ${schema.spec.name}-eks
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${schema.spec.region}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          name: ${schema.spec.name}-eks
          roleARN: ${computePrepBridge.data['cluster-role-arn']}
          version: ${schema.spec.kubernetesVersion}
          resourcesVPCConfig:
            subnetIDs:
              - ${foundationBridge.data['public-subnet-1-id']}
              - ${foundationBridge.data['public-subnet-2-id']}
              - ${foundationBridge.data['private-subnet-1-id']}
              - ${foundationBridge.data['private-subnet-2-id']}
            securityGroupIDs:
              - ${computePrepBridge.data['eks-security-group-id']}
            endpointPrivateAccess: true
            endpointPublicAccess: true
          encryptionConfig:
            - provider:
                keyARN: ${foundationBridge.data['platform-key-arn']}
              resources:
                - secrets
          accessConfig:
            authenticationMode: "API"
            bootstrapClusterCreatorAdminPermissions: true
          logging:
            clusterLogging:
              - types:
                  - api
                  - audit
                  - authenticator
                  - controllerManager
                  - scheduler
                enabled: true
          tags:
            Name: ${schema.spec.name}-eks
            Environment: ${schema.spec.environment}
            ManagedBy: Kro
            Project: ${schema.spec.project}

    # ── EKS Managed Node Group ───────────────────────────────────────
    - id: eksNodeGroup
      readyWhen:
        - ${eksNodeGroup.status.?ackResourceMetadata.?arn.orValue('null') != 'null'}
        - ${eksNodeGroup.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
        - ${eksNodeGroup.status.?status.orValue('null') == 'ACTIVE'}
      template:
        apiVersion: eks.services.k8s.aws/v1alpha1
        kind: Nodegroup
        metadata:
          name: ${schema.spec.name}-nodegroup
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${schema.spec.region}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          name: ${schema.spec.name}-nodegroup
          clusterName: ${eksCluster.spec.name}
          nodeRole: ${computePrepBridge.data['node-role-arn']}
          subnets:
            - ${foundationBridge.data['private-subnet-1-id']}
            - ${foundationBridge.data['private-subnet-2-id']}
          scalingConfig:
            desiredSize: ${schema.spec.nodeDesiredSize}
            minSize: ${schema.spec.nodeMinSize}
            maxSize: ${schema.spec.nodeMaxSize}
          instanceTypes: ${schema.spec.nodeInstanceTypes}
          amiType: ${schema.spec.nodeAMIType}
          diskSize: ${schema.spec.nodeDiskSize}
          tags:
            Name: ${schema.spec.name}-nodegroup
            Environment: ${schema.spec.environment}
            ManagedBy: Kro
            Project: ${schema.spec.project}

  # ====================================================================
  # EKS ADDONS: Essential cluster add-ons
  # ====================================================================

    # ── VPC CNI Add-on ───────────────────────────────────────────────
    - id: vpcCniAddon
      readyWhen:
        - ${vpcCniAddon.status.?ackResourceMetadata.?arn.orValue('null') != 'null'}
        - ${vpcCniAddon.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
      template:
        apiVersion: eks.services.k8s.aws/v1alpha1
        kind: Addon
        metadata:
          name: ${schema.spec.name}-vpc-cni
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${schema.spec.region}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          name: vpc-cni
          clusterName: ${eksCluster.spec.name}
          tags:
            Name: ${schema.spec.name}-vpc-cni
            Environment: ${schema.spec.environment}
            ManagedBy: Kro

    # ── CoreDNS Add-on ───────────────────────────────────────────────
    - id: coreDnsAddon
      readyWhen:
        - ${coreDnsAddon.status.?ackResourceMetadata.?arn.orValue('null') != 'null'}
        - ${coreDnsAddon.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
      template:
        apiVersion: eks.services.k8s.aws/v1alpha1
        kind: Addon
        metadata:
          name: ${schema.spec.name}-coredns
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${schema.spec.region}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          name: coredns
          clusterName: ${eksCluster.spec.name}
          tags:
            Name: ${schema.spec.name}-coredns
            Environment: ${schema.spec.environment}
            ManagedBy: Kro

    # ── kube-proxy Add-on ────────────────────────────────────────────
    - id: kubeProxyAddon
      readyWhen:
        - ${kubeProxyAddon.status.?ackResourceMetadata.?arn.orValue('null') != 'null'}
        - ${kubeProxyAddon.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
      template:
        apiVersion: eks.services.k8s.aws/v1alpha1
        kind: Addon
        metadata:
          name: ${schema.spec.name}-kube-proxy
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${schema.spec.region}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          name: kube-proxy
          clusterName: ${eksCluster.spec.name}
          tags:
            Name: ${schema.spec.name}-kube-proxy
            Environment: ${schema.spec.environment}
            ManagedBy: Kro

  # ====================================================================
  # ARGOCD ACCESS: IAM Role + EKS Access Entry for CSOC ArgoCD
  # ====================================================================

    # ── IAM Role for ArgoCD spoke access ─────────────────────────────
    - id: argoCDSpokeRole
      readyWhen:
        - ${argoCDSpokeRole.status.?ackResourceMetadata.?arn.orValue('null') != 'null'}
        - ${argoCDSpokeRole.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
      template:
        apiVersion: iam.services.k8s.aws/v1alpha1
        kind: Role
        metadata:
          name: ${schema.spec.name}-argocd-spoke-access
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${schema.spec.region}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          name: ${schema.spec.name}-argocd-spoke-access
          description: "Allows CSOC ArgoCD to authenticate to ${schema.spec.name} spoke EKS cluster"
          assumeRolePolicyDocument: |
            {
              "Version": "2012-10-17",
              "Statement": [
                {
                  "Effect": "Allow",
                  "Principal": {"AWS": "arn:aws:iam::${argocdNamespace.metadata.annotations['csoc-account-id']}:root"},
                  "Action": "sts:AssumeRole"
                }
              ]
            }
          tags:
            - key: Name
              value: ${schema.spec.name}-argocd-spoke-access
            - key: Environment
              value: ${schema.spec.environment}
            - key: ManagedBy
              value: Kro
            - key: Project
              value: ${schema.spec.project}

    # ── EKS Access Entry for ArgoCD role ─────────────────────────────
    - id: argoCDAccessEntry
      readyWhen:
        - ${argoCDAccessEntry.status.?ackResourceMetadata.?arn.orValue('null') != 'null'}
        - ${argoCDAccessEntry.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
      template:
        apiVersion: eks.services.k8s.aws/v1alpha1
        kind: AccessEntry
        metadata:
          name: ${schema.spec.name}-argocd-access
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${schema.spec.region}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          clusterName: ${eksCluster.spec.name}
          principalARN: ${argoCDSpokeRole.status.?ackResourceMetadata.?arn.orValue('loading')}
          type: STANDARD
          accessPolicies:
            - policyARN: arn:aws:eks::aws:cluster-access-policy/AmazonEKSClusterAdminPolicy
              accessScope:
                type: cluster
          tags:
            Name: ${schema.spec.name}-argocd-access
            Environment: ${schema.spec.environment}
            ManagedBy: Kro

  # ====================================================================
  # BRIDGE: Compute Outputs ConfigMap (for downstream tiers)
  # ====================================================================

    - id: computeBridge
      includeWhen:
        - ${schema.spec.createBridgeSecret == true}
      readyWhen:
        - ${computeBridge.metadata.?name.orValue('null') != 'null'}
      template:
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: ${schema.spec.computeBridgeName}
          namespace: ${schema.spec.namespace}
          labels:
            app.kubernetes.io/managed-by: kro
            gen3.io/tier: compute
            gen3.io/bridge: "true"
        data:
          eks-cluster-arn: ${eksCluster.status.?ackResourceMetadata.?arn.orValue("loading")}
          eks-cluster-endpoint: ${eksCluster.status.?endpoint.orValue("loading")}
          eks-cluster-name: ${schema.spec.name}-eks
          eks-cluster-ca: ${eksCluster.status.?certificateAuthority.?data.orValue("loading")}
          eks-oidc-issuer: ${eksCluster.status.?identity.?oidc.?issuer.orValue("loading")}
          argocd-spoke-access-arn: ${argoCDSpokeRole.status.?ackResourceMetadata.?arn.orValue("loading")}
