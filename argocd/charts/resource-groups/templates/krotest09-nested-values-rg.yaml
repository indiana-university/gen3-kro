# KRO Capability Test 9: Nested YAML String in ConfigMap → helm.values
#
# Tests whether KRO can read a multi-line nested YAML string from a
# ConfigMap data key (via externalRef) and pass it through to a resource
# template — simulating the ArgoCD Application spec.source.helm.values
# pattern.
#
# Pattern under test:
#   1. ConfigMap has a single key "values.yaml" containing nested YAML as a string
#   2. RGD reads ConfigMap via externalRef
#   3. RGD writes the string into another resource's data field
#
# If this works, the same pattern can replace per-key flat ConfigMap values
# with a single YAML document — matching the Su-informatics gen3-gitops
# values.yaml pattern.
#
# Usage:
#   kubectl apply -f argocd/charts/resource-groups/templates/krotest09-nested-values-rg.yaml

apiVersion: kro.run/v1alpha1
kind: ResourceGraphDefinition
metadata:
  name: kro-nested-values-test
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
    argocd.argoproj.io/sync-wave: "0"
spec:
  schema:
    apiVersion: v1alpha1
    kind: KroNestedValuesTest
    spec:
      name: string | required=true
      namespace: string | default="kro-test"
      valuesConfigMapName: string | required=true
    status:
      ready: ${targetNamespace.status.phase}
      echoedValuesLength: ${echoConfigMap.data.?echoedLength.orValue("unknown")}

  resources:
    # ── Namespace ──────────────────────────────────────────────────────────
    - id: targetNamespace
      readyWhen:
        - ${targetNamespace.status.phase == "Active"}
      template:
        apiVersion: v1
        kind: Namespace
        metadata:
          name: ${schema.spec.namespace}
          labels:
            app.kubernetes.io/managed-by: kro
            test-suite: kro-capabilities
            test-name: nested-values

    # ── ExternalRef: read the values ConfigMap ─────────────────────────────
    - id: valuesSource
      externalRef:
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: ${schema.spec.valuesConfigMapName}
          namespace: ${schema.spec.namespace}

    # ── Echo ConfigMap: write the nested YAML string into data ─────────────
    # This simulates how helm.values would receive the string.
    - id: echoConfigMap
      readyWhen:
        - ${echoConfigMap.metadata.?name.orValue('null') != 'null'}
      template:
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: ${schema.spec.name}-echo
          namespace: ${schema.spec.namespace}
          labels:
            test-suite: kro-capabilities
            test-name: nested-values-echo
        data:
          # Pass the nested YAML string through — this is the key test
          echoed-values: ${valuesSource.data['values.yaml']}
          echoedLength: "received"

    # ── ArgoCD-Simulation ConfigMap: structured like an ArgoCD App ──────────
    # This creates a ConfigMap whose data mirrors the ArgoCD Application
    # spec.source.helm structure, to verify KRO can place the string there.
    - id: argoSimConfigMap
      readyWhen:
        - ${argoSimConfigMap.metadata.?name.orValue('null') != 'null'}
      template:
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: ${schema.spec.name}-argo-sim
          namespace: ${schema.spec.namespace}
          labels:
            test-suite: kro-capabilities
            test-name: nested-values-argo-sim
        data:
          # Simulates spec.source.helm.values (which is a string field)
          helm-values: ${valuesSource.data['values.yaml']}
          # Also test a second key if one exists
          source-configmap: ${schema.spec.valuesConfigMapName}
