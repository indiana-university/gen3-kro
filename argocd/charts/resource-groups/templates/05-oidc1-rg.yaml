# AwsGen3OIDC — Tier 4: EKS OIDC Provider (Modular RGD v1)
#
# Creates the IAM OpenID Connect provider for the spoke EKS cluster and exports
# an oidcBridge ConfigMap for downstream tiers such as AwsGen3AppIAM1.
#
# PREREQUISITES:
#   1. Compute1 deployed with computeBridge (OIDC issuer)
#   2. ACK controller 'iam' must be running
#
# OUTPUT: oidcBridge ConfigMap with provider ARN, provider name, and issuer.

apiVersion: kro.run/v1alpha1
kind: ResourceGraphDefinition
metadata:
  name: awsgen3oidc1
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
    argocd.argoproj.io/sync-wave: "0"
spec:
  schema:
    apiVersion: v1alpha1
    kind: AwsGen3OIDC1
    spec:
      name: string | required=true
      namespace: string | required=true
      adoptionPolicy: string | default="adopt-or-create"
      deletionPolicy: string | default="delete"

      infrastructureConfigMapName: string | default="infrastructure-values"

      computeBridgeName: string | default="compute-bridge"

      oidcBridgeName: string | default="oidc-bridge"

    status:
      ready: ${oidcBridge.metadata.?name.orValue("loading")}

  resources:
    - id: spokeNamespace
      externalRef:
        apiVersion: v1
        kind: Namespace
        metadata:
          name: ${schema.spec.namespace}

    - id: infrastructureConfig
      readyWhen:
        - ${infrastructureConfig.metadata.?name.orValue('null') != 'null'}
      externalRef:
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: ${schema.spec.infrastructureConfigMapName}
          namespace: ${schema.spec.namespace}

    - id: computeBridge
      readyWhen:
        - ${computeBridge.metadata.?name.orValue('null') != 'null'}
      externalRef:
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: ${schema.spec.computeBridgeName}
          namespace: ${schema.spec.namespace}

    - id: oidcProvider
      readyWhen:
        - ${oidcProvider.status.?ackResourceMetadata.?arn.orValue('null') != 'null'}
        - ${oidcProvider.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
      template:
        apiVersion: iam.services.k8s.aws/v1alpha1
        kind: OpenIDConnectProvider
        metadata:
          name: ${schema.spec.name}-eks-oidc
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${infrastructureConfig.data['aws-region']}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          url: ${computeBridge.data['eks-oidc-issuer']}
          clientIDs:
            - sts.amazonaws.com
          thumbprints:
            - "9e99a48a9960b14926bb7f3b02e22da2b0ab7280"
          tags:
            - key: Name
              value: ${schema.spec.name}-eks-oidc
            - key: Environment
              value: ${infrastructureConfig.data['aws-environment']}
            - key: ManagedBy
              value: Kro
            - key: Project
              value: ${infrastructureConfig.data['aws-project']}

    - id: oidcBridge
      readyWhen:
        - ${oidcBridge.metadata.?name.orValue('null') != 'null'}
      template:
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: ${schema.spec.oidcBridgeName}
          namespace: ${schema.spec.namespace}
          labels:
            app.kubernetes.io/managed-by: kro
            gen3.io/tier: oidc
            gen3.io/bridge: "true"
        data:
          oidc-provider-arn: ${oidcProvider.status.?ackResourceMetadata.?arn.orValue("loading")}
          oidc-provider-name: ${schema.spec.name}-eks-oidc
          eks-oidc-issuer: ${computeBridge.data['eks-oidc-issuer']}
