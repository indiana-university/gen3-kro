# KRO Capability Test 1: forEach
#
# Tests KRO's forEach feature for creating multiple resources from a list.
# Uses K8s-native ConfigMaps (no AWS cost).
#
# Validates:
#   - Single-dimension forEach (list of strings)
#   - Cartesian product forEach (two lists → NxM resources)
#   - includeWhen combined with forEach
#   - Status reporting from forEach resources
#
# Usage:
#   kubectl apply -f argocd/charts/resource-groups/templates/krotest01-foreach-rg.yaml

apiVersion: kro.run/v1alpha1
kind: ResourceGraphDefinition
metadata:
  name: kro-foreach-test
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
    argocd.argoproj.io/sync-wave: "0"
spec:
  schema:
    apiVersion: v1alpha1
    kind: KroForEachTest
    spec:
      name: string | required=true
      namespace: string | default="kro-test"
      environment: string | default="test"
      values: "[]string | required=true"
      regions: '[]string | default=["us-east-1"]'
      tiers: '[]string | default=["web"]'
      cartesianEnabled: boolean | default=false
    status:
      namespacePhase: ${targetNamespace.status.phase}
  resources:
    - id: targetNamespace
      readyWhen:
        - ${targetNamespace.status.phase == "Active"}
      template:
        apiVersion: v1
        kind: Namespace
        metadata:
          name: ${schema.spec.namespace}
          labels:
            app.kubernetes.io/managed-by: kro
            test-suite: kro-capabilities
            test-name: foreach
    - id: simpleConfigs
      forEach:
        - value: ${schema.spec.values}
      readyWhen:
        - ${each.metadata.?name.orValue('null') != 'null'}
      template:
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: ${schema.spec.name}-single-${value}
          namespace: ${targetNamespace.metadata.name}
          labels:
            test-suite: kro-capabilities
            test-name: foreach-single
            test-value: ${value}
        data:
          value: ${value}
          source: "forEach single-dimension"
          environment: ${schema.spec.environment}
    - id: cartesianConfigs
      includeWhen:
        - ${schema.spec.cartesianEnabled == true}
      forEach:
        - region: ${schema.spec.regions}
        - tier: ${schema.spec.tiers}
      readyWhen:
        - ${each.metadata.?name.orValue('null') != 'null'}
      template:
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: ${schema.spec.name}-cart-${region}-${tier}
          namespace: ${targetNamespace.metadata.name}
          labels:
            test-suite: kro-capabilities
            test-name: foreach-cartesian
            test-region: ${region}
            test-tier: ${tier}
        data:
          region: ${region}
          tier: ${tier}
          source: "forEach cartesian product"
