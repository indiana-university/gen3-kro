# AwsGen3Database2 — Tier 1: Database (Modular RGD v2)
#
# Version 2 replaces the manual K8s Secret for the Aurora master password
# with External Secrets Operator (ESO). The password is pre-created in
# AWS Secrets Manager and pulled into K8s via an ExternalSecret resource.
#
# Changes from v1 (AwsGen3Database1):
#   - REMOVED: masterPasswordSecretName, masterPasswordSecretKey schema fields
#   - ADDED:   SecretStore + ExternalSecret for Aurora master password (IaC)
#   - ADDED:   auroraMasterPasswordSMName schema field (AWS SM key name)
#   - ADDED:   ESO auth configuration fields (esoUseIRSA, esoAwsCredsSecretName)
#   - Bridge:  exports aurora-master-password-sm-name for downstream tiers
#
# Per Plan 02 Revision 4, this tier creates ONLY:
#   ESO:        1 SecretStore (conditional: secretRef or IRSA mode)
#               1 ExternalSecret (aurora-master-password → K8s Secret)
#   Database:   1 Aurora PostgreSQL Serverless v2 cluster + 1 writer instance
#   Optional:   1 read replica instance (enableReadReplica=true)
#   Bridge:     1 optional databaseBridge ConfigMap with Aurora endpoints
#
# PREREQUISITES:
#   1. Foundation1 deployed with databaseEnabled=true (creates databasePrepBridge)
#   2. External Secrets Operator installed on CSOC cluster (via addons.yaml)
#   3. Aurora master password secret exists in AWS Secrets Manager:
#        aws secretsmanager create-secret \
#          --name "<auroraMasterPasswordSMName>" \
#          --secret-string '{"password":"<your-secure-password>"}' \
#          --region us-east-1
#   4. ESO credentials: K8s Secret for secretRef mode (local Kind) or
#      IRSA ServiceAccount for jwt mode (EKS CSOC)
#
# CROSS-TIER: Reads databasePrepBridge ConfigMap via externalRef
# (DB subnet group, Aurora SG, database KMS key from Foundation).

apiVersion: kro.run/v1alpha1
kind: ResourceGraphDefinition
metadata:
  name: awsgen3database2
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
    argocd.argoproj.io/sync-wave: "0"
spec:
  schema:
    apiVersion: v1alpha1
    kind: AwsGen3Database2
    spec:
      # ── Identity ──────────────────────────────────────────────────
      name: string | required=true
      namespace: string | default="default"
      region: string | default="us-east-1"
      environment: string | default="dev"
      project: string | default="gen3"
      adoptionPolicy: string | default="adopt-or-create"
      deletionPolicy: string | default="delete"

      # ── Bridge References (from Foundation1) ─────────────────────
      databasePrepBridgeName: string | required=true
      foundationNamespace: string | required=true

      # ── Aurora Configuration ─────────────────────────────────────
      auroraEngineVersion: string | default="16.6"
      auroraDBName: string | default="gen3"
      auroraMasterUsername: string | default="postgres"
      auroraMinCapacity: string | default="0.5"
      auroraMaxCapacity: string | default="4"

      # ── External Secrets (Aurora master password from AWS SM) ────
      # AWS SM key name, e.g. "spoke1_aurora-master-password"
      # SM secret must contain JSON: {"password":"<value>"}
      auroraMasterPasswordSMName: string | required=true
      # ESO auth: false = secretRef (local Kind), true = IRSA jwt (EKS)
      esoUseIRSA: boolean | default=false
      # For secretRef mode: K8s Secret with keys "access-key" + "secret-access-key"
      esoAwsCredsSecretName: string | default="eso-aws-credentials"
      # For IRSA jwt mode: ServiceAccount name with IRSA annotation
      esoServiceAccountName: string | default="external-secrets-sa"

      # ── Options ──────────────────────────────────────────────────
      enableReadReplica: boolean | default=false
      createBridgeSecret: boolean | default=true

      # ── Bridge Name Override ──────────────────────────────────────
      databaseBridgeName: string | default="database-bridge"

    status:
      # Aurora
      auroraClusterEndpoint: ${auroraCluster.status.?endpoint.orValue("loading")}
      auroraReaderEndpoint: ${auroraCluster.status.?readerEndpoint.orValue("loading")}
      auroraClusterARN: ${auroraCluster.status.?ackResourceMetadata.?arn.orValue("loading")}
      auroraInstanceARN: ${auroraInstance1.status.?ackResourceMetadata.?arn.orValue("loading")}

  resources:
  # ====================================================================
  # Layer 0: External References
  # ====================================================================

    # ── Namespace (for account ID) ───────────────────────────────────
    - id: spokeNamespace
      externalRef:
        apiVersion: v1
        kind: Namespace
        metadata:
          name: ${schema.spec.namespace}

    # ── Database Prep Bridge (from Foundation1) ──────────────────────
    - id: databasePrepBridge
      readyWhen:
        - ${databasePrepBridge.metadata.?name.orValue('null') != 'null'}
      externalRef:
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: ${schema.spec.databasePrepBridgeName}
          namespace: ${schema.spec.foundationNamespace}

  # ====================================================================
  # ESO: SecretStore + ExternalSecret for Aurora master password
  # ====================================================================
  # Two conditional SecretStores (KRO Test 8 pattern): same K8s name,
  # opposite includeWhen. Only one is created based on esoUseIRSA flag.

    # ── SecretStore: secretRef mode (local Kind — no IRSA) ───────────
    - id: secretStoreLocal
      includeWhen:
        - ${schema.spec.esoUseIRSA == false}
      readyWhen:
        - ${secretStoreLocal.metadata.?name.orValue('null') != 'null'}
      template:
        apiVersion: external-secrets.io/v1
        kind: SecretStore
        metadata:
          name: gen3-secret-store
          namespace: ${schema.spec.namespace}
          labels:
            app.kubernetes.io/managed-by: kro
            gen3.io/tier: database
        spec:
          provider:
            aws:
              service: SecretsManager
              region: ${schema.spec.region}
              auth:
                secretRef:
                  accessKeyIDSecretRef:
                    name: ${schema.spec.esoAwsCredsSecretName}
                    key: access-key
                  secretAccessKeySecretRef:
                    name: ${schema.spec.esoAwsCredsSecretName}
                    key: secret-access-key

    # ── SecretStore: Pod Identity mode (EKS CSOC) ───────────────────────
    # EKS CSOC uses EKS Pod Identity for ESO — no explicit auth needed.
    # ESO controller uses ambient credentials from Pod Identity association.
    - id: secretStoreIRSA
      includeWhen:
        - ${schema.spec.esoUseIRSA == true}
      readyWhen:
        - ${secretStoreIRSA.metadata.?name.orValue('null') != 'null'}
      template:
        apiVersion: external-secrets.io/v1
        kind: SecretStore
        metadata:
          name: gen3-secret-store
          namespace: ${schema.spec.namespace}
          labels:
            app.kubernetes.io/managed-by: kro
            gen3.io/tier: database
        spec:
          provider:
            aws:
              service: SecretsManager
              region: ${schema.spec.region}
              # No auth — ESO uses EKS Pod Identity ambient credentials

    # ── ExternalSecret: Aurora master password ───────────────────────
    # Pulls from AWS SM → creates K8s Secret "aurora-master-password"
    # with key "password". ACK DBCluster references this for masterUserPassword.
    - id: auroraMasterPasswordES
      readyWhen:
        - ${auroraMasterPasswordES.status.?conditions.orValue([]).exists(c, c.type == "Ready" && c.status == "True")}
      template:
        apiVersion: external-secrets.io/v1
        kind: ExternalSecret
        metadata:
          name: aurora-master-password
          namespace: ${schema.spec.namespace}
          labels:
            app.kubernetes.io/managed-by: kro
            gen3.io/tier: database
        spec:
          refreshInterval: 5m
          secretStoreRef:
            name: gen3-secret-store
            kind: SecretStore
          target:
            name: aurora-master-password
            creationPolicy: Owner
          data:
            - secretKey: password
              remoteRef:
                key: ${schema.spec.auroraMasterPasswordSMName}
                property: password

  # ====================================================================
  # DATABASE: Aurora PostgreSQL Serverless v2
  # ====================================================================

    # ── Aurora Cluster ───────────────────────────────────────────────
    - id: auroraCluster
      readyWhen:
        - ${auroraCluster.status.?ackResourceMetadata.?arn.orValue('null') != 'null'}
        - ${auroraCluster.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
        - ${auroraCluster.status.?status.orValue('null') == 'available'}
      template:
        apiVersion: rds.services.k8s.aws/v1alpha1
        kind: DBCluster
        metadata:
          name: ${schema.spec.name}-aurora
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${schema.spec.region}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          dbClusterIdentifier: ${schema.spec.name}-aurora
          engine: aurora-postgresql
          engineVersion: ${schema.spec.auroraEngineVersion}
          databaseName: ${schema.spec.auroraDBName}
          port: 5432
          masterUsername: ${schema.spec.auroraMasterUsername}
          # References K8s Secret created by auroraMasterPasswordES ExternalSecret.
          # CEL ref to auroraMasterPasswordES.metadata.name creates KRO dependency
          # ensuring the ES is Ready before Aurora cluster is created.
          masterUserPassword:
            name: ${auroraMasterPasswordES.metadata.name}
            namespace: ${schema.spec.namespace}
            key: password
          dbSubnetGroupName: ${databasePrepBridge.data['db-subnet-group-name']}
          vpcSecurityGroupIDs:
            - ${databasePrepBridge.data['aurora-sg-id']}
          storageEncrypted: true
          kmsKeyID: ${databasePrepBridge.data['database-key-arn']}
          serverlessV2ScalingConfiguration:
            minCapacity: ${double(schema.spec.auroraMinCapacity)}
            maxCapacity: ${double(schema.spec.auroraMaxCapacity)}
          backupRetentionPeriod: 7
          enableCloudwatchLogsExports:
            - postgresql
          tags:
            - key: Name
              value: ${schema.spec.name}-aurora
            - key: Environment
              value: ${schema.spec.environment}
            - key: ManagedBy
              value: Kro
            - key: Project
              value: ${schema.spec.project}

    # ── Aurora Writer Instance ───────────────────────────────────────
    - id: auroraInstance1
      readyWhen:
        - ${auroraInstance1.status.?ackResourceMetadata.?arn.orValue('null') != 'null'}
        - ${auroraInstance1.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
        - ${auroraInstance1.status.?dbInstanceStatus.orValue('null') == 'available'}
      template:
        apiVersion: rds.services.k8s.aws/v1alpha1
        kind: DBInstance
        metadata:
          name: ${schema.spec.name}-aurora-instance-1
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${schema.spec.region}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          dbInstanceIdentifier: ${schema.spec.name}-aurora-instance-1
          dbClusterIdentifier: ${auroraCluster.spec.dbClusterIdentifier}
          dbInstanceClass: db.serverless
          engine: aurora-postgresql
          tags:
            - key: Name
              value: ${schema.spec.name}-aurora-instance-1
            - key: Environment
              value: ${schema.spec.environment}
            - key: ManagedBy
              value: Kro
            - key: Project
              value: ${schema.spec.project}

    # ── Aurora Read Replica (optional) ───────────────────────────────
    - id: auroraInstance2
      includeWhen:
        - ${schema.spec.enableReadReplica == true}
      readyWhen:
        - ${auroraInstance2.status.?ackResourceMetadata.?arn.orValue('null') != 'null'}
        - ${auroraInstance2.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
        - ${auroraInstance2.status.?dbInstanceStatus.orValue('null') == 'available'}
      template:
        apiVersion: rds.services.k8s.aws/v1alpha1
        kind: DBInstance
        metadata:
          name: ${schema.spec.name}-aurora-instance-2
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${schema.spec.region}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          dbInstanceIdentifier: ${schema.spec.name}-aurora-instance-2
          dbClusterIdentifier: ${auroraCluster.spec.dbClusterIdentifier}
          dbInstanceClass: db.serverless
          engine: aurora-postgresql
          tags:
            - key: Name
              value: ${schema.spec.name}-aurora-instance-2
            - key: Environment
              value: ${schema.spec.environment}
            - key: ManagedBy
              value: Kro
            - key: Project
              value: ${schema.spec.project}

  # ====================================================================
  # BRIDGE: Database Outputs ConfigMap (for downstream tiers)
  # ====================================================================

    - id: databaseBridge
      includeWhen:
        - ${schema.spec.createBridgeSecret == true}
      readyWhen:
        - ${databaseBridge.metadata.?name.orValue('null') != 'null'}
      template:
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: ${schema.spec.databaseBridgeName}
          namespace: ${schema.spec.namespace}
          labels:
            app.kubernetes.io/managed-by: kro
            gen3.io/tier: database
            gen3.io/bridge: "true"
        data:
          aurora-cluster-endpoint: ${auroraCluster.status.?endpoint}
          aurora-reader-endpoint: ${auroraCluster.status.?readerEndpoint}
          aurora-cluster-arn: ${auroraCluster.status.?ackResourceMetadata.?arn}
          aurora-port: "5432"
          aurora-master-username: ${schema.spec.auroraMasterUsername}
          aurora-database-name: ${schema.spec.auroraDBName}
          # SM key name for downstream ESO (gen3-helm global.postgres.externalSecret)
          aurora-master-password-sm-name: ${schema.spec.auroraMasterPasswordSMName}
