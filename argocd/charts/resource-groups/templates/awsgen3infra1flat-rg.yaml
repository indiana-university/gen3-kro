  # ====================================================================
  # WAF: WAFv2 Web ACL
  # ====================================================================
    - id: wafWebAcl
      readyWhen:
        - ${wafWebAcl.status.?ackResourceMetadata.?arn.orValue('null') != 'null'}
        - ${wafWebAcl.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
      template:
        apiVersion: wafv2.services.k8s.aws/v1alpha1
        kind: WebACL
        metadata:
          name: ${schema.spec.name}-waf-acl
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${schema.spec.region}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          name: ${schema.spec.name}-waf-acl
          scope: ${schema.spec.wafScope}
          defaultAction:
            allow: {}
          visibilityConfig:
            cloudWatchMetricsEnabled: true
            metricName: ${schema.spec.name}-waf-metrics
            sampledRequestsEnabled: true
          rules:
            - name: aws-common-rules
              priority: 1
              overrideAction:
                none: {}
              statement:
                managedRuleGroupStatement:
                  vendorName: AWS
                  name: AWSManagedRulesCommonRuleSet
              visibilityConfig:
                cloudWatchMetricsEnabled: true
                metricName: ${schema.spec.name}-common-rules
                sampledRequestsEnabled: true
            - name: aws-bad-inputs
              priority: 2
              overrideAction:
                none: {}
              statement:
                managedRuleGroupStatement:
                  vendorName: AWS
                  name: AWSManagedRulesKnownBadInputsRuleSet
              visibilityConfig:
                cloudWatchMetricsEnabled: true
                metricName: ${schema.spec.name}-bad-inputs
                sampledRequestsEnabled: true
            - name: aws-sqli-rules
              priority: 3
              overrideAction:
                none: {}
              statement:
                managedRuleGroupStatement:
                  vendorName: AWS
                  name: AWSManagedRulesSQLiRuleSet
              visibilityConfig:
                cloudWatchMetricsEnabled: true
                metricName: ${schema.spec.name}-sqli-rules
                sampledRequestsEnabled: true
          tags:
            - key: Name
              value: ${schema.spec.name}-waf-acl
            - key: Environment
              value: ${schema.spec.environment}
            - key: ManagedBy
              value: Kro
            - key: Project
              value: ${schema.spec.project}
  # ====================================================================
  # CLUSTER RESOURCES: Spoke Prerequisite Deployments via ArgoCD
  # ====================================================================
    # External Secrets Operator â€” deployed from upstream Helm repo to spoke
    - id: clusterResourcesApp
      readyWhen:
        - ${clusterResourcesApp.metadata.?name.orValue('null') != 'null'}
        - ${clusterResourcesApp.status.?health.?status.orValue('Unknown') == 'Healthy'}
        - ${clusterResourcesApp.status.?sync.?status.orValue('Unknown') == 'Synced'}
      template:
        apiVersion: argoproj.io/v1alpha1
        kind: Application
        metadata:
          name: ${schema.spec.name}-external-secrets
          namespace: ${schema.spec.argoCDNamespace}
          labels:
            app.kubernetes.io/managed-by: kro
            gen3.io/tier: cluster-resources
            gen3.io/spoke: ${schema.spec.name}
          annotations:
            argocd.argoproj.io/cascade: "orphan"
        spec:
          project: ${schema.spec.argoCDProject}
          source:
            repoURL: https://charts.external-secrets.io
            chart: external-secrets
            targetRevision: ${schema.spec.externalSecretsHelmVersion}
            helm:
              releaseName: external-secrets
              values: |
                installCRDs: true
                serviceAccount:
                  annotations:
                    eks.amazonaws.com/role-arn: ${externalSecretsRole.status.?ackResourceMetadata.?arn.orValue("loading")}
          destination:
            name: ${schema.spec.name}
            namespace: external-secrets
          syncPolicy:
            automated:
              selfHeal: true
              allowEmpty: true
              prune: false
            retry:
              limit: 100
              backoff:
                duration: "30s"
                factor: 2
                maxDuration: "5m"
            syncOptions:
              - CreateNamespace=true
              - ServerSideApply=true
    # AWS Load Balancer Controller â€” deployed to spoke for ALB ingress
    - id: albControllerApp
      readyWhen:
        - ${albControllerApp.metadata.?name.orValue('null') != 'null'}
        - ${albControllerApp.status.?health.?status.orValue('Unknown') == 'Healthy'}
        - ${albControllerApp.status.?sync.?status.orValue('Unknown') == 'Synced'}
      template:
        apiVersion: argoproj.io/v1alpha1
        kind: Application
        metadata:
          name: ${schema.spec.name}-alb-controller
          namespace: ${schema.spec.argoCDNamespace}
          labels:
            app.kubernetes.io/managed-by: kro
            gen3.io/tier: cluster-resources
            gen3.io/spoke: ${schema.spec.name}
          annotations:
            argocd.argoproj.io/cascade: "orphan"
        spec:
          project: ${schema.spec.argoCDProject}
          source:
            repoURL: https://aws.github.io/eks-charts
            chart: aws-load-balancer-controller
            targetRevision: ${schema.spec.albControllerHelmVersion}
            helm:
              releaseName: aws-load-balancer-controller
              values: |
                clusterName: ${eksCluster.metadata.name}
                serviceAccount:
                  create: true
                  name: aws-load-balancer-controller
                  annotations:
                    eks.amazonaws.com/role-arn: ${albControllerRole.status.?ackResourceMetadata.?arn.orValue("loading")}
                region: ${schema.spec.region}
                vpcId: ${vpc.status.?vpcID.orValue("loading")}
          destination:
            name: ${schema.spec.name}
            namespace: kube-system
          syncPolicy:
            automated:
              selfHeal: true
              allowEmpty: true
              prune: false
            retry:
              limit: 100
              backoff:
                duration: "30s"
                factor: 2
                maxDuration: "5m"
            syncOptions:
              - CreateNamespace=true
              - ServerSideApply=true
  # ====================================================================
  # APPLICATION: Gen3 Helm Deployment via ArgoCD
  # ====================================================================
    - id: gen3App
      readyWhen:
        - ${gen3App.metadata.?name.orValue('null') != 'null'}
        - ${gen3App.status.?health.?status.orValue('Unknown') == 'Healthy'}
        - ${gen3App.status.?sync.?status.orValue('Unknown') == 'Synced'}
      template:
        apiVersion: argoproj.io/v1alpha1
        kind: Application
        metadata:
          name: ${schema.spec.name}-gen3-helm
          namespace: ${schema.spec.argoCDNamespace}
          labels:
            app.kubernetes.io/managed-by: kro
            gen3.io/tier: application
            gen3.io/spoke: ${schema.spec.name}
          annotations:
            argocd.argoproj.io/cascade: "orphan"
        spec:
          project: ${schema.spec.argoCDProject}
          ignoreDifferences:
            - group: ""
              kind: Secret
              jsonPointers:
                - /data
                - /stringData
          source:
            repoURL: ${schema.spec.gen3HelmRepoURL}
            chart: ${schema.spec.gen3HelmChart}
            targetRevision: ${schema.spec.gen3HelmTargetRevision}
            helm:
              releaseName: gen3
              values: |
                global:
                  hostname: ${schema.spec.hostname}
                  environment: ${schema.spec.environment}
                  revproxyArn: ${schema.spec.acmCertArn}
                  dev: false
                  tierAccessLevel: ${schema.spec.tierAccessLevel}
                  tierAccessLimit: ${string(schema.spec.tierAccessLimit)}
                  publicDataSets: true
                  frontendRoot: portal
                  portalApp: gitops
                  dataUploadBucket: ${schema.spec.uploadBucketName}
                  dictionaryUrl: ${schema.spec.dictionaryUrl}
                  aws:
                    enabled: true
                    region: ${schema.spec.region}
                    wafv2:
                      enabled: "${string(schema.spec.wafEnabled)}"
                      wafAclArn: ${wafWebAcl.status.?ackResourceMetadata.?arn.orValue("")}
                    secretStoreServiceAccount:
                      enabled: "${string(schema.spec.externalSecretsEnabled)}"
                      name: external-secrets-sa
                      roleArn: ${externalSecretsRole.status.?ackResourceMetadata.?arn.orValue("loading")}
                  postgres:
                    dbCreate: "${string(schema.spec.dbCreateEnabled)}"
                    externalSecret: ${schema.spec.postgresExternalSecret}
                  externalSecrets:
                    deploy: "${string(schema.spec.externalSecretsEnabled)}"
                aws-es-proxy:
                  enabled: "${string(schema.spec.awsEsProxyEnabled)}"
                  esEndpoint: ${openSearchDomain.status.?endpoint.orValue("loading")}
                ambassador:
                  enabled: true
                arborist:
                  enabled: true
                  externalSecrets:
                    dbcreds: ${schema.spec.arboristDbcredsSM}
                revproxy:
                  enabled: true
                  ingress:
                    aws:
                      group: ${schema.spec.name}
                fence:
                  enabled: "${string(schema.spec.fenceEnabled)}"
                  serviceAccount:
                    annotations:
                      eks.amazonaws.com/role-arn: ${fenceRole.status.?ackResourceMetadata.?arn.orValue("loading")}
                  externalSecrets:
                    fenceJwtKeys: ""
                    fenceConfig: ${schema.spec.fenceConfigSM}
                    fenceGoogleAppCredsSecret: ""
                    fenceGoogleStorageCredsSecret: ""
                    createK8sJwtKeysSecret: true
                    createK8sGoogleAppSecrets: true
                    createK8sFenceConfigSecret: true
                    dbcreds: ${schema.spec.fenceDbcredsSM}
                indexd:
                  enabled: "${string(schema.spec.indexdEnabled)}"
                  defaultPrefix: ${schema.spec.indexdDefaultPrefix}
                  externalSecrets:
                    dbcreds: ${schema.spec.indexdDbcredsSM}
                    createK8sServiceCredsSecret: true
                peregrine:
                  enabled: "${string(schema.spec.peregrinEnabled)}"
                  externalSecrets:
                    dbcreds: ${schema.spec.peregrinDbcredsSM}
                sheepdog:
                  enabled: "${string(schema.spec.sheepdogEnabled)}"
                  externalSecrets:
                    dbcreds: ${schema.spec.sheepdogDbcredsSM}
                metadata:
                  enabled: "${string(schema.spec.metadataEnabled)}"
                  externalSecrets:
                    createK8sMetadataSecret: true
                    dbcreds: ${schema.spec.metadataDbcredsSM}
                audit:
                  enabled: "${string(schema.spec.auditEnabled)}"
                  serviceAccount:
                    annotations:
                      eks.amazonaws.com/role-arn: ${auditRole.status.?ackResourceMetadata.?arn.orValue("loading")}
                  externalSecrets:
                    dbcreds: ${schema.spec.auditDbcredsSM}
                    createK8sAuditSecret: true
                  server:
                    pull_from_queue: "${string(schema.spec.auditEnabled)}"
                    type: aws_sqs
                    sqs:
                      region: ${schema.spec.region}
                      url: ${auditQueue.status.?queueURL.orValue("loading")}
                hatchery:
                  enabled: "${string(schema.spec.hatcheryEnabled)}"
                  serviceAccount:
                    annotations:
                      eks.amazonaws.com/role-arn: ${hatcheryRole.status.?ackResourceMetadata.?arn.orValue("loading")}
                manifestservice:
                  enabled: "${string(schema.spec.manifestserviceEnabled)}"
                  serviceAccount:
                    annotations:
                      eks.amazonaws.com/role-arn: ${manifestserviceRole.status.?ackResourceMetadata.?arn.orValue("loading")}
                portal:
                  enabled: "${string(schema.spec.portalEnabled)}"
                requestor:
                  enabled: "${string(schema.spec.requestorEnabled)}"
                  externalSecrets:
                    dbcreds: ${schema.spec.requestorDbcredsSM}
                wts:
                  enabled: "${string(schema.spec.wtsEnabled)}"
                  externalSecrets:
                    dbcreds: ${schema.spec.wtsDbcredsSM}
                guppy:
                  enabled: "${string(schema.spec.guppyEnabled)}"
                ssjdispatcher:
                  enabled: "${string(schema.spec.ssjdispatcherEnabled)}"
                  ssjcreds:
                    sqsUrl: ${ssjdispatcherQueue.status.?queueURL.orValue("loading")}
                etl:
                  esEndpoint: gen3-elasticsearch-master
          destination:
            name: ${schema.spec.name}
