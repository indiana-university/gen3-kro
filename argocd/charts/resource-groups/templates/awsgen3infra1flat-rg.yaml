            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          queueName: ${schema.spec.name}-audit-sqs
          messageRetentionPeriod: "${schema.spec.sqsMessageRetention}"
          visibilityTimeout: "${schema.spec.sqsVisibilityTimeout}"
          sqsManagedSSEEnabled: "true"
          tags:
            Name: ${schema.spec.name}-audit-sqs
            Environment: ${schema.spec.environment}
            ManagedBy: Kro
            Project: ${schema.spec.project}
    # SSJDispatcher SQS Queue
    - id: ssjdispatcherQueue
      readyWhen:
        - ${ssjdispatcherQueue.status.?ackResourceMetadata.?arn.orValue('null') != 'null'}
        - ${ssjdispatcherQueue.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
      template:
