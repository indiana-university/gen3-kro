            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          name: ${schema.spec.name}-opensearch-sg
          description: Security group for OpenSearch
          vpcID: ${vpc.status.?vpcID}
          ingressRules:
            - ipProtocol: tcp
              fromPort: 443
              toPort: 443
              userIDGroupPairs:
                - groupID: ${eksSecurityGroup.status.?id}
                  description: Allow EKS nodes to connect to OpenSearch
          tags:
            - key: Name
              value: ${schema.spec.name}-opensearch-sg
            - key: Environment
              value: ${schema.spec.environment}
            - key: ManagedBy
              value: Kro
            - key: Project
              value: ${schema.spec.project}
    # OpenSearch Domain
    - id: openSearchDomain
      readyWhen:
        - ${openSearchDomain.status.?domainID.orValue('null') != 'null'}
        - ${openSearchDomain.status.?created.orValue(false) == true}
        - ${openSearchDomain.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
      template:
        apiVersion: opensearchservice.services.k8s.aws/v1alpha1
        kind: Domain
        metadata:
          name: ${schema.spec.name}
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${schema.spec.region}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          name: ${schema.spec.name}
          engineVersion: "OpenSearch_${schema.spec.openSearchVersion}"
          clusterConfig:
            instanceType: ${schema.spec.openSearchInstanceType}
            instanceCount: ${schema.spec.openSearchInstanceCount}
            dedicatedMasterEnabled: false
            zoneAwarenessEnabled: true
            zoneAwarenessConfig:
              availabilityZoneCount: 2
          ebsOptions:
            ebsEnabled: true
            volumeSize: ${schema.spec.openSearchVolumeSize}
            volumeType: ${schema.spec.openSearchVolumeType}
          vpcOptions:
            subnetIDs:
              - ${privatesubnet1.status.?subnetID}
              - ${privatesubnet2.status.?subnetID}
            securityGroupIDs:
              - ${openSearchSecurityGroup.status.?id}
          encryptionAtRestOptions:
            enabled: true
            kmsKeyID: ${searchKey.status.?ackResourceMetadata.?arn}
          nodeToNodeEncryptionOptions:
            enabled: true
          advancedSecurityOptions:
            enabled: true
            internalUserDatabaseEnabled: true
            masterUserOptions:
              masterUserName: ${schema.spec.openSearchMasterUsername}
              masterUserPassword:
                namespace: ${schema.spec.namespace}
                name: ${schema.spec.openSearchMasterPasswordSecretRef}
                key: password
          domainEndpointOptions:
            enforceHTTPS: true
            tlsSecurityPolicy: "Policy-Min-TLS-1-2-2019-07"
          tags:
            - key: Name
              value: ${schema.spec.name}
            - key: Environment
              value: ${schema.spec.environment}
            - key: ManagedBy
              value: Kro
            - key: Project
              value: ${schema.spec.project}
