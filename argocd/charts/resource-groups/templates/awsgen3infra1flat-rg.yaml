    - id: openSearchSecurityGroup
      readyWhen:
        - ${openSearchSecurityGroup.status.?id.orValue('null') != 'null'}
        - ${openSearchSecurityGroup.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
      template:
        apiVersion: ec2.services.k8s.aws/v1alpha1
        kind: SecurityGroup
        metadata:
          name: ${schema.spec.name}-opensearch-sg
          namespace: ${schema.spec.namespace}
