        spec:
          name: ${schema.spec.name}-fence-role
          assumeRolePolicyDocument: |
            {
              "Version": "2012-10-17",
              "Statement": [{
                "Effect": "Allow",
                "Principal": {"Federated": "${oidcProvider.status.?ackResourceMetadata.?arn.orValue('loading')}"},
                "Action": "sts:AssumeRoleWithWebIdentity",
                "Condition": {"StringEquals": {"${eksCluster.status.?identity.?oidc.?issuer.orValue('loading')}:sub": "system:serviceaccount:${schema.spec.namespace}:fence-sa"}}
