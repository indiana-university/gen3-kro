# AwsGen3Helm1 — Tier 5: Gen3 Application Deployment (Modular RGD v1)
#
# Creates an ArgoCD cluster Secret (spoke EKS registration) and Application CR
# that deploys the gen3-helm umbrella chart onto the spoke EKS cluster.
# Reads bridge ConfigMaps from ALL upstream tiers to populate complete
# gen3-helm values (database endpoint, search endpoint, IRSA role ARNs, etc.).
#
# This RGD does NOT deploy AWS resources — it creates pure Kubernetes
# resources (ArgoCD Secret + Application + ConfigMap). No ACK controllers needed.
#
# PREREQUISITES:
#   1. Foundation1 deployed with foundationBridge (S3 buckets, KMS)
#   2. Compute2 deployed with computeBridge (EKS endpoint, CA, OIDC, ArgoCD role ARN)
#   3. Database1 deployed with databaseBridge (Aurora endpoint, username, DB name)
#   4. Search1 deployed with searchBridge (OpenSearch endpoint)
#   5. AppIAM1 deployed with appIAMBridge (IRSA role ARNs, SQS URLs)
#      — ALL feature flags must be enabled (KRO Test 8 limitation)
#   6. ArgoCD server must have AWS credentials for EKS IAM auth
#      (awsAuthConfig uses argocd-k8s-auth binary, included in ArgoCD 2.6+)
#
# OUTPUT: ArgoCD cluster Secret + Application CR + gen3HelmBridge.

apiVersion: kro.run/v1alpha1
kind: ResourceGraphDefinition
metadata:
  name: awsgen3helm1
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
    argocd.argoproj.io/sync-wave: "0"
spec:
  schema:
    apiVersion: v1alpha1
    kind: AwsGen3Helm1
    spec:
      # ── Identity ──────────────────────────────────────────────────
      name: string | required=true
      namespace: string | default="default"
      region: string | default="us-east-1"
      environment: string | default="dev"
      project: string | default="gen3"

      # ── ArgoCD ───────────────────────────────────────────────────
      argoCDNamespace: string | default="argocd"
      argoCDProject: string | default="default"

      # ── Gen3-Helm Source ─────────────────────────────────────────
      gen3HelmRepoURL: string | default="https://github.com/uc-cdis/gen3-helm"
      gen3HelmPath: string | default="helm/gen3"
      gen3HelmTargetRevision: string | default="master"

      # ── Gen3 Configuration ─────────────────────────────────────
      hostname: string | required=true
      dictionaryUrl: string | default="https://s3.amazonaws.com/dictionary-artifacts/datadictionary/develop/schema.json"

      # ── Database Configuration (passed to gen3-helm) ────────────
      auroraMasterUsername: string | default="postgres"
      auroraDBName: string | default="gen3"

      # ── Bridge References (ALL required for full deployment) ────
      foundationBridgeName: string | required=true
      computeBridgeName: string | required=true
      databaseBridgeName: string | required=true
      searchBridgeName: string | required=true
      appIAMBridgeName: string | required=true
      foundationNamespace: string | required=true
      computeNamespace: string | required=true
      databaseNamespace: string | required=true
      searchNamespace: string | required=true
      appIAMNamespace: string | required=true

      # ── Feature Flags (control which gen3 services are enabled) ─
      fenceEnabled: boolean | default=true
      auditEnabled: boolean | default=true
      hatcheryEnabled: boolean | default=false
      manifestserviceEnabled: boolean | default=false
      indexdEnabled: boolean | default=true
      metadataEnabled: boolean | default=true
      peregrinEnabled: boolean | default=true
      sheepdogEnabled: boolean | default=true
      guppyEnabled: boolean | default=false
      portalEnabled: boolean | default=true

      # ── Auto Sync ───────────────────────────────────────────────
      autoSync: boolean | default=false

    status:
      ready: ${spokeNamespace.metadata.?name.orValue("loading")}
      hostname: ${gen3HelmBridge.data.hostname}
      argoCDClusterName: ${gen3HelmBridge.data['argocd-cluster-name']}

  resources:
  # ====================================================================
  # Layer 0: External References (ALL upstream bridges)
  # ====================================================================

    - id: spokeNamespace
      externalRef:
        apiVersion: v1
        kind: Namespace
        metadata:
          name: ${schema.spec.namespace}

    - id: foundationBridge
      readyWhen:
        - ${foundationBridge.metadata.?name.orValue('null') != 'null'}
      externalRef:
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: ${schema.spec.foundationBridgeName}
          namespace: ${schema.spec.foundationNamespace}

    - id: computeBridge
      readyWhen:
        - ${computeBridge.metadata.?name.orValue('null') != 'null'}
      externalRef:
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: ${schema.spec.computeBridgeName}
          namespace: ${schema.spec.computeNamespace}

    - id: databaseBridge
      readyWhen:
        - ${databaseBridge.metadata.?name.orValue('null') != 'null'}
      externalRef:
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: ${schema.spec.databaseBridgeName}
          namespace: ${schema.spec.databaseNamespace}

    - id: searchBridge
      readyWhen:
        - ${searchBridge.metadata.?name.orValue('null') != 'null'}
      externalRef:
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: ${schema.spec.searchBridgeName}
          namespace: ${schema.spec.searchNamespace}

    - id: appIAMBridge
      readyWhen:
        - ${appIAMBridge.metadata.?name.orValue('null') != 'null'}
      externalRef:
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: ${schema.spec.appIAMBridgeName}
          namespace: ${schema.spec.appIAMNamespace}

  # ====================================================================
  # ARGOCD: Cluster Secret (spoke EKS registration via IAM auth)
  # ====================================================================
  # Registers the spoke EKS cluster in CSOC ArgoCD. Uses awsAuthConfig
  # with the ArgoCD spoke access IAM role created by Compute2.
  # ArgoCD server STS-assumes this role to authenticate to the spoke EKS.

    - id: argoCDClusterSecret
      readyWhen:
        - ${argoCDClusterSecret.metadata.?name.orValue('null') != 'null'}
      template:
        apiVersion: v1
        kind: Secret
        metadata:
          name: ${schema.spec.name}-spoke-cluster
          namespace: ${schema.spec.argoCDNamespace}
          labels:
            argocd.argoproj.io/secret-type: cluster
            app.kubernetes.io/managed-by: kro
            gen3.io/tier: application
            gen3.io/spoke: ${schema.spec.name}
        type: Opaque
        stringData:
          name: ${schema.spec.name}-spoke
          server: ${computeBridge.data['eks-cluster-endpoint']}
          config: |
            {
              "awsAuthConfig": {
                "clusterName": "${computeBridge.data['eks-cluster-name']}",
                "roleARN": "${computeBridge.data['argocd-spoke-role-arn']}"
              },
              "tlsClientConfig": {
                "caData": "${computeBridge.data['eks-cluster-ca']}"
              }
            }

  # ====================================================================
  # ARGOCD: Application CR for gen3-helm
  # ====================================================================

    - id: gen3App
      readyWhen:
        - ${gen3App.metadata.?name.orValue('null') != 'null'}
      template:
        apiVersion: argoproj.io/v1alpha1
        kind: Application
        metadata:
          name: ${schema.spec.name}-gen3-helm
          namespace: ${schema.spec.argoCDNamespace}
          labels:
            app.kubernetes.io/managed-by: kro
            gen3.io/tier: application
            gen3.io/spoke: ${schema.spec.name}
          finalizers:
            - resources-finalizer.argocd.argoproj.io
        spec:
          project: ${schema.spec.argoCDProject}
          # ── Ignore auto-generated Secrets (gen3-helm generates random passwords)
          ignoreDifferences:
            - group: ""
              kind: Secret
              jsonPointers:
                - /data
                - /stringData
          source:
            repoURL: ${schema.spec.gen3HelmRepoURL}
            path: ${schema.spec.gen3HelmPath}
            targetRevision: ${schema.spec.gen3HelmTargetRevision}
            helm:
              releaseName: gen3
              values: |
                global:
                  hostname: ${schema.spec.hostname}
                  environment: ${schema.spec.environment}
                  dev: false
                  aws:
                    enabled: true
                    region: ${schema.spec.region}
                  postgres:
                    dbCreate: true
                    master:
                      host: ${databaseBridge.data['aurora-cluster-endpoint']}
                      port: "5432"
                      username: ${schema.spec.auroraMasterUsername}
                      dbName: ${schema.spec.auroraDBName}
                  externalSecrets:
                    deploy: true
                  dictionaryUrl: ${schema.spec.dictionaryUrl}
                postgresql:
                  enabled: false
                elasticsearch:
                  enabled: false
                fence:
                  enabled: ${string(schema.spec.fenceEnabled)}
                  serviceAccount:
                    annotations:
                      eks.amazonaws.com/role-arn: ${appIAMBridge.data['fence-role-arn']}
                audit:
                  enabled: ${string(schema.spec.auditEnabled)}
                  serviceAccount:
                    annotations:
                      eks.amazonaws.com/role-arn: ${appIAMBridge.data['audit-role-arn']}
                hatchery:
                  enabled: ${string(schema.spec.hatcheryEnabled)}
                  serviceAccount:
                    annotations:
                      eks.amazonaws.com/role-arn: ${appIAMBridge.data['hatchery-role-arn']}
                manifestservice:
                  enabled: ${string(schema.spec.manifestserviceEnabled)}
                  serviceAccount:
                    annotations:
                      eks.amazonaws.com/role-arn: ${appIAMBridge.data['manifestservice-role-arn']}
                indexd:
                  enabled: ${string(schema.spec.indexdEnabled)}
                metadata:
                  enabled: ${string(schema.spec.metadataEnabled)}
                peregrin:
                  enabled: ${string(schema.spec.peregrinEnabled)}
                sheepdog:
                  enabled: ${string(schema.spec.sheepdogEnabled)}
                guppy:
                  enabled: ${string(schema.spec.guppyEnabled)}
                portal:
                  enabled: ${string(schema.spec.portalEnabled)}
                  resources:
                    requests:
                      memory: 512Mi
                      cpu: 100m
                    limits:
                      memory: 2Gi
          destination:
            name: ${schema.spec.name}-spoke
            namespace: ${schema.spec.name}
          syncPolicy:
            syncOptions:
              - CreateNamespace=true
              - ServerSideApply=true

  # ====================================================================
  # BRIDGE: Gen3 Helm Outputs ConfigMap
  # ====================================================================

    - id: gen3HelmBridge
      readyWhen:
        - ${gen3HelmBridge.metadata.?name.orValue('null') != 'null'}
      template:
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: ${schema.spec.name}-gen3helm-bridge
          namespace: ${schema.spec.namespace}
          labels:
            app.kubernetes.io/managed-by: kro
            gen3.io/tier: application
            gen3.io/bridge: "true"
        data:
          argocd-app-name: ${schema.spec.name}-gen3-helm
          argocd-cluster-name: ${schema.spec.name}-spoke
          hostname: ${schema.spec.hostname}
          target-cluster: ${computeBridge.data['eks-cluster-endpoint']}
