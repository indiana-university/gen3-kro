# AwsGen3Network1 — Tier 0: Network (Modular RGD v1)
apiVersion: kro.run/v1alpha1
kind: ResourceGraphDefinition
metadata:
  name: awsgen3network1
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  schema:
    apiVersion: v1alpha1
    kind: AwsGen3Network1
    spec:
      name: string | required=true
      namespace: string | required=true
      adoptionPolicy: string | default="adopt-or-create"
      deletionPolicy: string | default="delete"
      infrastructureConfigMapName: string | default="infrastructure-values"
      networkBridgeName: string | default="foundation-bridge"

    status:
      # Network
      vpcID: ${vpc.status.?vpcID.orValue("loading")}
      internetGatewayID: ${igw.status.?internetGatewayID.orValue("loading")}
      natGatewayID: ${natGateway1.status.?natGatewayID.orValue("loading")}
      eipAllocationID: ${eip1.status.?allocationID.orValue("loading")}
      publicSubnetIDs:
        - ${publicSubnet1.status.?subnetID.orValue("loading")}
        - ${publicSubnet2.status.?subnetID.orValue("loading")}
      privateSubnetIDs:
        - ${privateSubnet1.status.?subnetID.orValue("loading")}
        - ${privateSubnet2.status.?subnetID.orValue("loading")}
      routeTableIDs:
        public: ${publicRouteTable.status.?routeTableID.orValue("loading")}
        private: ${privateRouteTable.status.?routeTableID.orValue("loading")}

      # Security (KMS)
      loggingKeyARN: ${loggingKey.status.?ackResourceMetadata.?arn.orValue("loading")}
      platformKeyARN: ${platformKey.status.?ackResourceMetadata.?arn.orValue("loading")}

  resources:
    - id: spokeNamespace
      externalRef:
        apiVersion: v1
        kind: Namespace
        metadata:
          name: ${schema.spec.namespace}

    - id: infrastructureConfig
      readyWhen:
        - ${infrastructureConfig.metadata.?name.orValue('null') != 'null'}
      externalRef:
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: ${schema.spec.infrastructureConfigMapName}
          namespace: ${schema.spec.namespace}

  # ALWAYS-PRESENT RESOURCES (16)

  # NETWORKING: VPC, Gateways, Route Tables, Subnets

    - id: vpc
      readyWhen:
        - ${vpc.status.?vpcID.orValue('null') != 'null'}
        - ${vpc.status.?state.orValue('null') == 'available'}
        - ${vpc.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
      template:
        apiVersion: ec2.services.k8s.aws/v1alpha1
        kind: VPC
        metadata:
          name: ${schema.spec.name}-vpc
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${infrastructureConfig.data['aws-region']}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          cidrBlocks:
            - ${infrastructureConfig.data['network-vpc-cidr']}
          enableDNSHostnames: true
          enableDNSSupport: true
          tags:
            - key: Name
              value: ${schema.spec.name}-vpc
            - key: Environment
              value: ${infrastructureConfig.data['aws-environment']}
            - key: ManagedBy
              value: Kro
            - key: Project
              value: ${infrastructureConfig.data['aws-project']}

    - id: eip1
      readyWhen:
        - ${eip1.status.?allocationID.orValue('null') != 'null'}
        - ${eip1.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
      template:
        apiVersion: ec2.services.k8s.aws/v1alpha1
        kind: ElasticIPAddress
        metadata:
          name: ${schema.spec.name}-eip-1
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${infrastructureConfig.data['aws-region']}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          tags:
            - key: Name
              value: ${schema.spec.name}-eip-1
            - key: Environment
              value: ${infrastructureConfig.data['aws-environment']}
            - key: ManagedBy
              value: Kro
            - key: Project
              value: ${infrastructureConfig.data['aws-project']}

    - id: igw
      readyWhen:
        - ${igw.status.?internetGatewayID.orValue('null') != 'null'}
        - ${igw.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
        - ${igw.status.?attachments.orValue([]).exists(a, a.state == "available")}
      template:
        apiVersion: ec2.services.k8s.aws/v1alpha1
        kind: InternetGateway
        metadata:
          name: ${schema.spec.name}-igw
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${infrastructureConfig.data['aws-region']}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          vpcRef:
            from:
              name: ${vpc.metadata.name}
          tags:
            - key: Name
              value: ${schema.spec.name}-igw
            - key: Environment
              value: ${infrastructureConfig.data['aws-environment']}
            - key: ManagedBy
              value: Kro
            - key: Project
              value: ${infrastructureConfig.data['aws-project']}

    - id: publicRouteTable
      readyWhen:
        - ${publicRouteTable.status.?routeTableID.orValue('null') != 'null'}
        - ${publicRouteTable.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
      template:
        apiVersion: ec2.services.k8s.aws/v1alpha1
        kind: RouteTable
        metadata:
          name: ${schema.spec.name}-public-rt
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${infrastructureConfig.data['aws-region']}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          vpcID: ${vpc.status.?vpcID}
          routes:
            - destinationCIDRBlock: "0.0.0.0/0"
              gatewayID: ${igw.status.?internetGatewayID}
          tags:
            - key: Name
              value: ${schema.spec.name}-public-rt
            - key: Environment
              value: ${infrastructureConfig.data['aws-environment']}
            - key: ManagedBy
              value: Kro
            - key: Project
              value: ${infrastructureConfig.data['aws-project']}

    - id: publicSubnet1
      readyWhen:
        - ${publicSubnet1.status.?subnetID.orValue('null') != 'null'}
        - ${publicSubnet1.status.?state.orValue('null') == 'available'}
        - ${publicSubnet1.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
      template:
        apiVersion: ec2.services.k8s.aws/v1alpha1
        kind: Subnet
        metadata:
          name: ${schema.spec.name}-public-subnet-1
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${infrastructureConfig.data['aws-region']}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          vpcID: ${vpc.status.?vpcID}
          cidrBlock: ${infrastructureConfig.data['network-public-subnet-cidrs'].split(',')[0]}
          availabilityZone: ${infrastructureConfig.data['network-availability-zones'].split(',')[0]}
          mapPublicIPOnLaunch: true
          routeTableRefs:
            - from:
                name: ${publicRouteTable.metadata.name}
          tags:
            - key: Name
              value: ${schema.spec.name}-public-subnet-1
            - key: Environment
              value: ${infrastructureConfig.data['aws-environment']}
            - key: ManagedBy
              value: Kro
            - key: Project
              value: ${infrastructureConfig.data['aws-project']}
            - key: kubernetes.io/role/elb
              value: "1"

    - id: publicSubnet2
      readyWhen:
        - ${publicSubnet2.status.?subnetID.orValue('null') != 'null'}
        - ${publicSubnet2.status.?state.orValue('null') == 'available'}
        - ${publicSubnet2.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
      template:
        apiVersion: ec2.services.k8s.aws/v1alpha1
        kind: Subnet
        metadata:
          name: ${schema.spec.name}-public-subnet-2
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${infrastructureConfig.data['aws-region']}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          vpcID: ${vpc.status.?vpcID}
          cidrBlock: ${infrastructureConfig.data['network-public-subnet-cidrs'].split(',')[1]}
          availabilityZone: ${infrastructureConfig.data['network-availability-zones'].split(',')[1]}
          mapPublicIPOnLaunch: true
          routeTableRefs:
            - from:
                name: ${publicRouteTable.metadata.name}
          tags:
            - key: Name
              value: ${schema.spec.name}-public-subnet-2
            - key: Environment
              value: ${infrastructureConfig.data['aws-environment']}
            - key: ManagedBy
              value: Kro
            - key: Project
              value: ${infrastructureConfig.data['aws-project']}
            - key: kubernetes.io/role/elb
              value: "1"

    - id: natGateway1
      readyWhen:
        - ${natGateway1.status.?natGatewayID.orValue('null') != 'null'}
        - ${natGateway1.status.?state.orValue('null') == 'available'}
        - ${natGateway1.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
      template:
        apiVersion: ec2.services.k8s.aws/v1alpha1
        kind: NATGateway
        metadata:
          name: ${schema.spec.name}-nat-gw-1
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${infrastructureConfig.data['aws-region']}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          allocationID: ${eip1.status.?allocationID}
          subnetID: ${publicSubnet1.status.?subnetID}
          tags:
            - key: Name
              value: ${schema.spec.name}-nat-gw-1
            - key: Environment
              value: ${infrastructureConfig.data['aws-environment']}
            - key: ManagedBy
              value: Kro
            - key: Project
              value: ${infrastructureConfig.data['aws-project']}

    - id: privateRouteTable
      readyWhen:
        - ${privateRouteTable.status.?routeTableID.orValue('null') != 'null'}
        - ${privateRouteTable.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
      template:
        apiVersion: ec2.services.k8s.aws/v1alpha1
        kind: RouteTable
        metadata:
          name: ${schema.spec.name}-private-rt
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${infrastructureConfig.data['aws-region']}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          vpcID: ${vpc.status.?vpcID}
          routes:
            - destinationCIDRBlock: "0.0.0.0/0"
              natGatewayID: ${natGateway1.status.?natGatewayID}
          tags:
            - key: Name
              value: ${schema.spec.name}-private-rt
            - key: Environment
              value: ${infrastructureConfig.data['aws-environment']}
            - key: ManagedBy
              value: Kro
            - key: Project
              value: ${infrastructureConfig.data['aws-project']}

    - id: privateSubnet1
      readyWhen:
        - ${privateSubnet1.status.?subnetID.orValue('null') != 'null'}
        - ${privateSubnet1.status.?state.orValue('null') == 'available'}
        - ${privateSubnet1.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
      template:
        apiVersion: ec2.services.k8s.aws/v1alpha1
        kind: Subnet
        metadata:
          name: ${schema.spec.name}-private-subnet-1
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${infrastructureConfig.data['aws-region']}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          vpcID: ${vpc.status.?vpcID}
          cidrBlock: ${infrastructureConfig.data['network-private-subnet-cidrs'].split(',')[0]}
          availabilityZone: ${infrastructureConfig.data['network-availability-zones'].split(',')[0]}
          mapPublicIPOnLaunch: false
          routeTableRefs:
            - from:
                name: ${privateRouteTable.metadata.name}
          tags:
            - key: Name
              value: ${schema.spec.name}-private-subnet-1
            - key: Environment
              value: ${infrastructureConfig.data['aws-environment']}
            - key: ManagedBy
              value: Kro
            - key: Project
              value: ${infrastructureConfig.data['aws-project']}
            - key: kubernetes.io/role/internal-elb
              value: "1"
            - key: kubernetes.io/cluster/${schema.spec.name}
              value: owned

    - id: privateSubnet2
      readyWhen:
        - ${privateSubnet2.status.?subnetID.orValue('null') != 'null'}
        - ${privateSubnet2.status.?state.orValue('null') == 'available'}
        - ${privateSubnet2.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
      template:
        apiVersion: ec2.services.k8s.aws/v1alpha1
        kind: Subnet
        metadata:
          name: ${schema.spec.name}-private-subnet-2
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${infrastructureConfig.data['aws-region']}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          vpcID: ${vpc.status.?vpcID}
          cidrBlock: ${infrastructureConfig.data['network-private-subnet-cidrs'].split(',')[1]}
          availabilityZone: ${infrastructureConfig.data['network-availability-zones'].split(',')[1]}
          mapPublicIPOnLaunch: false
          routeTableRefs:
            - from:
                name: ${privateRouteTable.metadata.name}
          tags:
            - key: Name
              value: ${schema.spec.name}-private-subnet-2
            - key: Environment
              value: ${infrastructureConfig.data['aws-environment']}
            - key: ManagedBy
              value: Kro
            - key: Project
              value: ${infrastructureConfig.data['aws-project']}
            - key: kubernetes.io/role/internal-elb
              value: "1"
            - key: kubernetes.io/cluster/${schema.spec.name}
              value: owned

  # SECURITY: KMS Keys (always present)

    - id: loggingKey
      readyWhen:
        - ${loggingKey.status.?keyID.orValue('null') != 'null'}
        - ${loggingKey.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
        - ${loggingKey.status.?enabled.orValue(false) == true}
      template:
        apiVersion: kms.services.k8s.aws/v1alpha1
        kind: Key
        metadata:
          name: ${schema.spec.name}-logging-key
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${infrastructureConfig.data['aws-region']}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          description: "KMS key for logging and audit data (CloudTrail, VPC Flow Logs, security logs)"
          keyUsage: "ENCRYPT_DECRYPT"
          enableKeyRotation: true
          tags:
            - tagKey: Name
              tagValue: ${schema.spec.name}-logging-key
            - tagKey: Environment
              tagValue: ${infrastructureConfig.data['aws-environment']}
            - tagKey: ManagedBy
              tagValue: Kro
            - tagKey: Project
              tagValue: ${infrastructureConfig.data['aws-project']}
            - tagKey: KeyPurpose
              tagValue: logging-audit

    - id: platformKey
      readyWhen:
        - ${platformKey.status.?keyID.orValue('null') != 'null'}
        - ${platformKey.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
        - ${platformKey.status.?enabled.orValue(false) == true}
      template:
        apiVersion: kms.services.k8s.aws/v1alpha1
        kind: Key
        metadata:
          name: ${schema.spec.name}-platform-key
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${infrastructureConfig.data['aws-region']}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          description: "KMS key for platform services (EKS secrets, S3 app buckets, EFS)"
          keyUsage: "ENCRYPT_DECRYPT"
          enableKeyRotation: true
          policy: |
            {
              "Version": "2012-10-17",
              "Statement": [
                {
                  "Sid": "Enable IAM User Permissions",
                  "Effect": "Allow",
                  "Principal": {"AWS": "arn:aws:iam::${spokeNamespace.metadata.annotations['services.k8s.aws/owner-account-id']}:root"},
                  "Action": "kms:*",
                  "Resource": "*"
                },
                {
                  "Sid": "Allow EKS to use the key",
                  "Effect": "Allow",
                  "Principal": {"Service": "eks.amazonaws.com"},
                  "Action": [
                    "kms:Decrypt",
                    "kms:GenerateDataKey",
                    "kms:CreateGrant",
                    "kms:DescribeKey"
                  ],
                  "Resource": "*"
                }
              ]
            }
          tags:
            - tagKey: Name
              tagValue: ${schema.spec.name}-platform-key
            - tagKey: Environment
              tagValue: ${infrastructureConfig.data['aws-environment']}
            - tagKey: ManagedBy
              tagValue: Kro
            - tagKey: Project
              tagValue: ${infrastructureConfig.data['aws-project']}
            - tagKey: KeyPurpose
              tagValue: platform

  # Test 8: unconditional bridge — conditional prep data materialised in sub-bridges

  # CONDITIONAL: DATABASE PREP (includeWhen: databaseEnabled)

  # DB NETWORKING: Route Table, Subnets, Subnet Group

    - id: dbRouteTable
      includeWhen:
        - ${infrastructureConfig.data['network-database-enabled'] == 'true'}
      readyWhen:
        - ${dbRouteTable.status.?routeTableID.orValue('null') != 'null'}
        - ${dbRouteTable.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
      template:
        apiVersion: ec2.services.k8s.aws/v1alpha1
        kind: RouteTable
        metadata:
          name: ${schema.spec.name}-db-rt
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${infrastructureConfig.data['aws-region']}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          vpcID: ${vpc.status.?vpcID}
          routes:
            - destinationCIDRBlock: "0.0.0.0/0"
              natGatewayID: ${natGateway1.status.?natGatewayID}
          tags:
            - key: Name
              value: ${schema.spec.name}-db-rt
            - key: Environment
              value: ${infrastructureConfig.data['aws-environment']}
            - key: ManagedBy
              value: Kro
            - key: Project
              value: ${infrastructureConfig.data['aws-project']}

    - id: dbSubnet1
      includeWhen:
        - ${infrastructureConfig.data['network-database-enabled'] == 'true'}
      readyWhen:
        - ${dbSubnet1.status.?subnetID.orValue('null') != 'null'}
        - ${dbSubnet1.status.?state.orValue('null') == 'available'}
        - ${dbSubnet1.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
      template:
        apiVersion: ec2.services.k8s.aws/v1alpha1
        kind: Subnet
        metadata:
          name: ${schema.spec.name}-db-subnet-1
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${infrastructureConfig.data['aws-region']}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          vpcID: ${vpc.status.?vpcID}
          cidrBlock: ${infrastructureConfig.data['network-db-subnet-cidrs'].split(',')[0]}
          availabilityZone: ${infrastructureConfig.data['network-availability-zones'].split(',')[0]}
          mapPublicIPOnLaunch: false
          routeTableRefs:
            - from:
                name: ${dbRouteTable.metadata.name}
          tags:
            - key: Name
              value: ${schema.spec.name}-db-subnet-1
            - key: Environment
              value: ${infrastructureConfig.data['aws-environment']}
            - key: ManagedBy
              value: Kro
            - key: Project
              value: ${infrastructureConfig.data['aws-project']}
            - key: Tier
              value: database

    - id: dbSubnet2
      includeWhen:
        - ${infrastructureConfig.data['network-database-enabled'] == 'true'}
      readyWhen:
        - ${dbSubnet2.status.?subnetID.orValue('null') != 'null'}
        - ${dbSubnet2.status.?state.orValue('null') == 'available'}
        - ${dbSubnet2.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
      template:
        apiVersion: ec2.services.k8s.aws/v1alpha1
        kind: Subnet
        metadata:
          name: ${schema.spec.name}-db-subnet-2
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${infrastructureConfig.data['aws-region']}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          vpcID: ${vpc.status.?vpcID}
          cidrBlock: ${infrastructureConfig.data['network-db-subnet-cidrs'].split(',')[1]}
          availabilityZone: ${infrastructureConfig.data['network-availability-zones'].split(',')[1]}
          mapPublicIPOnLaunch: false
          routeTableRefs:
            - from:
                name: ${dbRouteTable.metadata.name}
          tags:
            - key: Name
              value: ${schema.spec.name}-db-subnet-2
            - key: Environment
              value: ${infrastructureConfig.data['aws-environment']}
            - key: ManagedBy
              value: Kro
            - key: Project
              value: ${infrastructureConfig.data['aws-project']}
            - key: Tier
              value: database

    - id: dbSubnetGroup
      includeWhen:
        - ${infrastructureConfig.data['network-database-enabled'] == 'true'}
      readyWhen:
        - ${dbSubnetGroup.status.?ackResourceMetadata.?arn.orValue('null') != 'null'}
        - ${dbSubnetGroup.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
      template:
        apiVersion: rds.services.k8s.aws/v1alpha1
        kind: DBSubnetGroup
        metadata:
          name: ${schema.spec.name}-db-subnet-group
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${infrastructureConfig.data['aws-region']}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          name: ${schema.spec.name}-db-subnet-group
          description: "DB subnet group for ${schema.spec.name}"
          subnetIDs:
            - ${dbSubnet1.status.?subnetID}
            - ${dbSubnet2.status.?subnetID}
          tags:
            - key: Name
              value: ${schema.spec.name}-db-subnet-group
            - key: Environment
              value: ${infrastructureConfig.data['aws-environment']}
            - key: ManagedBy
              value: Kro
            - key: Project
              value: ${infrastructureConfig.data['aws-project']}

  # DB SECURITY: Aurora Security Group + Database KMS Key

    - id: auroraSg
      includeWhen:
        - ${infrastructureConfig.data['network-database-enabled'] == 'true'}
      readyWhen:
        - ${auroraSg.status.?id.orValue('null') != 'null'}
        - ${auroraSg.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
      template:
        apiVersion: ec2.services.k8s.aws/v1alpha1
        kind: SecurityGroup
        metadata:
          name: ${schema.spec.name}-aurora-sg
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${infrastructureConfig.data['aws-region']}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          name: ${schema.spec.name}-aurora-sg
          description: "PostgreSQL access for ${schema.spec.name}"
          vpcID: ${vpc.status.?vpcID}
          ingressRules:
            - ipProtocol: tcp
              fromPort: 5432
              toPort: 5432
              ipRanges:
                - cidrIP: ${infrastructureConfig.data['network-vpc-cidr']}
                  description: "PostgreSQL from VPC"
          tags:
            - key: Name
              value: ${schema.spec.name}-aurora-sg
            - key: Environment
              value: ${infrastructureConfig.data['aws-environment']}
            - key: ManagedBy
              value: Kro
            - key: Project
              value: ${infrastructureConfig.data['aws-project']}

    - id: databaseKey
      includeWhen:
        - ${infrastructureConfig.data['network-database-enabled'] == 'true'}
      readyWhen:
        - ${databaseKey.status.?keyID.orValue('null') != 'null'}
        - ${databaseKey.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
        - ${databaseKey.status.?enabled.orValue(false) == true}
      template:
        apiVersion: kms.services.k8s.aws/v1alpha1
        kind: Key
        metadata:
          name: ${schema.spec.name}-database-key
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${infrastructureConfig.data['aws-region']}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          description: "KMS key for Aurora PostgreSQL encryption (${schema.spec.name})"
          keyUsage: "ENCRYPT_DECRYPT"
          enableKeyRotation: true
          policy: |
            {
              "Version": "2012-10-17",
              "Statement": [
                {
                  "Sid": "Enable IAM User Permissions",
                  "Effect": "Allow",
                  "Principal": {"AWS": "arn:aws:iam::${spokeNamespace.metadata.annotations['services.k8s.aws/owner-account-id']}:root"},
                  "Action": "kms:*",
                  "Resource": "*"
                },
                {
                  "Sid": "Allow RDS to use the key",
                  "Effect": "Allow",
                  "Principal": {"Service": "rds.amazonaws.com"},
                  "Action": [
                    "kms:Decrypt",
                    "kms:GenerateDataKey",
                    "kms:CreateGrant",
                    "kms:DescribeKey",
                    "kms:ReEncryptFrom",
                    "kms:ReEncryptTo"
                  ],
                  "Resource": "*"
                }
              ]
            }
          tags:
            - tagKey: Name
              tagValue: ${schema.spec.name}-database-key
            - tagKey: Environment
              tagValue: ${infrastructureConfig.data['aws-environment']}
            - tagKey: ManagedBy
              tagValue: Kro
            - tagKey: Project
              tagValue: ${infrastructureConfig.data['aws-project']}
            - tagKey: KeyPurpose
              tagValue: database

  # CONDITIONAL: COMPUTE PREP (includeWhen: computeEnabled)

  # COMPUTE IAM: Cluster Role (6 policies) + Node Role (4 policies)

    - id: clusterRole
      includeWhen:
        - ${infrastructureConfig.data['network-compute-enabled'] == 'true'}
      readyWhen:
        - ${clusterRole.status.?ackResourceMetadata.?arn.orValue('null') != 'null'}
        - ${clusterRole.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
      template:
        apiVersion: iam.services.k8s.aws/v1alpha1
        kind: Role
        metadata:
          name: ${schema.spec.name}-cluster-role
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${infrastructureConfig.data['aws-region']}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          name: ${schema.spec.name}-cluster-role
          assumeRolePolicyDocument: |
            {
              "Version": "2012-10-17",
              "Statement": [
                {
                  "Effect": "Allow",
                  "Principal": {"Service": "eks.amazonaws.com"},
                  "Action": ["sts:AssumeRole", "sts:TagSession"]
                }
              ]
            }
          policies:
            - arn:aws:iam::aws:policy/AmazonEKSClusterPolicy
            - arn:aws:iam::aws:policy/AmazonEKSVPCResourceController
            - arn:aws:iam::aws:policy/AmazonEKSComputePolicy
            - arn:aws:iam::aws:policy/AmazonEKSBlockStoragePolicy
            - arn:aws:iam::aws:policy/AmazonEKSLoadBalancingPolicy
            - arn:aws:iam::aws:policy/AmazonEKSNetworkingPolicy
          tags:
            - key: Name
              value: ${schema.spec.name}-cluster-role
            - key: Environment
              value: ${infrastructureConfig.data['aws-environment']}
            - key: ManagedBy
              value: Kro
            - key: Project
              value: ${infrastructureConfig.data['aws-project']}

    - id: nodeRole
      includeWhen:
        - ${infrastructureConfig.data['network-compute-enabled'] == 'true'}
      readyWhen:
        - ${nodeRole.status.?ackResourceMetadata.?arn.orValue('null') != 'null'}
        - ${nodeRole.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
      template:
        apiVersion: iam.services.k8s.aws/v1alpha1
        kind: Role
        metadata:
          name: ${schema.spec.name}-node-role
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${infrastructureConfig.data['aws-region']}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          name: ${schema.spec.name}-node-role
          assumeRolePolicyDocument: |
            {
              "Version": "2012-10-17",
              "Statement": [
                {
                  "Effect": "Allow",
                  "Principal": {"Service": ["ec2.amazonaws.com", "eks.amazonaws.com"]},
                  "Action": "sts:AssumeRole"
                }
              ]
            }
          policies:
            - arn:aws:iam::aws:policy/AmazonEKSWorkerNodePolicy
            - arn:aws:iam::aws:policy/AmazonEKS_CNI_Policy
            - arn:aws:iam::aws:policy/AmazonEC2ContainerRegistryReadOnly
            - arn:aws:iam::aws:policy/AmazonEC2ContainerRegistryPullOnly
          tags:
            - key: Name
              value: ${schema.spec.name}-node-role
            - key: Environment
              value: ${infrastructureConfig.data['aws-environment']}
            - key: ManagedBy
              value: Kro
            - key: Project
              value: ${infrastructureConfig.data['aws-project']}

  # COMPUTE SECURITY: EKS Security Group (443 + 10250)

    - id: eksSecurityGroup
      includeWhen:
        - ${infrastructureConfig.data['network-compute-enabled'] == 'true'}
      readyWhen:
        - ${eksSecurityGroup.status.?id.orValue('null') != 'null'}
        - ${eksSecurityGroup.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
      template:
        apiVersion: ec2.services.k8s.aws/v1alpha1
        kind: SecurityGroup
        metadata:
          name: ${schema.spec.name}-eks-sg
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${infrastructureConfig.data['aws-region']}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          name: ${schema.spec.name}-eks-sg
          description: "EKS additional security group for ${schema.spec.name}"
          vpcID: ${vpc.status.?vpcID}
          ingressRules:
            - ipProtocol: tcp
              fromPort: 443
              toPort: 443
              ipRanges:
                - cidrIP: ${infrastructureConfig.data['network-vpc-cidr']}
                  description: "HTTPS API server access from VPC"
            - ipProtocol: tcp
              fromPort: 10250
              toPort: 10250
              ipRanges:
                - cidrIP: ${infrastructureConfig.data['network-vpc-cidr']}
                  description: "Kubelet API from VPC"
          tags:
            - key: Name
              value: ${schema.spec.name}-eks-sg
            - key: Environment
              value: ${infrastructureConfig.data['aws-environment']}
            - key: ManagedBy
              value: Kro
            - key: Project
              value: ${infrastructureConfig.data['aws-project']}

  # CONDITIONAL: SEARCH PREP (includeWhen: searchEnabled)

  # SEARCH SECURITY: Search KMS Key + OpenSearch SG

    - id: searchKey
      includeWhen:
        - ${infrastructureConfig.data['network-search-enabled'] == 'true'}
      readyWhen:
        - ${searchKey.status.?keyID.orValue('null') != 'null'}
        - ${searchKey.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
        - ${searchKey.status.?enabled.orValue(false) == true}
      template:
        apiVersion: kms.services.k8s.aws/v1alpha1
        kind: Key
        metadata:
          name: ${schema.spec.name}-search-key
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${infrastructureConfig.data['aws-region']}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          description: "KMS key for OpenSearch and ElastiCache encryption (${schema.spec.name})"
          keyUsage: "ENCRYPT_DECRYPT"
          enableKeyRotation: true
          policy: |
            {
              "Version": "2012-10-17",
              "Statement": [
                {
                  "Sid": "Enable IAM User Permissions",
                  "Effect": "Allow",
                  "Principal": {"AWS": "arn:aws:iam::${spokeNamespace.metadata.annotations['services.k8s.aws/owner-account-id']}:root"},
                  "Action": "kms:*",
                  "Resource": "*"
                },
                {
                  "Sid": "Allow Search services to use the key",
                  "Effect": "Allow",
                  "Principal": {"Service": ["es.amazonaws.com", "elasticache.amazonaws.com"]},
                  "Action": [
                    "kms:Decrypt",
                    "kms:GenerateDataKey",
                    "kms:CreateGrant",
                    "kms:DescribeKey"
                  ],
                  "Resource": "*"
                }
              ]
            }
          tags:
            - tagKey: Name
              tagValue: ${schema.spec.name}-search-key
            - tagKey: Environment
              tagValue: ${infrastructureConfig.data['aws-environment']}
            - tagKey: ManagedBy
              tagValue: Kro
            - tagKey: Project
              tagValue: ${infrastructureConfig.data['aws-project']}
            - tagKey: KeyPurpose
              tagValue: search

    - id: openSearchSg
      includeWhen:
        - ${infrastructureConfig.data['network-search-enabled'] == 'true'}
      readyWhen:
        - ${openSearchSg.status.?id.orValue('null') != 'null'}
        - ${openSearchSg.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
      template:
        apiVersion: ec2.services.k8s.aws/v1alpha1
        kind: SecurityGroup
        metadata:
          name: ${schema.spec.name}-opensearch-sg
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${infrastructureConfig.data['aws-region']}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          name: ${schema.spec.name}-opensearch-sg
          description: "OpenSearch access for ${schema.spec.name}"
          vpcID: ${vpc.status.?vpcID}
          ingressRules:
            - ipProtocol: tcp
              fromPort: 443
              toPort: 443
              ipRanges:
                - cidrIP: ${infrastructureConfig.data['network-vpc-cidr']}
                  description: "HTTPS to OpenSearch from VPC"
          tags:
            - key: Name
              value: ${schema.spec.name}-opensearch-sg
            - key: Environment
              value: ${infrastructureConfig.data['aws-environment']}
            - key: ManagedBy
              value: Kro
            - key: Project
              value: ${infrastructureConfig.data['aws-project']}

  # S3 buckets are managed by AwsGen3Storage1 — no S3 ARNs here

    - id: networkBridge
      readyWhen:
        - ${networkBridge.metadata.?name.orValue('null') != 'null'}
      # LIMITATION: references conditional nodes via ternary — all three network flags must be true; split into sub-bridges if any become optional
      template:
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: ${schema.spec.networkBridgeName}
          namespace: ${schema.spec.namespace}
          labels:
            app.kubernetes.io/managed-by: kro
            gen3.io/tier: network
            gen3.io/bridge: "true"
        data:
          vpc-id: ${vpc.status.?vpcID}
          vpc-cidr: ${infrastructureConfig.data['network-vpc-cidr']}
          igw-id: ${igw.status.?internetGatewayID}
          eip-allocation-id: ${eip1.status.?allocationID}
          nat-gateway-id: ${natGateway1.status.?natGatewayID}
          public-subnet-1-id: ${publicSubnet1.status.?subnetID}
          public-subnet-2-id: ${publicSubnet2.status.?subnetID}
          private-subnet-1-id: ${privateSubnet1.status.?subnetID}
          private-subnet-2-id: ${privateSubnet2.status.?subnetID}
          public-route-table-id: ${publicRouteTable.status.?routeTableID}
          private-route-table-id: ${privateRouteTable.status.?routeTableID}
          logging-key-arn: ${loggingKey.status.?ackResourceMetadata.?arn}
          platform-key-arn: ${platformKey.status.?ackResourceMetadata.?arn}
          db-subnet-1-id: "${infrastructureConfig.data['network-database-enabled'] == 'true' ? dbSubnet1.status.?subnetID.orValue('loading') : ''}"
          db-subnet-2-id: "${infrastructureConfig.data['network-database-enabled'] == 'true' ? dbSubnet2.status.?subnetID.orValue('loading') : ''}"
          db-route-table-id: "${infrastructureConfig.data['network-database-enabled'] == 'true' ? dbRouteTable.status.?routeTableID.orValue('loading') : ''}"
          db-subnet-group-name: "${infrastructureConfig.data['network-database-enabled'] == 'true' ? dbSubnetGroup.spec.name : ''}"
          database-key-arn: "${infrastructureConfig.data['network-database-enabled'] == 'true' ? databaseKey.status.?ackResourceMetadata.?arn.orValue('loading') : ''}"
          aurora-sg-id: "${infrastructureConfig.data['network-database-enabled'] == 'true' ? auroraSg.status.?id.orValue('loading') : ''}"
          eks-security-group-id: "${infrastructureConfig.data['network-compute-enabled'] == 'true' ? eksSecurityGroup.status.?id.orValue('loading') : ''}"
          cluster-role-arn: "${infrastructureConfig.data['network-compute-enabled'] == 'true' ? clusterRole.status.?ackResourceMetadata.?arn.orValue('loading') : ''}"
          node-role-arn: "${infrastructureConfig.data['network-compute-enabled'] == 'true' ? nodeRole.status.?ackResourceMetadata.?arn.orValue('loading') : ''}"
          search-key-arn: "${infrastructureConfig.data['network-search-enabled'] == 'true' ? searchKey.status.?ackResourceMetadata.?arn.orValue('loading') : ''}"
          opensearch-sg-id: "${infrastructureConfig.data['network-search-enabled'] == 'true' ? openSearchSg.status.?id.orValue('loading') : ''}"

