# AwsGen3Search1 — Tier 2: Search + Cache
apiVersion: kro.run/v1alpha1
kind: ResourceGraphDefinition
metadata:
  name: awsgen3search1
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  schema:
    apiVersion: v1alpha1
    kind: AwsGen3Search1
    spec:
      name: string | required=true
      namespace: string | required=true
      adoptionPolicy: string | default="adopt-or-create"
      deletionPolicy: string | default="delete"
      infrastructureConfigMapName: string | default="infrastructure-values"
      foundationBridgeName: string | default="foundation-bridge"
      searchBridgeName: string | default="search-bridge"

    status:
      openSearchEndpoint: ${openSearchDomain.status.?endpoints.?vpc.orValue("loading")}
      openSearchDomainARN: ${openSearchDomain.status.?ackResourceMetadata.?arn.orValue("loading")}

  resources:

    - id: spokeNamespace
      externalRef:
        apiVersion: v1
        kind: Namespace
        metadata:
          name: ${schema.spec.namespace}

    - id: infrastructureConfig
      readyWhen:
        - ${infrastructureConfig.metadata.?name.orValue('null') != 'null'}
      externalRef:
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: ${schema.spec.infrastructureConfigMapName}
          namespace: ${schema.spec.namespace}

    - id: foundationBridge
      externalRef:
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: ${schema.spec.foundationBridgeName}
          namespace: ${schema.spec.namespace}

    # OpenSearch Domain

    - id: openSearchDomain
      readyWhen:
        - ${openSearchDomain.status.?ackResourceMetadata.?arn.orValue('null') != 'null'}
        - ${openSearchDomain.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
      template:
        apiVersion: opensearchservice.services.k8s.aws/v1alpha1
        kind: Domain
        metadata:
          name: ${schema.spec.name}-opensearch
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${infrastructureConfig.data['aws-region']}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          name: ${schema.spec.name}-opensearch
          engineVersion: ${infrastructureConfig.data['search-opensearch-version']}
          clusterConfig:
            instanceType: ${infrastructureConfig.data['search-opensearch-instance-type']}
            instanceCount: ${int(infrastructureConfig.data['search-opensearch-instance-count'])}
            dedicatedMasterEnabled: ${infrastructureConfig.data['search-opensearch-master-enabled'] == 'true'}
            zoneAwarenessEnabled: false
          ebsOptions:
            ebsEnabled: true
            volumeType: gp3
            volumeSize: ${int(infrastructureConfig.data['search-opensearch-volume-size'])}
          encryptionAtRestOptions:
            enabled: true
            kmsKeyID: ${foundationBridge.data['search-key-arn']}
          nodeToNodeEncryptionOptions:
            enabled: true
          domainEndpointOptions:
            enforceHTTPS: true
            tlsSecurityPolicy: Policy-Min-TLS-1-2-2019-07
          vpcOptions:
            subnetIDs:
              - ${foundationBridge.data['private-subnet-1-id']}
            securityGroupIDs:
              - ${foundationBridge.data['opensearch-sg-id']}
          tags:
            - key: Name
              value: ${schema.spec.name}-opensearch
            - key: Environment
              value: ${infrastructureConfig.data['aws-environment']}
            - key: ManagedBy
              value: Kro
            - key: Project
              value: ${infrastructureConfig.data['aws-project']}

    # Redis / ElastiCache (conditional — requires redisEnabled=true)

    - id: redisSg
      includeWhen:
        - ${infrastructureConfig.data['search-redis-enabled'] == 'true'}
      readyWhen:
        - ${redisSg.status.?id.orValue('null') != 'null'}
        - ${redisSg.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
      template:
        apiVersion: ec2.services.k8s.aws/v1alpha1
        kind: SecurityGroup
        metadata:
          name: ${schema.spec.name}-redis-sg
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${infrastructureConfig.data['aws-region']}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          name: ${schema.spec.name}-redis-sg
          description: "Security group for Redis ElastiCache - allows port ${infrastructureConfig.data['search-redis-port']} from VPC"
          vpcID: ${foundationBridge.data['vpc-id']}
          ingressRules:
            - ipProtocol: tcp
              fromPort: ${int(infrastructureConfig.data['search-redis-port'])}
              toPort: ${int(infrastructureConfig.data['search-redis-port'])}
              ipRanges:
                - cidrIP: ${foundationBridge.data['vpc-cidr']}
                  description: "Redis access from VPC"
          tags:
            - key: Name
              value: ${schema.spec.name}-redis-sg
            - key: Environment
              value: ${infrastructureConfig.data['aws-environment']}
            - key: ManagedBy
              value: Kro
            - key: Project
              value: ${infrastructureConfig.data['aws-project']}

    - id: cacheSubnetGroup
      includeWhen:
        - ${infrastructureConfig.data['search-redis-enabled'] == 'true'}
      readyWhen:
        - ${cacheSubnetGroup.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
      template:
        apiVersion: elasticache.services.k8s.aws/v1alpha1
        kind: CacheSubnetGroup
        metadata:
          name: ${schema.spec.name}-cache-subnets
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${infrastructureConfig.data['aws-region']}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          cacheSubnetGroupName: ${schema.spec.name}-cache-subnets
          cacheSubnetGroupDescription: "Cache subnet group for ${schema.spec.name} Redis"
          subnetIDs:
            - ${foundationBridge.data['private-subnet-1-id']}
            - ${foundationBridge.data['private-subnet-2-id']}

    - id: redisReplicationGroup
      includeWhen:
        - ${infrastructureConfig.data['search-redis-enabled'] == 'true'}
      readyWhen:
        - ${redisReplicationGroup.status.?ackResourceMetadata.?arn.orValue('null') != 'null'}
        - ${redisReplicationGroup.status.?conditions.orValue([]).exists(c, c.type == "ACK.ResourceSynced" && c.status == "True")}
      template:
        apiVersion: elasticache.services.k8s.aws/v1alpha1
        kind: ReplicationGroup
        metadata:
          name: ${schema.spec.name}-redis
          namespace: ${schema.spec.namespace}
          annotations:
            services.k8s.aws/region: ${infrastructureConfig.data['aws-region']}
            services.k8s.aws/adoption-policy: ${schema.spec.adoptionPolicy}
            services.k8s.aws/deletion-policy: ${schema.spec.deletionPolicy}
        spec:
          description: "Redis cluster for ${schema.spec.name} gen3 platform"
          replicationGroupID: ${schema.spec.name}-redis
          engine: redis
          engineVersion: ${infrastructureConfig.data['search-redis-engine-version']}
          cacheNodeType: ${infrastructureConfig.data['search-redis-node-type']}
          numNodeGroups: ${int(infrastructureConfig.data['search-redis-num-node-groups'])}
          replicasPerNodeGroup: ${int(infrastructureConfig.data['search-redis-replicas-per-node-group'])}
          automaticFailoverEnabled: ${infrastructureConfig.data['search-redis-auto-failover-enabled'] == 'true'}
          atRestEncryptionEnabled: true
          transitEncryptionEnabled: ${infrastructureConfig.data['search-redis-transit-encryption-enabled'] == 'true'}
          kmsKeyID: ${foundationBridge.data['search-key-arn']}
          cacheSubnetGroupName: ${schema.spec.name}-cache-subnets
          securityGroupIDs:
            - ${redisSg.status.?id.orValue("")}
          snapshotRetentionLimit: ${int(infrastructureConfig.data['search-redis-snapshot-retention-limit'])}
          port: ${int(infrastructureConfig.data['search-redis-port'])}
          tags:
            - key: Name
              value: ${schema.spec.name}-redis
            - key: Environment
              value: ${infrastructureConfig.data['aws-environment']}
            - key: ManagedBy
              value: Kro
            - key: Project
              value: ${infrastructureConfig.data['aws-project']}

    # Search bridge — Redis endpoints omitted (no downstream consumers)

    - id: searchBridge
      template:
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: ${schema.spec.searchBridgeName}
          namespace: ${schema.spec.namespace}
          labels:
            app.kubernetes.io/managed-by: kro
            gen3.io/tier: search
            gen3.io/bridge: "true"
        data:
          opensearch-endpoint: ${openSearchDomain.status.?endpoints.?vpc.orValue("loading")}
          opensearch-domain-arn: ${openSearchDomain.status.?ackResourceMetadata.?arn.orValue("loading")}
