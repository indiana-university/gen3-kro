{{/*
workloads.yaml — renders one ArgoCD Application per enabled workload entry.
Each Application targets the spoke cluster (registered by the RGD's argoCDClusterSecret)
and deploys a Gen3 service via its upstream Helm chart.
*/}}
{{- range $name, $wl := .Values.workloads }}
{{- if $wl.enabled }}
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: {{ $.Values.spokeNamespace | default $.Release.Namespace }}-{{ $name }}
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: {{ $wl.syncWave | default "50" | quote }}
  labels:
    app.kubernetes.io/managed-by: gen3-workloads-chart
    gen3.io/workload: {{ $name | quote }}
spec:
  project: default
  source:
    repoURL: {{ $wl.spec.helmRepo }}
    targetRevision: {{ $wl.spec.helmRevision | default "master" }}
    path: {{ $wl.spec.helmPath }}
    helm:
      releaseName: {{ $name }}
      {{- if $wl.spec.values }}
      values: |
        {{- $wl.spec.values | nindent 8 }}
      {{- end }}
  destination:
    # Target the spoke cluster registered by argoCDClusterSecret
    name: {{ $.Values.spokeNamespace | default $.Release.Namespace }}-{{ $wl.clusterName | default (printf "%s" $.Values.spokeNamespace) }}
    namespace: {{ $wl.namespace | default "default" }}
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
    retry:
      limit: 5
      backoff:
        duration: "30s"
        factor: 2
        maxDuration: "5m"
    syncOptions:
      - CreateNamespace=true
      - Replace=true
{{- end }}
{{- end }}
